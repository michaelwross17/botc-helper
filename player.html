<body>
<div id="root" class="max-w-md mx-auto p-4 sm:p-6"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

// ---------------- Data + storage ----------------
const ALL_CHARACTERS = window.BOTC_DATA?.characters || [];
const CHAR_BY_ID = Object.fromEntries(ALL_CHARACTERS.map(c => [c.id, c]));

function iconUrl(charId) {
  const c = CHAR_BY_ID[charId];
  if (!c) return null;
  return `data/icons/${c.team}/${charId}.webp`;
}

// Cloud sync via Firebase Realtime Database. The room code in the URL
// (`?room=ABCD`) decides which game we attach to. The storyteller and every
// player phone listen to the same node — writes from any client fan out
// to the others in milliseconds.
const CLIENT_ID_KEY = 'botc-player-client-id';

// Module-level pointer to the current game cache so updateSeat / updateTraveller
// can grab the latest snapshot without an additional Firebase read.
let __gameCache = null;
let __gameRef = null;
let __saveTimer = null;
let __lastSavedJson = '';

function setGameRef(ref) { __gameRef = ref; }
function setGameCache(g) {
  __gameCache = g;
  __lastSavedJson = JSON.stringify(g || {});
}

function loadGame() { return __gameCache; }

function saveGame(g) {
  __gameCache = g;
  if (!__gameRef) return;
  const json = JSON.stringify(g);
  if (json === __lastSavedJson) return;
  clearTimeout(__saveTimer);
  __saveTimer = setTimeout(() => {
    __lastSavedJson = json;
    __gameRef.set(g).catch(e => console.error('player write failed:', e));
  }, 150);
}

function getRoomFromUrl() {
  try { return new URLSearchParams(window.location.search).get('room'); } catch { return null; }
}

function getOrCreateClientId() {
  // Per-tab/session client ID. Two tabs on the same device = two different clients,
  // which is exactly what we want for duplicate-claim detection.
  let id = sessionStorage.getItem(CLIENT_ID_KEY);
  if (!id) {
    id = 'c_' + Math.random().toString(36).slice(2, 10);
    sessionStorage.setItem(CLIENT_ID_KEY, id);
  }
  return id;
}

// Mutate a single seat in localStorage. Returns the new game state.
function updateSeat(seatNum, mutator) {
  const game = loadGame();
  if (!game?.grimoire?.seats) return null;
  game.grimoire.seats = game.grimoire.seats.map(s =>
    s.seatNum === seatNum ? mutator({ ...s }) : s
  );
  saveGame(game);
  return game;
}

// Mutate a single traveller in localStorage. Returns the new game state.
function updateTraveller(travellerNum, mutator) {
  const game = loadGame();
  const list = game?.grimoire?.travellers;
  if (!list) return null;
  game.grimoire.travellers = list.map(t =>
    t.travellerNum === travellerNum ? mutator({ ...t }) : t
  );
  saveGame(game);
  return game;
}

// Mirror of storyteller.html: Firebase RTDB drops nulls from arrays, so bluff
// arrays come back sparse or as objects. Always pad to length 3.
function padBluffs(b) {
  if (b == null) return [null, null, null];
  if (Array.isArray(b)) return [b[0] || null, b[1] || null, b[2] || null];
  if (typeof b === 'object') return [b[0] || b['0'] || null, b[1] || b['1'] || null, b[2] || b['2'] || null];
  return [null, null, null];
}
function normalizeGrimoireBluffs(grim) {
  if (!grim) return grim;
  const fixed = {
    ...grim,
    demonBluffs: padBluffs(grim.demonBluffs),
    lunaticBluffs: padBluffs(grim.lunaticBluffs),
  };
  if (grim.minionBluffs && typeof grim.minionBluffs === 'object') {
    const m = {};
    for (const k in grim.minionBluffs) m[k] = padBluffs(grim.minionBluffs[k]);
    fixed.minionBluffs = m;
  }
  return fixed;
}
function normalizeGameBluffs(game) {
  if (!game) return game;
  if (!game.grimoire) return game;
  return { ...game, grimoire: normalizeGrimoireBluffs(game.grimoire) };
}

// Read ?t=N from the current URL — non-null = this client is a traveller, not a regular player.
function getTravellerNumFromUrl() {
  try {
    const v = new URLSearchParams(window.location.search).get('t');
    const n = v ? parseInt(v, 10) : NaN;
    return Number.isInteger(n) && n > 0 ? n : null;
  } catch { return null; }
}

// ---------------- App ----------------
function App() {
  const clientId = useMemo(getOrCreateClientId, []);
  // ?t=N tells us this client is a traveller, joining via the link the ST shared.
  // We don't go through SeatPicker at all in that case — the traveller's slot is
  // pre-allocated by the ST.
  const travellerNum = useMemo(getTravellerNumFromUrl, []);
  const [roomCode, setRoomCode] = useState(() => {
    const c = getRoomFromUrl();
    return c ? c.toUpperCase() : null;
  });
  const [game, setGameState] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [isOnline, setIsOnline] = useState(true);

  // Wrap setGame so callers stay simple — both update React state AND push to
  // Firebase via saveGame (which debounces).
  const setGame = (g) => {
    setGameState(g);
    if (g) saveGame(g);
  };

  // Subscribe to the room's state in Firebase. Re-subscribes if roomCode changes.
  useEffect(() => {
    if (!roomCode || !window.__BOTC_DB__) {
      setLoaded(true);
      return;
    }
    const ref = window.__BOTC_DB__.ref('rooms/' + roomCode + '/state');
    setGameRef(ref);
    const onValue = (snap) => {
      const v = normalizeGameBluffs(snap.val());
      setGameCache(v || null);
      setGameState(v || null);
      setLoaded(true);
    };
    ref.on('value', onValue);
    const connRef = window.__BOTC_DB__.ref('.info/connected');
    const onConn = (snap) => setIsOnline(!!snap.val());
    connRef.on('value', onConn);
    return () => {
      ref.off('value', onValue);
      connRef.off('value', onConn);
      setGameRef(null);
    };
  }, [roomCode]);

  // Without a room code, show a join screen.
  if (!roomCode) {
    return <RoomEntry onJoin={(code) => {
      const c = code.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 8);
      if (!c) return;
      // Update URL so the player can refresh/bookmark.
      const url = new URL(window.location.href);
      url.searchParams.set('room', c);
      window.history.replaceState(null, '', url.toString());
      setRoomCode(c);
    }} />;
  }

  if (!loaded) {
    return (
      <div className="text-center py-24">
        <div className="text-amber-200 text-lg">Joining room <span className="font-bold tracking-widest">{roomCode}</span>…</div>
        <p className="text-xs text-stone-500 mt-2">Connecting…</p>
      </div>
    );
  }

  const grim = game?.grimoire;

  // Traveller flow — diverges before the regular seat-picker because travellers
  // can join AFTER the bag has been dealt (so the game may already be running).
  if (travellerNum != null) {
    return <TravellerApp
      game={game}
      setGame={setGame}
      clientId={clientId}
      travellerNum={travellerNum}
    />;
  }

  // No seats yet — either the room is brand new or a legacy room created before
  // we pre-populated seats. Show the waiting screen until the ST sets things up.
  if (!grim?.seats?.length) {
    return <WaitingForStoryteller />;
  }

  // Find any seat that this client has claimed
  const mySeat = grim.seats.find(s =>
    (s.claims || []).some(c => c.clientId === clientId)
  );

  if (!mySeat) {
    return <SeatPicker
      seats={grim.seats}
      clientId={clientId}
      onPicked={(seatNum) => setGame(loadGame())}
    />;
  }

  if (!(mySeat.playerName || '').trim()) {
    return <NameEntry
      seat={mySeat}
      onSubmit={(name) => setGame(updateSeat(mySeat.seatNum, s => ({ ...s, playerName: name })))}
      onChangeSeat={() => {
        const game = updateSeat(mySeat.seatNum, s => ({
          ...s,
          claims: (s.claims || []).filter(c => c.clientId !== clientId),
        }));
        setGame(game);
      }}
    />;
  }

  // Storyteller is showing the full grimoire snapshot to this seat (Spy ability etc.)
  // Renders on top of whatever else is currently displayed.
  if (grim.grimoireShownToSeat === mySeat.seatNum) {
    return <GrimoireSnapshotOverlay grimoire={grim}
      onAccept={() => setGame(((g) => {
        const next = loadGame() || g;
        next.grimoire = { ...(next.grimoire || {}), grimoireShownToSeat: null };
        saveGame(next);
        return next;
      })(game))}
    />;
  }

  // Storyteller has passed out this player's role → show their character.
  if (mySeat.roleDealt) {
    const setStatus = (status) => setGame(updateSeat(mySeat.seatNum, s => ({ ...s, playerStatus: status })));
    if (mySeat.playerStatus === 'accepted') {
      // Kazali special flow: after accepting, the player must pick which players
      // become Minions. We gate the AcceptedScreen on those picks being submitted.
      const needsKazaliPicks =
        mySeat.actualRoleId === 'kazali' &&
        !(grim.kazaliPicks && grim.kazaliPicks.length);
      if (needsKazaliPicks) {
        return <KazaliPicksScreen
          mySeat={mySeat}
          game={game}
          onSubmit={(picks) => {
            // Atomic write: update Kazali's seat AND every picked seat AND the
            // grimoire.kazaliPicks marker in one localStorage write so the
            // storyteller sees a consistent state.
            const next = loadGame() || game;
            if (!next?.grimoire) return;
            const pickedBySeat = Object.fromEntries(picks.map(p => [p.seatNum, p.minionId]));
            next.grimoire.seats = next.grimoire.seats.map(s => {
              if (pickedBySeat[s.seatNum]) {
                const minionId = pickedBySeat[s.seatNum];
                const origId = s.previousRoleId || s.perceivedRoleId;
                const origChar = CHAR_BY_ID[origId];
                const existingReminders = s.reminders || [];
                // Drop a reminder token of the original role on the seat so the
                // storyteller can see at a glance that this player was converted
                // and what they were before. Skip if the same marker is already
                // present (re-runs of the picks flow).
                const alreadyMarked = existingReminders.some(r =>
                  r.kazaliOriginal && r.charId === origId);
                const reminders = alreadyMarked ? existingReminders : [
                  ...existingReminders,
                  {
                    charId: origId,
                    label: `Was ${origChar?.name || origId}`,
                    charName: origChar?.name,
                    team: origChar?.team,
                    kazaliOriginal: true,
                  },
                ];
                return {
                  ...s,
                  // Remember what they were before Kazali chose them, so the role
                  // reveal can explain the change ("you were X, Kazali made you Y").
                  // Don't overwrite a previously-set previousRoleId — preserve the
                  // earliest known role in case of repeated conversions.
                  previousRoleId: origId,
                  changedBy: 'kazali',
                  perceivedRoleId: minionId,
                  actualRoleId: minionId,
                  reminders,
                  // Reset deal status so the ST re-pushes the new role to the player.
                  roleDealt: false,
                  playerStatus: null,
                };
              }
              return s;
            });
            next.grimoire.kazaliPicks = picks;
            saveGame(next);
            setGame(next);
          }}
        />;
      }
      // Night automation: if the ST has issued a prompt to our seat, the player
      // sees a full-screen NightPromptScreen instead of the resting AcceptedScreen.
      // Excludes 'show-grimoire' prompts — those are rendered exclusively via
      // the grimoireShownToSeat → GrimoireSnapshotOverlay path; rendering the
      // generic target picker for them flashes briefly between the player
      // tapping Got it and the ST effect transitioning the prompt to submitted.
      const myPrompt = (grim.nightPrompts || {})[mySeat.seatNum];
      // Lunatic-as-X: when the prompt is parked at 'awaiting-st-response' (ST
      // is reviewing the picks before clicking Send-to-Demon), skip the
      // 'Choice recorded' screen and fall through to AcceptedScreen — the
      // Lunatic shouldn't see they're in a waiting state.
      const isLunaticSeat = mySeat.actualRoleId === 'lunatic';
      if (myPrompt && myPrompt.action !== 'show-grimoire' &&
          (myPrompt.status === 'use-decision' || myPrompt.status === 'awaiting' || myPrompt.status === 'question' || (myPrompt.status === 'awaiting-st-response' && !isLunaticSeat))) {
        return <NightPromptScreen
          mySeat={mySeat}
          seats={grim.seats}
          prompt={myPrompt}
          scriptCharIds={game?.characterIds || []}
          onSubmit={(targets, extras) => {
            const next = loadGame() || game;
            if (!next?.grimoire) return;
            const np = { ...(next.grimoire.nightPrompts || {}) };
            const curr = np[mySeat.seatNum] || {};
            // Two-step actions (Fortune Teller etc.) leave the prompt in
            // 'awaiting-st-response' so the ST can pick the info to return.
            // For info acks (Got it on an info display) the prompt already has
            // an infoPayload — those go straight to 'submitted'.
            const isTwoStep = (curr.action === 'target2+yesno' || curr.action === 'target1+role' || curr.action === 'target1+role-pair' || curr.action === 'target1+mad-claim' || curr.action === 'target2+number' || curr.action === 'target2+st-pick' || curr.action === 'target1+st-pick' || curr.action === 'target1+guess') && !curr.infoPayload;
            const newStatus = isTwoStep ? 'awaiting-st-response' : 'submitted';
            // Preserve existing targets when info-acking with an empty array,
            // so the ST effect can still place the per-target reminders.
            const newTargets = (Array.isArray(targets) && targets.length > 0)
              ? targets
              : (curr.targets || targets);
            np[mySeat.seatNum] = { ...curr, status: newStatus, targets: newTargets, decidedAt: Date.now(), ...(extras && typeof extras === 'object' ? extras : {}) };
            next.grimoire.nightPrompts = np;
            saveGame(next);
            setGame(next);
          }}
          onQuestion={() => {
            const next = loadGame() || game;
            if (!next?.grimoire) return;
            const np = { ...(next.grimoire.nightPrompts || {}) };
            np[mySeat.seatNum] = { ...np[mySeat.seatNum], status: 'question', decidedAt: Date.now() };
            next.grimoire.nightPrompts = np;
            saveGame(next);
            setGame(next);
          }}
          onUseAbility={() => {
            const next = loadGame() || game;
            if (!next?.grimoire) return;
            const np = { ...(next.grimoire.nightPrompts || {}) };
            np[mySeat.seatNum] = { ...np[mySeat.seatNum], status: 'awaiting', decidedAt: Date.now() };
            next.grimoire.nightPrompts = np;
            saveGame(next);
            setGame(next);
          }}
          onSkipAbility={() => {
            const next = loadGame() || game;
            if (!next?.grimoire) return;
            const np = { ...(next.grimoire.nightPrompts || {}) };
            np[mySeat.seatNum] = { ...np[mySeat.seatNum], status: 'declined', decidedAt: Date.now() };
            next.grimoire.nightPrompts = np;
            saveGame(next);
            setGame(next);
          }}
        />;
      }
      return <AcceptedScreen seat={mySeat} />;
    }
    return <RoleReveal
      seat={mySeat}
      grimoire={grim}
      bagCharacterIds={game?.bagCharacterIds || []}
      onAccept={() => setStatus('accepted')}
      onAsk={() => setStatus('asking')}
    />;
  }

  return <WaitingForGame
    seat={mySeat}
    onChangeName={() => setGame(updateSeat(mySeat.seatNum, s => ({ ...s, playerName: '' })))}
    onLeaveSeat={() => {
      if (!confirm('Leave your seat? Someone else may take it.')) return;
      const game = updateSeat(mySeat.seatNum, s => ({
        ...s,
        playerName: '',
        claims: (s.claims || []).filter(c => c.clientId !== clientId),
      }));
      setGame(game);
    }}
  />;
}

// ---------------- Screens ----------------
function ScreenShell({ children }) {
  return (
    <div className="min-h-[100dvh] flex flex-col gap-6 py-6">
      <header className="text-center">
        <h1 className="text-amber-200 text-xl font-semibold tracking-tight">Blood on the Clocktower</h1>
        <p className="text-xs text-stone-500 mt-1">Player</p>
      </header>
      {children}
    </div>
  );
}

// Shown when the player opens player.html without a room code. They either
// scan the ST's QR (which sets ?room=…) or type the 4-letter code by hand.
function RoomEntry({ onJoin }) {
  const [code, setCode] = useState('');
  const trimmed = code.trim();
  return (
    <ScreenShell>
      <section className="parchment rounded-lg p-5 space-y-4 text-center">
        <div className="text-xs uppercase tracking-wider text-amber-300">Join a game</div>
        <p className="text-sm text-stone-300">
          Ask the storyteller for the 4-letter room code, or scan the QR code they're holding up.
        </p>
        <input value={code}
          onChange={e => setCode(e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 8))}
          onKeyDown={e => { if (e.key === 'Enter' && trimmed) onJoin(trimmed); }}
          autoFocus placeholder="ABCD"
          className="w-full bg-stone-900 border border-stone-700 rounded px-3 py-3 text-2xl tracking-[0.4em] font-mono text-center" />
        <button onClick={() => trimmed && onJoin(trimmed)}
          disabled={!trimmed}
          className={`w-full py-3 rounded-lg text-base font-semibold
            ${trimmed ? 'bg-emerald-600 hover:bg-emerald-500 text-stone-950' : 'bg-stone-800 text-stone-500 cursor-not-allowed'}`}>
          Join
        </button>
      </section>
    </ScreenShell>
  );
}

function WaitingForStoryteller() {
  return (
    <ScreenShell>
      <section className="parchment rounded-lg p-6 text-center space-y-3">
        <div className="text-3xl">🕯️</div>
        <div className="text-amber-200 text-lg font-medium">Waiting for the storyteller…</div>
        <p className="text-sm text-stone-400">
          Once the storyteller has set up the game, you'll be able to pick your seat here.
        </p>
        <p className="text-xs text-stone-500 pt-4">
          This page auto-updates — no need to refresh.
        </p>
      </section>
    </ScreenShell>
  );
}

function SeatPicker({ seats, clientId, onPicked }) {
  const [error, setError] = useState(null);

  const pick = (seatNum) => {
    setError(null);
    const game = loadGame();
    if (!game?.grimoire?.seats) return;
    const seat = game.grimoire.seats.find(s => s.seatNum === seatNum);
    if (!seat) return;

    const claims = seat.claims || [];
    const alreadyMine = claims.some(c => c.clientId === clientId);
    const claimedByOther = claims.some(c => c.clientId !== clientId);

    if (claimedByOther && !alreadyMine) {
      setError(`Seat #${seatNum} is already taken${seat.playerName ? ` by ${seat.playerName}` : ''}. Pick another.`);
      return;
    }

    // Claim the seat (add our clientId)
    const newClaims = alreadyMine ? claims : [...claims, { clientId, timestamp: Date.now() }];
    game.grimoire.seats = game.grimoire.seats.map(s =>
      s.seatNum === seatNum ? { ...s, claims: newClaims } : s
    );
    saveGame(game);
    onPicked(seatNum);
  };

  return (
    <ScreenShell>
      <section className="parchment rounded-lg p-4 space-y-3">
        <h2 className="text-amber-200 font-semibold text-lg">Pick your seat</h2>
        <p className="text-xs text-stone-400">Tap the seat you're sitting in at the table.</p>
        {error && (
          <div className="text-sm text-red-400 bg-red-950/40 border border-red-700 rounded px-3 py-2">
            {error}
          </div>
        )}
        <div className="grid grid-cols-3 sm:grid-cols-4 gap-2">
          {seats.map(seat => {
            const claimed = (seat.claims || []).length > 0;
            const isLocal = !!seat.isLocal;
            // Local seats are managed on the ST's device — no remote phone can claim them.
            const taken = claimed || isLocal;
            return (
              <button key={seat.seatNum}
                onClick={() => !isLocal && pick(seat.seatNum)}
                disabled={taken}
                className={`seat-btn rounded-lg border flex flex-col items-center justify-center gap-0.5 p-2 transition
                  ${taken
                    ? 'bg-stone-900/60 border-stone-800 text-stone-600 cursor-not-allowed'
                    : 'pill hover:border-amber-500 hover:text-amber-200 active:scale-95'}`}>
                <span className="text-lg font-bold">#{seat.seatNum}</span>
                {isLocal
                  ? <span className="text-[10px] uppercase truncate w-full text-center text-purple-400">
                      🏠 local{seat.playerName ? ` · ${seat.playerName}` : ''}
                    </span>
                  : taken
                    ? <span className="text-[10px] uppercase truncate w-full text-center">
                        {seat.playerName ? seat.playerName : 'taken'}
                      </span>
                    : <span className="text-[10px] uppercase text-stone-500">open</span>}
              </button>
            );
          })}
        </div>
      </section>
    </ScreenShell>
  );
}

function NameEntry({ seat, onSubmit, onChangeSeat }) {
  const [name, setName] = useState(seat.playerName || '');
  const trimmed = name.trim();
  return (
    <ScreenShell>
      <section className="parchment rounded-lg p-4 space-y-3">
        <div className="text-center">
          <div className="text-xs text-stone-400 uppercase tracking-wider">You're at</div>
          <div className="text-amber-200 text-3xl font-bold">Seat #{seat.seatNum}</div>
        </div>
        <label className="block">
          <span className="text-sm text-stone-300">Your name</span>
          <input
            value={name}
            onChange={e => setName(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter' && trimmed) onSubmit(trimmed); }}
            autoFocus
            maxLength={32}
            placeholder="Type your name…"

function RoleReveal({ seat, grimoire, bagCharacterIds, onAccept, onAsk }) {
  // Players see their PERCEIVED role (what they think they are).
  // For Drunk-as-Chef, the player sees Chef. The Drunk-ness is the storyteller's secret.
  const role = CHAR_BY_ID[seat.perceivedRoleId];
  const actual = CHAR_BY_ID[seat.actualRoleId];
  // Anyone holding a demon-team token sees bluffs. If they're actually the Lunatic,
  // those bluffs come from grimoire.lunaticBluffs (fake info). Otherwise (real demon),
  // grimoire.demonBluffs.
  const isLunatic = seat.actualRoleId === 'lunatic';
  const perceivedIsDemon = role?.team === 'demon';
  // Summoner ability says "You get 3 bluffs" — same 3 as the demon-bluff slots,
  // even though the Summoner is a Minion (and there's no Demon in play yet).
  const isSummoner = seat.actualRoleId === 'summoner';
  // Minions get their own bluffs ONLY if the Snitch is in play (Snitch ability:
  // "Each Minion gets 3 bluffs."). We check the bag for Snitch and treat the
  // perceived role here — a Spy holding a Townsfolk token wouldn't see minion
  // bluffs because their perceived role is Townsfolk. But that's the official
  // behavior: the Snitch grants bluffs to actual minions, and those minions know
  // they're minions, so perceived === actual for them. We additionally check
  // actualRoleId team so a Marionette (perceived minion, actual outsider)
  // doesn't get bluffs they shouldn't have.
  const snitchInPlay = (bagCharacterIds || []).includes('snitch');
  const actualIsMinion = actual?.team === 'minion';
  const perceivedIsMinion = role?.team === 'minion';
  const showMinionBluffs = snitchInPlay && actualIsMinion && perceivedIsMinion;
  const minionBluffsForMe = showMinionBluffs
    ? ((grimoire?.minionBluffs || {})[seat.seatNum] || [null, null, null]).filter(Boolean)
    : [];
  // Summoner uses the demon-bluff pool; if Snitch ALSO marks this minion, prefer
  // the minion-specific bluffs (which are per-seat and may be customized).
  // skipDemonBluffs is set by the storyteller when promoting (e.g. SW becomes
  // the Demon) — those players don't get the 3-bluff first-night info.
  const showBluffs = !seat.skipDemonBluffs && (perceivedIsDemon || showMinionBluffs || isSummoner);
  const bluffs = showMinionBluffs
    ? minionBluffsForMe
    : (isLunatic
      ? (grimoire?.lunaticBluffs || []).filter(Boolean)
      : (grimoire?.demonBluffs || []).filter(Boolean));
  const asking = seat.playerStatus === 'asking';

  return (
    <ScreenShell>
      <section className="parchment rounded-lg p-5 text-center space-y-4">
        <div>
          <div className="text-xs text-stone-400 uppercase tracking-wider">{seat.playerName}</div>
          <div className="text-amber-200/80 text-sm">Seat #{seat.seatNum}</div>
        </div>

        {/* Kazali-conversion banner: if the player was originally a different role
            (i.e. they were a Townsfolk and the Kazali chose them to become a Minion),
            show their original token + label so they know what they were and that
            the Kazali changed them. */}
        {seat.previousRoleId && seat.previousRoleId !== seat.perceivedRoleId && (() => {
          const prev = CHAR_BY_ID[seat.previousRoleId];
          const fromSW = seat.changedBy === 'scarletwoman';
          const by = seat.changedBy === 'kazali'
            ? 'the Kazali'
            : (fromSW ? 'The previous Demon has died and' : 'the Storyteller');
          // SW-promotion blurb: she's becoming the Demon (not a Minion).
          // Kazali / generic ST conversions still read as "become a Minion".
          const message = fromSW
            ? `${by} you have taken over as the Demon. Your new role is shown below.`
            : `${by} has chosen you to become a Minion of the evil team. Your new role is shown below.`;
          return (
            <div className="rounded-lg p-3 border-2 border-red-700 bg-red-950/40 text-center">
              <div className="text-xs uppercase tracking-wider text-red-300 font-semibold mb-2">Your role has changed</div>
              <div className="text-xs text-stone-300 mb-2">You were originally:</div>
              <div className="flex flex-col items-center gap-1.5">
                <div className="rounded-full overflow-hidden border-2 border-amber-700 w-20 h-20"
                  style={{ backgroundImage: 'url(data/tokens/character-token-noise.webp)', backgroundSize: 'cover' }}>
                  {iconUrl(seat.previousRoleId) && (
                    <img src={iconUrl(seat.previousRoleId)} alt={prev?.name || ''} className="w-full h-full object-cover" />
                  )}
                </div>
                <div className={`text-sm font-bold ${prev ? `team-${prev.team}` : ''}`}>
                  {prev?.name || seat.previousRoleId}
                </div>
              </div>
              <p className="text-xs text-stone-300 mt-3">{message}</p>
            </div>
          );
        })()}

        <div className="text-xs uppercase tracking-wider text-amber-300">Your role</div>

        {/* Big round token */}
        <div className="mx-auto rounded-full overflow-hidden border-4 border-amber-700 relative shadow-xl"
          style={{ width: 'min(220px, 60vw)', aspectRatio: '1 / 1',
                   backgroundImage: 'url(data/tokens/character-token-noise.webp)', backgroundSize: 'cover' }}>
          {iconUrl(seat.perceivedRoleId) && (
            <img src={iconUrl(seat.perceivedRoleId)} alt={role?.name || ''} className="w-full h-full object-cover" />
          )}
          <div className="absolute inset-x-0 bottom-0 bg-stone-950/85 px-2 py-2 text-center"
            style={{ minHeight: '42%' }}>
            <div className={`text-[10px] sm:text-xs leading-tight mb-1 text-stone-200 px-1`}
              style={{ wordBreak: 'break-word' }}>
              {role?.ability}
            </div>
            <div className={`text-sm sm:text-base font-bold leading-tight ${role ? `team-${role.team}` : ''}`}>
              {role?.name || '?'}
            </div>
          </div>
        </div>

        {/* Big role name + ability outside the token for easy reading */}
        <div className="pt-2">
          <div className={`text-2xl font-bold ${role ? `team-${role.team}` : ''}`}>{role?.name}</div>
          <p className="text-sm text-stone-300 mt-2 leading-relaxed">{role?.ability}</p>
        </div>

        {/* Bluffs — real demons see demonBluffs, lunatics see lunaticBluffs (their fake info),
            minions see their own slot of minionBluffs only when Snitch is in play. */}
        {showBluffs && (
          <div className="pt-4 mt-2 border-t border-stone-800">
            <div className="text-xs uppercase tracking-wider text-amber-300 mb-1">
              {showMinionBluffs
                ? 'Your bluffs (from the Snitch)'
                : (isSummoner ? 'Your bluffs (Summoner)' : 'Your bluffs')}
            </div>
            <p className="text-xs text-stone-400 mb-3">3 roles you can claim to be</p>
            <div className="grid grid-cols-3 gap-2">
              {[0,1,2].map(i => {
                // Summoner uses the demon-bluffs pool. Snitch-minion uses per-seat
                // minion bluffs. Lunatic uses lunatic bluffs. Real demon uses demon bluffs.
                const sourceArr = showMinionBluffs
                  ? (grimoire?.minionBluffs || {})[seat.seatNum]
                  : (isLunatic ? grimoire.lunaticBluffs : grimoire.demonBluffs);
                const bId = sourceArr?.[i];
                const bc = bId ? CHAR_BY_ID[bId] : null;
                return (
                  <div key={i} className="text-center">
                    <div className="rounded-full overflow-hidden border-2 border-amber-700/70 mx-auto aspect-square w-full"
                      style={{ backgroundImage: 'url(data/tokens/character-token-noise.webp)', backgroundSize: 'cover' }}>
                      {bc && iconUrl(bId) ? (
                        <img src={iconUrl(bId)} alt={bc.name} className="w-full h-full object-cover" />
                      ) : (
                        <div className="w-full h-full flex items-center justify-center text-stone-600 text-xs">?</div>
                      )}
                    </div>
                    {bc ? (
                      <>
                        <div className={`mt-1 text-[11px] font-medium team-${bc.team}`}>{bc.name}</div>
                        <div className="text-[9px] text-stone-300/80 leading-tight mt-0.5">{bc.ability}</div>
                      </>
                    ) : (
                      <div className="mt-1 text-[10px] text-stone-500 italic">(no bluff set)</div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Accept / Ask question controls */}
        <div className="pt-4 border-t border-stone-800 space-y-2">
          {asking && (
            <div className="rounded p-2 text-sm bg-yellow-950/40 border border-yellow-700 text-yellow-200">
              ✋ Storyteller notified. Wave them over to discuss.
            </div>
          )}
          <button onClick={onAccept}
            className="w-full py-3 rounded-lg text-base font-semibold bg-emerald-600 hover:bg-emerald-500 text-stone-950">
            {asking ? 'Discussion done — Accept role' : 'Accept role'}
          </button>
          {!asking && (
            <button onClick={onAsk}
              className="w-full py-3 rounded-lg text-base font-medium bg-yellow-700 hover:bg-yellow-600 text-stone-100">
              ✋ Ask question
            </button>
          )}
          <p className="text-[11px] text-stone-500 text-center pt-1">
            "Accept" hides your role from the screen so no one can peek over your shoulder.
          </p>
        </div>
      </section>
    </ScreenShell>
  );
}

// Traveller player flow. The ST has given this player a link with ?t=<travellerNum>.
// The traveller slot is created by the ST in advance, so we just auto-claim it,
// collect the player's name, and (when the ST passes the role) show role reveal.
function TravellerApp({ game, setGame, clientId, travellerNum }) {
  const traveller = (game?.grimoire?.travellers || []).find(t => t.travellerNum === travellerNum);

  // Auto-claim on first arrival (only if not already claimed by this client).
  useEffect(() => {
    if (!traveller) return;
    const alreadyClaimed = (traveller.claims || []).some(c => c.clientId === clientId);
    if (alreadyClaimed) return;
    const next = updateTraveller(travellerNum, t => ({
      ...t,
      claims: [...(t.claims || []), { clientId, timestamp: Date.now() }],
    }));
    if (next) setGame(next);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [traveller?.travellerNum]);

  if (!traveller) {
    return (
      <ScreenShell>
        <section className="parchment rounded-lg p-6 text-center space-y-3">
          <div className="text-amber-200 text-lg font-semibold">Traveller link not active</div>
          <p className="text-sm text-stone-300">
            The storyteller hasn't added Traveller <span className="text-amber-200 font-bold">T#{travellerNum}</span> yet —
            or this slot has been removed.
          </p>
          <p className="text-xs text-stone-500">Ask the storyteller for the correct link, or refresh once they've added you.</p>
        </section>
      </ScreenShell>
    );
  }

  // Name entry (similar to regular player flow).
  if (!(traveller.playerName || '').trim()) {
    return <TravellerNameEntry traveller={traveller}
      onSubmit={(name) => setGame(updateTraveller(travellerNum, t => ({ ...t, playerName: name })))}
    />;
  }

  // ST has dealt the role → show it.
  if (traveller.roleDealt) {
    const setStatus = (status) => setGame(updateTraveller(travellerNum, t => ({ ...t, playerStatus: status })));
    if (traveller.playerStatus === 'accepted') {
      // Synthesize a seat-shaped object for AcceptedScreen's display.
      return <AcceptedScreen seat={{ seatNum: `T${travellerNum}`, playerName: traveller.playerName }} />;
    }
    return <TravellerRoleReveal
      traveller={traveller}
      onAccept={() => setStatus('accepted')}
      onAsk={() => setStatus('asking')}
    />;
  }

  // Waiting for ST to push role.
  return (
    <ScreenShell>
      <section className="parchment rounded-lg p-5 text-center space-y-3">
        <div className="text-xs uppercase tracking-wider text-purple-300">Traveller T#{travellerNum}</div>
        <h2 className="text-amber-200 text-lg font-semibold">Welcome, {traveller.playerName}</h2>
        <p className="text-sm text-stone-300">
          You're in. Hold tight — the storyteller will hand you your role when they're ready.
        </p>
        <div className="text-xs text-stone-500 pt-2 border-t border-stone-800">
          T#{travellerNum} · joined
        </div>
      </section>
    </ScreenShell>
  );
}
