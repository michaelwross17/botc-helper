// Standard bag composition per player count: [townsfolk, outsider, minion, demon].
// Mirrors the storyteller's BAG table so we can derive the minion count without
// piping it through state. Used by Kazali to know how many minions to pick.
const STD_BAG = {
  5:  [3, 0, 1, 1], 6:  [3, 1, 1, 1], 7:  [5, 0, 1, 1],
  8:  [5, 1, 1, 1], 9:  [5, 2, 1, 1], 10: [7, 0, 2, 1],
  11: [7, 1, 2, 1], 12: [7, 2, 2, 1], 13: [9, 0, 3, 1],
  14: [9, 1, 3, 1], 15: [9, 2, 3, 1],
};

// Kazali setup picks. The Kazali player chooses which Townsfolk become Minions
// (one minion per pick row). After submit, those seats' perceived AND actual roles
// become the chosen minion role. The storyteller sees the picks list and the
// seats auto-update so they can re-deal to the converted players.
function KazaliPicksScreen({ mySeat, game, onSubmit }) {
  const grim = game?.grimoire || {};
  const seats = grim.seats || [];
  const playerCount = game?.playerCount || seats.length || 0;
  const baseBag = STD_BAG[playerCount] || [0, 0, 0, 0];
  const minionCount = baseBag[2];

  // Available minion choices = minions on the script (any of them, even if not
  // already in play — Kazali freely picks). Sorted by name for scannability.
  const scriptMinions = (game?.characterIds || [])
    .map(id => CHAR_BY_ID[id])
    .filter(c => c && c.team === 'minion')
    .sort((a, b) => a.name.localeCompare(b.name));

  // Seats Kazali can pick from = everyone except themselves.
  const otherSeats = seats.filter(s => s.seatNum !== mySeat.seatNum);

  // One row per minion slot. Each row has a seat + a minion id (both default to '').
  const [picks, setPicks] = useState(
    () => Array.from({ length: minionCount }, () => ({ seatNum: '', minionId: '' }))
  );

  const setRow = (i, patch) => setPicks(p => p.map((r, j) => j === i ? { ...r, ...patch } : r));

  // Pre-compute "already used" sets so each subsequent row can disable conflicts.
  const usedSeats = new Set(picks.map(p => p.seatNum).filter(Boolean));
  const usedMinions = new Set(picks.map(p => p.minionId).filter(Boolean));

  const allFilled = picks.every(p => p.seatNum && p.minionId);
  const hasMinionsAvailable = scriptMinions.length >= minionCount;

  if (minionCount === 0) {
    // No minions in this player count? Bypass picks entirely — submit empty.
    return (
      <ScreenShell>
        <section className="parchment rounded-lg p-5 text-center space-y-3">
          <div className="text-amber-200 text-lg font-semibold">No minions to pick</div>
          <p className="text-sm text-stone-400">
            This game has 0 minions. Tap below to continue.
          </p>
          <button onClick={() => onSubmit([])}
            className="w-full py-3 rounded-lg text-base font-semibold bg-emerald-600 hover:bg-emerald-500 text-stone-950">
            Continue
          </button>
        </section>
      </ScreenShell>
    );
  }

  return (
    <ScreenShell>
      <section className="parchment rounded-lg p-5 space-y-4">
        <div className="text-center">
          <div className="text-xs uppercase tracking-wider text-red-300">You are the Kazali</div>
          <h2 className="text-amber-200 text-xl font-bold mt-1">Choose your Minions</h2>
          <p className="text-xs text-stone-400 mt-1">
            Pick {minionCount} player{minionCount === 1 ? '' : 's'} and the minion role each becomes.
          </p>
        </div>

        {!hasMinionsAvailable && (
          <div className="rounded p-2 text-xs bg-red-950/40 border border-red-700 text-red-200">
            ⚠ Only {scriptMinions.length} minion role{scriptMinions.length === 1 ? '' : 's'} on this script — you need {minionCount}. Storyteller may need to adjust the script.
          </div>
        )}

        <div className="space-y-4">
          {picks.map((row, i) => (
            <div key={i} className="card rounded p-3 space-y-3">
              <div className="text-xs uppercase tracking-wider text-amber-300">Minion #{i + 1}</div>

              {/* Player list — tap a name to select. Used-elsewhere seats are dimmed. */}
              <div>
                <div className="text-[11px] text-stone-400 mb-1.5">Player</div>
                <div className="grid grid-cols-2 gap-1.5">
                  {otherSeats.map(s => {
                    const taken = usedSeats.has(s.seatNum) && s.seatNum !== row.seatNum;
                    const isSelected = row.seatNum === s.seatNum;
                    return (
                      <button key={s.seatNum}
                        onClick={() => !taken && setRow(i, { seatNum: isSelected ? '' : s.seatNum })}
                        disabled={taken}
                        className={`text-left px-2.5 py-2 rounded border text-sm transition seat-btn
                          ${isSelected
                            ? 'border-amber-500 bg-amber-950/40 text-amber-200'
                            : taken
                              ? 'border-stone-800 bg-stone-900/40 text-stone-600 cursor-not-allowed line-through'
                              : 'border-stone-700 hover:border-amber-700 text-stone-200'}`}>
                        <div className="text-[10px] text-amber-200/70 uppercase tracking-wider">Seat #{s.seatNum}</div>
                        <div className="font-medium truncate">{s.playerName || '(no name)'}</div>
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* Minion icon grid — tap an icon to select. Used-elsewhere minions are dimmed. */}
              <div>
                <div className="text-[11px] text-stone-400 mb-1.5">Minion role</div>
                <div className="grid grid-cols-3 gap-2">
                  {scriptMinions.map(c => {
                    const taken = usedMinions.has(c.id) && c.id !== row.minionId;
                    const isSelected = row.minionId === c.id;
                    return (
                      <button key={c.id}
                        onClick={() => !taken && setRow(i, { minionId: isSelected ? '' : c.id })}
                        disabled={taken}
                        title={c.ability}
                        className={`text-center p-2 rounded border transition flex flex-col items-center gap-1
                          ${isSelected
                            ? 'border-amber-500 bg-amber-950/40 ring-2 ring-amber-500/40'
                            : taken
                              ? 'border-stone-800 bg-stone-900/40 opacity-40 cursor-not-allowed'
                              : 'border-stone-700 hover:border-red-500'}`}>
                        <div className="rounded-full overflow-hidden border-2 border-stone-700 w-12 h-12"
                          style={{ backgroundImage: 'url(data/tokens/character-token-noise.webp)', backgroundSize: 'cover' }}>
                          {iconUrl(c.id) && (
                            <img src={iconUrl(c.id)} alt={c.name} className="w-full h-full object-cover" />
                          )}
                        </div>
                        <div className={`text-[11px] font-medium leading-tight ${isSelected ? 'text-amber-200' : 'team-minion'}`}>
                          {c.name}
                        </div>
                      </button>
                    );
                  })}
                </div>
                {row.minionId && CHAR_BY_ID[row.minionId]?.ability && (
                  <p className="text-[10px] text-stone-400 mt-2 leading-snug px-1">{CHAR_BY_ID[row.minionId].ability}</p>
                )}
              </div>
            </div>
          ))}
        </div>

        <button onClick={() => onSubmit(picks)}
          disabled={!allFilled || !hasMinionsAvailable}
          className={`w-full py-3 rounded-lg text-base font-semibold transition
            ${allFilled && hasMinionsAvailable
              ? 'bg-emerald-600 hover:bg-emerald-500 text-stone-950 shadow-lg shadow-emerald-900/40'
              : 'bg-stone-800 text-stone-500 cursor-not-allowed'}`}>
          Confirm picks
        </button>
        <p className="text-[11px] text-stone-500 text-center">
          These will be sent to the storyteller and the chosen players' roles will update automatically.
        </p>
      </section>
    </ScreenShell>
  );
}

// Full-screen INFO display for info roles. Reads prompt.infoPayload (set by the
// ST in InfoPickerModal) and renders the appropriate visual:
//   - 'seats+role'  → role icon + name, then 2 seat cards labeled "One of these"
//   - 'role'        → role icon + name only
//   - 'number'      → big numeric display with the configured label
//   - 'yesno'       → big YES or NO with the configured statement
// Tap "Got it" to acknowledge (parent submits a status='submitted' with no
// targets so the ST gets a toast). Question still flags the ST.
function NightInfoScreen({ mySeat, seats, prompt, onAck, onQuestion }) {
  const info = prompt.infoPayload || {};
  // For team-reveal info, override the role shown in the header so a Lunatic
  // player sees the demon role they think they are, not "Lunatic".
  const _teamRevealRoleId = (info && info.type === 'team-reveal' && info.viewerRoleId)
    ? info.viewerRoleId : null;
  const _displayRoleId = _teamRevealRoleId || prompt.roleId;
  const c = CHAR_BY_ID[_displayRoleId];
  const seatBy = Object.fromEntries((seats || []).map(s => [s.seatNum, s]));

  let body;
  if (info.type === 'seats+role') {
    const role = info.roleId ? CHAR_BY_ID[info.roleId] : null;
    if (info.none) {
      body = (
        <div className="text-center space-y-3">
          <div className="text-amber-200 text-xl font-bold">No such role in play.</div>
          <p className="text-sm text-stone-300">There are none of the relevant character in play tonight.</p>
        </div>
      );
    } else {
      const pickedSeats = (info.seats || []).map(n => seatBy[n]).filter(Boolean);
      body = (
        <div className="space-y-4">
          <div className="text-center text-sm text-stone-300">One of these players is the:</div>
          {role && (
            <div className="flex flex-col items-center gap-1">
              {iconUrl(role.id) && (
                <img src={iconUrl(role.id)} alt="" className="w-24 h-24 rounded-full border-2 border-amber-700 object-cover" />
              )}
              <div className={`text-2xl font-bold team-${role.team}`}>{role.name}</div>
            </div>
          )}
          <ul className="grid grid-cols-2 gap-2">
            {pickedSeats.map(s => (
              <li key={s.seatNum} className="card rounded p-3 text-center">
                <div className="text-amber-200/80 text-xs">seat #{s.seatNum}</div>
                <div className="text-base text-amber-100 font-semibold truncate">
                  {s.playerName || <span className="text-stone-500 italic">—</span>}
                </div>
              </li>
            ))}
          </ul>
        </div>
      );
    }
  } else if (info.type === 'role') {
    const role = info.roleId ? CHAR_BY_ID[info.roleId] : null;
    body = (
      <div className="text-center space-y-3">
        <div className="text-sm text-stone-300">The executed player was:</div>
        {role ? (
          <div className="flex flex-col items-center gap-2">
            {iconUrl(role.id) && (
              <img src={iconUrl(role.id)} alt="" className="w-28 h-28 rounded-full border-2 border-amber-700 object-cover" />
            )}
            <div className={`text-3xl font-bold team-${role.team}`}>{role.name}</div>
          </div>
        ) : <div className="text-stone-400 italic">(none)</div>}
      </div>
    );
  } else if (info.type === 'number') {
    body = (
      <div className="text-center space-y-2">
        <div className="text-sm text-stone-300">You learn the number:</div>
        <div className="text-7xl font-extrabold text-amber-200 leading-none my-2">{info.number}</div>
      </div>
    );
  } else if (info.type === 'yesno') {
    body = (
      <div className="text-center space-y-2">
        <div className={`text-6xl font-extrabold leading-none my-2 ${info.yes ? 'text-emerald-300' : 'text-red-300'}`}>
          {info.yes ? 'YES' : 'NO'}
        </div>
      </div>
    );
  } else if (info.type === 'role-list') {
    const roles = (info.roleIds || []).map(id => CHAR_BY_ID[id]).filter(Boolean);
    body = (
      <div className="space-y-3">
        <div className="text-center text-sm text-stone-300">
          These are the roles you learn about:
        </div>
        <ul className="grid grid-cols-2 sm:grid-cols-3 gap-3">
          {roles.map(rc => (
            <li key={rc.id} className="card rounded p-2 flex flex-col items-center gap-1 text-center">
              {iconUrl(rc.id) && (
                <img src={iconUrl(rc.id)} alt="" className="w-16 h-16 rounded-full border-2 border-amber-700 object-cover" />
              )}
              <div className={`text-sm font-bold team-${rc.team}`}>{rc.name}</div>
            </li>
          ))}
        </ul>
        {roles.length === 0 && (
          <div className="text-stone-500 italic text-center">(no roles)</div>
        )}
      </div>
    );
  } else if (info.type === 'seat+role-pair') {
    const askSeat = seatBy[info.askSeat];
    const roles = (info.roles || []).map(id => CHAR_BY_ID[id]).filter(Boolean);
    body = (
      <div className="space-y-4">
        <div className="text-center text-sm text-stone-300">
          You dream about{' '}
          {askSeat ? (
            <span className="text-amber-200 font-semibold">
              seat #{askSeat.seatNum}{askSeat.playerName ? ' · ' + askSeat.playerName : ''}
            </span>
          ) : <span className="text-stone-500">(unknown seat)</span>}.
        </div>
        <div className="text-center text-xs text-stone-400">One of these is their role:</div>
        <ul className="grid grid-cols-2 gap-3">
          {roles.map((rc, i) => (
            <li key={i} className="card rounded p-3 flex flex-col items-center gap-1 text-center">
              {iconUrl(rc.id) && (
                <img src={iconUrl(rc.id)} alt="" className="w-20 h-20 rounded-full border-2 border-amber-700 object-cover" />
              )}
              <div className={`text-base font-bold team-${rc.team}`}>{rc.name}</div>
            </li>
          ))}
        </ul>
      </div>
    );
  } else if (info.type === 'alignment') {
    const align = info.alignment || 'good';
    const top = info.displayLabel || 'Your new alignment is:';
    body = (
      <div className="space-y-3 text-center">
        <div className="text-sm text-stone-300">{top}</div>
        <div className={`p-5 rounded-lg border-2 ${align === 'good'
          ? 'bg-emerald-900/40 text-emerald-200 border-emerald-700/70'
          : 'bg-red-900/40 text-red-200 border-red-700/70'}`}>
          <div className="text-7xl mb-1 leading-none">{align === 'good' ? '👍' : '👎'}</div>
          <div className="text-4xl font-extrabold">{align === 'good' ? 'GOOD' : 'EVIL'}</div>
        </div>
      </div>
    );
  } else if (info.type === 'seat+role') {
    const askSeat = seatBy[info.askSeat];
    const role = info.roleId ? CHAR_BY_ID[info.roleId] : null;
    const topLabel = info.displayLabel || 'Your Grandchild is:';
    const midLabel = info.displayRoleLabel || 'Their character is:';
    body = (
      <div className="space-y-4">
        <div className="text-center text-sm text-stone-300">{topLabel}</div>
        {askSeat ? (
          <div className="card rounded p-3 text-center">
            <div className="text-amber-200/80 text-xs">seat #{askSeat.seatNum}</div>
            <div className="text-lg text-amber-100 font-semibold truncate">
              {askSeat.playerName || <span className="text-stone-500 italic">—</span>}
            </div>
          </div>
        ) : <div className="text-stone-500 italic text-center">(unknown seat)</div>}
        <div className="text-center text-sm text-stone-300">{midLabel}</div>
        {role ? (
          <div className="flex flex-col items-center gap-2">
            {iconUrl(role.id) && (
              <img src={iconUrl(role.id)} alt="" className="w-24 h-24 rounded-full border-2 border-amber-700 object-cover" />
            )}
            <div className={`text-2xl font-bold team-${role.team}`}>{role.name}</div>
          </div>
        ) : <div className="text-stone-400 italic text-center">(no role)</div>}
      </div>
    );
  } else if (info.type === 'seat') {
    const askSeat = seatBy[info.askSeat];
    const top = info.display || 'The Storyteller shows you:';
    body = (
      <div className="space-y-4">
        <div className="text-center text-sm text-stone-300">{top}</div>
        {askSeat ? (
          <div className="card rounded p-3 text-center mx-auto max-w-xs">
            <div className="text-amber-200/80 text-xs">seat #{askSeat.seatNum}</div>
            <div className="text-lg text-amber-100 font-semibold truncate">
              {askSeat.playerName || <span className="text-stone-500 italic">—</span>}
            </div>
          </div>
        ) : <div className="text-stone-500 italic text-center">(unknown seat)</div>}
      </div>
    );
  } else if (info.type === 'seats') {
    const pickedSeats = (info.askSeats || []).map(n => seatBy[n]).filter(Boolean);
    const top = info.display || 'The Storyteller shows you:';
    body = (
      <div className="space-y-3">
        <div className="text-center text-sm text-stone-300">{top}</div>
        <ul className="grid grid-cols-2 gap-2">
          {pickedSeats.map(s => (
            <li key={s.seatNum} className="card rounded p-3 text-center">
              <div className="text-amber-200/80 text-xs">seat #{s.seatNum}</div>
              <div className="text-base text-amber-100 font-semibold truncate">
                {s.playerName || <span className="text-stone-500 italic">—</span>}
              </div>
            </li>
          ))}
        </ul>
      </div>
    );
  } else if (info.type === 'team-reveal') {
    const viewerIsDemon = info.viewerRole === 'demon';
    const minions = info.minions || [];
    const demon = info.demon || null;
    const bluffs = (info.bluffs || []).map(id => CHAR_BY_ID[id]).filter(Boolean);
    const viewerRole = info.viewerRoleId ? CHAR_BY_ID[info.viewerRoleId] : null;
    const headerLabel = viewerIsDemon
      ? (viewerRole ? ('You are the ' + viewerRole.name) : 'You are the Demon')
      : 'You are a Minion';
    body = (
      <div className="space-y-4">
        <div className={`text-center text-xl font-extrabold ${viewerIsDemon ? 'text-red-300' : 'text-purple-300'}`}>
          {headerLabel}
        </div>
        {viewerIsDemon && viewerRole && iconUrl(viewerRole.id) && (
          <div className="flex justify-center">
            <img src={iconUrl(viewerRole.id)} alt="" className="w-20 h-20 rounded-full border-2 border-red-700 object-cover" />
          </div>
        )}
        {minions.length > 0 && (
          <div>
            <div className="text-center text-xs text-stone-400 mb-2 uppercase tracking-wider">
              {viewerIsDemon
                ? (minions.length === 1 ? 'Your Minion' : 'Your Minions')
                : (minions.length === 1 ? 'Your fellow Minion' : 'Your fellow Minions')}
            </div>
            <ul className="grid grid-cols-2 gap-2">
              {minions.map(m => (
                <li key={m.seatNum} className="card rounded p-3 text-center border-purple-700/50 bg-purple-950/30">
                  <div className="text-amber-200/80 text-xs">seat #{m.seatNum}</div>
                  <div className="text-base text-amber-100 font-semibold truncate">
                    {m.playerName || <span className="text-stone-500 italic">—</span>}
                  </div>
                </li>
              ))}
            </ul>
          </div>
        )}
        {!viewerIsDemon && demon && (
          <div>
            <div className="text-center text-xs text-stone-400 mb-2 uppercase tracking-wider">The Demon</div>
            <div className="card rounded p-3 text-center border-red-700/60 bg-red-950/40 mx-auto max-w-xs">
              <div className="text-amber-200/80 text-xs">seat #{demon.seatNum}</div>
              <div className="text-lg text-amber-100 font-bold truncate">
                {demon.playerName || <span className="text-stone-500 italic">—</span>}
              </div>
            </div>
          </div>
        )}
        {viewerIsDemon && bluffs.length > 0 && (
          <div>
            <div className="text-center text-xs text-stone-400 mb-2 uppercase tracking-wider">Your Bluffs (not in play)</div>
            <ul className="grid grid-cols-3 gap-2">
              {bluffs.map(b => (
                <li key={b.id} className="card rounded p-2 flex flex-col items-center gap-1 text-center">
                  {iconUrl(b.id) && <img src={iconUrl(b.id)} alt="" className="w-14 h-14 rounded-full border-2 border-amber-700 object-cover" />}
                  <div className={`text-[11px] font-bold team-${b.team}`}>{b.name}</div>
                </li>
              ))}
            </ul>
          </div>
        )}
        {viewerIsDemon && info.lunaticSeat && (
          <div>
            <div className="text-center text-xs text-stone-400 mb-2 uppercase tracking-wider">Lunatic in play</div>
            <div className="card rounded p-3 border-purple-700/50 bg-purple-950/30 mx-auto max-w-xs flex items-center justify-center gap-3">
              {iconUrl('lunatic') && (
                <img src={iconUrl('lunatic')} alt="" className="w-12 h-12 rounded-full border-2 border-purple-600 object-cover flex-shrink-0" />
              )}
              <div className="text-left min-w-0">
                <div className="text-amber-200/80 text-xs">seat #{info.lunaticSeat.seatNum}</div>
                <div className="text-base text-amber-100 font-semibold truncate">
                  {info.lunaticSeat.playerName || <span className="text-stone-500 italic">—</span>}
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  } else if (info.type === 'mad-claim') {
    const madRole = info.roleId ? CHAR_BY_ID[info.roleId] : null;
    body = (
      <div className="space-y-4">
        <div className="text-center text-sm text-stone-300">
          You are mad about being:
        </div>
        {madRole ? (
          <div className="flex flex-col items-center gap-2">
            {iconUrl(madRole.id) && (
              <img src={iconUrl(madRole.id)} alt="" className="w-28 h-28 rounded-full border-2 border-amber-700 object-cover" />
            )}
            <div className={`text-3xl font-bold team-${madRole.team}`}>{madRole.name}</div>
          </div>
        ) : <div className="text-stone-400 italic text-center">(no role)</div>}
        <div className="text-center text-xs text-stone-400 leading-snug">
          Claim this character tomorrow. If you don't, you may be executed.
        </div>
      </div>
    );
  } else if (info.type === 'lunatic-actions') {
    const ls = info.lunaticSeat || {};
    const perceived = info.perceivedRoleId ? CHAR_BY_ID[info.perceivedRoleId] : null;
    const perceivedName = info.perceivedRoleName || perceived?.name || 'their perceived role';
    const picks = info.picks || [];
    body = (
      <div className="space-y-4">
        <div className="text-center text-sm text-stone-300">
          The Lunatic just acted. They believe they are you.
        </div>
        <div className="flex flex-col items-center gap-2">
          {iconUrl('lunatic') && (
            <img src={iconUrl('lunatic')} alt=""
              className="w-20 h-20 rounded-full border-2 border-purple-600 object-cover" />
          )}
          <div className="text-amber-200 text-lg font-bold">Lunatic</div>
          <div className="text-amber-200/80 text-sm">
            seat #{ls.seatNum}{ls.playerName ? ' · ' + ls.playerName : ''}
          </div>
        </div>
        {picks.length > 0 ? (
          <div>
            <div className="text-center text-xs text-stone-400 mb-2 uppercase tracking-wider">
              Their picks
            </div>
            <ul className="grid grid-cols-2 gap-2">
              {picks.map((p, i) => (
                <li key={i} className="card rounded p-3 text-center">
                  <div className="text-amber-200/80 text-xs">seat #{p.seatNum}</div>
                  <div className="text-base text-amber-100 font-semibold truncate">
                    {p.playerName || <span className="text-stone-500 italic">—</span>}
                  </div>
                </li>
              ))}
            </ul>
          </div>
        ) : (
          <div className="text-center text-stone-400 italic">(no player targets — info action)</div>
        )}
      </div>
    );
  } else if (info.type === 'direction') {
    const dir = info.direction || 'cw';
    const top = info.display || 'The nearest evil player is:';
    body = (
      <div className="space-y-3 text-center">
        <div className="text-sm text-stone-300">{top}</div>
        <div className="p-6 rounded-lg border-2 bg-amber-900/30 text-amber-200 border-amber-700/70">
          <div className="text-7xl mb-1 leading-none">{dir === 'cw' ? '↻' : '↺'}</div>
          <div className="text-3xl font-extrabold tracking-wide">{dir === 'cw' ? 'CLOCKWISE' : 'COUNTER-CLOCKWISE'}</div>
        </div>
      </div>
    );
  } else {
    body = <div className="text-stone-400 italic text-center">(no info)</div>;
  }

  return (
    <ScreenShell>
      <section className="parchment rounded-lg p-4 sm:p-5 space-y-3 border-2 border-amber-600/70">
        <div className="flex items-center gap-3">
          {iconUrl(_displayRoleId) && (
            <img src={iconUrl(_displayRoleId)} alt=""
              className="w-14 h-14 rounded-full border-2 border-amber-700 object-cover flex-shrink-0" />
          )}
          <div className="min-w-0">
            <div className={`text-xs uppercase tracking-wider team-${c?.team || 'townsfolk'}`}>
              {c?.team || 'role'}
            </div>
            <div className="text-amber-200 text-lg font-bold">{c?.name || _displayRoleId}</div>
          </div>
        </div>
        <div className="text-sm text-stone-300/90 leading-relaxed border-l-2 border-amber-700/50 pl-3">
          {prompt.instruction || c?.ability}
        </div>
      </section>

      <section className="parchment rounded-lg p-5">
        {body}
      </section>

      <div className="grid grid-cols-2 gap-2 pt-1">
        <button onClick={onAck}
          className="py-3 rounded-lg text-base font-semibold bg-emerald-600 hover:bg-emerald-500 text-stone-950 shadow-lg shadow-emerald-900/40">
          Got it
        </button>
        <button onClick={onQuestion}
          className="py-3 rounded-lg text-base font-semibold bg-stone-800 hover:bg-stone-700 text-amber-200 border border-amber-700/40">
          Question
        </button>
      </div>
      <p className="text-[10px] text-stone-500 text-center">
        Got it confirms you saw the info. Question flags the storyteller.
      </p>
    </ScreenShell>
  );
}

// Full-screen prompt shown when the storyteller (with automation on) clicks
// "Start" on this player's night step. Renders a seat picker — the player taps
// 1 or 2 seats (based on prompt.action) and hits Submit or Question. Submit
// writes the targets back; the ST's effect auto-places the reminder. Question
// flags the ST to come over in person.
function NightPromptScreen({ mySeat, seats, prompt, onSubmit, onQuestion, onUseAbility, onSkipAbility, scriptCharIds = [] }) {
  // Use-decision phase — for once-per-game canSkip roles, ask Use/Skip first.
  if (prompt.status === 'use-decision') {
    const c = CHAR_BY_ID[prompt.roleId];
    const roleName = c?.name || prompt.roleId;
    return (
      <ScreenShell>
        <section className="parchment rounded-lg p-4 sm:p-5 space-y-3 border-2 border-amber-600/70">
          <div className="flex items-center gap-3">
            {iconUrl(prompt.roleId) && (
              <img src={iconUrl(prompt.roleId)} alt=""
                className="w-14 h-14 rounded-full border-2 border-amber-700 object-cover flex-shrink-0" />
            )}
            <div className="min-w-0">
              <div className={`text-xs uppercase tracking-wider team-${c?.team || 'townsfolk'}`}>{c?.team || 'role'}</div>
              <div className="text-amber-200 text-lg font-bold">{roleName}</div>
            </div>
          </div>
          <div className="text-sm text-stone-200 leading-relaxed border-l-2 border-amber-700/50 pl-3">
            {prompt.instruction || c?.ability}
          </div>
        </section>
        <section className="parchment rounded-lg p-5 text-center space-y-3">
          <div className="text-stone-200 text-base">
            Use your <span className="text-amber-200 font-semibold">{roleName}</span> ability tonight?
          </div>
          <div className="text-xs text-stone-500">
            You can only use this ability once per game. Save it for later if you want.
          </div>
        </section>
        <div className="grid grid-cols-2 gap-2 pt-1">
          <button onClick={onSkipAbility}
            className="py-3 rounded-lg text-base font-semibold bg-stone-800 hover:bg-stone-700 text-stone-300 border border-stone-700">
            No, save it
          </button>
          <button onClick={onUseAbility}
            className="py-3 rounded-lg text-base font-semibold bg-emerald-600 hover:bg-emerald-500 text-stone-950 shadow-lg shadow-emerald-900/40">
            Yes, use it
          </button>
        </div>
      </ScreenShell>
    );
  }
  // Info-role prompt (Washerwoman, Investigator, Empath, etc.) — ST has already
  // picked the info; we just display it and let the player tap Got it.
  if (prompt.infoPayload) {
    return <NightInfoScreen
      mySeat={mySeat}
      seats={seats}
      prompt={prompt}
      onAck={() => onSubmit([])}
      onQuestion={onQuestion}
    />;
  }
  // Two-step actions: after submitting targets, wait for the ST's response.
  if (prompt.status === 'awaiting-st-response') {
    const c = CHAR_BY_ID[prompt.roleId];
    return (
      <ScreenShell>
        <section className="parchment rounded-lg p-6 text-center space-y-4 border-2 border-amber-700/60">
          <div className="text-5xl">⌛</div>
          <div className="text-amber-200 text-xl font-bold">Choice recorded</div>
          <p className="text-sm text-stone-300">
            The storyteller is reviewing your choice as the{' '}
            <span className="text-amber-200 font-semibold">{c?.name || prompt.roleId}</span>.
          </p>
          <p className="text-xs text-stone-500">Keep your eyes closed — the answer will appear here in a moment.</p>
          <div className="text-xs text-amber-200/80 pt-3 border-t border-stone-800">
            Seat #{mySeat.seatNum}{mySeat.playerName ? ' · ' + mySeat.playerName : ''}
          </div>
        </section>
      </ScreenShell>
    );
  }
  const isTwo = prompt.action === 'target2' || prompt.action === 'target2+yesno' || prompt.action === 'target2+number' || prompt.action === 'target2+st-pick';
  const isThree = prompt.action === 'target3';
  const isPoFlex = prompt.action === 'po-flex';
  const need = isThree ? 3 : (isTwo ? 2 : 1);
  // Filter eligible seats based on the action's eligibility rules.
  const eligibleSeats = (seats || []).filter(s => {
    if (!s) return false;
    const isSelf = s.seatNum === mySeat.seatNum;
    if (prompt.eligible === 'others' && isSelf) return false;
    if (prompt.eligible === 'self' && !isSelf) return false;
    if (prompt.eligible === 'dead' && !s.isDead) return false;
    // target1any (or eligible='dead') allows dead seats; everything else requires alive.
    if (prompt.action !== 'target1any' && prompt.eligible !== 'dead' && s.isDead) return false;
    // Exorcist cannot pick the same player two nights in a row.
    if (prompt.roleId === 'exorcist' &&
        (s.reminders || []).some(r => r && r.charId === 'exorcist' && r.exChose)) {
      return false;
    }
    return true;
  });
  const [picked, setPicked] = useState(() => {
    // Philosopher: auto-pick self so the seat picker can be hidden.
    if (prompt.action === 'target1+role-claim' && prompt.roleId === 'philosopher') {
      return [mySeat.seatNum];
    }
    return [];
  });
  // Gambler-only: a role guess in addition to the seat pick.
  const isGuess = prompt.action === 'target1+guess';
  const isRoleClaim = prompt.action === 'target1+role-claim';
  const wantsRolePick = isGuess || isRoleClaim;
  // Philosopher: pick role only — the seat is the Philosopher's own seat,
  // auto-selected so the player only sees the role picker.
  const isRoleOnly = isRoleClaim && prompt.roleId === 'philosopher';
  const [pickedGuess, setPickedGuess] = useState('');
  // If status flipped to 'question' on this device (rare race), bail out.
  const togglePick = (seatNum) => {
    setPicked(prev => {
      if (prev.includes(seatNum)) return prev.filter(n => n !== seatNum);
      if (prev.length >= need) return [...prev.slice(1), seatNum]; // bump oldest
      return [...prev, seatNum];
    });
  };
  const canSubmit = isRoleOnly
    ? !!pickedGuess
    : wantsRolePick
      ? (picked.length === 1 && !!pickedGuess)
      : (isPoFlex ? (picked.length <= 1) : (picked.length === need));
  const c = CHAR_BY_ID[prompt.roleId];
  const isQuestion = prompt.status === 'question';

  if (isQuestion) {
    // Player has raised a question and is waiting for the ST to come pull them aside.
    return (
      <ScreenShell>
        <section className="parchment rounded-lg p-6 text-center space-y-4 border-2 border-red-700/60">
          <div className="text-5xl">⚠</div>
          <div className="text-red-200 text-2xl font-bold">Waiting for the storyteller</div>
          <p className="text-sm text-stone-300">
            You asked a question about <span className="text-amber-200 font-semibold">{c?.name || prompt.roleId}</span>.
            The storyteller will come to you in person.
          </p>
          <div className="text-xs text-stone-500 pt-3 border-t border-stone-800">
            Seat #{mySeat.seatNum}{mySeat.playerName ? ' · ' + mySeat.playerName : ''}
          </div>
        </section>
      </ScreenShell>
    );
  }

  return (
    <ScreenShell>
      <section className="parchment rounded-lg p-4 sm:p-5 space-y-3 border-2 border-amber-600/70">
        <div className="flex items-center gap-3">
          {iconUrl(prompt.roleId) && (
            <img src={iconUrl(prompt.roleId)} alt=""
              className="w-14 h-14 rounded-full border-2 border-amber-700 object-cover flex-shrink-0" />
          )}
          <div className="min-w-0">
            <div className={`text-xs uppercase tracking-wider team-${c?.team || 'townsfolk'}`}>
              {c?.team || 'role'}
            </div>
            <div className="text-amber-200 text-lg font-bold">{c?.name || prompt.roleId}</div>
          </div>
        </div>
        <div className="text-sm text-stone-200 leading-relaxed border-l-2 border-amber-700/50 pl-3">
          {prompt.instruction || c?.ability}
        </div>
      </section>

      <section className="parchment rounded-lg p-3 sm:p-4 space-y-2">
        {!isRoleOnly && (
        <div className="flex items-baseline justify-between gap-2">
          <h3 className="text-amber-200 font-semibold text-sm">
            {isPoFlex
              ? 'Choose 1 player or pick none'
              : (isThree ? 'Choose 3 players' : (isTwo ? 'Choose 2 players' : 'Choose 1 player'))}
          </h3>
          <span className="text-xs text-stone-400">
            {picked.length} of {isPoFlex ? '0–1' : need} chosen
          </span>
        </div>
        )}
        {!isRoleOnly && (
        <ul className="grid grid-cols-2 gap-1.5">
          {eligibleSeats.map(s => {
            const isMe = s.seatNum === mySeat.seatNum;
            const pickIdx = picked.indexOf(s.seatNum);
            const isPicked = pickIdx >= 0;
            return (
              <li key={s.seatNum}>
                <button onClick={() => togglePick(s.seatNum)}
                  className={`w-full card rounded px-2.5 py-2 flex items-center gap-2 text-left transition
                    ${isPicked ? 'border-amber-500 bg-amber-900/30 ring-1 ring-amber-700' : 'hover:border-amber-500'}
                    ${s.isDead ? 'opacity-60' : ''}`}>
                  <span className="text-amber-200/80 text-xs w-7 text-center font-semibold">#{s.seatNum}</span>
                  <span className="flex-1 min-w-0 truncate text-sm">
                    {s.playerName || <span className="text-stone-500 italic">(no name)</span>}
                    {isMe && <span className="ml-1 text-[10px] text-amber-300/80">· you</span>}
                  </span>
                  {isPicked && (
                    need > 1
                      ? <span className="text-amber-200 text-xs font-bold bg-amber-900/70 rounded-full w-5 h-5 flex items-center justify-center">{pickIdx + 1}</span>
                      : <span className="text-amber-300 text-sm leading-none">✓</span>
                  )}
                </button>
              </li>
            );
          })}
        </ul>
        )}
        {wantsRolePick && (
          <div className="mt-3 pt-3 border-t border-stone-800">
            <div className="flex items-baseline justify-between gap-2 mb-1.5">
              <h3 className="text-amber-200 font-semibold text-sm">
                {isRoleClaim ? 'Pick a good character' : 'Guess their character'}
              </h3>
              <span className="text-xs text-stone-400">{pickedGuess ? '1' : '0'} of 1 chosen</span>
            </div>
            <ul className="grid grid-cols-2 gap-1.5 max-h-60 overflow-y-auto">
              {(scriptCharIds || [])
                .map(id => CHAR_BY_ID[id])
                .filter(rc => {
                  if (!rc || rc.team === 'traveller') return false;
                  if (isRoleClaim) {
                    // Per-prompt filter: 'all' allows any non-traveller; otherwise default 'good'.
                    if (prompt.roleClaimFilter === 'all') return true;
                    return rc.team === 'townsfolk' || rc.team === 'outsider';
                  }
                  return true;
                })
                .sort((a, b) => (a.name || '').localeCompare(b.name || ''))
                .map(rc => {
                  const isPickedRole = pickedGuess === rc.id;
                  return (
                    <li key={rc.id}>
                      <button onClick={() => setPickedGuess(rc.id)}
                        className={`w-full card rounded px-2 py-1.5 flex items-center gap-2 text-left text-sm
                          ${isPickedRole ? 'border-amber-500 bg-amber-900/30 ring-1 ring-amber-700' : 'hover:border-amber-500'}`}>
                        {iconUrl(rc.id) && <img src={iconUrl(rc.id)} alt="" className="w-7 h-7 rounded-full border border-stone-700 object-cover flex-shrink-0" />}
                        <span className={`flex-1 min-w-0 truncate team-${rc.team}`}>{rc.name}</span>
                      </button>
                    </li>
                  );
                })}
            </ul>
          </div>
        )}
      </section>

      <div className={`grid ${isPoFlex ? 'grid-cols-3' : 'grid-cols-2'} gap-2 pt-1`}>
        {isPoFlex && (
          <button onClick={() => onSubmit([])}
            className="py-3 rounded-lg text-sm font-semibold bg-stone-700 hover:bg-stone-600 text-stone-100 border border-stone-600">
            ✕ Kill no one
          </button>
        )}
        <button onClick={() => onSubmit(picked, wantsRolePick ? { guess: pickedGuess } : undefined)}
          disabled={!canSubmit}
          className={`py-3 rounded-lg text-base font-semibold transition
            ${canSubmit
              ? 'bg-emerald-600 hover:bg-emerald-500 text-stone-950 shadow-lg shadow-emerald-900/40'
              : 'bg-stone-800 text-stone-500 cursor-not-allowed'}`}>
          {isPoFlex && picked.length === 0 ? 'Submit (kill 1)' : 'Submit'}
        </button>
        <button onClick={onQuestion}
          className="py-3 rounded-lg text-base font-semibold bg-stone-800 hover:bg-stone-700 text-amber-200 border border-amber-700/40">
          Question
        </button>
      </div>
      <p className="text-[10px] text-stone-500 text-center">
        Submit places your choice automatically. Question flags the storyteller to come over.
      </p>
    </ScreenShell>
  );
}

function AcceptedScreen({ seat }) {
  return (
    <ScreenShell>
      <section className="parchment rounded-lg p-6 text-center space-y-4">
        <div className="text-5xl">✓</div>
        <div className="text-emerald-300 text-2xl font-bold">Role confirmed</div>
        <p className="text-sm text-stone-300">
          You're all set, <span className="text-amber-200 font-semibold">{seat.playerName}</span>.
        </p>
        <p className="text-xs text-stone-500">
          Your role is hidden so no one can see it over your shoulder.
          The storyteller will guide the rest of the game.
        </p>
        <div className="text-xs text-amber-200/80 pt-4 border-t border-stone-800">
          Seat #{seat.seatNum}
        </div>
      </section>
    </ScreenShell>
  );
}

// Reminder rendered with all info visible (no hover required): round token icon
// plus the source character's name and the reminder label, both as readable text.
function MiniReminderToken({ reminder }) {
  const c = CHAR_BY_ID[reminder.charId];
  const img = iconUrl(reminder.charId);
  return (
    <div className="card rounded p-1.5 flex items-center gap-2"
      style={{ minWidth: 0 }}>
      <div className="relative inline-block flex-shrink-0"
        style={{ width: 32, height: 32, aspectRatio: '1 / 1' }}>
        <div className="rounded-full overflow-hidden border border-amber-700/70 bg-stone-900 w-full h-full"
          style={{
            backgroundImage: 'url(data/tokens/character-token-noise.webp)',
            backgroundSize: 'cover',
          }}>
          {img && <img src={img} alt="" className="w-full h-full object-cover opacity-90" draggable={false} />}
        </div>
      </div>
      <div className="min-w-0 leading-tight">
        <div className={`text-[10px] font-medium truncate team-${c?.team || 'townsfolk'}`}>
          {c?.name || reminder.charId}
        </div>
        <div className="text-[10px] text-amber-100 truncate">{reminder.label}</div>
      </div>
    </div>
  );
}

// Fullscreen overlay showing the full grimoire to a player whose seat is the Spy
// (or similar). Lists every seat with its real role, reminders, dead status, plus
// the demon bluffs. Player taps "Got it" to dismiss.
function GrimoireSnapshotOverlay({ grimoire, onAccept }) {
  const seats = grimoire.seats || [];
  const bluffs = (grimoire.demonBluffs || []).filter(Boolean);
  return (
    <div className="fixed inset-0 z-50 bg-stone-950 overflow-y-auto">
      <div className="max-w-md mx-auto p-4 space-y-4">
        <header className="text-center py-2">
          <div className="text-amber-300 uppercase text-xs tracking-widest">Grimoire snapshot</div>
          <div className="text-stone-400 text-xs mt-1">The storyteller is sharing the full grimoire with you. Memorize what you need, then tap Got it.</div>
        </header>

        {/* Seats */}
        <section className="space-y-1.5">
          {seats.map(seat => {
            const actual = CHAR_BY_ID[seat.actualRoleId];
            const perceived = CHAR_BY_ID[seat.perceivedRoleId];
            const misregistered = seat.actualRoleId !== seat.perceivedRoleId;
            return (
              <div key={seat.seatNum}
                className={`card rounded p-2 flex items-start gap-2 ${seat.isDead ? 'opacity-50' : ''}`}>
                <div className="flex-shrink-0 flex items-baseline gap-1.5">
                  <span className="text-amber-200/80 text-sm font-bold">#{seat.seatNum}</span>
                  {(seat.playerName || '').trim() && (
                    <span className="text-xs text-stone-300 truncate max-w-[80px]">{seat.playerName}</span>
                  )}
                </div>
                {iconUrl(seat.actualRoleId) && (
                  <img src={iconUrl(seat.actualRoleId)} alt=""
                    className={`w-10 h-10 rounded-full border border-stone-700 object-cover flex-shrink-0 ${seat.isDead ? 'grayscale' : ''}`} />
                )}
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 flex-wrap">
                    <span className={`font-medium text-sm team-${actual?.team || 'townsfolk'}`}>{actual?.name || '?'}</span>
                    {seat.isDead && <span className="text-[10px] uppercase text-red-400">dead</span>}
                  </div>
                  {misregistered && perceived && (
                    <div className="text-[10px] italic text-stone-400">thinks they are {perceived.name}</div>
                  )}
                  {seat.reminders && seat.reminders.length > 0 && (
                    <div className="flex flex-wrap gap-1 mt-1">
                      {seat.reminders.map((r, i) => (
                        <MiniReminderToken key={i} reminder={r} />
                      ))}
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </section>

        {/* Demon bluffs */}
        {bluffs.length > 0 && (
          <section className="card rounded p-3">
            <div className="text-[10px] uppercase tracking-wider text-amber-300 mb-2">Demon bluffs</div>
            <div className="grid grid-cols-3 gap-2">
              {bluffs.map((bId, i) => {
                const bc = CHAR_BY_ID[bId];
                return (
                  <div key={i} className="text-center">
                    {iconUrl(bId) && (
                      <img src={iconUrl(bId)} alt=""
                        className="w-12 h-12 rounded-full border border-amber-700/60 object-cover mx-auto" />
                    )}
                    <div className={`text-[11px] font-medium mt-1 team-${bc?.team || 'townsfolk'}`}>{bc?.name || '?'}</div>
                  </div>
                );
              })}
            </div>
          </section>
        )}

        {/* Accept */}
        <div className="sticky bottom-0 pt-2 pb-4 bg-gradient-to-t from-stone-950 via-stone-950 to-transparent">
          <button onClick={onAccept}
            className="w-full py-3 rounded-lg text-base font-semibold bg-emerald-600 hover:bg-emerald-500 text-stone-950">
            ✓ Got it
          </button>
        </div>
      </div>
    </div>
  );
}

// ---------------- Mount ----------------
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
