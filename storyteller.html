            <div className="text-[10px] text-stone-400 mb-1.5">Reason: {yesReason.join('; ')}.</div>
          )}
          <div className="grid grid-cols-2 gap-3">
            <button onClick={() => onSend({ type: 'yesno', yes: true })}
              className="py-3 rounded-lg text-base font-bold transition bg-emerald-700 hover:bg-emerald-600 text-stone-100">
              Send YES →
            </button>
            <button onClick={() => onSend({ type: 'yesno', yes: false })}
              className="py-3 rounded-lg text-base font-bold transition bg-red-700 hover:bg-red-600 text-stone-100">
              Send NO →
            </button>
          </div>
        </div>
      )}
    </section>
  );
}

// ---------------- Day-phase outcome banners (dismissable) ----------------
//
// Small cards stacked above the grimoire; ST dismisses each with ✕. Used for
// "fake claim" outcomes and other auditable day-phase events.
function DayBannerStack({ banners, onDismiss }) {
  return (
    <div className="space-y-1.5">
      {banners.map(b => (
        <div key={b.id}
          className={`parchment rounded-lg p-2.5 flex items-start gap-2 border
            ${b.kind === 'fake' ? 'border-stone-600 bg-stone-900/40' : 'border-amber-700/50 bg-amber-950/15'}`}>
          <div className="text-base leading-none mt-0.5">{b.kind === 'fake' ? '·' : 'ℹ'}</div>
          <div className="flex-1 min-w-0 text-xs text-stone-200 leading-snug">{b.text}</div>
          <button onClick={() => onDismiss && onDismiss(b.id)}
            title="Dismiss"
            className="text-stone-500 hover:text-stone-300 px-1.5 -my-0.5 text-base leading-none">✕</button>
        </div>
      ))}
    </div>
  );
}

// ---------------- ST Corner Prompts (small notifications) ----------------
//
// Stacked in the bottom-right of the viewport. Compact (~280px wide on phones).
// Each prompt has a title + body + actions. Action click invokes onAction(id, actionIdx).
// Dismiss via ✕ (calls onDismiss(id) without invoking any action).
function STCornerPrompts({ prompts, onAction, onDismiss }) {
  return (
    <div className="fixed bottom-3 right-3 z-50 flex flex-col gap-2 max-w-[300px] w-[calc(100vw-1.5rem)] sm:w-[280px]">
      {prompts.map(p => (
        <div key={p.id}
          className={`rounded-lg shadow-xl border-2 p-3 text-xs leading-snug
            ${p.kind === 'success'
              ? 'border-emerald-700 bg-emerald-950/95 text-emerald-100'
              : p.kind === 'warn'
                ? 'border-amber-600 bg-amber-950/95 text-amber-100'
                : 'border-stone-600 bg-stone-900/95 text-stone-100'}`}>
          <div className="flex items-start gap-2 mb-1.5">
            <div className="text-base leading-none">
              {p.kind === 'success' ? '✓' : p.kind === 'warn' ? '⚠' : 'ℹ'}
            </div>
            <div className="flex-1 min-w-0 font-semibold text-[11px] uppercase tracking-wider">{p.title}</div>
            <button onClick={() => onDismiss(p.id)} className="text-stone-400 hover:text-stone-100 leading-none">✕</button>
          </div>
          <div className="text-stone-100/95 mb-2">{p.body}</div>
          {(p.actions || []).length > 0 && (
            <div className="flex gap-1.5 flex-wrap">
              {(p.actions || []).map((a, i) => (
                <button key={i} onClick={() => onAction(p.id, i)}
                  className={`px-2.5 py-1 rounded text-[11px] font-medium
                    ${a.primary
                      ? 'bg-amber-600 hover:bg-amber-500 text-stone-950'
                      : 'bg-stone-800 hover:bg-stone-700 text-stone-200 border border-stone-700'}`}>
                  {a.label}
                </button>
              ))}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// ---------------- Day Abilities Bar (Nominations tab, v2) ----------------
//
// Compact horizontal row of role buttons. Clicking selects an ability — the
// CircularNominator below switches to ability mode and clicks in the circle
// resolve as claimant + (optional) target.
function DayAbilitiesBar({ scriptCharIds, activeAbility, onSelect, onCancel, dayIdx = 0 }) {
  const inScript = new Set(scriptCharIds || []);
  const available = DAY_ABILITY_ROLES.filter(r => inScript.has(r.id));
  if (available.length === 0) return null;
  // Juggler is Day-1-only — dim the button on later days.
  const isDay1 = dayIdx === 0;
  return (
    <section className={`parchment rounded-lg p-3 sm:p-4 ${activeAbility ? 'border-amber-500/70 ring-1 ring-amber-700/30' : 'border-amber-700/40'}`}>
      <div className="flex items-baseline justify-between gap-2 mb-2 flex-wrap">
        <div>
          <h3 className="text-amber-200 font-semibold text-sm">Day-phase abilities</h3>
          <p className="text-[10px] text-stone-500 mt-0.5">
            Click a role when publicly claimed, then pick the player(s) in the circle below.
          </p>
        </div>
        {activeAbility && (
          <button onClick={onCancel}
            className="text-xs px-3 py-1 rounded pill hover:border-red-500 hover:text-red-300">Cancel</button>
        )}
      </div>
      <ul className="flex flex-wrap gap-1.5">
        {available.map(r => {
          const isActive = activeAbility?.id === r.id;
          const disabled = r.id === 'juggler' && !isDay1;
          return (
            <li key={r.id}>
              <button onClick={() => disabled ? null : (isActive ? onCancel() : onSelect({ id: r.id, kind: r.kind, label: r.label, roleName: (CHAR_BY_ID[r.id] || {}).name || r.id }))}
                disabled={disabled}
                title={disabled ? 'Juggler can only claim on Day 1' : undefined}
                className={`card rounded px-2.5 py-1.5 flex items-center gap-2 text-sm transition
                  ${disabled
                    ? 'opacity-40 cursor-not-allowed'
                    : isActive ? 'border-amber-500 bg-amber-900/30 ring-1 ring-amber-700' : 'hover:border-amber-500'}`}>
                {iconUrl(r.icon) && (
                  <img src={iconUrl(r.icon)} alt="" className={`w-7 h-7 rounded-full border border-stone-700 object-cover flex-shrink-0 ${disabled ? 'grayscale' : ''}`} />
                )}
                <span className="text-amber-200 font-medium leading-tight">{r.label}</span>
              </button>
            </li>
          );
        })}
      </ul>
    </section>
  );
}

// ---------------- Day Abilities Section (LEGACY — no longer rendered) ----------------
//
// Renders above New Nomination on the Nominations tab when features.automation
// is enabled. Lists role buttons for in-script day-phase abilities the ST
// might need to resolve. Clicking opens DayClaimModal (compact picker).
//
// Currently covers: Slayer, Psychopath (claim+target), Mutant (claim only).
// Virgin is auto-handled when a nomination is added.
const DAY_ABILITY_ROLES = [
  { id: 'slayer',     label: 'Slayer claim',     kind: 'claim-target', icon: 'slayer',     hint: '"I claim Slayer on X."' },
  { id: 'psychopath', label: 'Psychopath claim', kind: 'claim-target', icon: 'psychopath', hint: '"I claim Psychopath, killing X."' },
  { id: 'mutant',     label: 'Mutant claim',     kind: 'claim-only',   icon: 'mutant',     hint: 'Public Outsider claim — checks if they\'re the Mutant.' },
  { id: 'artist',     label: 'Artist claim',     kind: 'claim-only',   icon: 'artist',     hint: 'Artist asks the ST a yes/no question (once per game).' },
  { id: 'savant',     label: 'Savant claim',     kind: 'claim-only',   icon: 'savant',     hint: 'Each day, the Savant asks the ST for 2 facts — 1 true, 1 false (repeatable).' },
  { id: 'fisherman',  label: 'Fisherman claim',  kind: 'claim-only',   icon: 'fisherman',  hint: 'Fisherman asks the ST for advice (once per game).' },
  { id: 'damsel',     label: 'Damsel guess',     kind: 'claim-target', icon: 'damsel',     hint: 'Pick the Minion claimant, then the player they guess is the Damsel.' },
  { id: 'puzzlemaster', label: 'Puzzlemaster guess', kind: 'claim-target', icon: 'puzzlemaster', hint: 'Pick the Puzzlemaster claimant, then the player they guess is drunk.' },
  { id: 'juggler',    label: 'Juggler claim',    kind: 'claim-juggler', icon: 'juggler',   hint: 'Up to 5 (player + character) public guesses (once per game).' },
];

function DayAbilitiesSection({ scriptCharIds, seats, onResolveClaimAndKill, onResolveMutantClaim }) {
  // Only show roles that are in the script.
  const inScript = new Set(scriptCharIds || []);
  const available = DAY_ABILITY_ROLES.filter(r => inScript.has(r.id));
  const [openClaim, setOpenClaim] = useState(null); // descriptor of the modal to open
  if (available.length === 0) return null;
  return (
    <section className="parchment rounded-lg p-3 sm:p-4 border-amber-700/40">
      <div className="flex items-baseline justify-between gap-2 mb-2">
        <h3 className="text-amber-200 font-semibold text-sm">Day-phase abilities</h3>
        <span className="text-[10px] text-stone-500">Click when a player publicly claims one of these.</span>
      </div>
      <ul className="grid grid-cols-1 sm:grid-cols-2 gap-1.5">
        {available.map(r => (
          <li key={r.id}>
            <button onClick={() => setOpenClaim(r)}
              className="w-full card rounded px-2.5 py-2 flex items-center gap-2 text-left hover:border-amber-500">
              {iconUrl(r.icon) && (
                <img src={iconUrl(r.icon)} alt=""
                  className="w-9 h-9 rounded-full border border-stone-700 object-cover flex-shrink-0" />
              )}
              <div className="flex-1 min-w-0 leading-tight">
                <div className="text-sm text-amber-200 font-medium">{r.label}</div>
                <div className="text-[10px] text-stone-400 truncate">{r.hint}</div>
              </div>
            </button>
          </li>
        ))}
      </ul>
      {openClaim && (
        <DayClaimModal
          role={openClaim}
          seats={seats}
          onSubmit={({ claimantSeatNum, targetSeatNum }) => {
            if (openClaim.kind === 'claim-target') {
              onResolveClaimAndKill && onResolveClaimAndKill({
                roleId: openClaim.id,
                label: openClaim.label,
                claimantSeatNum,
                targetSeatNum,
              });
            } else if (openClaim.kind === 'claim-only' && openClaim.id === 'mutant') {
              onResolveMutantClaim && onResolveMutantClaim({ claimantSeatNum });
            }
            setOpenClaim(null);
          }}
          onClose={() => setOpenClaim(null)}
        />
      )}
    </section>
  );
}

function JugglerPicksModal({ scriptCharIds, seats, claimantSeatNum, onSubmit, onClose }) {
  const [picks, setPicks] = useState(() => Array.from({ length: 5 }, () => ({ seatNum: null, roleId: null })));
  const claimant = (seats || []).find(s => s && s.seatNum === claimantSeatNum);
  const aliveSeats = (seats || []).filter(s => s && s.actualRoleId);
  const scriptRoles = (scriptCharIds || [])
    .map(id => CHAR_BY_ID[id])

// ---------------- ST Response Popup (modal variant) ----------------
//
// Full-screen modal counterpart to the STResponseInline banner — pops up on
// the ST device whenever a new prompt is awaiting their response so they
// notice it immediately even if scrolled elsewhere. ST can close (X) to
// dismiss the popup for that seat (banner remains as a reminder), or click
// Send YES/NO to respond. Status change naturally closes the popup.
function STResponsePopup({ prompts, seats, dismissed, onDismiss, onSend, scriptCharIds = [] }) {
  const pending = Object.entries(prompts || {})
    .filter(([_, p]) => p && p.status === 'awaiting-st-response')
    .map(([k, p]) => ({ seatNum: Number(k), prompt: p }))
    .filter(({ seatNum }) => !(dismissed && dismissed.has(seatNum)));
  if (pending.length === 0) return null;
  // Show one popup at a time (the earliest awaiting). Others queue behind it.
  const { seatNum, prompt } = pending[0];
  return (
    <div className="fixed inset-0 z-50 bg-stone-950/90 flex items-start sm:items-center justify-center p-2 sm:p-4 overflow-y-auto">
      <div className="max-w-lg w-full my-4 relative">
        <button onClick={() => onDismiss(seatNum)}
          title="Dismiss popup (banner still visible at top of grimoire)"
          className="absolute top-2 right-2 z-10 w-9 h-9 rounded-full bg-stone-800 hover:bg-stone-700 border border-stone-700 text-stone-300 text-xl leading-none flex items-center justify-center">
          ✕
        </button>
        <STResponseCard
          seatNum={seatNum}
          prompt={prompt}
          seats={seats}
          scriptCharIds={scriptCharIds}
          onSend={(payload) => onSend(seatNum, payload)}
        />
        {pending.length > 1 && (
          <div className="mt-2 text-center text-[11px] text-stone-400">
            {pending.length - 1} more response{pending.length - 1 === 1 ? '' : 's'} queued.
          </div>
        )}
      </div>
    </div>
  );
}

// ---------------- Night Toasts (automation feedback) ----------------

// Compact stack of dismissable banners shown at the top of the grimoire when

function NightToastStack({ toasts, onDismiss }) {

function BoomdandyPickModal({ data, onApply, onCancel }) {
  const [picked, setPicked] = useState([]);
  if (!data) return null;
  const cands = data.candidates || [];
  const need = data.needKill || 0;
  const toggle = (n) => {
    setPicked(prev => {
      if (prev.includes(n)) return prev.filter(x => x !== n);
      if (prev.length >= need) return prev;
      return [...prev, n];
    });
  };
  const ready = picked.length === need;
  return (
    <div className="fixed inset-0 z-50 bg-stone-950/85 flex items-start sm:items-center justify-center p-2 sm:p-4 overflow-y-auto">
