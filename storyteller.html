// caller swaps roles, re-deals, and places the permanent "Was the Scarlet
// Woman" reminder.
function SWPromoteModal({ step, onConfirm, onCancel }) {
  if (!step) return null;
  const demonChar = CHAR_BY_ID[step.demonRoleId];
  const swSeat = step.swSeat;
  const deadDemonSeat = step.deadDemonSeat;
  return (
    <div className="fixed inset-0 z-50 bg-stone-950/85 flex items-start sm:items-center justify-center p-2 sm:p-4 overflow-y-auto">
      <div className="parchment rounded-lg p-4 sm:p-5 max-w-md w-full my-4 space-y-4 border-2 border-red-700/70">
        <div className="flex items-center gap-3">
          <div className="text-3xl leading-none">🩸</div>
          <div className="flex-1 min-w-0">
            <div className="text-xs uppercase tracking-wider text-red-300">Scarlet Woman promotion</div>
            <div className="text-amber-200 text-lg font-bold leading-tight">
              The Scarlet Woman becomes the Demon
            </div>
          </div>
        </div>

        <div className="grid grid-cols-1 gap-2">
          <div className="card rounded p-2 flex items-center gap-2 border-stone-700">
            {iconUrl('scarletwoman') && (
              <img src={iconUrl('scarletwoman')} alt=""
                className="w-10 h-10 rounded-full border border-stone-700 object-cover flex-shrink-0" />
            )}
            <div className="flex-1 min-w-0 leading-tight">
              <div className="text-xs uppercase tracking-wider text-stone-400">SW seat</div>
              <div className="text-sm">
                #{swSeat.seatNum}{swSeat.playerName ? ` · ${swSeat.playerName}` : ''}
                {swSeat.isLocal && <span className="ml-1 text-[10px] text-purple-300">🏠 local</span>}
              </div>
            </div>
          </div>
          <div className="text-center text-stone-500 text-lg leading-none">↓</div>
          <div className="card rounded p-2 flex items-center gap-2 border-red-700/60 bg-red-950/20">
            {iconUrl(step.demonRoleId) && (
              <img src={iconUrl(step.demonRoleId)} alt=""
                className="w-10 h-10 rounded-full border border-red-700 object-cover flex-shrink-0" />
            )}
            <div className="flex-1 min-w-0 leading-tight">
              <div className="text-xs uppercase tracking-wider text-red-300">becomes</div>
              <div className="text-sm">
                <span className="team-demon font-bold">{demonChar?.name || step.demonRoleId}</span>
                <span className="text-stone-500 text-[11px] ml-1">(was seat #{deadDemonSeat.seatNum})</span>
              </div>
            </div>
          </div>
        </div>

        <div className="rounded-md p-2.5 bg-stone-900/60 border border-stone-800 text-xs text-stone-300/90 leading-snug space-y-1">
          <div>On confirm:</div>
          <ul className="space-y-0.5 ml-2">
            <li>• SW's role changes to <span className="team-demon">{demonChar?.name || step.demonRoleId}</span> (with demon bluffs)</li>
            <li>• Role is auto re-dealt — {swSeat.isLocal ? "the local-role overlay opens on this device" : "their phone re-shows the role reveal"}</li>
            <li>• A permanent "Was the Scarlet Woman" reminder is placed on their seat</li>
          </ul>
        </div>

        <div className="grid grid-cols-2 gap-2 pt-1">
          <button onClick={onCancel}
            className="py-2.5 rounded-lg text-sm font-semibold bg-stone-800 hover:bg-stone-700 text-stone-300 border border-stone-700">
            Cancel
          </button>
          <button onClick={onConfirm}
            className="py-2.5 rounded-lg text-sm font-bold bg-red-700 hover:bg-red-600 text-stone-100 shadow-lg shadow-red-900/40">
            Promote
          </button>
        </div>
      </div>
    </div>
  );
}

// ---------------- Info Picker Modal (ST-picks-info for Washerwoman, etc.) ----------------
//
// Modal that opens when the ST clicks Start on an info-role step. Type-specific
// inputs derived from NIGHT_ACTIONS[role].infoConfig.infoType:
//   - 'seats+role'  → seat multi-picker (numSeats) + character picker (filtered by team)
//   - 'role'        → character picker (any in-play role for Undertaker)
//   - 'number'      → number stepper (min..max)
//   - 'yesno'       → two big YES/NO buttons
//
// On Send, calls onSend(payload) where payload describes what to reveal.
// The parent then writes the prompt to Firebase (status='awaiting' + infoPayload)
// and the player's phone shows NightInfoScreen.
function InfoPickerModal({ step, seats, scriptCharIds, viewingDayIndex, nominationsByDay, daysSnapshots, lastExecution, onClose, onSend }) {
  const def = NIGHT_ACTIONS[step.char.id] || {};
  // Step-level overrides (Godfather first night swaps to info-st role-list).
  const cfg = step.infoConfig || def.infoConfig || {};
  const infoType = step.infoType || def.infoType || 'manual';
  // Context bundle for infoSuggestion() — passed to history-dependent suggestions.
  const suggestionCtx = { viewingDayIndex, nominationsByDay, daysSnapshots, seats, lastExecution };
  // Selected values, kept in local state per type.
  const [pickedSeats, setPickedSeats] = useState([]);
  const [pickedRole, setPickedRole]   = useState('');
  const [pickedFalseRole, setPickedFalseRole] = useState(''); // seat+role-pair (Dreamer)
  const [pickedNone, setPickedNone]   = useState(false);   // librarian "no outsiders"
  const [pickedNum, setPickedNum]     = useState(cfg.min ?? 0);
  const [pickedYes, setPickedYes]     = useState(null);    // null = unset, true/false = chosen
  const [pickedDirection, setPickedDirection] = useState(''); // '' | 'cw' | 'ccw' (Shugenja)

  const c = CHAR_BY_ID[step.char.id];
  const targetSeat = step.seat;
  // Candidate roles for seats+role: roles on the script of the requested team.
  // We use the full script (not just in-play) so the ST can give false info if
  // the player is drunk/poisoned. ST decides truthfulness.
  const candidateRoles = (scriptCharIds || [])
    .map(id => CHAR_BY_ID[id])
    .filter(c => c && (infoType !== 'seats+role' || c.team === cfg.roleTeam))
    .filter(c => infoType !== 'role' || c)  // 'role' type: any in-script role
    .sort((a, b) => (a.name || '').localeCompare(b.name || ''));
  // For seat+role-pair (Dreamer): the true role suggestion is the picked seat's
  // actual role; the false role candidates are roles of the OPPOSITE alignment.
  const dreamerPickedSeat = (infoType === 'seat+role-pair' && pickedSeats.length === 1)
    ? (seats || []).find(s => s.seatNum === pickedSeats[0]) : null;
  const dreamerSuggestedTrueRoleId = dreamerPickedSeat?.actualRoleId || '';
  const dreamerTrueIsEvil = dreamerPickedSeat
    ? isEvilSeat(dreamerPickedSeat)
    : null;
  const dreamerFalseCandidates = (scriptCharIds || [])
    .map(id => CHAR_BY_ID[id])
    .filter(rc => {
      if (!rc) return false;
      if (rc.id === pickedRole) return false; // can't reuse the true role
      // False role should be opposite alignment from the true role pick.
      if (dreamerTrueIsEvil === true) {
        // True is evil → false should be good (townsfolk/outsider)
        return rc.team === 'townsfolk' || rc.team === 'outsider';
      } else if (dreamerTrueIsEvil === false) {
        // True is good → false should be evil (minion/demon)
        return rc.team === 'minion' || rc.team === 'demon';
      }
      return true; // alignment unknown yet
    })
    .sort((a, b) => (a.name || '').localeCompare(b.name || ''));

  const toggleSeat = (seatNum) => {
    setPickedSeats(prev => {
      if (prev.includes(seatNum)) return prev.filter(n => n !== seatNum);
      const max = cfg.numSeats || 2;
      if (prev.length >= max) return [...prev.slice(1), seatNum];
      return [...prev, seatNum];
    });
  };

  // Validation per type
  let canSend = false;
  if (infoType === 'seats+role') {
    canSend = pickedNone ? cfg.allowNone : (pickedSeats.length === (cfg.numSeats || 2) && !!pickedRole);
  } else if (infoType === 'role') {
    canSend = !!pickedRole;
  } else if (infoType === 'number') {
    canSend = typeof pickedNum === 'number';
  } else if (infoType === 'yesno') {
    canSend = pickedYes === true || pickedYes === false;
  } else if (infoType === 'seat+role-pair') {
    canSend = pickedSeats.length === 1 && !!pickedRole && !!pickedFalseRole && pickedRole !== pickedFalseRole;
  } else if (infoType === 'seat+role') {
    canSend = pickedSeats.length === 1 && !!pickedRole;
  } else if (infoType === 'role-list') {
    canSend = (pickedRole || '').split(',').filter(Boolean).length > 0;
  } else if (infoType === 'alignment') {
    canSend = !!(cfg.presetAlignment);
  } else if (infoType === 'seat') {
    canSend = pickedSeats.length === 1;
  } else if (infoType === 'seats') {
    canSend = pickedSeats.length === (cfg.numSeats || 2);
  } else if (infoType === 'direction') {
    canSend = pickedDirection === 'cw' || pickedDirection === 'ccw';
  }

  const buildPayload = () => {
    if (infoType === 'seats+role') {
      if (pickedNone) return { type: 'seats+role', none: true, seats: [], roleId: null };
      return { type: 'seats+role', none: false, seats: [...pickedSeats], roleId: pickedRole };
    }
    if (infoType === 'role')   return { type: 'role',   roleId: pickedRole };
    if (infoType === 'number') return { type: 'number', number: pickedNum };
    if (infoType === 'yesno')  return { type: 'yesno',  yes: pickedYes };
    if (infoType === 'seat+role-pair') {
      // Shuffle the two roles so the player can't infer which is true.
      const roles = [pickedRole, pickedFalseRole];
      if (Math.random() < 0.5) roles.reverse();
      return { type: 'seat+role-pair', askSeat: pickedSeats[0], roles };
    }
    if (infoType === 'seat+role') {
      return {
        type: 'seat+role',
        askSeat: pickedSeats[0],
        roleId: pickedRole,
        displayLabel: cfg.displayLabel || null,
        displayRoleLabel: cfg.displayRoleLabel || null,
      };
    }
    if (infoType === 'role-list') {
      return { type: 'role-list', roleIds: (pickedRole || '').split(',').filter(Boolean) };
    }
    if (infoType === 'alignment') {
      return {
        type: 'alignment',
        alignment: cfg.presetAlignment,
        displayLabel: cfg.displayLabel || null,
      };
    }
    if (infoType === 'seat') {
      return { type: 'seat', askSeat: pickedSeats[0], display: cfg.display || null };
    }
    if (infoType === 'seats') {
      return { type: 'seats', askSeats: [...pickedSeats], display: cfg.display || null };
    }
    if (infoType === 'direction') {
      return { type: 'direction', direction: pickedDirection, display: cfg.display || null };
    }
    return null;
  };

  return (
    <div className="fixed inset-0 z-50 bg-stone-950/85 flex items-start sm:items-center justify-center p-2 sm:p-4 overflow-y-auto">
      <div className="parchment rounded-lg p-4 sm:p-5 max-w-lg w-full space-y-4 my-4">
        {/* Header */}
        <div className="flex items-start gap-3">
          {iconUrl(step.char.id) && (
            <img src={iconUrl(step.char.id)} alt=""
              className="w-12 h-12 rounded-full border-2 border-amber-700 object-cover flex-shrink-0" />
          )}
          <div className="flex-1 min-w-0">
            <div className={`text-[10px] uppercase tracking-wider team-${c?.team || 'townsfolk'}`}>
              {c?.team || 'info'} info
            </div>
            <div className="text-amber-200 text-lg font-bold leading-tight">
              {c?.name || step.char.id}
            </div>
            <div className="text-xs text-stone-400 mt-0.5">
              seat #{targetSeat?.seatNum}{targetSeat?.playerName ? ' · ' + targetSeat.playerName : ''}
            </div>
          </div>
          <button onClick={onClose}
            className="text-stone-400 hover:text-stone-200 text-xl leading-none">✕</button>
        </div>

        {/* Instruction */}
        <div className="text-xs text-stone-300/90 border-l-2 border-amber-700/50 pl-3">
          {step.instruction || c?.ability}
        </div>

        {/* Goon trigger warning — if a picked seat is the Goon and the
            Goon hasn't fired tonight yet, the asker will become drunk on
            Send. ST can choose to give false info accordingly. */}
        {(() => {
          const goonSeat = (seats || []).find(s => s.actualRoleId === 'goon');
          if (!goonSeat) return null;
          const goonHasFirst = (goonSeat.reminders || []).some(r =>
            r && r.charId === 'goon' && /^first$/i.test(String(r.label || '')));
          if (goonHasFirst) return null;
          const picksGoon = pickedSeats.includes(goonSeat.seatNum);
          if (!picksGoon) return null;
          const roleName = (CHAR_BY_ID[step.char.id] || {}).name || step.char.id;
          return (
            <div className="rounded-md p-2.5 border-2 border-purple-600/70 bg-purple-950/40 text-purple-100 text-xs flex items-start gap-2">
              <span className="text-base leading-none mt-0.5">⚠</span>
              <div className="leading-snug">
                <span className="font-semibold">Picking the Goon will make the {roleName} drunk.</span>
                {' '}This will be the first chooser tonight — Goon's ability fires on Send. Consider giving false info.
              </div>
            </div>
          );
        })()}

        {/* Drunk / poisoned warning for the RECEIVING player */}
        {isDrunkOrPoisoned(targetSeat) && (
          <div className="rounded-md p-2.5 border-2 border-red-600/70 bg-red-950/40 text-red-100 text-xs flex items-start gap-2">
            <span className="text-base leading-none mt-0.5">⚠</span>
            <div className="leading-snug">
              <span className="font-semibold">This player is drunk or poisoned.</span>
              {' '}Their ability malfunctions — consider giving them false info.
              {(() => {
                const labels = (targetSeat.reminders || [])
                  .map(r => r?.label)
                  .filter(l => l && /drunk|poisoned/i.test(l));
                if (targetSeat.actualRoleId === 'drunk') labels.unshift('Drunk role');
                if (targetSeat.actualRoleId === 'marionette') labels.unshift('Marionette');
                return labels.length > 0
                  ? <div className="text-[10px] text-red-200/80 mt-0.5">Source: {labels.join(', ')}</div>
                  : null;
              })()}
            </div>
          </div>
        )}

        {/* Type-specific inputs */}
        {infoType === 'seats+role' && (
          <>
            {cfg.allowNone && (
              <label className="flex items-center gap-2 text-sm cursor-pointer">
                <input type="checkbox" checked={pickedNone} onChange={e => setPickedNone(e.target.checked)}
                  className="w-4 h-4 accent-amber-600" />
                <span className={pickedNone ? 'text-amber-200 font-medium' : 'text-stone-300'}>
                  {cfg.noneLabel || 'Reveal that none are in play'}
                </span>
              </label>
            )}
            {!pickedNone && (
              <>
                <div>
                  <div className="text-xs uppercase tracking-wider text-amber-300 mb-1.5">
                    Pick {cfg.numSeats || 2} seats <span className="text-stone-500 normal-case">({pickedSeats.length}/{cfg.numSeats || 2})</span>
                  </div>
                  <ul className="grid grid-cols-1 sm:grid-cols-2 gap-1.5">
                    {(seats || []).map(s => {
                      const picked = pickedSeats.includes(s.seatNum);
                      const rc = CHAR_BY_ID[s.actualRoleId];
                      return (
                        <li key={s.seatNum}>
                          <button onClick={() => toggleSeat(s.seatNum)}
                            className={`w-full card rounded px-2 py-1.5 flex items-center gap-2 text-left text-sm
                              ${picked ? 'border-amber-500 bg-amber-900/30 ring-1 ring-amber-700' : 'hover:border-amber-500'}
                              ${s.isDead ? 'opacity-60' : ''}`}>
                            <span className="text-amber-200/80 text-xs w-6 text-center flex-shrink-0">#{s.seatNum}</span>
                            {iconUrl(s.actualRoleId) ? (
                              <img src={iconUrl(s.actualRoleId)} alt=""
                                className="w-8 h-8 rounded-full border border-stone-700 object-cover flex-shrink-0" />
                            ) : (
                              <span className="w-8 h-8 flex-shrink-0"></span>
                            )}
                            <div className="flex-1 min-w-0 leading-tight">
                              <div className="truncate">{s.playerName || <span className="text-stone-500 italic">—</span>}</div>
                              <div className={`text-[10px] uppercase tracking-wider truncate ${rc ? `team-${rc.team}` : 'text-stone-500'}`}>
                                {rc?.name || '(no role)'}
                              </div>
                            </div>
                            {picked && <span className="text-amber-300 text-base">✓</span>}
                          </button>
                        </li>
                      );
                    })}
                  </ul>
                </div>
                <div>
                  <div className="text-xs uppercase tracking-wider text-amber-300 mb-1.5">
                    Pick the role to reveal
                  </div>
                  <ul className="grid grid-cols-2 sm:grid-cols-3 gap-1.5 max-h-48 overflow-y-auto">
                    {candidateRoles.map(rc => (
                      <li key={rc.id}>
                        <button onClick={() => setPickedRole(rc.id)}
                          className={`w-full card rounded px-2 py-1.5 flex items-center gap-2 text-left text-sm
                            ${pickedRole === rc.id ? 'border-amber-500 bg-amber-900/30 ring-1 ring-amber-700' : 'hover:border-amber-500'}`}>
                          {iconUrl(rc.id) && <img src={iconUrl(rc.id)} alt="" className="w-7 h-7 rounded-full border border-stone-700 object-cover flex-shrink-0" />}
                          <span className={`flex-1 min-w-0 truncate team-${rc.team}`}>{rc.name}</span>
                        </button>
                      </li>
                    ))}
                  </ul>
                </div>
              </>
            )}
          </>
        )}

        {infoType === 'seat+role' && (() => {
          // Grandmother: pick one seat AND one role. Suggestion = whoever has
          // the Grandchild reminder, plus that seat's actualRoleId.
          // Exorcist 'Show Exorcism' synthetic step: suggestion comes from
          // infoConfig.presetSeat / presetRoleId (pre-determined).
          const presetSeat = cfg.presetSeat;
          const presetRoleId = cfg.presetRoleId;
          const grandmotherSug = (presetSeat == null)
            ? infoSuggestion(step.char.id, targetSeat, seats, suggestionCtx)
            : null;
          const sugSeat = presetSeat != null ? presetSeat : (grandmotherSug?.value?.askSeat ?? null);
          const sugRole = presetRoleId || (grandmotherSug?.value?.roleId ?? null);
          const sugBreakdownName = grandmotherSug?.breakdown?.playerName ?? (
            presetSeat != null ? ((seats || []).find(s => s.seatNum === presetSeat) || {}).playerName : null
          );
          const sugBreakdownRoleName = grandmotherSug?.breakdown?.roleName ?? (
            presetRoleId ? (CHAR_BY_ID[presetRoleId] || {}).name : null
          );
          const suggestion = (sugSeat != null || sugRole)
            ? { value: { askSeat: sugSeat, roleId: sugRole }, breakdown: { playerName: sugBreakdownName, roleName: sugBreakdownRoleName } }
            : null;
          const acceptSuggestion = () => {
            if (sugSeat != null) setPickedSeats([sugSeat]);
            if (sugRole) setPickedRole(sugRole);
          };
          const sugBoth = sugSeat != null && sugRole &&
            pickedSeats.length === 1 && pickedSeats[0] === sugSeat && pickedRole === sugRole;
          return (
            <>
              <div>
                <div className="flex items-baseline justify-between gap-2 mb-1.5">
                  <div className="text-xs uppercase tracking-wider text-amber-300">
                    Pick the seat to reveal
                  </div>
                  {suggestion && (
                    <button onClick={acceptSuggestion}
                      className={`text-[11px] px-2 py-1 rounded transition
                        ${sugBoth
                          ? 'bg-emerald-700/60 text-emerald-100 border border-emerald-600'
                          : 'pill hover:border-emerald-500 hover:text-emerald-200 text-emerald-300'}`}>
                      {sugBoth ? '✓ Suggested: ' : 'Suggested: '}
                      <span className="font-bold">
                        #{sugSeat}{suggestion.breakdown?.playerName ? ' · ' + suggestion.breakdown.playerName : ''} · {suggestion.breakdown?.roleName || '?'}
                      </span>
                    </button>
                  )}
                </div>
                <ul className="grid grid-cols-1 sm:grid-cols-2 gap-1.5 max-h-48 overflow-y-auto">
                  {(seats || []).map(s => {
                    const picked = pickedSeats.includes(s.seatNum);
                    const rc = CHAR_BY_ID[s.actualRoleId];
                    const isSug = sugSeat === s.seatNum;
                    return (
                      <li key={s.seatNum}>
                        <button onClick={() => setPickedSeats([s.seatNum])}
                          className={`w-full card rounded px-2 py-1.5 flex items-center gap-2 text-left text-sm
                            ${picked
                              ? 'border-amber-500 bg-amber-900/30 ring-1 ring-amber-700'
                              : isSug ? 'border-emerald-600/70 hover:border-emerald-500' : 'hover:border-amber-500'}
                            ${s.isDead ? 'opacity-60' : ''}`}>
                          <span className="text-amber-200/80 text-xs w-6 text-center flex-shrink-0">#{s.seatNum}</span>
                          {iconUrl(s.actualRoleId) ? (
                            <img src={iconUrl(s.actualRoleId)} alt=""
                              className="w-8 h-8 rounded-full border border-stone-700 object-cover flex-shrink-0" />
                          ) : (
                            <span className="w-8 h-8 flex-shrink-0"></span>
                          )}
                          <div className="flex-1 min-w-0 leading-tight">
                            <div className="truncate">{s.playerName || <span className="text-stone-500 italic">—</span>}</div>
                            <div className={`text-[10px] uppercase tracking-wider truncate ${rc ? `team-${rc.team}` : 'text-stone-500'}`}>
                              {rc?.name || '(no role)'}
                            </div>
                          </div>
                          {picked && <span className="text-amber-300 text-base">✓</span>}
                        </button>
                      </li>
                    );
                  })}
                </ul>
              </div>
              <div>
                <div className="text-xs uppercase tracking-wider text-amber-300 mb-1.5">
                  Pick the role to reveal
                </div>
                <ul className="grid grid-cols-2 sm:grid-cols-3 gap-1.5 max-h-48 overflow-y-auto">
                  {candidateRoles.map(rc => {
                    const isSug = sugRole === rc.id;
                    return (
                      <li key={rc.id}>
                        <button onClick={() => setPickedRole(rc.id)}
                          className={`w-full card rounded px-2 py-1.5 flex items-center gap-2 text-left text-sm
                            ${pickedRole === rc.id
                              ? 'border-amber-500 bg-amber-900/30 ring-1 ring-amber-700'
                              : isSug ? 'border-emerald-600/70 hover:border-emerald-500' : 'hover:border-amber-500'}`}>
                          {iconUrl(rc.id) && <img src={iconUrl(rc.id)} alt="" className="w-7 h-7 rounded-full border border-stone-700 object-cover flex-shrink-0" />}
                          <span className={`flex-1 min-w-0 truncate team-${rc.team}`}>{rc.name}</span>
                          {isSug && pickedRole !== rc.id && (
                            <span className="w-2 h-2 rounded-full bg-emerald-500 flex-shrink-0"></span>
                          )}
                        </button>
                      </li>
                    );
                  })}
                </ul>
              </div>
            </>
          );
        })()}

        {infoType === 'role-list' && (() => {
          // Auto-suggest: list of all in-play role IDs matching the team.
          const teamFilter = (cfg.roleTeam || 'outsider');
          const inPlay = (seats || [])
            .map(s => s.actualRoleId)
            .filter(id => id && CHAR_BY_ID[id]?.team === teamFilter);
          const inPlaySet = new Set(inPlay);
          // pickedRoles is stored as a comma-separated string in pickedRole
          // to reuse the existing single-string state; for role-list we
          // parse/format as a list.
          const selected = (pickedRole || '').split(',').filter(Boolean);
          const selectedSet = new Set(selected);
          const toggleRoleInList = (rid) => {
            const next = new Set(selectedSet);
            if (next.has(rid)) next.delete(rid); else next.add(rid);
            setPickedRole([...next].join(','));
          };
          const autoPick = () => setPickedRole(inPlay.join(','));
          return (
            <div>
              <div className="flex items-baseline justify-between gap-2 mb-1.5">
                <div className="text-xs uppercase tracking-wider text-amber-300">
                  Pick the {teamFilter}{teamFilter.endsWith('s') ? '' : 's'} to reveal
                </div>
                {inPlay.length > 0 && (
                  <button onClick={autoPick}
                    className={`text-[11px] px-2 py-1 rounded transition
                      ${selected.length === inPlay.length && inPlay.every(id => selectedSet.has(id))
                        ? 'bg-emerald-700/60 text-emerald-100 border border-emerald-600'
                        : 'pill hover:border-emerald-500 hover:text-emerald-200 text-emerald-300'}`}>
                    Suggested: <span className="font-bold">in-play {teamFilter}s</span> ({inPlay.length})
                  </button>
                )}
              </div>
              <ul className="grid grid-cols-2 sm:grid-cols-3 gap-1.5 max-h-72 overflow-y-auto">
                {candidateRoles.filter(rc => rc.team === teamFilter).map(rc => {
                  const isPicked = selectedSet.has(rc.id);
                  const isSuggested = inPlaySet.has(rc.id);
                  return (
                    <li key={rc.id}>
                      <button onClick={() => toggleRoleInList(rc.id)}
                        className={`w-full card rounded px-2 py-1.5 flex items-center gap-2 text-left text-sm
                          ${isPicked
                            ? 'border-amber-500 bg-amber-900/30 ring-1 ring-amber-700'
                            : isSuggested
                              ? 'border-emerald-600/70 hover:border-emerald-500'
                              : 'hover:border-amber-500'}`}>
                        {iconUrl(rc.id) && <img src={iconUrl(rc.id)} alt="" className="w-7 h-7 rounded-full border border-stone-700 object-cover flex-shrink-0" />}
                        <span className={`flex-1 min-w-0 truncate team-${rc.team}`}>{rc.name}</span>
                        {isPicked && <span className="text-amber-300 text-base leading-none">✓</span>}
                      </button>
                    </li>
                  );
                })}
              </ul>
              <div className="mt-2 text-[10px] text-stone-500">
                Selected: {selected.length === 0 ? '(none)' : selected.map(id => CHAR_BY_ID[id]?.name || id).join(', ')}
              </div>
            </div>
          );
        })()}

        {infoType === 'alignment' && (() => {
          const align = cfg.presetAlignment || 'good';
          return (
            <div className="space-y-2">
              <div className="text-xs uppercase tracking-wider text-amber-300 mb-1.5">
                Reveal alignment to the Goon
              </div>
              <div className={`text-center p-5 rounded-lg border-2 ${align === 'good'
                ? 'bg-emerald-900/40 text-emerald-200 border-emerald-700/70'
                : 'bg-red-900/40 text-red-200 border-red-700/70'}`}>
                <div className="text-6xl mb-1 leading-none">{align === 'good' ? '👍' : '👎'}</div>
                <div className="text-3xl font-extrabold">{align === 'good' ? 'GOOD' : 'EVIL'}</div>
              </div>
            </div>
          );
        })()}

        {infoType === 'role' && (() => {
          const suggestion = infoSuggestion(step.char.id, targetSeat, seats, suggestionCtx);
          return (
            <div>
              <div className="flex items-baseline justify-between gap-2 mb-1.5">
                <div className="text-xs uppercase tracking-wider text-amber-300">Pick the role to reveal</div>
                {suggestion?.value && (
                  <button onClick={() => setPickedRole(suggestion.value)}
                    className={`text-[11px] px-2 py-1 rounded transition
                      ${pickedRole === suggestion.value
                        ? 'bg-emerald-700/60 text-emerald-100 border border-emerald-600'
                        : 'pill hover:border-emerald-500 hover:text-emerald-200 text-emerald-300'}`}>
                    {pickedRole === suggestion.value ? '✓ Suggested: ' : 'Suggested: '}
                    <span className="font-bold">{(CHAR_BY_ID[suggestion.value] || {}).name || suggestion.value}</span>
                  </button>
                )}
              </div>
              <ul className="grid grid-cols-2 sm:grid-cols-3 gap-1.5 max-h-72 overflow-y-auto">
                {candidateRoles.map(rc => {
                  const isSuggested = suggestion?.value === rc.id;
                  return (
                    <li key={rc.id}>
                      <button onClick={() => setPickedRole(rc.id)}
                        className={`w-full card rounded px-2 py-1.5 flex items-center gap-2 text-left text-sm
                          ${pickedRole === rc.id
                            ? 'border-amber-500 bg-amber-900/30 ring-1 ring-amber-700'
                            : isSuggested
                              ? 'border-emerald-600/70 hover:border-emerald-500'
                              : 'hover:border-amber-500'}`}>
                        {iconUrl(rc.id) && <img src={iconUrl(rc.id)} alt="" className="w-7 h-7 rounded-full border border-stone-700 object-cover flex-shrink-0" />}
                        <span className={`flex-1 min-w-0 truncate team-${rc.team}`}>{rc.name}</span>
                        {isSuggested && pickedRole !== rc.id && (
                          <span className="w-2 h-2 rounded-full bg-emerald-500 flex-shrink-0"></span>
                        )}
                      </button>
                    </li>
                  );
                })}
              </ul>
              {suggestion?.breakdown && step.char.id === 'undertaker' && (
                <div className="mt-2 text-[10px] text-stone-500 leading-snug">
                  Based on today's execution: seat #{suggestion.breakdown.seatNum}
                  {suggestion.breakdown.playerName ? ` · ${suggestion.breakdown.playerName}` : ''}
                  {suggestion.breakdown.misregistered ? ' — actual role differs from what the player thought they were.' : '.'}
                </div>
              )}
            </div>
          );
        })()}

        {infoType === 'number' && (() => {
          const suggestion = infoSuggestion(step.char.id, targetSeat, seats);
          return (
            <div>
              <div className="flex items-baseline justify-between gap-2 mb-1.5">
                <div className="text-xs uppercase tracking-wider text-amber-300">
                  Pick the number
                </div>
                {suggestion != null && (
                  <button onClick={() => setPickedNum(suggestion.value)}
                    className={`text-[11px] px-2 py-1 rounded transition
                      ${pickedNum === suggestion.value
                        ? 'bg-emerald-700/60 text-emerald-100 border border-emerald-600'
                        : 'pill hover:border-emerald-500 hover:text-emerald-200 text-emerald-300'}`}>
                    {pickedNum === suggestion.value ? '✓ Suggested: ' : 'Suggested: '}
                    <span className="font-bold">{suggestion.value}</span>
                  </button>
                )}
              </div>
              <div className="flex items-center justify-center gap-2 py-2 flex-wrap">
                {Array.from({ length: (cfg.max - cfg.min) + 1 }, (_, i) => cfg.min + i).map(n => {
                  const isSuggested = suggestion != null && n === suggestion.value;
                  return (
                    <button key={n} onClick={() => setPickedNum(n)}
                      className={`w-11 h-11 rounded text-lg font-bold transition relative
                        ${pickedNum === n
                          ? 'bg-amber-600 text-stone-950'
                          : isSuggested
                            ? 'pill border-emerald-600/70 text-emerald-200 hover:border-emerald-500'
                            : 'pill hover:border-amber-500'}`}>
                      {n}
                      {isSuggested && pickedNum !== n && (
                        <span className="absolute -top-1 -right-1 w-2 h-2 rounded-full bg-emerald-500"></span>
                      )}
                    </button>
                  );
                })}
              </div>
              <div className="text-xs text-stone-400 text-center">
                {cfg.display || 'Reveal:'} <span className="text-amber-200 font-medium">{pickedNum} {cfg.label || ''}</span>
              </div>
              {/* Auto-computed breakdown — helps the ST verify the suggestion */}
              {suggestion?.breakdown && (
                <div className="mt-2 text-[10px] text-stone-500 leading-snug">
                  {step.char.id === 'chef' && suggestion.breakdown.evilSeats && (
                    <>Evil seats: {suggestion.breakdown.evilSeats.length === 0
                      ? '(none)'
                      : suggestion.breakdown.evilSeats.map(n => '#' + n).join(', ')}</>
                  )}
                  {step.char.id === 'empath' && (
                    <>Alive neighbours: left {suggestion.breakdown.leftSeat ? '#' + suggestion.breakdown.leftSeat + (suggestion.breakdown.leftEvil ? ' (evil)' : ' (good)') : '—'}, right {suggestion.breakdown.rightSeat ? '#' + suggestion.breakdown.rightSeat + (suggestion.breakdown.rightEvil ? ' (evil)' : ' (good)') : '—'}</>
                  )}
                  {step.char.id === 'oracle' && suggestion.breakdown.deadEvilSeats && (
                    <>Dead evil seats: {suggestion.breakdown.deadEvilSeats.length === 0
                      ? '(none)'
                      : suggestion.breakdown.deadEvilSeats.map(n => '#' + n).join(', ')}</>
                  )}
                  {step.char.id === 'mathematician' && suggestion.breakdown.affectedSeats && (
                    <>Drunk/poisoned: {suggestion.breakdown.affectedSeats.length === 0
                      ? '(none)'
                      : suggestion.breakdown.affectedSeats.map(n => '#' + n).join(', ')} <span className="text-stone-600">(approx — official count is malfunctions today/tonight)</span></>
                  )}
                </div>
              )}
            </div>
          );
        })()}

        {infoType === 'yesno' && (() => {
          const suggestion = infoSuggestion(step.char.id, targetSeat, seats, suggestionCtx);
          return (
            <>
              {suggestion != null && (
                <div className="flex items-center justify-between gap-2 -mb-1">
                  <span className="text-[11px] uppercase tracking-wider text-stone-400">
                    Pick the answer
                  </span>
                  <button onClick={() => setPickedYes(suggestion.value)}
                    className={`text-[11px] px-2 py-1 rounded transition
                      ${pickedYes === suggestion.value
                        ? (suggestion.value
                            ? 'bg-emerald-700/60 text-emerald-100 border border-emerald-600'
                            : 'bg-red-700/60 text-red-100 border border-red-600')
                        : (suggestion.value
                            ? 'pill hover:border-emerald-500 hover:text-emerald-200 text-emerald-300'
                            : 'pill hover:border-red-500 hover:text-red-200 text-red-300')}`}>
                    {pickedYes === suggestion.value ? '✓ Suggested: ' : 'Suggested: '}
                    <span className="font-bold">{suggestion.value ? 'YES' : 'NO'}</span>
                  </button>
                </div>
              )}
              <div className="grid grid-cols-2 gap-3">
                <button onClick={() => setPickedYes(true)}
                  className={`py-4 rounded-lg text-base font-bold transition relative
                    ${pickedYes === true ? 'bg-emerald-600 text-stone-950 shadow-lg shadow-emerald-900/40' : 'pill hover:border-emerald-500 text-emerald-300'}`}>
                  YES
                  <div className="text-[10px] uppercase tracking-wider mt-1 font-normal opacity-90">
                    {cfg.yesLabel}
                  </div>
                  {suggestion?.value === true && pickedYes !== true && (
                    <span className="absolute top-1 right-1 w-2 h-2 rounded-full bg-emerald-500"></span>
                  )}
                </button>
                <button onClick={() => setPickedYes(false)}
                  className={`py-4 rounded-lg text-base font-bold transition relative
                    ${pickedYes === false ? 'bg-red-600 text-stone-100 shadow-lg shadow-red-900/40' : 'pill hover:border-red-500 text-red-300'}`}>
                  NO
                  <div className="text-[10px] uppercase tracking-wider mt-1 font-normal opacity-90">
                    {cfg.noLabel}
                  </div>
                  {suggestion?.value === false && pickedYes !== false && (
                    <span className="absolute top-1 right-1 w-2 h-2 rounded-full bg-red-500"></span>
                  )}
                </button>
              </div>
              {suggestion?.breakdown && (
                <div className="text-[10px] text-stone-500 leading-snug mt-1">
                  {step.char.id === 'flowergirl' && (
                    <>Based on Day {suggestion.breakdown.prevDayNumber} voting (toggle "Demon voted" on the Nominations tab to change).</>
                  )}
                  {step.char.id === 'towncrier' && (suggestion.breakdown.minionNominatorSeats?.length
                    ? <>Day {suggestion.breakdown.prevDayNumber} minion nominators: {suggestion.breakdown.minionNominatorSeats.map(n => '#' + n).join(', ')}</>
                    : <>No Minions nominated on Day {suggestion.breakdown.prevDayNumber}.</>
                  )}
                </div>
              )}
            </>
          );
        })()}

        {infoType === 'seat+role-pair' && (
          <>
            {/* Pick the asked-about seat */}
            <div>
              <div className="text-xs uppercase tracking-wider text-amber-300 mb-1.5">
                Pick the seat being asked about
              </div>
              <ul className="grid grid-cols-1 sm:grid-cols-2 gap-1.5">
                {(seats || []).filter(s => s.actualRoleId && s.seatNum !== targetSeat?.seatNum).map(s => {
                  const picked = pickedSeats.includes(s.seatNum);
                  const rc = CHAR_BY_ID[s.actualRoleId];
                  return (
                    <li key={s.seatNum}>
                      <button onClick={() => {
                        setPickedSeats([s.seatNum]);
                        // Reset role pick when seat changes — true-role suggestion shifts.
                        setPickedRole('');
                        setPickedFalseRole('');
                      }}
                        className={`w-full card rounded px-2 py-1.5 flex items-center gap-2 text-left text-sm
                          ${picked ? 'border-amber-500 bg-amber-900/30 ring-1 ring-amber-700' : 'hover:border-amber-500'}
                          ${s.isDead ? 'opacity-60' : ''}`}>
                        <span className="text-amber-200/80 text-xs w-6 text-center flex-shrink-0">#{s.seatNum}</span>
                        {iconUrl(s.actualRoleId) ? (
                          <img src={iconUrl(s.actualRoleId)} alt=""
                            className="w-8 h-8 rounded-full border border-stone-700 object-cover flex-shrink-0" />
                        ) : (
                          <span className="w-8 h-8 flex-shrink-0"></span>
                        )}
                        <div className="flex-1 min-w-0 leading-tight">
                          <div className="truncate">{s.playerName || <span className="text-stone-500 italic">—</span>}</div>
                          <div className={`text-[10px] uppercase tracking-wider truncate ${rc ? `team-${rc.team}` : 'text-stone-500'}`}>
                            {rc?.name || '(no role)'}
                          </div>
                        </div>
                        {picked && <span className="text-amber-300 text-base">✓</span>}
                      </button>
                    </li>
                  );
                })}
              </ul>
            </div>

            {dreamerPickedSeat && (
              <>
                {/* True role — defaults to the actual role of the picked seat */}
                <div>
                  <div className="flex items-baseline justify-between gap-2 mb-1.5">
                    <div className="text-xs uppercase tracking-wider text-amber-300">
                      True role <span className="text-stone-500 normal-case">(one of the two shown)</span>
                    </div>
                    {dreamerSuggestedTrueRoleId && (
                      <button onClick={() => setPickedRole(dreamerSuggestedTrueRoleId)}
                        className={`text-[11px] px-2 py-1 rounded transition
                          ${pickedRole === dreamerSuggestedTrueRoleId
                            ? 'bg-emerald-700/60 text-emerald-100 border border-emerald-600'
                            : 'pill hover:border-emerald-500 hover:text-emerald-200 text-emerald-300'}`}>
                        {pickedRole === dreamerSuggestedTrueRoleId ? '✓ Suggested: ' : 'Suggested: '}
                        <span className="font-bold">{(CHAR_BY_ID[dreamerSuggestedTrueRoleId] || {}).name || dreamerSuggestedTrueRoleId}</span>
                      </button>
                    )}
                  </div>
                  <ul className="grid grid-cols-2 sm:grid-cols-3 gap-1.5 max-h-44 overflow-y-auto">
                    {candidateRoles.map(rc => (
                      <li key={rc.id}>
                        <button onClick={() => { setPickedRole(rc.id); setPickedFalseRole(''); }}
                          className={`w-full card rounded px-2 py-1.5 flex items-center gap-2 text-left text-sm
                            ${pickedRole === rc.id ? 'border-amber-500 bg-amber-900/30 ring-1 ring-amber-700' : 'hover:border-amber-500'}`}>
                          {iconUrl(rc.id) && <img src={iconUrl(rc.id)} alt="" className="w-7 h-7 rounded-full border border-stone-700 object-cover flex-shrink-0" />}
                          <span className={`flex-1 min-w-0 truncate team-${rc.team}`}>{rc.name}</span>
                        </button>
                      </li>
                    ))}
                  </ul>
                </div>

                {/* False role — opposite alignment from the picked true role */}
                {pickedRole && (
                  <div>
                    <div className="text-xs uppercase tracking-wider text-amber-300 mb-1.5">
                      False role <span className="text-stone-500 normal-case">(opposite alignment)</span>
                    </div>
                    <ul className="grid grid-cols-2 sm:grid-cols-3 gap-1.5 max-h-44 overflow-y-auto">
                      {dreamerFalseCandidates.map(rc => (
                        <li key={rc.id}>
                          <button onClick={() => setPickedFalseRole(rc.id)}
                            className={`w-full card rounded px-2 py-1.5 flex items-center gap-2 text-left text-sm
                              ${pickedFalseRole === rc.id ? 'border-amber-500 bg-amber-900/30 ring-1 ring-amber-700' : 'hover:border-amber-500'}`}>
                            {iconUrl(rc.id) && <img src={iconUrl(rc.id)} alt="" className="w-7 h-7 rounded-full border border-stone-700 object-cover flex-shrink-0" />}
                            <span className={`flex-1 min-w-0 truncate team-${rc.team}`}>{rc.name}</span>
                          </button>
                        </li>
                      ))}
                    </ul>
                  </div>
                )}
              </>
            )}
          </>
        )}

        {/* New simple-pick info types: seat (single), seats (N), direction. */}
        {(infoType === 'seat' || infoType === 'seats') && (
          <div>
            <div className="text-xs uppercase tracking-wider text-amber-300 mb-1.5">
              {cfg.display || (infoType === 'seat' ? 'Pick 1 player' : `Pick ${cfg.numSeats || 2} players`)}
              <span className="text-stone-500 normal-case"> ({pickedSeats.length}/{cfg.numSeats || (infoType === 'seat' ? 1 : 2)})</span>
            </div>
            {step.char && step.char.id === 'sage' && (() => {
              const demonSeat = (seats || []).find(s => (CHAR_BY_ID[s.actualRoleId] || {}).team === 'demon');
              if (!demonSeat) return null;
              const sageAfflicted = targetSeat ? isDrunkOrPoisoned(targetSeat) : false;
              const alreadyPicked = pickedSeats.includes(demonSeat.seatNum);
              return (
                <div className="flex items-center justify-between gap-2 -mt-1 mb-1.5 text-[11px]">
                  <span className="text-stone-400">
                    {sageAfflicted
                      ? 'Sage is drunk/poisoned — consider giving false info.'
                      : 'Suggested: include the demon seat #' + demonSeat.seatNum + (demonSeat.playerName ? ' · ' + demonSeat.playerName : '')}
                  </span>
                  <button onClick={() => setPickedSeats(prev => prev.includes(demonSeat.seatNum) ? prev : (prev.length >= (cfg.numSeats || 2) ? [...prev.slice(1), demonSeat.seatNum] : [...prev, demonSeat.seatNum]))}
                    className={`px-2 py-1 rounded transition ${alreadyPicked ? 'bg-emerald-700/60 text-emerald-100 border border-emerald-600' : 'pill hover:border-emerald-500 hover:text-emerald-200 text-emerald-300'}`}>
                    {alreadyPicked ? '✓ Demon included' : '+ Add demon'}
                  </button>
                </div>
              );
            })()}
            <ul className="grid grid-cols-1 sm:grid-cols-2 gap-1.5 max-h-72 overflow-y-auto">
              {(seats || []).map(s => {
                const picked = pickedSeats.includes(s.seatNum);
                const rc = CHAR_BY_ID[s.actualRoleId];
                return (
                  <li key={s.seatNum}>
                    <button onClick={() => toggleSeat(s.seatNum)}
                      className={`w-full card rounded px-2 py-1.5 flex items-center gap-2 text-left text-sm
                        ${picked ? 'border-amber-500 bg-amber-900/30 ring-1 ring-amber-700' : 'hover:border-amber-500'}
                        ${s.isDead ? 'opacity-60' : ''}`}>
                      <span className="text-amber-200/80 text-xs w-6 text-center flex-shrink-0">#{s.seatNum}</span>
                      {iconUrl(s.actualRoleId) ? (
                        <img src={iconUrl(s.actualRoleId)} alt=""
                          className="w-8 h-8 rounded-full border border-stone-700 object-cover flex-shrink-0" />
                      ) : (
                        <span className="w-8 h-8 flex-shrink-0"></span>
                      )}
                      <div className="flex-1 min-w-0 leading-tight">
                        <div className="truncate">{s.playerName || <span className="text-stone-500 italic">—</span>}</div>
                        <div className={`text-[10px] uppercase tracking-wider truncate ${rc ? `team-${rc.team}` : 'text-stone-500'}`}>
                          {rc?.name || '(no role)'}
                        </div>
                      </div>
                      {picked && <span className="text-amber-300 text-base">✓</span>}
                    </button>
                  </li>
                );
              })}
            </ul>
          </div>
        )}

        {infoType === 'direction' && (
          <div>
            <div className="text-xs uppercase tracking-wider text-amber-300 mb-2">
              {cfg.display || 'Pick the direction'}
            </div>
            <div className="grid grid-cols-2 gap-3">
              <button onClick={() => setPickedDirection('cw')}
                className={`py-5 rounded-lg text-base font-bold transition
                  ${pickedDirection === 'cw' ? 'bg-amber-600 text-stone-950 shadow-lg shadow-amber-900/40' : 'pill hover:border-amber-500 text-amber-300'}`}>
                ↻ Clockwise
              </button>
              <button onClick={() => setPickedDirection('ccw')}
                className={`py-5 rounded-lg text-base font-bold transition
                  ${pickedDirection === 'ccw' ? 'bg-amber-600 text-stone-950 shadow-lg shadow-amber-900/40' : 'pill hover:border-amber-500 text-amber-300'}`}>
                ↺ Counter-clockwise
              </button>
            </div>
          </div>
        )}

        {/* Footer */}
        <div className="flex items-center gap-2 pt-3 border-t border-stone-800">
          <button onClick={onClose}
            className="text-xs px-3 py-2 rounded pill hover:border-stone-400 text-stone-400">
            Cancel
          </button>
          <button onClick={() => onSend(buildPayload())}
            disabled={!canSend}
            className={`flex-1 py-2.5 rounded font-semibold transition text-sm
              ${canSend
                ? 'bg-amber-600 hover:bg-amber-500 text-stone-950 shadow-lg shadow-amber-900/40'
                : 'bg-stone-800 text-stone-500 cursor-not-allowed'}`}>
            {step.char && step.char.id === 'sweetheart' ? 'Place drunk marker →' : "Send to player's phone →"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ---------------- Mini Reminder Token (compact display for snapshots) ----------------
//
// Used inside LocalGrimoireOverlay (and could be reused elsewhere). Mirrors
// the player.html MiniReminderToken — small round icon + char name + label.
function STMiniReminderToken({ reminder }) {
  const rc = CHAR_BY_ID[reminder.charId];
  const img = iconUrl(reminder.charId);
  return (
    <div className="card rounded p-1.5 flex items-center gap-2" style={{ minWidth: 0 }}>
      <div className="relative inline-block flex-shrink-0" style={{ width: 32, height: 32, aspectRatio: '1 / 1' }}>
        <div className="rounded-full overflow-hidden border border-amber-700/70 bg-stone-900 w-full h-full"
          style={{ backgroundImage: 'url(data/tokens/character-token-noise.webp)', backgroundSize: 'cover' }}>
          {img && <img src={img} alt="" className="w-full h-full object-cover opacity-90" draggable={false} />}
        </div>
      </div>
      <div className="min-w-0 leading-tight">
        <div className={`text-[10px] font-medium truncate team-${rc?.team || 'townsfolk'}`}>
          {rc?.name || reminder.charId}
        </div>
        <div className="text-[10px] text-amber-100 truncate">{reminder.label}</div>
      </div>
    </div>
  );
}

// ---------------- Local Grimoire Overlay (Spy on ST device) ----------------
//
// Fullscreen overlay shown on the ST device when a LOCAL seat's Spy step is
// started. Two phases mirroring LocalNightPromptOverlay:
//   'input'     → full grimoire snapshot + Got it button (local player taps)
//   'confirmed' → "Choice recorded — return phone to storyteller" + Return
//                  button (only the ST taps Return; player never sees the
//                  grimoire after Got it). Fully opaque background.
// The submitted-prompt status flip happens on Return so the toast appears
// after the ST takes the phone back.
function LocalGrimoireOverlay({ seat, grimoire, phase, onAck, onReturn, onCancel }) {
  if (!seat) return null;
  const seats = grimoire?.seats || [];
  const bluffs = (grimoire?.demonBluffs || []).filter(Boolean);

  if (phase === 'confirmed') {
    return (
      <div className="fixed inset-0 z-50 bg-stone-950 overflow-y-auto p-3 sm:p-4">
        <div className="max-w-md mx-auto space-y-4 py-4">
          <section className="parchment rounded-lg p-6 sm:p-8 text-center space-y-4 border-2 border-emerald-700/70">
            <div className="text-6xl">✓</div>
            <div className="text-emerald-300 text-2xl font-bold">Acknowledged</div>
            <p className="text-sm text-stone-300">
              Thanks, <span className="text-amber-200 font-semibold">{seat.playerName || `seat #${seat.seatNum}`}</span>.
              Please return the phone to the storyteller.
            </p>
            <div className="text-xs text-stone-500 pt-3 border-t border-stone-800">
              Seat #{seat.seatNum}
            </div>
          </section>

          <button onClick={onReturn}
            className="w-full py-3 rounded-lg text-base font-semibold bg-amber-600 hover:bg-amber-500 text-stone-950 shadow-lg shadow-amber-900/40">
            Return to storyteller →
          </button>
          <p className="text-[10px] text-stone-500 text-center">
            Storyteller-only — do not tap if you are the local player.
          </p>
        </div>
      </div>
    );
  }

  // 'input' phase — show the full grimoire snapshot.
  return (
    <div className="fixed inset-0 z-50 bg-stone-950 overflow-y-auto">
      <div className="max-w-md mx-auto p-4 space-y-4">
        <header className="text-center py-2">
          <div className="text-purple-300 uppercase text-[10px] tracking-widest">🏠 Local player</div>
          <div className="text-amber-300 uppercase text-xs tracking-widest mt-1">Grimoire snapshot</div>
          <div className="text-stone-400 text-xs mt-1">
            Hand the phone to <span className="text-amber-200 font-semibold">{seat.playerName || `seat #${seat.seatNum}`}</span>.
            They can study the grimoire, then tap Got it.
          </div>
        </header>

        <section className="space-y-1.5">
          {seats.map(s => {
            const actual = CHAR_BY_ID[s.actualRoleId];
            const perceived = CHAR_BY_ID[s.perceivedRoleId];
            const misregistered = s.actualRoleId !== s.perceivedRoleId;
            return (
              <div key={s.seatNum}
                className={`card rounded p-2 flex items-start gap-2 ${s.isDead ? 'opacity-50' : ''}`}>
                <div className="flex-shrink-0 flex items-baseline gap-1.5">
                  <span className="text-amber-200/80 text-sm font-bold">#{s.seatNum}</span>
                  {(s.playerName || '').trim() && (
                    <span className="text-xs text-stone-300 truncate max-w-[80px]">{s.playerName}</span>
                  )}
                </div>
                {iconUrl(s.actualRoleId) && (
                  <img src={iconUrl(s.actualRoleId)} alt=""
                    className={`w-10 h-10 rounded-full border border-stone-700 object-cover flex-shrink-0 ${s.isDead ? 'grayscale' : ''}`} />
                )}
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 flex-wrap">
                    <span className={`font-medium text-sm team-${actual?.team || 'townsfolk'}`}>{actual?.name || '?'}</span>
                    {s.isDead && <span className="text-[10px] uppercase text-red-400">dead</span>}
                  </div>
                  {misregistered && perceived && (
                    <div className="text-[10px] italic text-stone-400">thinks they are {perceived.name}</div>
                  )}
                  {s.reminders && s.reminders.length > 0 && (
                    <div className="flex flex-wrap gap-1 mt-1">
                      {s.reminders.map((r, i) => (
                        <STMiniReminderToken key={i} reminder={r} />
                      ))}
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </section>

        {bluffs.length > 0 && (
          <section className="card rounded p-3">
            <div className="text-[10px] uppercase tracking-wider text-amber-300 mb-2">Demon bluffs</div>
            <div className="grid grid-cols-3 gap-2">
              {bluffs.map((bId, i) => {
                const bc = CHAR_BY_ID[bId];
                return (
                  <div key={i} className="text-center">
                    {iconUrl(bId) && (
                      <img src={iconUrl(bId)} alt=""
                        className="w-12 h-12 rounded-full border border-amber-700/60 object-cover mx-auto" />
                    )}
                    <div className={`text-[11px] font-medium mt-1 team-${bc?.team || 'townsfolk'}`}>{bc?.name || '?'}</div>
                  </div>
                );
              })}
            </div>
          </section>
        )}

        <div className="sticky bottom-0 pt-2 pb-4 bg-gradient-to-t from-stone-950 via-stone-950 to-transparent space-y-2">
          <button onClick={onAck}
            className="w-full py-3 rounded-lg text-base font-semibold bg-emerald-600 hover:bg-emerald-500 text-stone-950 shadow-lg shadow-emerald-900/40">
            ✓ Got it
          </button>
          <button onClick={onCancel}
            className="w-full py-2 rounded-lg text-xs font-medium bg-stone-800 hover:bg-stone-700 text-stone-300 border border-stone-700">
            Cancel (storyteller — aborts the prompt)
          </button>
        </div>
      </div>
    </div>
  );
}

// ---------------- Local Night Prompt Overlay (local-player handling) ----------------
//
// Full-screen overlay rendered on the ST device when a local-player (🏠) step
// is started. Dispatches on infoPayload:
//   - infoPayload present  → render the info-display variant (mirrors player's
//                            NightInfoScreen) with a single "Got it" button
//   - infoPayload absent   → render the seat-picker variant (mirrors player's
//                            NightPromptScreen) with Submit/Cancel
// No Question button — for local players the ST IS the storyteller.
function LocalNightPromptOverlay({ step, infoPayload, seats, onSubmit, onClose, scriptCharIds = [] }) {
  // For team-reveal info, use the viewerRoleId to populate the header so a
  // Lunatic player sees the demon role they were dealt rather than "Lunatic".
  const _teamRevealRoleId = (infoPayload && infoPayload.type === 'team-reveal' && infoPayload.viewerRoleId)
    ? infoPayload.viewerRoleId : null;
  const c = CHAR_BY_ID[_teamRevealRoleId || step.char.id];
  const _displayCharId = _teamRevealRoleId || step.char.id;
  const mySeat = step.seat;
  const isInfo = !!infoPayload;
  const isTwo = step.action === 'target2' || step.action === 'target2+yesno' || step.action === 'target2+number' || step.action === 'target2+st-pick';
  const isThree = step.action === 'target3';
  const isPoFlex = step.action === 'po-flex';
  const need = isThree ? 3 : (isTwo ? 2 : 1);
  // For canSkip oncePerGame abilities, start with a Use/Skip decision unless
  // the seat already used the ability.
  const defForRole = NIGHT_ACTIONS[step.char.id] || {};
  const alreadyUsed = (mySeat.reminders || []).some(r => r && /no ability/i.test(String(r.label || '')));
  const needsUseDecision = !!defForRole.canSkip && !isInfo && !alreadyUsed;
  const eligible = (NIGHT_ACTIONS[step.char.id] && NIGHT_ACTIONS[step.char.id].eligible) || 'all';
  const eligibleSeats = (seats || []).filter(s => {
    if (!s) return false;
    const isSelf = s.seatNum === mySeat.seatNum;
    if (eligible === 'others' && isSelf) return false;
    if (eligible === 'self' && !isSelf) return false;
    if (eligible === 'dead' && !s.isDead) return false;
    if (step.action !== 'target1any' && eligible !== 'dead' && s.isDead) return false;
    // Exorcist cannot pick the same player two nights in a row.
    if (step.char.id === 'exorcist' &&
        (s.reminders || []).some(r => r && r.charId === 'exorcist' && r.exChose)) {
      return false;
    }
    return true;
  });
  const [picked, setPicked] = useState([]);
  // Internal phase: 'use-decision' (optional, for canSkip roles) → 'input'
  // → 'confirmed'. 'confirmed' shows a hand-the-phone-back screen so the
  // local player never sees the grimoire flash when the overlay closes.
  const [phase, setPhase] = useState(needsUseDecision ? 'use-decision' : 'input');
  // Remember what was submitted so the confirmation screen can echo it.
  const [submittedValue, setSubmittedValue] = useState(null);

  const togglePick = (seatNum) => {
    setPicked(prev => {
      if (prev.includes(seatNum)) return prev.filter(n => n !== seatNum);
      if (prev.length >= need) return [...prev.slice(1), seatNum];
      return [...prev, seatNum];
    });
  };
  // Gambler-only: in addition to picking 1 seat, the player picks 1 role guess.
  const isGuess = step.action === 'target1+guess';
  // Cerenovus: player picks 1 seat AND 1 good-aligned character (no ST step).
  const isRoleClaim = step.action === 'target1+role-claim';
  const wantsRolePick = isGuess || isRoleClaim;
  // Philosopher: role-only — auto-pick self, hide seat picker entirely.
  const isLocalRoleOnly = isRoleClaim && step.char && step.char.id === 'philosopher';
  const [pickedGuess, setPickedGuess] = useState('');
  React.useEffect(() => {
    if (isLocalRoleOnly && mySeat && picked.length !== 1) {
      setPicked([mySeat.seatNum]);
    }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [isLocalRoleOnly]);
  const canSubmit = isInfo
    ? true
    : (isLocalRoleOnly
        ? !!pickedGuess
        : wantsRolePick
          ? (picked.length === 1 && !!pickedGuess)
          : (isPoFlex ? (picked.length <= 1) : (picked.length === need)));

  const doSubmit = () => {
    const v = isInfo ? [] : picked;
    const extras = wantsRolePick ? { guess: pickedGuess } : undefined;
    onSubmit(v, extras);         // writes the prompt; overlay does NOT close here
    setSubmittedValue(isInfo ? 'info' : [...picked]);
    setPhase('confirmed');
  };
  // Local player chose to skip — write status='declined' via the special
  // sentinel array (submitLocalPrompt checks targets.__skipped).
  const doSkip = () => {
    const sentinel = []; sentinel.__skipped = true;
    onSubmit(sentinel);
    setSubmittedValue('skipped');
    setPhase('confirmed');
  };

  // Build the info display body — same visual logic as player's NightInfoScreen.
  let infoBody = null;
  if (isInfo) {
    const info = infoPayload || {};
    const seatBy = Object.fromEntries((seats || []).map(s => [s.seatNum, s]));
    if (info.type === 'seats+role') {
      const role = info.roleId ? CHAR_BY_ID[info.roleId] : null;
      if (info.none) {
        infoBody = (
          <div className="text-center space-y-3">
            <div className="text-amber-200 text-xl font-bold">No such role in play.</div>
          </div>
        );
      } else {
        const pickedSeats = (info.seats || []).map(n => seatBy[n]).filter(Boolean);
        infoBody = (
          <div className="space-y-4">
            <div className="text-center text-sm text-stone-300">One of these players is the:</div>
            {role && (
              <div className="flex flex-col items-center gap-1">
                {iconUrl(role.id) && (
                  <img src={iconUrl(role.id)} alt="" className="w-24 h-24 rounded-full border-2 border-amber-700 object-cover" />
                )}
                <div className={`text-2xl font-bold team-${role.team}`}>{role.name}</div>
              </div>
            )}
            <ul className="grid grid-cols-2 gap-2">
              {pickedSeats.map(s => (
                <li key={s.seatNum} className="card rounded p-3 text-center">
                  <div className="text-amber-200/80 text-xs">seat #{s.seatNum}</div>
                  <div className="text-base text-amber-100 font-semibold truncate">
                    {s.playerName || <span className="text-stone-500 italic">—</span>}
                  </div>
                </li>
              ))}
            </ul>
          </div>
        );
      }
    } else if (info.type === 'role') {
      const role = info.roleId ? CHAR_BY_ID[info.roleId] : null;
      infoBody = (
        <div className="text-center space-y-3">
          <div className="text-sm text-stone-300">The executed player was:</div>
          {role ? (
            <div className="flex flex-col items-center gap-2">
              {iconUrl(role.id) && (
                <img src={iconUrl(role.id)} alt="" className="w-28 h-28 rounded-full border-2 border-amber-700 object-cover" />
              )}
              <div className={`text-3xl font-bold team-${role.team}`}>{role.name}</div>
            </div>
          ) : <div className="text-stone-400 italic">(none)</div>}
        </div>
      );
    } else if (info.type === 'number') {
      infoBody = (
        <div className="text-center space-y-2">
          <div className="text-sm text-stone-300">You learn the number:</div>
          <div className="text-7xl font-extrabold text-amber-200 leading-none my-2">{info.number}</div>
        </div>
      );
    } else if (info.type === 'yesno') {
      infoBody = (
        <div className="text-center space-y-2">
          <div className={`text-6xl font-extrabold leading-none my-2 ${info.yes ? 'text-emerald-300' : 'text-red-300'}`}>
            {info.yes ? 'YES' : 'NO'}
          </div>
        </div>
      );
    } else if (info.type === 'seat+role-pair') {
      const askSeat = seatBy[info.askSeat];
      const roles = (info.roles || []).map(id => CHAR_BY_ID[id]).filter(Boolean);
      infoBody = (
        <div className="space-y-4">
          <div className="text-center text-sm text-stone-300">
            You dream about{' '}
            {askSeat ? (
              <span className="text-amber-200 font-semibold">
                seat #{askSeat.seatNum}{askSeat.playerName ? ' · ' + askSeat.playerName : ''}
              </span>
            ) : <span className="text-stone-500">(unknown seat)</span>}.
          </div>
          <div className="text-center text-xs text-stone-400">One of these is their role:</div>
          <ul className="grid grid-cols-2 gap-3">
            {roles.map((rc, i) => (
              <li key={i} className="card rounded p-3 flex flex-col items-center gap-1 text-center">
                {iconUrl(rc.id) && (
                  <img src={iconUrl(rc.id)} alt="" className="w-20 h-20 rounded-full border-2 border-amber-700 object-cover" />
                )}
                <div className={`text-base font-bold team-${rc.team}`}>{rc.name}</div>
              </li>
            ))}
          </ul>
        </div>
      );
    } else if (info.type === 'role-list') {
      const roles = (info.roleIds || []).map(id => CHAR_BY_ID[id]).filter(Boolean);
      infoBody = (
        <div className="space-y-3">
          <div className="text-center text-sm text-stone-300">
            These are the roles you learn about:
          </div>
          {roles.length === 0 ? (
            <div className="text-center text-stone-500 italic">(none)</div>
          ) : (
            <ul className="grid grid-cols-2 sm:grid-cols-3 gap-3">
              {roles.map(rc => (
                <li key={rc.id} className="card rounded p-2 flex flex-col items-center gap-1 text-center">
                  {iconUrl(rc.id) && (
                    <img src={iconUrl(rc.id)} alt="" className="w-16 h-16 rounded-full border-2 border-amber-700 object-cover" />
                  )}
                  <div className={`text-sm font-bold team-${rc.team}`}>{rc.name}</div>
                </li>
              ))}
            </ul>
          )}
        </div>
      );
    } else if (info.type === 'alignment') {
      const align = info.alignment || 'good';
      const top = info.displayLabel || 'Your new alignment is:';
      infoBody = (
        <div className="space-y-3 text-center">
          <div className="text-sm text-stone-300">{top}</div>
          <div className={`p-5 rounded-lg border-2 ${align === 'good'
            ? 'bg-emerald-900/40 text-emerald-200 border-emerald-700/70'
            : 'bg-red-900/40 text-red-200 border-red-700/70'}`}>
            <div className="text-7xl mb-1 leading-none">{align === 'good' ? '👍' : '👎'}</div>
            <div className="text-4xl font-extrabold">{align === 'good' ? 'GOOD' : 'EVIL'}</div>
          </div>
        </div>
      );
    } else if (info.type === 'seat+role') {
      const askSeat = seatBy[info.askSeat];
      const role = info.roleId ? CHAR_BY_ID[info.roleId] : null;
      const topLabel = info.displayLabel || 'Your Grandchild is:';
      const midLabel = info.displayRoleLabel || 'Their character is:';
      infoBody = (
        <div className="space-y-4">
          <div className="text-center text-sm text-stone-300">{topLabel}</div>
          {askSeat ? (
            <div className="card rounded p-3 text-center">
              <div className="text-amber-200/80 text-xs">seat #{askSeat.seatNum}</div>
              <div className="text-lg text-amber-100 font-semibold truncate">
                {askSeat.playerName || <span className="text-stone-500 italic">—</span>}
              </div>
            </div>
          ) : <div className="text-stone-500 italic text-center">(unknown seat)</div>}
          <div className="text-center text-sm text-stone-300">{midLabel}</div>
          {role ? (
            <div className="flex flex-col items-center gap-2">
              {iconUrl(role.id) && (
                <img src={iconUrl(role.id)} alt="" className="w-24 h-24 rounded-full border-2 border-amber-700 object-cover" />
              )}
              <div className={`text-2xl font-bold team-${role.team}`}>{role.name}</div>
            </div>
          ) : <div className="text-stone-400 italic text-center">(no role)</div>}
        </div>
      );
    } else if (info.type === 'team-reveal') {
      const viewerIsDemon = info.viewerRole === 'demon';
      const minions = info.minions || [];
      const demon = info.demon || null;
      const bluffs = (info.bluffs || []).map(id => CHAR_BY_ID[id]).filter(Boolean);
      const viewerRole = info.viewerRoleId ? CHAR_BY_ID[info.viewerRoleId] : null;
      const headerLabel = viewerIsDemon
        ? (viewerRole ? ('You are the ' + viewerRole.name) : 'You are the Demon')
        : 'You are a Minion';
      infoBody = (
        <div className="space-y-4">
          <div className={`text-center text-xl font-extrabold ${viewerIsDemon ? 'text-red-300' : 'text-purple-300'}`}>
            {headerLabel}
          </div>
          {viewerIsDemon && viewerRole && iconUrl(viewerRole.id) && (
            <div className="flex justify-center">
              <img src={iconUrl(viewerRole.id)} alt="" className="w-20 h-20 rounded-full border-2 border-red-700 object-cover" />
            </div>
          )}
          {minions.length > 0 && (
            <div>
              <div className="text-center text-xs text-stone-400 mb-2 uppercase tracking-wider">
                {viewerIsDemon
                  ? (minions.length === 1 ? 'Your Minion' : 'Your Minions')
                  : (minions.length === 1 ? 'Your fellow Minion' : 'Your fellow Minions')}
              </div>
              <ul className="grid grid-cols-2 gap-2">
                {minions.map(m => (
                  <li key={m.seatNum} className="card rounded p-3 text-center border-purple-700/50 bg-purple-950/30">
                    <div className="text-amber-200/80 text-xs">seat #{m.seatNum}</div>
                    <div className="text-base text-amber-100 font-semibold truncate">
                      {m.playerName || <span className="text-stone-500 italic">—</span>}
                    </div>
                  </li>
                ))}
              </ul>
            </div>
          )}
          {!viewerIsDemon && demon && (
            <div>
              <div className="text-center text-xs text-stone-400 mb-2 uppercase tracking-wider">The Demon</div>
              <div className="card rounded p-3 text-center border-red-700/60 bg-red-950/40 mx-auto max-w-xs">
                <div className="text-amber-200/80 text-xs">seat #{demon.seatNum}</div>
                <div className="text-lg text-amber-100 font-bold truncate">
                  {demon.playerName || <span className="text-stone-500 italic">—</span>}
                </div>
              </div>
            </div>
          )}
          {viewerIsDemon && bluffs.length > 0 && (
            <div>
              <div className="text-center text-xs text-stone-400 mb-2 uppercase tracking-wider">Your Bluffs (not in play)</div>
              <ul className="grid grid-cols-3 gap-2">
                {bluffs.map(b => (
                  <li key={b.id} className="card rounded p-2 flex flex-col items-center gap-1 text-center">
                    {iconUrl(b.id) && <img src={iconUrl(b.id)} alt="" className="w-14 h-14 rounded-full border-2 border-amber-700 object-cover" />}
                    <div className={`text-[11px] font-bold team-${b.team}`}>{b.name}</div>
                  </li>
                ))}
              </ul>
            </div>
          )}
          {!viewerIsDemon && info.damselInPlay && (
            <div>
              <div className="text-center text-xs text-stone-400 mb-2 uppercase tracking-wider">Damsel in play</div>
              <div className="card rounded p-3 border-amber-700/60 bg-amber-950/30 mx-auto max-w-xs flex items-center justify-center gap-3">
                {iconUrl('damsel') && (
                  <img src={iconUrl('damsel')} alt="" className="w-14 h-14 rounded-full border-2 border-amber-700 object-cover flex-shrink-0" />
                )}
                <div className="text-left min-w-0">
                  <div className="text-amber-100 text-base font-semibold">Damsel</div>
                  <div className="text-stone-400 text-[11px]">If a Minion publicly guesses who they are, Evil wins.</div>
                </div>
              </div>
            </div>
          )}
          {viewerIsDemon && info.lunaticSeat && (
            <div>
              <div className="text-center text-xs text-stone-400 mb-2 uppercase tracking-wider">Lunatic in play</div>
              <div className="card rounded p-3 border-purple-700/50 bg-purple-950/30 mx-auto max-w-xs flex items-center justify-center gap-3">
                {iconUrl('lunatic') && (
                  <img src={iconUrl('lunatic')} alt="" className="w-12 h-12 rounded-full border-2 border-purple-600 object-cover flex-shrink-0" />
                )}
                <div className="text-left min-w-0">
                  <div className="text-amber-200/80 text-xs">seat #{info.lunaticSeat.seatNum}</div>
                  <div className="text-base text-amber-100 font-semibold truncate">
                    {info.lunaticSeat.playerName || <span className="text-stone-500 italic">—</span>}
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    } else if (info.type === 'seat') {
      const askSeat = seatBy[info.askSeat];
      const top = info.display || 'The Storyteller shows you:';
      infoBody = (
        <div className="space-y-4">
          <div className="text-center text-sm text-stone-300">{top}</div>
          {askSeat ? (
            <div className="card rounded p-3 text-center mx-auto max-w-xs">
              <div className="text-amber-200/80 text-xs">seat #{askSeat.seatNum}</div>
              <div className="text-lg text-amber-100 font-semibold truncate">
                {askSeat.playerName || <span className="text-stone-500 italic">—</span>}
              </div>
            </div>
          ) : <div className="text-stone-500 italic text-center">(unknown seat)</div>}
        </div>
      );
    } else if (info.type === 'seats') {
      const pickedSeats = (info.askSeats || []).map(n => seatBy[n]).filter(Boolean);
      const top = info.display || 'The Storyteller shows you:';
      infoBody = (
        <div className="space-y-3">
          <div className="text-center text-sm text-stone-300">{top}</div>
          <ul className="grid grid-cols-2 gap-2">
            {pickedSeats.map(s => (
              <li key={s.seatNum} className="card rounded p-3 text-center">
                <div className="text-amber-200/80 text-xs">seat #{s.seatNum}</div>
                <div className="text-base text-amber-100 font-semibold truncate">
                  {s.playerName || <span className="text-stone-500 italic">—</span>}
                </div>
              </li>
            ))}

        </div>

    } else if (info.type === 'mad-claim') {

          <div className="text-center text-sm text-stone-300">
