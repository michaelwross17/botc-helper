function Token({ seat, isEligible, swapSourceSeat, onSeatTap, onToggleDead, onToggleAlignment, onUnassignPending, onSwap, onOpenReminderPicker, onOpenRoleChanger, onRemoveReminder, hideSeatBadge, showHeaderLabel, compact, zoom = 1 }) {
  const perceived = CHAR_BY_ID[seat.perceivedRoleId];
  const actual = CHAR_BY_ID[seat.actualRoleId];
  const misregistered = seat.actualRoleId !== seat.perceivedRoleId;
  const isPickedUp = swapSourceSeat === seat.seatNum;
  const isSwapTarget = swapSourceSeat != null && swapSourceSeat !== seat.seatNum;
  const img = iconUrl(seat.perceivedRoleId);
  const [isDragOver, setIsDragOver] = useState(false);
  const naturalAlign = naturalAlignment(seat.perceivedRoleId);
  const effectiveAlign = seat.alignment || naturalAlign;
  const alignmentOverridden = effectiveAlign !== naturalAlign;

  const handleDragStart = (e) => {
    e.dataTransfer.setData('application/x-botc-seat', String(seat.seatNum));
    e.dataTransfer.effectAllowed = 'move';
  };
  const handleDragOver = (e) => {
    if (e.dataTransfer.types.includes('application/x-botc-seat')) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      setIsDragOver(true);
    }
  };
  const handleDragLeave = () => setIsDragOver(false);
  const handleDrop = (e) => {
    e.preventDefault();
    setIsDragOver(false);
    const src = Number(e.dataTransfer.getData('application/x-botc-seat'));
    if (src && src !== seat.seatNum && onSwap) onSwap(src, seat.seatNum);
  };

  const handleClick = () => {
    if (onSeatTap) onSeatTap(seat.seatNum);
  };

  // Six reminder slots fanning around the token's left and right edges.
  // The first 3 reminders go to the left side (top→bottom); reminders 4-6 to the right.
  const reminders = seat.reminders || [];
  const slotConfigs = [
    { side: 'left',  top: '2%',  off: '-14%' },
    { side: 'left',  top: '38%', off: '-22%' },
    { side: 'left',  top: '74%', off: '-14%' },
    { side: 'right', top: '2%',  off: '-14%' },
    { side: 'right', top: '38%', off: '-22%' },
    { side: 'right', top: '74%', off: '-14%' },
  ];

  return (
    <div className="relative w-full flex flex-col items-center group">
      {showHeaderLabel && (
        <div className="text-center mb-1 leading-tight px-0.5">
          <div className={`text-amber-200 font-bold ${compact ? 'text-xs' : 'text-base sm:text-lg'}`}>#{seat.seatNum}</div>
          {(seat.playerName || '').trim() && (
            <div className={`text-stone-300 break-words ${compact ? 'text-[10px]' : 'text-xs sm:text-sm'}`}>{seat.playerName}</div>
          )}
        </div>
      )}
      {/* Round token + 6 reminder slots flanking it */}
      <div className="relative w-full">
      <div
        draggable={!!onSwap}
        onDragStart={handleDragStart}
        onDragOver={handleDragOver}
        onDragLeave={handleDragLeave}
        onDrop={handleDrop}
        onClick={handleClick}
        style={{ touchAction: 'manipulation' }}
        className={`relative w-full aspect-square rounded-full overflow-hidden border-2 transition cursor-pointer
          ${isPickedUp ? 'border-sky-400 ring-4 ring-sky-400/60 scale-105' :
            isEligible ? 'border-emerald-400 ring-4 ring-emerald-400/40 animate-pulse' :
            isSwapTarget ? 'border-sky-500/60 ring-2 ring-sky-500/30 hover:ring-sky-400 hover:border-sky-400' :
            isDragOver ? 'border-sky-400 ring-4 ring-sky-400/40' :
            alignmentOverridden && effectiveAlign === 'evil' ? 'border-red-500 ring-2 ring-red-500/40' :
            alignmentOverridden && effectiveAlign === 'good' ? 'border-sky-500 ring-2 ring-sky-500/40' :
            misregistered ? 'border-amber-500' :
            'border-stone-700'}
          ${seat.isDead ? 'opacity-50 grayscale' : ''}
          ${onSwap ? 'active:cursor-grabbing' : ''}`}>
        {img ? (
          <img src={img} alt={perceived?.name || ''} draggable={false} className="w-full h-full object-cover pointer-events-none" />
        ) : (
          <div className={`w-full h-full flex items-center justify-center team-${perceived?.team || 'townsfolk'} bg-stone-800 text-xs pointer-events-none`}>
            {perceived?.name?.[0] || '?'}
          </div>
        )}
        {!hideSeatBadge && (
          <div className="absolute top-0 left-0 bg-stone-950/85 text-amber-200 text-[10px] px-1 rounded-br pointer-events-none">
            #{seat.seatNum}
          </div>
        )}
        {/* Ability + role name overlay on the bottom half of the token (like a physical BotC token face) */}
        <div className="absolute inset-x-0 bottom-0 bg-stone-950/85 px-1 py-1 text-center pointer-events-none flex flex-col items-center"
          style={{ minHeight: '46%' }}
          title={perceived?.ability || ''}>
          {perceived?.ability && (
            <div className={`text-[7px] leading-tight text-stone-200 mb-0.5 px-0.5 ${zoom >= 2.5 ? '' : zoom >= 1.5 ? 'line-clamp-6' : 'line-clamp-3'}`}
              style={{ wordBreak: 'break-word' }}>
              {perceived.ability}
            </div>
          )}
          <div className={`mt-auto text-[9px] font-bold leading-tight tracking-wide ${perceived ? `team-${perceived.team}` : ''}`}>
            {perceived?.name || '?'}
          </div>
        </div>
        {seat.isDead && (
          <div className="absolute inset-0 flex items-center justify-center text-5xl text-red-500/80 font-bold pointer-events-none">×</div>
        )}
      </div>
      {/* Reminder slots flanking the round token (3 left, 3 right) */}
      {slotConfigs.map((cfg, idx) => {
        const reminder = reminders[idx];
        if (!reminder) return null;
        const style = {
          position: 'absolute',
          top: cfg.top,
          width: '30%',
          zIndex: 5,
          ...(cfg.side === 'left' ? { left: cfg.off } : { right: cfg.off }),
        };
        // For auto-generated hidden-role markers, the × undoes the assignment instead of just removing the reminder.
        const onRemoveForSlot = reminder.hiddenRoleMarker
          ? (onUnassignPending ? () => onUnassignPending(seat.seatNum) : null)
          : (onRemoveReminder ? () => onRemoveReminder(seat.seatNum, idx) : null);
        return (
          <div key={idx} style={style}>
            <ReminderToken reminder={reminder} size="100%" zoom={zoom} onRemove={onRemoveForSlot} />
          </div>
        );
      })}
      </div>
      {misregistered && actual && !(reminders.some(r => r.hiddenRoleMarker && r.charId === seat.actualRoleId)) && (
        <div className={`text-center text-[10px] italic mt-1 team-${actual.team}`}>
          (actually {actual.name})
        </div>
      )}
      {alignmentOverridden && (
        <div className={`text-center text-[10px] font-bold uppercase tracking-wider mt-0.5
          ${effectiveAlign === 'evil' ? 'text-red-400' : 'text-sky-400'}`}>
          {effectiveAlign === 'evil' ? '⚑ Evil' : '⚑ Good'}
        </div>
      )}
      <div className="touch-show absolute top-0 right-0 flex flex-col gap-0.5 opacity-0 group-hover:opacity-100 transition">
        {onOpenReminderPicker && (
          <button onClick={(e) => { e.stopPropagation(); onOpenReminderPicker(seat.seatNum); }}
            title="Add reminder"
            className="bg-stone-900 border border-amber-700 rounded-full w-6 h-6 text-[11px] hover:border-amber-500 hover:text-amber-300 leading-none">
            +
          </button>
        )}
        {onOpenRoleChanger && (
          <button onClick={(e) => { e.stopPropagation(); onOpenRoleChanger(seat.seatNum); }}
            title="Change role (Summoner picks Demon, Pit-Hag transform, etc.)"
            className="bg-stone-900 border border-amber-700 rounded-full w-6 h-6 text-[11px] hover:border-amber-500 hover:text-amber-300 leading-none">
            ↻
          </button>
        )}
        <button onClick={(e) => { e.stopPropagation(); onToggleDead(seat.seatNum); }}
          title={seat.isDead ? 'Revive' : 'Mark dead'}
          className="bg-stone-900 border border-stone-700 rounded-full w-6 h-6 text-[10px] hover:border-red-500 hover:text-red-400">
          {seat.isDead ? '✓' : '×'}
        </button>
        {onToggleAlignment && (
          <button onClick={(e) => { e.stopPropagation(); onToggleAlignment(seat.seatNum); }}
            title={`Flip alignment (currently ${effectiveAlign})`}
            className={`bg-stone-900 border rounded-full w-6 h-6 text-[10px] font-bold leading-none
              ${effectiveAlign === 'evil' ? 'border-red-700 text-red-400 hover:border-red-500' : 'border-sky-700 text-sky-400 hover:border-sky-500'}`}>
            {effectiveAlign === 'evil' ? 'E' : 'G'}
          </button>
        )}
        {misregistered && (
          <button onClick={(e) => { e.stopPropagation(); onUnassignPending(seat.seatNum); }}
            title="Undo hidden role assignment"
            className="bg-stone-900 border border-amber-700 rounded-full w-6 h-6 text-[10px] hover:border-amber-500">
            ↩
          </button>
        )}
      </div>
    </div>
  );
}

// Horizontal tab strip for switching between past day snapshots and the current live day.
// Sits above the grimoire box, after the Players panel.
function DayTabs({ days, viewingDayIndex, onSelect }) {
  const currentLabel = `Night ${days.length} / Day ${days.length + 1}`;
  const allTabs = [
    ...days.map((d, i) => ({ idx: i, label: d.label, isCurrent: false })),
    { idx: days.length, label: currentLabel, isCurrent: true },
  ];
  return (
    <div className="flex items-center gap-2 overflow-x-auto pb-1" style={{ scrollbarWidth: 'thin' }}>
      <span className="text-xs uppercase tracking-wider text-stone-500 flex-shrink-0">Day:</span>
      {allTabs.map(t => {
        const active = viewingDayIndex === t.idx;
        return (
          <button key={t.idx}
            onClick={() => onSelect?.(t.idx)}
            className={`text-xs sm:text-sm px-3 py-1.5 rounded whitespace-nowrap border transition flex-shrink-0 font-medium
              ${active
                ? (t.isCurrent
                    ? 'bg-amber-700 border-amber-500 text-stone-100 shadow-md shadow-amber-900/30'
                    : 'bg-stone-700 border-stone-500 text-stone-100')
                : 'border-stone-700 bg-stone-900/40 text-stone-400 hover:border-amber-500 hover:text-amber-200'}`}>
            {t.label}{t.isCurrent ? ' · now' : ''}
          </button>
        );
      })}
    </div>
  );
}

function NominationsPage({ state, onAdd, onUpdate, onRemove, onSetDayVoting, onSetViewingDay, onJumpToGrimoire,
                            onResolveClaimAndKill, onResolveMutantClaim, onResolveArtistClaim, onResolveSavantClaim, onResolveFishermanClaim, onResolveJugglerClaim, onAdvanceToNight }) {
  const grim = state.grimoire;
  const [activeAbility, setActiveAbility] = useState(null);
  const [pendingClaimant, setPendingClaimant] = useState(null);
  const [jugglerClaimantSeat, setJugglerClaimantSeat] = useState(null);
  const resetAbility = () => { setActiveAbility(null); setPendingClaimant(null); };
  const handleAbilityTap = (seatNum) => {
    if (!activeAbility) return;
    const dayIdx = grim.nominationsViewingDayIndex || 0;
    if (activeAbility.kind === 'claim-only') {
      if (activeAbility.id === 'mutant') {
        onResolveMutantClaim && onResolveMutantClaim({ claimantSeatNum: seatNum, dayIdx });
      } else if (activeAbility.id === 'artist') {
        onResolveArtistClaim && onResolveArtistClaim({ claimantSeatNum: seatNum, dayIdx });
      } else if (activeAbility.id === 'savant') {
        onResolveSavantClaim && onResolveSavantClaim({ claimantSeatNum: seatNum, dayIdx });
      } else if (activeAbility.id === 'fisherman') {
        onResolveFishermanClaim && onResolveFishermanClaim({ claimantSeatNum: seatNum, dayIdx });
      }
      resetAbility();
    } else if (activeAbility.kind === 'claim-juggler') {
      setJugglerClaimantSeat(seatNum);
      resetAbility();
    } else if (activeAbility.kind === 'claim-target') {
      if (pendingClaimant == null) setPendingClaimant(seatNum);
      else {
        onResolveClaimAndKill && onResolveClaimAndKill({
          roleId: activeAbility.id, label: activeAbility.label,
          claimantSeatNum: pendingClaimant, targetSeatNum: seatNum,
          dayIdx,
        });
        resetAbility();
      }
    }
  };

  if (!grim.gameStarted) {
    return (
      <section className="parchment rounded-lg p-8 text-center space-y-4">
        <div className="text-amber-200 text-lg">No nominations yet</div>
        <p className="text-sm text-stone-400">
          Once you click <span className="text-amber-300 font-medium">Begin Game</span> on the Grimoire tab,
          nominations will track here, day by day.
        </p>
        <button onClick={onJumpToGrimoire}
          className="px-4 py-2 rounded pill hover:border-amber-500 hover:text-amber-200">
          → Go to Grimoire
        </button>
      </section>
    );
  }

  const days = grim.days || [];
  const viewingIdx = grim.nominationsViewingDayIndex || 0;
  const isPast = viewingIdx < days.length;
  const liveSeats = grim.seats || [];
  const snapSeats = isPast ? (days[viewingIdx]?.seats || liveSeats) : liveSeats;
  const day = normalizeDayNoms((grim.nominationsByDay || {})[viewingIdx]);
  const aliveCount = (snapSeats || []).filter(s => !s.isDead && s.actualRoleId).length;
  const choppingBlock = computeChoppingBlock(day.nominations, aliveCount);

  return (
    <div className="space-y-4">
      <DayTabs
        days={days}
        viewingDayIndex={viewingIdx}
        onSelect={onSetViewingDay}
      />

      <DayVotingFlags
        day={day}
        readOnly={isPast}
        onChange={(which, value) => onSetDayVoting(viewingIdx, which, value)}
      />

      {!isPast && !!(state.features?.automation) && (
        <DayAbilitiesBar
          scriptCharIds={state.characterIds || []}
          activeAbility={activeAbility}
          dayIdx={viewingIdx}
          onSelect={(ab) => { setActiveAbility(ab); setPendingClaimant(null); }}
          onCancel={resetAbility}
        />
      )}
      {jugglerClaimantSeat != null && (
        <JugglerPicksModal
          scriptCharIds={state.characterIds || []}
          seats={(state.grimoire?.seats || [])}
          claimantSeatNum={jugglerClaimantSeat}
          onSubmit={({ picks }) => {
            const dayIdx = (state.grimoire?.nominationsViewingDayIndex) || 0;
            onResolveJugglerClaim && onResolveJugglerClaim({ claimantSeatNum: jugglerClaimantSeat, picks, dayIdx });
            setJugglerClaimantSeat(null);
          }}
          onClose={() => setJugglerClaimantSeat(null)}
        />
      )}

      {!isPast && (
        <CircularNominator
          seats={liveSeats}
          onNominate={(nomSeat, voteSeat) => onAdd(viewingIdx, nomSeat, voteSeat)}
          abilityMode={activeAbility}
          abilityPendingSeat={pendingClaimant}
          onAbilityTap={handleAbilityTap}
          onCancelAbility={resetAbility}
          dayNominations={day.nominations}
          aliveCount={aliveCount}
          choppingBlock={choppingBlock}
        />
      )}

      <NominationsList
        nominations={day.nominations}
        seats={snapSeats}
        readOnly={isPast}
        onUpdate={(id, patch) => onUpdate(viewingIdx, id, patch)}
        onRemove={(id) => onRemove(viewingIdx, id)}
        onBlockNomineeSeat={choppingBlock.onBlock?.nomineeSeat ?? null}
      />

      {/* Go to Night button at the bottom of the Nominations tab — same
          handler as the grimoire's Go-to-night, includes the execution
          check for whoever is currently on the chopping block. */}
      {!isPast && grim.gameStarted && (
        <BeginOrAdvanceButton
          seats={liveSeats}
          gameStarted={grim.gameStarted}
          daysCount={days.length}
          onBegin={() => {}}
          onAdvance={onAdvanceToNight}
        />
      )}
    </div>
  );
}

function seatLabel(seat) {
  if (!seat) return '?';
  const name = (seat.playerName || '').trim();
  return name ? `#${seat.seatNum} ${name}` : `#${seat.seatNum}`;
}

// Per-day checkboxes for whether any minion / the demon voted today.
// Some abilities (e.g. Flower Girl) need this info. Collapsible so the ST can
// hide the values from players watching the screen.

// Circular seat picker for creating a nomination. Same geometry as the grimoire,
// but no center "Town Square" piece and no roles — just seat # + name on each disc.
// Two-tap flow: tap nominator → tap nominee (or the same seat for self-nom).
function CircularNominator({ seats, onNominate, abilityMode = null, abilityPendingSeat = null, onAbilityTap, onCancelAbility,
                              dayNominations = [], aliveCount = 0, choppingBlock = null }) {
  const [picked, setPicked] = useState(null); // seatNum of the first tap
  const N = Math.max(1, seats.length);
  // Once-per-day rule: each seat can nominate once and be nominated once today.
  const noms = (dayNominations || []).filter(n => !n.kind || n.kind === 'nomination');
  const hasNominated = new Set(noms.map(n => n.nominatorSeat));
  const hasBeenNominated = new Set(noms.map(n => n.nomineeSeat));
  const tokenRadiusPct = N >= 15 ? 44 : N >= 13 ? 42 : N >= 11 ? 40 : 38;
  const linearSpacingPct = N > 1 ? 2 * tokenRadiusPct * Math.sin(Math.PI / N) : 100;
  const cap = N >= 15 ? 13 : N >= 13 ? 14 : N >= 11 ? 16 : 18;
  const tokenWidthPct = Math.max(11, Math.min(cap, linearSpacingPct - 2));
  const tokenWidthStyle = `min(120px, ${tokenWidthPct.toFixed(1)}%)`;

  const handleTap = (seatNum) => {
    if (abilityMode) {
      onAbilityTap && onAbilityTap(seatNum);
      return;
    }
    const seat = seats.find(s => s.seatNum === seatNum);
    if (picked == null) {
      // First tap — selecting the NOMINATOR. Dead players cannot nominate.
      // Players who have already nominated today cannot nominate again.
      if (!seat || seat.isDead) return;
      if (hasNominated.has(seatNum)) return;
      setPicked(seatNum);
      return;
    }
    // Second tap — selecting the NOMINEE. Dead seats are valid nominees
    // (executing the dead is a thing). Block players who have already been
    // nominated today.
    if (!seat) return;
    if (hasBeenNominated.has(seatNum)) return;
    onNominate(picked, seatNum);
    setPicked(null);
  };
  const highlighted = abilityMode ? abilityPendingSeat : picked;

  return (
    <section className={`parchment rounded-lg p-3 sm:p-4 ${abilityMode ? 'border-amber-500/70 ring-1 ring-amber-700/30' : ''}`}>
      <div className="flex items-baseline justify-between mb-2 gap-2 flex-wrap">
        <div>
          <h3 className="text-amber-200 font-semibold">
            {abilityMode ? `${abilityMode.label} — ${abilityPendingSeat == null ? 'pick claimant' : (abilityMode.kind === 'claim-target' ? 'pick target' : '…')}` : 'New nomination'}
          </h3>
          <p className="text-xs text-stone-400">
            {abilityMode
              ? (abilityPendingSeat == null
                  ? `Tap the player who is claiming to be the ${abilityMode.roleName}.`
                  : (abilityMode.kind === 'claim-target' ? 'Now tap the player they are targeting.' : 'Resolving…'))
              : (picked == null
                  ? 'Tap the player who is nominating.'
                  : <>Now tap the player being nominated <span className="text-stone-500">(or tap {seatLabel(seats.find(s => s.seatNum === picked))} again to self-nominate)</span>.</>)}
          </p>
        </div>
        {abilityMode ? (
          <button onClick={() => onCancelAbility && onCancelAbility()}
            className="text-xs px-3 py-1.5 rounded pill hover:border-red-500 hover:text-red-300">
            Cancel ability
          </button>
        ) : picked != null && (
          <button onClick={() => setPicked(null)}
            className="text-xs px-3 py-1.5 rounded pill hover:border-amber-500 hover:text-amber-200">
            Cancel
          </button>
        )}
      </div>
      <div className="relative mx-auto" style={{ width: 'min(560px, calc(100vw - 3rem))', aspectRatio: '1 / 1' }}>
        {/* Center display — minimum votes + current chopping block */}
        {!abilityMode && (
          <div className="absolute pointer-events-none text-center"
            style={{ left: '50%', top: '50%', transform: 'translate(-50%, -50%)', width: '60%' }}>
            <div className="text-[10px] uppercase tracking-wider text-stone-400">Min votes</div>
            <div className="text-3xl sm:text-4xl font-bold text-amber-200 leading-none">{choppingBlock?.nextNeeded ?? '—'}</div>
            <div className="mt-2 text-[10px] uppercase tracking-wider text-stone-400">On the block</div>
            {choppingBlock?.onBlock ? (() => {
              const bs = seats.find(s => s.seatNum === choppingBlock.onBlock.nomineeSeat);
              return (
                <div className="text-sm sm:text-base font-bold text-red-300 leading-tight mt-0.5">
                  #{choppingBlock.onBlock.nomineeSeat}{bs?.playerName ? ' · ' + bs.playerName : ''}
                  <div className="text-[10px] text-stone-400 font-normal">({choppingBlock.onBlock.votes} votes)</div>
                </div>
              );
            })() : (
              <div className="text-xs text-stone-500 italic mt-0.5">no one yet</div>
            )}
          </div>
        )}
        {seats.map((seat, i) => {
          const angle = (i / N) * 2 * Math.PI - Math.PI / 2;
          const tx = 50 + tokenRadiusPct * Math.cos(angle);
          const ty = 50 + tokenRadiusPct * Math.sin(angle);
          const isPicked = highlighted === seat.seatNum;
          const isDead = !!seat.isDead;
          const usedNom = hasNominated.has(seat.seatNum);     // already nominated today
          const usedNominee = hasBeenNominated.has(seat.seatNum); // already a nominee today
          // Determine if this seat is selectable in the CURRENT click stage.
          const wouldBeNominator = picked == null && !abilityMode;
          const wouldBeNominee   = picked != null && !abilityMode;
          let disabledReason = null;
          if (!abilityMode) {
            if (wouldBeNominator && isDead)              disabledReason = 'Dead — cannot nominate';
            if (wouldBeNominator && usedNom)             disabledReason = 'Already nominated today';
            if (wouldBeNominee   && usedNominee)         disabledReason = 'Already been nominated today';
          }
          // Both dead seats and "already nominated as nominator" seats are
          // dimmed (those are the always-unavailable states the ST wants to
          // visually de-emphasize). "Was nominated" seats stay full opacity
          // (they can still nominate someone else this day) — only their text
          // label appears.
          const dim = isDead || usedNom;
          let stateClasses;
          if (isPicked) {
            stateClasses = 'border-amber-400 ring-4 ring-amber-400/40 bg-amber-950/40';
          } else if (disabledReason) {
            stateClasses = 'border-stone-800 bg-stone-900/40 cursor-not-allowed';
          } else {
            stateClasses = 'border-stone-700 bg-stone-900/70 hover:border-amber-500 hover:bg-stone-900';
          }
          return (
            <button key={seat.seatNum}
              onClick={() => handleTap(seat.seatNum)}
              disabled={!!disabledReason}
              title={disabledReason || undefined}
              className={`absolute rounded-full border-2 transition flex flex-col items-center justify-center text-center p-1 leading-tight overflow-hidden ${stateClasses} ${dim && !isPicked ? 'opacity-55' : ''}`}
              style={{
                left: `${tx}%`,
                top: `${ty}%`,
                transform: 'translate(-50%, -50%)',
                width: tokenWidthStyle,
                aspectRatio: '1 / 1',
              }}>
              <div className="text-amber-200 font-bold text-base sm:text-lg leading-none">#{seat.seatNum}</div>
              {/* Status indicators between seat# and player name — compact,
                  one line each, distinct colours so the ST can tell at a glance. */}
              {isDead && (
                <div className="text-base sm:text-lg leading-none text-stone-400 mt-0.5">☠</div>
              )}
              {!isDead && usedNom && (
                <div className="text-[8px] sm:text-[9px] uppercase tracking-wider text-amber-400/85 leading-tight mt-0.5">Nom Used</div>
              )}
              {usedNominee && !isDead && (
                <div className="text-[8px] sm:text-[9px] uppercase tracking-wider text-red-400/85 leading-tight mt-0.5">Was Nominee</div>
              )}
              {(seat.playerName || '').trim() && (
                <div className="text-stone-200 text-[10px] sm:text-xs mt-0.5 break-words w-full px-0.5"
                  style={{ wordBreak: 'break-word' }}>
                  {seat.playerName}
                </div>
              )}
            </button>
          );
        })}
      </div>
    </section>
  );
}

function NominationsList({ nominations, seats, readOnly, onUpdate, onRemove, onBlockNomineeSeat = null }) {
  if (!nominations.length) {
    return (
      <section className="parchment rounded-lg p-6 text-center text-sm text-stone-500 italic">
        {readOnly ? 'No nominations recorded for this day.' : 'No nominations yet.'}
      </section>
    );
  }
  const seatById = Object.fromEntries(seats.map(s => [s.seatNum, s]));

  return (
    <section className="parchment rounded-lg p-3 sm:p-4">
      <div className="flex items-baseline justify-between mb-3">
        <h3 className="text-amber-200 font-semibold">Nominations</h3>
        <span className="text-xs text-stone-500">{nominations.length} total</span>
      </div>
      <ol className="space-y-2">
        {nominations.map((n, i) => (
          <NominationRow key={n.id}
            index={i + 1}
            nom={n}
            seatById={seatById}
            nominator={seatById[n.nominatorSeat]}
            nominee={seatById[n.nomineeSeat]}
            readOnly={readOnly}
            onUpdate={(patch) => onUpdate(n.id, patch)}
            onRemove={() => onRemove(n.id)}
            isOnBlock={onBlockNomineeSeat != null && n.nomineeSeat === onBlockNomineeSeat && (!n.kind || n.kind === 'nomination')}
          />
        ))}
      </ol>
    </section>
  );
}

function NominationRow({ index, nom, seatById = {}, nominator, nominee, readOnly, onUpdate, onRemove, isOnBlock = false }) {
  // Claim entry (Slayer/Psychopath/Mutant): render compact with role icon +
  // outcome badge; no votes tracked.
  if (nom.kind === 'claim') {
    const rc = CHAR_BY_ID[nom.roleId];
    const cs = seatById[nom.claimantSeat];
    const ts = nom.targetSeat != null ? seatById[nom.targetSeat] : null;
    const outcomeText = ({
      'killed-demon':   'killed (Demon hit)',
      'killed':         'killed',
      'killed-recluse': 'killed (Recluse, ST choice)',
      'recluse-spared': 'spared (Recluse, ST choice)',
      'drunk-no-kill':  'no effect (drunk/poisoned — ability consumed)',
      'no-effect':      'no effect (target not the Demon — ability consumed)',
      'fake':           'fake claim — no effect',
      'already-used':   'already used — no effect',
      'mutant-real':    'is the Mutant (ST may execute)',
      'mutant-drunk':   'is the Mutant but drunk/poisoned (ST may waive)',
      'artist-real':    'is the Artist — ST answers the yes/no question',
      'artist-drunk':   'is the Artist but drunk/poisoned',
      'savant-real':    'is the Savant — ST delivers 2 facts (1 true, 1 false)',
      'savant-drunk':   'is the Savant but drunk/poisoned — both facts may be false',
      'fisherman-real': 'is the Fisherman — ST gives advice',
      'fisherman-drunk':'is the Fisherman but drunk/poisoned — advice may be false',
      'damsel-correct-win':   'guessed the Damsel correctly — Evil wins',
      'damsel-wrong':         'guessed wrong — "Guess used" marker placed on the Damsel',
      'damsel-already-guessed': 'Damsel guess already used — no effect',
      'damsel-no-minion':     'claimant is not a Minion — no effect',
      'damsel-not-in-play':   'no Damsel in play (e.g. Huntsman swapped)',
      'pm-correct':           'is the Puzzlemaster — guessed the drunk player correctly',
      'pm-wrong':             'is the Puzzlemaster — guessed wrong, gets false info',
      'pm-fake':              'is not the Puzzlemaster — no effect',
      'juggler-real':   (nom.correctCount != null && nom.jugglerPicks ? (nom.correctCount + ' / ' + nom.jugglerPicks.length + ' correct') : 'guesses recorded'),
      'juggler-drunk':  'drunk/poisoned — no Correct markers placed',
    })[nom.outcome] || nom.outcome || '';
    const outcomeColor = /killed/.test(nom.outcome || '') ? 'text-red-300'
      : /fake|no-effect|already|drunk|spared/.test(nom.outcome || '') ? 'text-stone-400'
      : 'text-amber-300';
    return (
      <li className="card rounded p-2.5 border-amber-700/40">
        <div className="flex items-center gap-2 flex-wrap">
          <span className="text-stone-500 text-xs tabular-nums w-6">#{index}</span>
          {iconUrl(nom.roleId) && (
            <img src={iconUrl(nom.roleId)} alt=""
              className="w-7 h-7 rounded-full border border-amber-700/60 object-cover flex-shrink-0" />
          )}
          <div className="flex-1 min-w-0 leading-tight">
            <div className="text-sm">
              <span className="text-amber-200 font-medium">{seatLabel(cs)}</span>
              <span className="text-stone-500"> claimed </span>
              <span className={`team-${rc?.team || 'townsfolk'} font-medium`}>{rc?.name || nom.roleId}</span>
              {ts && (<>
                <span className="text-stone-500"> on </span>
                <span className="text-amber-200 font-medium">{seatLabel(ts)}</span>
              </>)}
            </div>
            <div className={`text-[11px] ${outcomeColor} mt-0.5`}>{outcomeText}</div>
            {nom.roleId === 'juggler' && Array.isArray(nom.jugglerPicks) && nom.jugglerPicks.length > 0 && (
              <ol className="mt-1.5 space-y-0.5">
                {nom.jugglerPicks.map((p, idx) => {
                  const ps = seatById[p.seatNum];
                  const guessRc = CHAR_BY_ID[p.roleId];
                  const result = Array.isArray(nom.jugglerResults) ? nom.jugglerResults[idx] : null;
                  const resultBadge = result === 'correct'
                    ? <span className="text-emerald-300 text-[10px] font-semibold uppercase tracking-wider">✓ Correct</span>
                    : result === 'wrong'
                      ? <span className="text-red-300 text-[10px] font-semibold uppercase tracking-wider">✗ Wrong</span>
                      : null;
                  return (
                    <li key={idx} className="text-[11px] flex items-center gap-1.5 flex-wrap">
                      <span className="text-stone-500 tabular-nums w-4 text-center">{idx + 1}.</span>
                      <span className="text-amber-200">{seatLabel(ps)}</span>
                      <span className="text-stone-500">→</span>
                      {guessRc && iconUrl(guessRc.id) && (
                        <img src={iconUrl(guessRc.id)} alt="" className="w-4 h-4 rounded-full border border-stone-700 object-cover" />
                      )}
                      <span className={`team-${guessRc?.team || 'townsfolk'}`}>{guessRc?.name || p.roleId}</span>
                      {resultBadge}
                    </li>
                  );
                })}
              </ol>
            )}
          </div>
          {!readOnly && (
            <button onClick={onRemove}
              title="Remove from log"
              className="text-xs text-stone-400 hover:text-red-400">×</button>
          )}
        </div>
      </li>
    );
  }
  // Special entry (e.g. Virgin-triggered execution): plain text card.
  if (nom.kind === 'special') {
    const subj = nom.subjectSeat != null ? seatById[nom.subjectSeat] : null;
    return (
      <li className="card rounded p-2.5 border-red-700/50 bg-red-950/15">
        <div className="flex items-center gap-2 flex-wrap">
          <span className="text-stone-500 text-xs tabular-nums w-6">#{index}</span>
          {iconUrl(nom.sourceRoleId) && (
            <img src={iconUrl(nom.sourceRoleId)} alt=""
              className="w-7 h-7 rounded-full border border-red-700/60 object-cover flex-shrink-0" />
          )}
          <div className="flex-1 min-w-0 text-sm text-stone-200 leading-snug">
            {nom.text || 'Special event'}
          </div>
          {!readOnly && (
            <button onClick={onRemove}
              title="Remove from log"
              className="text-xs text-stone-400 hover:text-red-400">×</button>
          )}
        </div>
      </li>
    );
  }
  // Normal nomination
  const isSelfNom = nom.nominatorSeat === nom.nomineeSeat;
  return (
    <li className={`card rounded p-3 space-y-2 ${isOnBlock ? 'border-red-500 ring-2 ring-red-700/40 bg-red-950/20' : ''}`}>
      {isOnBlock && (
        <div className="text-[10px] uppercase tracking-wider text-red-300 font-semibold">
          ⛓ On the chopping block
        </div>
      )}
      <div className="flex items-center gap-2 flex-wrap">
        <span className="text-stone-500 text-xs tabular-nums w-6">#{index}</span>
        <span className="text-amber-200 font-medium">{seatLabel(nominator)}</span>
        <span className="text-stone-500 text-sm">{isSelfNom ? 'self-nominates' : 'nominates'}</span>
        {!isSelfNom && <span className="text-amber-200 font-medium">{seatLabel(nominee)}</span>}
        {!readOnly && (
          <button onClick={onRemove}
            title="Remove nomination"
            className="ml-auto text-xs text-stone-400 hover:text-red-400">×</button>
        )}
      </div>
      <div className="flex items-center gap-4 flex-wrap text-xs">
        <label className="flex items-center gap-1.5">
          <span className="text-stone-400 uppercase tracking-wider">Votes:</span>
          <input type="number" min={0}
            value={nom.votes ?? 0}
            disabled={readOnly}
            onChange={e => onUpdate({ votes: Math.max(0, parseInt(e.target.value, 10) || 0) })}
            className="w-16 bg-stone-900 border border-stone-700 rounded px-2 py-1 text-sm tabular-nums disabled:opacity-60"
          />
        </label>
      </div>
    </li>
  );
}

// ---------------- Tokens page ----------------

function TokensPage({ state, onShowGrimoireToSeat, onCancelGrimoireShow }) {
  const grim = state.grimoire || {};
  const seats = grim.seats || [];
  // scriptIds = script's regular characters PLUS any traveller currently added to
  // the game (so the Script roles grid and "You are mad" / "selected you" pickers
  // surface mid-game travellers without overcounting). Dedup in case a traveller
  // role also somehow appears in the script.
  const baseScriptIds = state.characterIds || [];
  const travellerInPlayIds = Array.from(new Set(
    (grim.travellers || []).map(t => t.charId).filter(Boolean)
  ));
  const scriptIds = Array.from(new Set([
    ...baseScriptIds,
    ...travellerInPlayIds.filter(id => !baseScriptIds.includes(id)),
  ]));
  const [shown, setShown] = useState(null); // { kind, ... }
  const [spyPickerOpen, setSpyPickerOpen] = useState(false);
  const [lunaticMinionsPickerOpen, setLunaticMinionsPickerOpen] = useState(false);
  const [madTokenOpen, setMadTokenOpen] = useState(false);
  const [wordTokenOpen, setWordTokenOpen] = useState(false);
  const [selectedYouOpen, setSelectedYouOpen] = useState(false);

  // Compute in-play groups for quick actions.
  // NOTE: these filter by ACTUAL role, so the Lunatic (perceivedRole=demon, actualRole=lunatic)
  // is correctly excluded from both demonSeats and minionSeats.
  const demonSeats   = seats.filter(s => CHAR_BY_ID[s.actualRoleId]?.team === 'demon');
  const minionSeats  = seats.filter(s => CHAR_BY_ID[s.actualRoleId]?.team === 'minion');
  const bluffs       = (grim.demonBluffs || []).filter(Boolean);
  const lunaticInPlay = seats.some(s => s.actualRoleId === 'lunatic') || state.bagCharacterIds?.includes('lunatic');
  const lunaticBluffs = (grim.lunaticBluffs || []).filter(Boolean);
  // Magician (Experimental Townsfolk): "The Demon thinks you are a Minion. Minions think
  // you are a Demon." On N1 info-giving, the Magician seat is added to BOTH the Show-Demon
  // and Show-Minions lists, in random order, so neither the Demon nor the Minions can tell
  // who the real Demon / who the real Minions are.
  const magicianSeat = seats.find(s => s.actualRoleId === 'magician');
  // Stable shallow randomizer — Fisher-Yates on a copy. Reshuffles per-click so the
  // ordering changes every time the ST shows the token (avoids the Demon learning the
  // Magician's position by re-watching).
  const shuffleSeats = (arr) => {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  };

  return (
    <div className="space-y-4">
      <header>
        <h2 className="text-amber-200 text-lg font-semibold">Tokens</h2>
        <p className="text-xs text-stone-400">
          Tap any token to show it full-screen. Hand the phone (or hold up the screen) to the player.
          Tap anywhere on the overlay to dismiss.
        </p>
      </header>

      {/* Quick actions tied to the live game */}
      <section className="parchment rounded-lg p-3 sm:p-4 space-y-3">
        <h3 className="text-amber-200 font-semibold">Quick show</h3>
        <p className="text-xs text-stone-500">For Night 0 info-giving.</p>
        <div className="grid grid-cols-1 sm:grid-cols-3 gap-2">
          <button
            onClick={() => {
              if (!demonSeats.length) return;
              // Magician (if in play) is mixed into the Demon's view in random order
              // so the real Demon can't pick out which seat is the actual Demon.
              const list = magicianSeat
                ? shuffleSeats([...demonSeats, magicianSeat])
                : demonSeats;
              setShown({
                kind: 'players',
                header: magicianSeat ? 'These are the Demons' : 'This is the Demon',
                team: 'demon',
                players: list.map(s => ({ seatNum: s.seatNum, playerName: s.playerName })),
              });
            }}
            disabled={!demonSeats.length}
            className={`card rounded p-3 text-left ${demonSeats.length ? 'hover:border-red-500' : 'opacity-40 cursor-not-allowed'}`}>
            <div className="text-xs uppercase tracking-wider text-red-300">Show the Demon{magicianSeat ? ' (+ Magician)' : ''}</div>
            <div className="text-sm text-stone-200 mt-1">
              {demonSeats[0]
                ? (magicianSeat
                    ? `${demonSeats.length + 1} seats (shuffled — Magician confusion)`
                    : `Seat #${demonSeats[0].seatNum}${demonSeats[0].playerName ? ` · ${demonSeats[0].playerName}` : ''}`)
                : 'No demon in play'}
            </div>
            <div className="text-[10px] text-stone-500 mt-0.5">Role hidden — shows player identity only</div>
          </button>
          <button
            onClick={() => {
              if (!minionSeats.length && !magicianSeat) return;
              // Magician (if in play) is added to the Minion list in random order so
              // Minions can't pick out who the real Minions are.
              const list = magicianSeat
                ? shuffleSeats([...minionSeats, magicianSeat])
                : minionSeats;
              const realMinionWord = list.length === 1 ? 'Minion' : 'Minions';
              setShown({
                kind: 'players',
                header: list.length === 1 ? 'This is the Minion' : 'These are the Minions',
                team: 'minion',
                players: list.map(s => ({ seatNum: s.seatNum, playerName: s.playerName })),
              });
            }}
            disabled={!minionSeats.length && !magicianSeat}
            className={`card rounded p-3 text-left ${(minionSeats.length || magicianSeat) ? 'hover:border-red-500' : 'opacity-40 cursor-not-allowed'}`}>
            <div className="text-xs uppercase tracking-wider text-red-300">Show the Minion{(minionSeats.length + (magicianSeat ? 1 : 0)) === 1 ? '' : 's'}{magicianSeat ? ' (+ Magician)' : ''}</div>
            <div className="text-sm text-stone-200 mt-1">
              {(minionSeats.length || magicianSeat)
                ? (magicianSeat
                    ? `${minionSeats.length + 1} seats (shuffled — Magician confusion)`
                    : `${minionSeats.length} in play`)
                : 'No minions in play'}
            </div>
            <div className="text-[10px] text-stone-500 mt-0.5">Roles hidden — shows player identities only</div>
          </button>
          <button
            onClick={() => bluffs.length && setShown({
              kind: 'multi',
              charIds: bluffs,
              header: 'Demon Bluffs',
              labels: bluffs.map(() => '(not in play)'),
            })}
            disabled={!bluffs.length}
            className={`card rounded p-3 text-left ${bluffs.length ? 'hover:border-amber-500' : 'opacity-40 cursor-not-allowed'}`}>
            <div className="text-xs uppercase tracking-wider text-amber-300">Show Demon Bluffs</div>
            <div className="text-sm text-stone-200 mt-1">
              {bluffs.length ? `${bluffs.length} / 3 picked` : 'Pick bluffs on the Grimoire tab'}
            </div>
          </button>
        </div>
        <p className="text-[10px] text-stone-500">
          Note: Show-the-Demon and Show-the-Minion(s) deliberately exclude the Lunatic
          (they use each seat's actual role). For showing the Lunatic their fake info, use Special Actions below.
        </p>

        <div className="grid grid-cols-1 sm:grid-cols-3 gap-2 pt-2 border-t border-stone-800">
          <button
            onClick={() => setShown({ kind: 'phrase', title: '', body: 'Look at your phone' })}
            className="card rounded p-3 text-left hover:border-amber-500">
            <div className="text-xs uppercase tracking-wider text-amber-300">📱 Look at your phone</div>
            <div className="text-sm text-stone-200 mt-1">Prompts a player to check their phone.</div>
          </button>
          <button
            onClick={() => setSelectedYouOpen(true)}
            className="card rounded p-3 text-left hover:border-amber-500">
            <div className="text-xs uppercase tracking-wider text-amber-300">🎯 This character selected you</div>
            <div className="text-sm text-stone-200 mt-1">Pick any role on the script (incl. in-play travellers).</div>
          </button>
          <button
            onClick={() => setShown({ kind: 'phrase', title: '', body: 'Choose a player' })}
            className="card rounded p-3 text-left hover:border-amber-500">
            <div className="text-xs uppercase tracking-wider text-amber-300">👉 Choose a player</div>
            <div className="text-sm text-stone-200 mt-1">Prompts a player to pick someone.</div>
          </button>
        </div>
      </section>

      {/* Team alignment */}
      <section className="parchment rounded-lg p-3 sm:p-4 space-y-3">
        <h3 className="text-amber-200 font-semibold">Team alignment</h3>
        <div className="grid grid-cols-2 gap-2">
          <button onClick={() => setShown({ kind: 'text', title: 'You are', big: 'GOOD', tone: 'good' })}
            className="card rounded p-4 hover:border-sky-500 transition">
            <div className="text-xs uppercase tracking-wider text-sky-300">You are</div>
            <div className="text-2xl font-bold text-sky-300 mt-1">GOOD</div>
          </button>
          <button onClick={() => setShown({ kind: 'text', title: 'You are', big: 'EVIL', tone: 'evil' })}
            className="card rounded p-4 hover:border-red-500 transition">
            <div className="text-xs uppercase tracking-wider text-red-300">You are</div>
            <div className="text-2xl font-bold text-red-400 mt-1">EVIL</div>
          </button>
        </div>
      </section>

      {/* Team type (TF / OUT / MIN / DEM) — for Washerwoman/Librarian/Investigator info */}
      <section className="parchment rounded-lg p-3 sm:p-4 space-y-3">
        <h3 className="text-amber-200 font-semibold">Team type</h3>
        <p className="text-xs text-stone-500">For Washerwoman / Librarian / Investigator-style info.</p>
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
          {[
            { team: 'townsfolk', label: 'Townsfolk' },
            { team: 'outsider',  label: 'Outsider' },
            { team: 'minion',    label: 'Minion' },
            { team: 'demon',     label: 'Demon' },
          ].map(t => (
            <button key={t.team}
              onClick={() => setShown({ kind: 'team', team: t.team, label: t.label })}
              className={`card rounded p-3 hover:border-amber-500 transition team-${t.team}`}>
              <div className="text-xs uppercase tracking-wider">{t.label}</div>
            </button>
          ))}
        </div>
      </section>

      {/* Yes / No */}
      <section className="parchment rounded-lg p-3 sm:p-4 space-y-3">
        <h3 className="text-amber-200 font-semibold">Yes / No</h3>
        <p className="text-xs text-stone-500">For Fortune Teller, Snake Charmer, Cult Leader.</p>
        <div className="grid grid-cols-2 gap-2">
          <button onClick={() => setShown({ kind: 'text', big: 'YES', tone: 'evil' })}
            className="card rounded p-4 hover:border-red-500 transition">
            <div className="text-3xl font-bold text-red-400 text-center">YES</div>
          </button>
          <button onClick={() => setShown({ kind: 'text', big: 'NO', tone: 'good' })}
            className="card rounded p-4 hover:border-sky-500 transition">

        </div>
      </section>

      {/* Numbers */}
      <section className="parchment rounded-lg p-3 sm:p-4 space-y-3">
        <h3 className="text-amber-200 font-semibold">Numbers</h3>
        <p className="text-xs text-stone-500">For Chef, Empath, etc.</p>
        <div className="grid grid-cols-6 gap-2">
          {[0, 1, 2, 3, 4, 5].map(n => (
            <button key={n}
              onClick={() => setShown({ kind: 'text', big: String(n) })}
              className="card rounded p-4 hover:border-amber-500 transition">
              <div className="text-3xl font-bold text-amber-200 text-center">{n}</div>

        <SpyAction

        {lunaticInPlay && (
          <>

              disabled={!lunaticBluffs.length}
              className={`w-full card rounded p-3 text-left ${lunaticBluffs.length ? 'hover:border-amber-500' : 'opacity-40 cursor-not-allowed'}`}>

              <div className="text-xs text-stone-400 mt-0.5">
                {lunaticBluffs.length
                  ? `${lunaticBluffs.length} / 3 picked on the Grimoire tab — shows the Lunatic the same way you'd show the Demon their bluffs.`

            <button

              <div className="text-amber-200 font-medium">🌙 Show Lunatic the "Minions"</div>
              <div className="text-xs text-stone-400 mt-0.5">
                Pick any {minionSeats.length || 'N'} player{minionSeats.length === 1 ? '' : 's'} to show the Lunatic as their fake Minions. Can be real Minions or red herrings.
              </div>
            </button>
          </>
        )}

        <button
          onClick={() => setMadTokenOpen(true)}
          className="w-full card rounded p-3 text-left hover:border-amber-500">
          <div className="text-amber-200 font-medium">🤪 Send "You are mad" token</div>
          <div className="text-xs text-stone-400 mt-0.5">
            Tells a player they're mad about a role (or any custom claim). Pick a role from the script, or type your own text.
          </div>
        </button>

        <button
          onClick={() => setWordTokenOpen(true)}
          className="w-full card rounded p-3 text-left hover:border-amber-500">
          <div className="text-amber-200 font-medium">📜 Send "The word is:" token</div>
          <div className="text-xs text-stone-400 mt-0.5">
            Type any word or phrase to display full-screen for a player.
          </div>
        </button>

      {spyPickerOpen && (
        <SeatPickerModal
          title="Send grimoire to which seat?"
          subtitle="The chosen player will see a snapshot of the full grimoire (all roles, reminders, deaths, demon bluffs) until they tap Got it."

          onPick={(seatNum) => {
            onShowGrimoireToSeat(seatNum);
            setSpyPickerOpen(false);
          }}
          onClose={() => setSpyPickerOpen(false)}

      {lunaticMinionsPickerOpen && (
        <MultiSeatPickerModal

          suggestedCount={minionSeats.length || null}
          onDone={(picked) => {

              kind: 'players',

              team: 'minion',

function ScriptRolesGrid({ scriptIds, onPick }) {
  const chars = scriptIds.map(id => CHAR_BY_ID[id]).filter(Boolean);
  const byTeam = {};
  for (const c of chars) {
    if (!byTeam[c.team]) byTeam[c.team] = [];
    byTeam[c.team].push(c);
  }
  return (
    <div className="space-y-3">
      {TEAM_ORDER.filter(t => byTeam[t]?.length).map(team => (
        <div key={team}>
          <div className={`text-[10px] uppercase tracking-wider mb-1 team-${team}`}>{TEAM_LABEL[team]}</div>
          <div className="grid grid-cols-3 sm:grid-cols-5 lg:grid-cols-6 gap-2">
            {byTeam[team].map(c => (
              <button key={c.id}
                onClick={() => onPick(c.id)}
                title={c.ability}
                className="card rounded p-2 flex flex-col items-center gap-1 hover:border-amber-500 transition">
                {iconUrl(c.id) && (
                  <img src={iconUrl(c.id)} alt="" className="w-12 h-12 rounded-full border border-stone-700 object-cover" />
                )}
                <div className={`text-xs text-center team-${c.team} font-medium`}>{c.name}</div>
              </button>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

function SpyAction({ seats, sentToSeat, onPick, onCancel }) {
  if (sentToSeat != null) {
    const seat = seats.find(s => s.seatNum === sentToSeat);
    return (
      <div className="card rounded p-3 border-amber-700/60">
        <div className="flex items-center justify-between gap-2 flex-wrap">
          <div>
            <div className="text-amber-200 font-medium">Grimoire snapshot sent</div>
            <div className="text-xs text-stone-400">
              Seat #{sentToSeat}{seat?.playerName ? ` · ${seat.playerName}` : ''} is viewing the full grimoire.
              Awaiting their "Got it" tap.
            </div>
          </div>
          <button onClick={onCancel}
            className="text-xs px-3 py-1.5 rounded pill hover:border-red-500 hover:text-red-400">
            Recall
          </button>
        </div>
      </div>
    );
  }
  return (
    <button onClick={onPick}
      className="w-full card rounded p-3 hover:border-amber-500 text-left">
      <div className="text-amber-200 font-medium">📜 Show grimoire to a player</div>
      <div className="text-xs text-stone-400 mt-0.5">
        For the Spy (and similar). Sends a snapshot to the player's phone — they tap "Got it" to dismiss.
      </div>
    </button>
  );
}

function MultiSeatPickerModal({ title, subtitle, seats, suggestedCount, onDone, onClose }) {
  const [picked, setPicked] = useState(new Set());
  const toggle = (n) => {
    setPicked(p => {
      const next = new Set(p);
      if (next.has(n)) next.delete(n);
      else next.add(n);
      return next;
    });
  };
  const tooMany = suggestedCount != null && picked.size > suggestedCount;
  const enoughPicked = suggestedCount == null || picked.size >= suggestedCount;

  return (
    <div className="fixed inset-0 z-50 bg-black/70 flex items-center justify-center p-4" onClick={onClose}>
      <div className="parchment rounded-lg max-w-md w-full max-h-[85vh] flex flex-col" onClick={e => e.stopPropagation()}>
        <div className="p-4 border-b border-stone-800 flex items-center justify-between">
          <h3 className="font-semibold text-amber-200">{title}</h3>
          <button onClick={onClose} className="text-stone-400 hover:text-amber-200">✕</button>
        </div>
        {subtitle && <div className="px-4 pt-2 text-xs text-stone-400">{subtitle}</div>}
        <div className="px-4 pt-2 text-xs">
          <span className="text-stone-500">Selected: </span>
          <span className={`tabular-nums font-semibold ${tooMany ? 'text-red-400' : enoughPicked ? 'text-emerald-300' : 'text-amber-200'}`}>
            {picked.size}{suggestedCount != null ? ` / ${suggestedCount}` : ''}
          </span>
          {tooMany && <span className="text-red-400 ml-2">over the suggested count — that's OK if intentional.</span>}
        </div>
        <div className="scroll-y p-3">
          <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
            {seats.map(s => {
              const isPicked = picked.has(s.seatNum);
              return (
                <button key={s.seatNum}
                  onClick={() => toggle(s.seatNum)}
                  className={`card rounded p-3 text-left transition
                    ${isPicked ? 'border-amber-500 bg-amber-950/30' : 'hover:border-amber-700'}`}>
                  <div className="flex items-center gap-2">
                    <span className={`w-4 h-4 rounded-sm border flex items-center justify-center text-[10px]
                      ${isPicked ? 'bg-amber-500 border-amber-500 text-stone-950' : 'border-stone-600'}`}>
                      {isPicked ? '✓' : ''}
                    </span>
                    <span className="text-amber-200 font-bold text-base">#{s.seatNum}</span>
                  </div>
                  {s.playerName && <div className="text-xs text-stone-300 truncate mt-1">{s.playerName}</div>}
                </button>
              );
            })}
          </div>
        </div>
        <div className="p-3 border-t border-stone-800 flex justify-between gap-2">
          <button onClick={onClose}
            className="text-xs px-3 py-1.5 rounded pill hover:border-amber-500 hover:text-amber-200">
            Cancel
          </button>
          <button onClick={() => onDone([...picked])}
            disabled={picked.size === 0}
            className={`text-sm px-4 py-2 rounded font-medium ${picked.size === 0
              ? 'bg-stone-800 text-stone-500 cursor-not-allowed'
              : 'bg-amber-600 hover:bg-amber-500 text-stone-950'}`}>
            Show {picked.size}
          </button>
        </div>
      </div>
    </div>
  );
}

function SeatPickerModal({ title, subtitle, seats, onPick, onClose }) {
  return (
    <div className="fixed inset-0 z-50 bg-black/70 flex items-center justify-center p-4" onClick={onClose}>
      <div className="parchment rounded-lg max-w-md w-full max-h-[85vh] flex flex-col" onClick={e => e.stopPropagation()}>
        <div className="p-4 border-b border-stone-800 flex items-center justify-between">
          <h3 className="font-semibold text-amber-200">{title}</h3>
          <button onClick={onClose} className="text-stone-400 hover:text-amber-200">✕</button>
        </div>

function CircularGrimoire({ seats, travellers, eligibleSet, swapSourceSeat, assigningRoleId, townSquareNotes,
                            gameStarted, days, viewingDayIndex, readOnly,
                            onSeatTap, onToggleDead, onToggleAlignment, onUnassignPending, onSwap,
                            onOpenReminderPicker, onOpenRoleChanger, onRemoveReminder, onSetTownSquareNote,
                            onSetViewingDayIndex,
                            onToggleTravellerDead, onToggleTravellerAlignment,
                            onOpenTravellerReminderPicker, onOpenTravellerRoleChanger,
                            onRemoveTravellerReminder }) {
  // Build the interleaved entity list: each entry is either a regular seat or a
  // traveller. Travellers slot in based on their insertAfterSeat field
  // (0 = before seat 1, S = after seat S).
  const travs = travellers || [];
  const travBefore = (n) => travs.filter(t => (t.insertAfterSeat || 0) === n);
  const entities = [];
  // Anything with insertAfterSeat === 0 goes before seat 1
  for (const t of travBefore(0)) entities.push({ kind: 'traveller', traveller: t });
  for (const s of seats) {
    entities.push({ kind: 'seat', seat: s });
    for (const t of travBefore(s.seatNum)) entities.push({ kind: 'traveller', traveller: t });
  }
  const N = Math.max(1, entities.length);
  // Zoom + pan (transient — resets when leaving the page or regenerating).
  const [zoom, setZoom] = useState(1);
  const [pan, setPan]   = useState({ x: 0, y: 0 });
  const dragRef  = useRef(null);   // { startX, startY, panX, panY }
  const pinchRef = useRef(null);   // { startDist, startZoom }
  const viewportRef = useRef(null);
  const reset = () => { setZoom(1); setPan({ x: 0, y: 0 }); };
  const zoomBy = (factor) => setZoom(z => Math.max(0.5, Math.min(4, z * factor)));
  // Reset zoom/pan whenever the seat count changes meaningfully.
  useEffect(() => { reset(); }, [N]);

  // Wheel + touchmove must be attached natively with passive:false so preventDefault
  // actually blocks page scroll / native pinch-zoom. React's synthetic onWheel is
  // passive by default in modern versions.
  useEffect(() => {
    const el = viewportRef.current;
    if (!el) return;
    const onNativeWheel = (e) => {
      e.preventDefault();
      const factor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
      setZoom(z => Math.max(0.5, Math.min(4, z * factor)));
    };
    const onNativeTouchMove = (e) => {
      if (e.touches.length === 2 && pinchRef.current) {
        e.preventDefault();
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.hypot(dx, dy);
        setZoom(Math.max(0.5, Math.min(4, pinchRef.current.startZoom * (dist / pinchRef.current.startDist))));
      } else if (dragRef.current && e.touches.length === 1) {
        // Single-finger pan during touch — preventDefault stops the page from scrolling.
        e.preventDefault();
      }
    };
    el.addEventListener('wheel', onNativeWheel, { passive: false });
    el.addEventListener('touchmove', onNativeTouchMove, { passive: false });
    return () => {
      el.removeEventListener('wheel', onNativeWheel);
      el.removeEventListener('touchmove', onNativeTouchMove);
    };
  }, []);

  // Background drag = pan. Skip when the drag starts on a token (so token swap/click works)
  // or inside the Town Square notes area (so text inputs can focus and select).
  const isInteractive = (target) => target && target.closest && (
    target.closest('[data-seat-token]') || target.closest('[data-town-square]')
  );
  const onPointerDown = (e) => {
    if (isInteractive(e.target)) return;
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    e.currentTarget.setPointerCapture?.(e.pointerId);
    dragRef.current = { startX: e.clientX, startY: e.clientY, panX: pan.x, panY: pan.y };
  };
  const onPointerMove = (e) => {
    if (!dragRef.current) return;
    setPan({
      x: dragRef.current.panX + (e.clientX - dragRef.current.startX),
      y: dragRef.current.panY + (e.clientY - dragRef.current.startY),
    });
  };
  const onPointerUp = (e) => {
    dragRef.current = null;
    try { e.currentTarget.releasePointerCapture?.(e.pointerId); } catch {}
  };

  // Two-finger pinch = zoom (touch). The actual zoom update happens in the native
  // touchmove handler above (so it can preventDefault). These just bracket the gesture.
  const onTouchStart = (e) => {
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      pinchRef.current = { startDist: Math.hypot(dx, dy), startZoom: zoom };
    }
  };
  const onTouchEnd = (e) => { if (e.touches.length < 2) pinchRef.current = null; };

  // Adapt layout to player count so high-count games don't overlap.
  // Linear spacing between adjacent seat centers (in % of container width) = 2*R*sin(π/N).
  // Push the radius further out for crowded circles to gain spacing.
  const tokenRadiusPct = N >= 15 ? 44 : N >= 13 ? 42 : N >= 11 ? 40 : 38;
  const linearSpacingPct = N > 1 ? 2 * tokenRadiusPct * Math.sin(Math.PI / N) : 100;
  // Token-width cap shrinks with N — at 15 players the diagonal X gap between adjacent
  // columns drops to ~9%, so columns need to be narrower than that to keep adjacent
  // headers from landing on neighbouring tokens.
  const cap = N >= 15 ? 11.5 : N >= 13 ? 13 : N >= 11 ? 15 : 18;
  const tokenWidthPct = Math.max(9, Math.min(cap, linearSpacingPct - 2));
  const tokenWidthStyle = `min(120px, ${tokenWidthPct.toFixed(1)}%)`;
  // Shrink the centerpiece a bit when we push tokens outward, so it doesn't dominate.
  const centerInsetPct = N >= 15 ? 20 : N >= 12 ? 23 : 26;
  // Compact header for tight columns so longer names don't blow them out.
  const headerCompact = tokenWidthPct < 14;

  return (
    <section className="parchment rounded-lg p-3">
      {/* Zoom + pan controls */}
      <div className="flex items-center justify-end gap-1 mb-2">
        <button onClick={() => zoomBy(1/1.2)}
          className="text-xs px-2.5 py-1 rounded pill hover:border-amber-500 hover:text-amber-300"
          title="Zoom out">−</button>
        <span className="text-[10px] tabular-nums text-stone-400 w-10 text-center">{Math.round(zoom * 100)}%</span>
        <button onClick={() => zoomBy(1.2)}
          className="text-xs px-2.5 py-1 rounded pill hover:border-amber-500 hover:text-amber-300"
          title="Zoom in">+</button>
        <button onClick={reset}
          className="text-xs px-2.5 py-1 rounded pill hover:border-amber-500 hover:text-amber-200"
          title="Reset zoom and pan">Reset</button>
      </div>
      {/* Pan/zoom viewport — clips overflow so zoomed-in content doesn't bleed into adjacent UI */}
      <div ref={viewportRef}
        className="relative overflow-hidden mx-auto rounded-md bg-stone-950/40 select-none"
        style={{
          width: 'min(640px, calc(100vw - 3rem))',
          aspectRatio: '1 / 1',
          touchAction: 'none',
          cursor: dragRef.current ? 'grabbing' : 'grab',
        }}
        onPointerDown={onPointerDown}
        onPointerMove={onPointerMove}
        onPointerUp={onPointerUp}
        onPointerCancel={onPointerUp}
        onTouchStart={onTouchStart}
        onTouchEnd={onTouchEnd}>
        <div className="absolute inset-0"
          style={{
            transform: `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`,
            transformOrigin: '50% 50%',
            transition: (dragRef.current || pinchRef.current) ? 'none' : 'transform 0.08s linear',
          }}>
          <div data-town-square
            className="absolute rounded-full border border-stone-800/60 bg-stone-900/40 flex flex-col items-stretch justify-center gap-1 p-2 sm:p-3 overflow-hidden"
            style={{ top: `${centerInsetPct}%`, bottom: `${centerInsetPct}%`, left: `${centerInsetPct}%`, right: `${centerInsetPct}%` }}>
            <textarea
              value={townSquareNotes?.above || ''}
              onChange={e => onSetTownSquareNote?.('above', e.target.value)}
              onPointerDown={e => e.stopPropagation()}
              readOnly={readOnly || !onSetTownSquareNote}
              placeholder="Persistent notes…"
              className={`w-full flex-1 min-h-0 bg-transparent border border-transparent rounded text-stone-200 text-[10px] sm:text-xs leading-tight text-center resize-none focus:outline-none placeholder:text-stone-600 transition px-1 py-1
                ${readOnly ? 'cursor-default' : 'hover:bg-stone-950/30 focus:bg-stone-950/50 hover:border-stone-700 focus:border-amber-700'}`}
            />
            <div className="text-stone-600 text-[10px] sm:text-xs uppercase tracking-widest text-center leading-relaxed shrink-0">
              The Town<br/>Square
            </div>
            <textarea
              value={townSquareNotes?.below || ''}
              onChange={e => onSetTownSquareNote?.('below', e.target.value)}
              onPointerDown={e => e.stopPropagation()}
              readOnly={readOnly || !onSetTownSquareNote}
              placeholder="This day's notes…"
              className={`w-full flex-1 min-h-0 bg-transparent border border-transparent rounded text-stone-200 text-[10px] sm:text-xs leading-tight text-center resize-none focus:outline-none placeholder:text-stone-600 transition px-1 py-1
                ${readOnly ? 'cursor-default' : 'hover:bg-stone-950/30 focus:bg-stone-950/50 hover:border-stone-700 focus:border-amber-700'}`}
            />
          </div>
          {entities.map((entity, i) => {
            const angle = (i / N) * 2 * Math.PI - Math.PI / 2;
            const tx = 50 + tokenRadiusPct * Math.cos(angle);
            const ty = 50 + tokenRadiusPct * Math.sin(angle);
            const key = entity.kind === 'seat'
              ? `s-${entity.seat.seatNum}`
              : `t-${entity.traveller.travellerNum}`;
            return (
              <div key={key}
                data-seat-token
                className="absolute"
                style={{
                  left: `${tx}%`,
                  top: `${ty}%`,
                  transform: 'translate(-50%, -50%)',
                  width: tokenWidthStyle,
                }}>
                {entity.kind === 'seat' ? (
                  <Token
                    seat={entity.seat}
                    isEligible={eligibleSet.has(entity.seat.seatNum)}
                    swapSourceSeat={swapSourceSeat}
                    onSeatTap={onSeatTap}
                    onToggleDead={onToggleDead}
                    onToggleAlignment={onToggleAlignment}
                    onUnassignPending={onUnassignPending}
                    onSwap={onSwap}
                    onOpenReminderPicker={onOpenReminderPicker}
                    onOpenRoleChanger={onOpenRoleChanger}
                    onRemoveReminder={onRemoveReminder}
                    showHeaderLabel={true}
                    hideSeatBadge={true}
                    compact={headerCompact}
                    zoom={zoom}
                  />
                ) : (
                  <TravellerCircleToken
                    traveller={entity.traveller}
                    compact={headerCompact}
                    onToggleDead={onToggleTravellerDead}
                    onToggleAlignment={onToggleTravellerAlignment}
                    onOpenReminderPicker={onOpenTravellerReminderPicker}
                    onOpenRoleChanger={onOpenTravellerRoleChanger}
                    onRemoveReminder={onRemoveTravellerReminder}
                  />
                )}
              </div>
            );
          })}
        </div>
      </div>
      <p className="text-xs text-center text-stone-500 mt-2">
        Tap a token to pick it up, then tap another to swap. Drag empty space to pan · scroll/pinch to zoom.
      </p>
    </section>
  );
}

function ListGrimoire({ seats, travellers, eligibleSet, swapSourceSeat, assigningRoleId, onSeatTap,
                        onToggleDead, onToggleAlignment, onUnassignPending, onSwap,
                        onOpenReminderPicker, onOpenRoleChanger, onRemoveReminder,
                        onToggleTravellerDead, onToggleTravellerAlignment,
                        onOpenTravellerReminderPicker, onOpenTravellerRoleChanger,
                        onRemoveTravellerReminder }) {
  // Same interleaving rule as the circular view: travellers slot in at their
  // chosen insertion point (insertAfterSeat: 0 = before seat 1, S = after S).
  const travs = travellers || [];
  const travBefore = (n) => travs.filter(t => (t.insertAfterSeat || 0) === n);
  const rows = [];
  for (const t of travBefore(0)) rows.push({ kind: 'traveller', traveller: t });
  for (const s of seats) {
    rows.push({ kind: 'seat', seat: s });
    for (const t of travBefore(s.seatNum)) rows.push({ kind: 'traveller', traveller: t });
  }
  return (
    <section className="parchment rounded-lg p-3">
      <div className="space-y-1.5">
        {rows.map(r => r.kind === 'seat' ? (
          <ListGrimoireRow key={`s-${r.seat.seatNum}`}
            seat={r.seat}
            isEligible={eligibleSet.has(r.seat.seatNum)}
            swapSourceSeat={swapSourceSeat}
            onSeatTap={onSeatTap}
            onToggleDead={onToggleDead}
            onToggleAlignment={onToggleAlignment}
            onUnassignPending={onUnassignPending}
            onSwap={onSwap}
            onOpenReminderPicker={onOpenReminderPicker}
            onOpenRoleChanger={onOpenRoleChanger}
            onRemoveReminder={onRemoveReminder}
          />
        ) : (
          <TravellerListRow key={`t-${r.traveller.travellerNum}`}
            traveller={r.traveller}
            onToggleDead={onToggleTravellerDead}
            onToggleAlignment={onToggleTravellerAlignment}
            onOpenReminderPicker={onOpenTravellerReminderPicker}
            onOpenRoleChanger={onOpenTravellerRoleChanger}
            onRemoveReminder={onRemoveTravellerReminder}
          />
        ))}
      </div>
      <p className="text-xs text-center text-stone-500 mt-3">
        Tap a row to pick it up, then tap another to swap. (Desktop: drag the ☰ handle.)
      </p>
    </section>
  );
}

function ListGrimoireRow({ seat, isEligible, swapSourceSeat, onSeatTap,
                          onToggleDead, onToggleAlignment, onUnassignPending, onSwap,
                          onOpenReminderPicker, onOpenRoleChanger, onRemoveReminder }) {
  const perceived = CHAR_BY_ID[seat.perceivedRoleId];
  const actual = CHAR_BY_ID[seat.actualRoleId];
  const misregistered = seat.actualRoleId !== seat.perceivedRoleId;
  const img = iconUrl(seat.perceivedRoleId);
  const [isDragOver, setIsDragOver] = useState(false);

  const handleDragStart = (e) => {
    e.dataTransfer.setData('application/x-botc-seat', String(seat.seatNum));
    e.dataTransfer.effectAllowed = 'move';
  };
  const handleDragOver = (e) => {
    if (e.dataTransfer.types.includes('application/x-botc-seat')) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      setIsDragOver(true);
    }
  };
  const handleDragLeave = () => setIsDragOver(false);
  const handleDrop = (e) => {
    e.preventDefault();
    setIsDragOver(false);
    const src = Number(e.dataTransfer.getData('application/x-botc-seat'));
    if (src && src !== seat.seatNum && onSwap) onSwap(src, seat.seatNum);
  };

  const isPickedUp = swapSourceSeat === seat.seatNum;
  const isSwapTarget = swapSourceSeat != null && swapSourceSeat !== seat.seatNum;
  const naturalAlign = naturalAlignment(seat.perceivedRoleId);
  const effectiveAlign = seat.alignment || naturalAlign;
  const alignmentOverridden = effectiveAlign !== naturalAlign;

  const handleClick = () => {
    if (onSeatTap) onSeatTap(seat.seatNum);
  };

  return (
    <div
      onDragOver={handleDragOver}
      onDragLeave={handleDragLeave}
      onDrop={handleDrop}
      onClick={handleClick}
      style={{ touchAction: 'manipulation' }}
      className={`card rounded p-2 flex items-center gap-3 transition cursor-pointer
        ${isPickedUp ? 'border-sky-400 ring-2 ring-sky-400/40 bg-sky-950/20' :
          isEligible ? 'border-emerald-400 ring-2 ring-emerald-400/30 hover:bg-emerald-950/30' :
          isSwapTarget ? 'border-sky-700 hover:border-sky-400 hover:bg-sky-950/15' :
          isDragOver ? 'border-sky-400 ring-2 ring-sky-400/30' :
          alignmentOverridden && effectiveAlign === 'evil' ? 'border-red-500 ring-1 ring-red-500/30' :
          alignmentOverridden && effectiveAlign === 'good' ? 'border-sky-500 ring-1 ring-sky-500/30' :
          misregistered ? 'border-amber-700' : ''}
        ${seat.isDead ? 'opacity-50' : ''}`}>
      <div
        draggable={!!onSwap}
        onDragStart={handleDragStart}
        title="Drag to swap with another seat (or tap the row)"
        className={`text-stone-500 w-5 text-center ${onSwap ? 'cursor-grab active:cursor-grabbing hover:text-amber-300' : ''}`}
        onClick={e => e.stopPropagation()}>
        ☰
      </div>
      <div className="flex-shrink-0 flex items-baseline gap-1.5">
        <span className="text-amber-200/80 text-sm font-bold">#{seat.seatNum}</span>
        {(seat.playerName || '').trim() && (
          <span className="text-xs text-stone-300 truncate max-w-[100px]">{seat.playerName}</span>
        )}
      </div>
      {img && (
        <img src={img} alt="" draggable={false}
          className={`w-12 h-12 rounded-full border border-stone-700 object-cover flex-shrink-0 ${seat.isDead ? 'grayscale' : ''}`} />
      )}
      <div className="flex-1 min-w-0">
        <div className="flex items-center gap-2 flex-wrap">
          <span className={`font-medium text-sm team-${perceived?.team || 'townsfolk'}`}>{perceived?.name || '?'}</span>
          {alignmentOverridden && (
            <span className={`text-[10px] uppercase font-bold tracking-wider px-1.5 py-0.5 rounded
              ${effectiveAlign === 'evil' ? 'bg-red-950/60 text-red-300 border border-red-700' : 'bg-sky-950/60 text-sky-300 border border-sky-700'}`}>
              {effectiveAlign === 'evil' ? '⚑ Evil' : '⚑ Good'}
            </span>
          )}
        </div>
        {misregistered && actual && !(seat.reminders || []).some(r => r.hiddenRoleMarker && r.charId === seat.actualRoleId) && (
          <div className={`text-xs italic team-${actual.team}`}>actually {actual.name}</div>
        )}
        {perceived?.ability && (
          <div className="text-xs text-stone-300/85 mt-0.5 leading-snug">{perceived.ability}</div>
        )}
        {seat.reminders && seat.reminders.length > 0 && (
          <div className="flex flex-wrap gap-1 mt-1">
            {seat.reminders.map((r, i) => {
              const onRemoveForR = r.hiddenRoleMarker
                ? (onUnassignPending ? () => onUnassignPending(seat.seatNum) : null)
                : (onRemoveReminder ? () => onRemoveReminder(seat.seatNum, i) : null);
              return (
                <ReminderToken key={i} reminder={r} size={28} onRemove={onRemoveForR} />
              );
            })}
          </div>
        )}
      </div>
      {onOpenReminderPicker && (
        <button onClick={(e) => { e.stopPropagation(); onOpenReminderPicker(seat.seatNum); }}
          title="Add reminder"
          className="text-xs px-2 py-1 rounded pill hover:border-amber-500 hover:text-amber-300">
          + Reminder
        </button>
      )}
      {onOpenRoleChanger && (
        <button onClick={(e) => { e.stopPropagation(); onOpenRoleChanger(seat.seatNum); }}
          title="Change role (Summoner picks Demon, Pit-Hag transform, etc.)"
          className="text-xs px-2 py-1 rounded pill hover:border-amber-500 hover:text-amber-300">
          ↻ Role
        </button>
      )}
      {onToggleAlignment && (
        <button onClick={(e) => { e.stopPropagation(); onToggleAlignment(seat.seatNum); }}
          title={`Flip alignment (currently ${effectiveAlign})`}
          className={`text-xs px-2 py-1 rounded pill font-medium
            ${effectiveAlign === 'evil' ? 'border-red-700 text-red-300 hover:border-red-500' : 'border-sky-700 text-sky-300 hover:border-sky-500'}`}>
          → {effectiveAlign === 'evil' ? 'Good' : 'Evil'}
        </button>
      )}
      {misregistered && !isEligible && (
        <button onClick={(e) => { e.stopPropagation(); onUnassignPending(seat.seatNum); }}
          className="text-xs px-2 py-1 rounded pill hover:border-amber-500 hover:text-amber-200">
          Unassign
        </button>
      )}
      <button onClick={(e) => { e.stopPropagation(); onToggleDead(seat.seatNum); }}
        className={`text-xs px-2 py-1 rounded pill ${seat.isDead ? 'border-emerald-700 text-emerald-300' : 'hover:border-red-500 hover:text-red-400'}`}>
        {seat.isDead ? 'Revive' : 'Dead'}
      </button>
    </div>
  );
}

// ---------------- Pass-out-roles button ----------------

function DealRolesButton({ seats, onDealAll, onUndealAll, blockedReason }) {
  const allSeats = seats || [];
  const filled = allSeats.filter(s => (s.playerName || '').trim()).length;
  const allFilled = filled === allSeats.length && allSeats.length > 0;
  const missing = allSeats.length - filled;
  const dealtCount    = allSeats.filter(s => s.roleDealt).length;
  const acceptedCount = allSeats.filter(s => s.playerStatus === 'accepted').length;
  const askingCount   = allSeats.filter(s => s.playerStatus === 'asking').length;
  const pendingCount  = allSeats.filter(s => s.roleDealt && s.playerStatus === 'pending').length;
  const allDealt = dealtCount === allSeats.length && allSeats.length > 0;

  if (allDealt) {
    return (
      <section className="parchment rounded-lg p-4 border-emerald-700/60">
        <div className="text-center space-y-2">
          <div className="text-emerald-300 font-semibold text-lg">✓ All {dealtCount} roles dealt</div>
          <div className="flex flex-wrap items-center justify-center gap-2 text-xs">
            {acceptedCount > 0 && <span className="px-2 py-0.5 rounded bg-emerald-700 text-stone-100">{acceptedCount} accepted</span>}
            {askingCount > 0   && <span className="px-2 py-0.5 rounded bg-yellow-700 text-stone-100">{askingCount} asking</span>}
            {pendingCount > 0  && <span className="px-2 py-0.5 rounded bg-amber-950/60 text-amber-300 border border-amber-700">{pendingCount} awaiting</span>}
          </div>
          <button onClick={() => { if (confirm('Take back all roles? Every player returns to the waiting screen.')) onUndealAll(); }}
            className="text-xs px-3 py-1.5 rounded pill hover:border-amber-500 hover:text-amber-200">
            Take back all roles
          </button>
        </div>
      </section>
    );
  }

  const canDeal = allFilled && !blockedReason;
  return (
    <section className="parchment rounded-lg p-4">
      <button onClick={onDealAll}
        disabled={!canDeal}
        className={`w-full py-3 rounded-lg text-base font-semibold transition
          ${canDeal
            ? 'bg-amber-600 hover:bg-amber-500 text-stone-950 shadow-lg shadow-amber-900/40'
            : 'bg-stone-800 text-stone-500 cursor-not-allowed'}`}>
        Pass out roles to all players →
      </button>
      <p className="text-xs text-center mt-2">
        {blockedReason
          ? <span className="text-amber-300">⚠ {blockedReason}</span>
          : !allFilled
            ? <span className="text-stone-500">{missing} seat{missing === 1 ? '' : 's'} still need a player name before bulk-dealing.</span>
            : dealtCount > 0
              ? <span className="text-stone-500">{dealtCount} of {allSeats.length} dealt individually. Click to deal the remaining {allSeats.length - dealtCount}.</span>
              : <span className="text-stone-500">All seats are filled. Click to send every player their role at once — or use the "Pass role" button per row above.</span>}
      </p>
    </section>
  );
}

// Look up the action descriptor for a role. Returns a normalized descriptor with
// defaults applied — never returns null so the caller can always call `.action`.
function nightActionFor(roleId) {
  const def = NIGHT_ACTIONS[roleId] || {};
  return {
    action: def.action || 'manual',
    reminder: def.reminder || '',
    instruction: def.instruction || '',
    eligible: def.eligible || 'all',
    phase: def.phase || 'both',
