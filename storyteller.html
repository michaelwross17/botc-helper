<script>
  // Global error handler — surfaces script errors directly on the page so blank
  // pages always have a visible diagnostic instead of failing silently.
  window.addEventListener('error', function(e) {
    var d = document.getElementById('__diag__') || (function() {
      var el = document.createElement('div');
      el.id = '__diag__';
      el.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#3a1010;color:#fcc;padding:12px;font-family:monospace;font-size:12px;z-index:9999;white-space:pre-wrap;border-bottom:2px solid #f55;max-height:50vh;overflow:auto';
      (document.body || document.documentElement).appendChild(el);
      return el;
    })();
    d.textContent += '[error] ' + (e.message || e.error || e) + (e.filename ? ' at ' + e.filename + ':' + e.lineno + ':' + e.colno : '') + '\n';
  });
  window.addEventListener('unhandledrejection', function(e) {
    var d = document.getElementById('__diag__');
    if (!d) return;
    d.textContent += '[promise] ' + (e.reason && e.reason.message || e.reason) + '\n';
  });
</script>

<script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect, useRef, useCallback } = React;

// ---------------- Data ----------------
const ALL_CHARACTERS = window.BOTC_DATA.characters;
const EDITIONS       = window.BOTC_DATA.editions;
const NIGHT_ORDER    = window.BOTC_DATA.nightOrder;
const JINXES         = window.BOTC_DATA.jinxes;

const CHAR_BY_ID = Object.fromEntries(ALL_CHARACTERS.map(c => [c.id, c]));

const TEAM_ORDER = ['townsfolk','outsider','minion','demon','traveller','fabled'];
const TEAM_LABEL = {
  townsfolk: 'Townsfolk', outsider: 'Outsiders',
  minion: 'Minions', demon: 'Demons',
  traveller: 'Travellers', fabled: 'Fabled',
};

// Standard bag composition: [townsfolk, outsider, minion, demon]
const BAG = {
   5:[3,0,1,1],  6:[3,1,1,1],  7:[5,0,1,1],  8:[5,1,1,1],
   9:[5,2,1,1], 10:[7,0,2,1], 11:[7,1,2,1], 12:[7,2,2,1],
  13:[9,0,3,1], 14:[9,1,3,1], 15:[9,2,3,1],
};

const DEFAULT_SCRIPTS = {
  tb:  { id:'tb',  name:'Trouble Brewing'  },
  bmr: { id:'bmr', name:'Bad Moon Rising'  },
  snv: { id:'snv', name:'Sects & Violets'  },
};

// Build the canonical character list for each base edition (bag roles only — TF/Out/Min/Dem)
function charactersForEdition(editionId) {
  return ALL_CHARACTERS
    .filter(c => c.edition === editionId && ['townsfolk','outsider','minion','demon'].includes(c.team))
    .map(c => c.id);
}

// ---------------- Cloud persistence (Firebase Realtime Database) ----------------
// We store all game state in Firebase keyed by an ST-chosen room code. Players
// join with the same code. localStorage is now only used to remember which room
// the storyteller most recently created/joined, so reopening their browser drops
// them straight back in.
const LAST_ROOM_KEY = 'botc-last-room';

// Room codes are 4 chars from an unambiguous alphabet (no 0/O, no 1/I).
// 32^4 = ~1M codes — plenty for non-overlapping concurrent home games.
function generateRoomCode() {
  const A = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 4; i++) code += A[Math.floor(Math.random() * A.length)];
  return code;
}

function getRoomFromUrl() {
  try { return new URLSearchParams(window.location.search).get('room'); } catch { return null; }
}

function getLastRoom() {
  try { return localStorage.getItem(LAST_ROOM_KEY); } catch { return null; }
}
function setLastRoom(code) {
  try { localStorage.setItem(LAST_ROOM_KEY, code); } catch {}
}

// Replace ?room=X in the current URL without a page reload. So creating a new
// game updates the address bar so the ST can copy/share it.
function setRoomInUrl(code) {
  try {
    const url = new URL(window.location.href);
    url.searchParams.set('room', code);
    window.history.replaceState(null, '', url.toString());
  } catch {}
}

// Reference to the JSON tree for one room. Returns null if Firebase didn't load.
function roomRef(code) {
  if (!window.__BOTC_DB__ || !code) return null;
  return window.__BOTC_DB__.ref('rooms/' + code + '/state');
}

// ---------------- Helpers ----------------
function getBag(n) { return BAG[n] || null; }

// Detect setup-modifying characters (Baron, Drunk, Godfather, etc.) in the active script
function getSetupModifiers(charIds) {
  return charIds
    .map(id => CHAR_BY_ID[id])
    .filter(c => c && c.setup);
}

// Known bag-composition deltas that apply when a setup character is *in the bag*.
// IMPORTANT: deltas for characters that physically go in the bag must sum to zero so
// the total number of selected characters equals the player count. (Outsider+1 must
// be paired with Townsfolk−1, etc.) Drunk and Marionette are the only exceptions —
// they're in NOT_IN_PHYSICAL_BAG, so their +1 Townsfolk decoy doesn't need balancing.
const SETUP_DELTAS = {
  // Trouble Brewing
  baron:        { townsfolk: -2, outsider: +2, note: 'Baron: +2 outsiders, −2 townsfolk.' },
  drunk:        { townsfolk: +1, note: 'Drunk: +1 Townsfolk token in the bag (the role the Drunk thinks they are). The Drunk token itself stays out — the ST places it on the grimoire after the bag is drawn.' },
  lunatic:      { demon: +1, note: 'Lunatic: +1 Demon token in the bag (the demon the Lunatic thinks they are; can be the same demon twice). The Lunatic token stays out — ST places "Is the Lunatic" on whichever demon-token seat is the Lunatic after the draw.' },
  // Bad Moon Rising
  godfather:    { townsfolk: -1, outsider: +1, note: 'Godfather: +1 or −1 outsider (ST choice). Defaulting to +1 outsider / −1 townsfolk; toggle below to flip.' },
  // Sects & Violets
  fanggu:       { townsfolk: -1, outsider: +1, note: 'Fang Gu: +1 outsider, −1 townsfolk.' },
  vigormortis:  { townsfolk: +1, outsider: -1, note: 'Vigormortis: −1 outsider, +1 townsfolk.' },
  // Common experimentals — Marionette behaves like the Drunk
  marionette:   { townsfolk: +1, note: 'Marionette: +1 Townsfolk token in the bag (the role the Marionette thinks they are). The Marionette token stays out — ST places it after the draw. The Marionette MUST sit next to the Demon.' },
  balloonist:   { townsfolk: -1, outsider: +1, note: 'Balloonist: +0 or +1 outsider (ST choice). Defaulting to +1 outsider / −1 townsfolk; toggle below to set +0.' },
  huntsman:     { townsfolk: -1, outsider: +1, note: 'Huntsman: adds the Damsel as an outsider (+1 outsider, −1 townsfolk).' },
  hermit:       { townsfolk: +1, outsider: -1, note: 'Hermit: −0 or −1 outsider (ST choice). Defaulting to −1 outsider / +1 townsfolk; toggle below to set −0.' },
  lilmonsta:    { minion: +1, demon: -1, note: 'Lil’ Monsta: +1 Minion, no Demon in the bag. Lil’ Monsta is a token passed between Minions each night.' },
  // Lord of Typhon is fully overridden in getEffectiveBag (post-pass). The entry
  // here exists only so the SetupNeedsPanel finds a note. Real bag math is applied
  // after the main loop using the ST's chosen outsider count + the in-play minion count.
  lordoftyphon: { note: 'Lord of Typhon: all evil players sit in a line with Lord of Typhon in the middle. Pick outsider count below; minions are placed manually after the deal.' },
  // Kazali is also overridden in getEffectiveBag (post-pass). The Kazali picks which
  // players become Minions during the game — they're not put in the bag at setup.
  kazali:       { note: 'Kazali: no Minions go in the bag — the Kazali picks which Townsfolk become Minions during the game. Pick outsider count below; TF target is bumped so the bag fills every seat.' },
  // Atheist is also overridden in getEffectiveBag (post-pass). No evil characters in
  // play; the bag fills with townsfolk + ST-chosen outsiders only.
  atheist:      { note: 'Atheist: no minions or demons in play. The ST breaks rules and decides if evil wins. Pick outsider count below.' },
  summoner:     { townsfolk: +1, demon: -1, note: 'Summoner: no Demon in the bag, +1 townsfolk. The Summoner picks the Demon on Night 3. They also get 3 demon bluffs (auto-sent at role-deal).' },
  // Xaan has no fixed delta — its effect (force outsider count to X) is computed in
  // a post-loop step using the user-chosen X value. We still register a note here so
  // the setup-needs panel shows it. The townsfolk/outsider adjustment is applied later.
  xaan:         { note: 'Xaan: forces the bag to X outsiders (replacing townsfolk). Set X on the bag page.' },
};

// Characters that REQUIRE another character to be present (per their setup ability).
// Adding the key to the script or to the bag auto-adds the value. We do NOT auto-remove
// the partner when the trigger is removed — the ST might still want the partner.
//   choirboy → king   ("If the Demon kills the King, you learn …" [+the King])
//   huntsman → damsel ("…the Damsel, if chosen, becomes a not-in-play Townsfolk." [+the Damsel])
const FORCED_PAIRS = {
  choirboy: 'king',
  huntsman: 'damsel',
};

// Characters that occupy a player seat but don't physically go in the bag.
// Their bag slot is filled by another token (e.g. Drunk → an extra Townsfolk token).
// The ST assigns the actual character after the draw, via the grimoire.
// Lil' Monsta is included here too (no physical token), but it's special — it doesn't
// get assigned to a seat at all (see NO_SEAT_ASSIGNMENT). It's tracked via reminders
// as a "babysitter" token passed between minions each night.
const NOT_IN_PHYSICAL_BAG = new Set(['drunk', 'marionette', 'lunatic', 'lilmonsta']);

// Subset of NOT_IN_PHYSICAL_BAG that should NOT generate a pending-assignment entry.
// These represent in-play mechanics that aren't tied to a single seat — e.g. Lil' Monsta
// is a token passed between minions; no player IS the Lil' Monsta.
const NO_SEAT_ASSIGNMENT = new Set(['lilmonsta']);

// Labels for the auto-generated reminder placed on a seat when it's assigned a hidden role.
// These appear in the side-slot reminder rings so the misregistration is visible at a glance.
const HIDDEN_ROLE_REMINDER_LABEL = {
  drunk:      'Is the Drunk',
  marionette: 'Is the Marionette',
  lunatic:    'Is the Lunatic',
};

// Labels to STRIP from pocket-grimoire's per-character reminders before augmenting.
// Useful when the upstream label is a placeholder (e.g. Xaan's 'X' which should be a
// concrete night number for the way we play). Keyed by charId → list of exact labels.
const REMINDER_REMOVES = {
  xaan: ['X'],  // replaced via REMINDER_AUGMENTS below with 'Night 4'
};

// Extra reminder labels layered on top of pocket-grimoire's per-character `reminders` array.
// pocket-grimoire only ships the canonical official tokens; STs often want a few extras
// for tracking once-per-game uses and chosen targets. Anything missing here can still be
// added via the "Custom reminder" picker.
const REMINDER_AUGMENTS = {
  // Trouble Brewing
  fortuneteller: ['Chose 1', 'Chose 2'],
  ravenkeeper:   ['Used'],
  slayer:        ['Used'],
  virgin:        ['Used'],
  mutant:        ['Mad'],
  // Bad Moon Rising
  exorcist:      ['Used', 'Chosen'],
  gambler:       ['Chosen'],
  innkeeper:     ['Protected'],
  sailor:        ['Drunk'],
  professor:     ['Used'],
  pacifist:      ['Used'],
  chambermaid:   ['Chose 1', 'Chose 2'],
  // Sects & Violets
  acrobat:       ['Chosen'],
  artist:        ['Used'],
  // Juggler base data already includes 'Correct' — add 'Used' and 'Wrong' so the
  // final set is Used / Correct / Wrong (1 each), matching official tokens.
  juggler:       ['Used', 'Wrong'],
  philosopher:   ['Used'],
  sage:          ['Used', 'Shown'],
  savant:        ['Used'],
  snakecharmer:  ['Used', 'Chosen'],
  dreamer:       ['Good shown', 'Evil shown'],
  klutz:         ['Chosen'],
  pithag:        ['Chosen'],
  king:          ['Has ability'],
  general:       ['Good', 'Evil', 'Neither'],
  lycanthrope:   ['Chosen'],
  nightwatchman: ['Chosen'],
  wizard:        ['No ability'],
  zealot:        ['No ability'],
  summoner:      ['Chosen'],
  // Xaan's base data ships an 'X' placeholder which we strip via REMINDER_REMOVES
  // above; we replace it with 'Night 4' here (X = the number of outsiders in play).
  xaan:          ['Night 4'],
  // Lil' Monsta has no upstream reminders. The token is passed between minions each
  // night — the current babysitter "is the Demon" — and Lil' Monsta picks a kill target.
  lilmonsta:     ['Is the Demon', 'Dead'],
  // Riot has no upstream reminders; the ability rolls over days 1–3 so the ST needs to
  // track which day they're on. (Day 3 nominees die instantly and good loses.)
  riot:          ['Day 1', 'Day 2', 'Day 3'],
  // Travellers — augments for ones missing useful once-per-X / state tokens.
  beggar:        ['Voted'],            // tracks "received a dead player's vote token"
  butcher:       ['Used'],             // may nominate again after first execution (once/day)
  deviant:       ['Funny'],            // cannot die by exile today
  gangster:      ['Used'],             // once per day kill
  gunslinger:    ['Used'],             // once per day kill
  jiaohuazi:     ['Used'],             // once per day choose ability
  matron:        ['Used'],             // once per day swap
  scapegoat:     ['Dead'],             // executed in place of an aligned player
};

// Characters that can appear in the bag multiple times — static list.
const MULTI_INSTANCE = {
  villageidiot: { min: 1, max: 3, note: 'Village Idiot: 1 to 3 in play. One of the extras is drunk (ST chooses which).' },
};

// Multi-instance lookup that ALSO considers contextual state — currently used so
// that Demons become multi-instance (max 2) when the Lunatic is in the bag, allowing
// the same demon to be picked twice (real + the demon the Lunatic is told they are).
// The optional third arg (playerCount) is used by Legion to derive its max.
function getMultiMeta(charId, bagCharacterIds, playerCount) {
  if (MULTI_INSTANCE[charId]) return MULTI_INSTANCE[charId];
  const c = CHAR_BY_ID[charId];
  if ((bagCharacterIds || []).includes('lunatic') && c?.team === 'demon') {
    return {
      min: 1, max: 2,
      note: 'Lunatic in play: pick 2 demons total (real + what the Lunatic thinks they are). The same demon may be picked twice.',
    };
  }
  // Legion: "Most players are Legion." # of Legion tokens = the normal good count
  // (townsfolk + outsider in the base bag for that player count). No minions in play.
  if (charId === 'legion') {
    const pcBag = playerCount && BAG[playerCount];
    const legionCount = pcBag ? (pcBag[0] + pcBag[1]) : 15;
    return {
      min: 1, max: legionCount,
      note: `Legion: ${pcBag ? legionCount : '?'} players are Legion. No minions in play.`,
    };
  }
  return null;
}

// Compute effective bag target [tf, out, min, dem] given a base bag and the IDs in the bag.
function getEffectiveBag(baseBag, bagIds, godfatherSign = +1, balloonistOutsider = 1, hermitOutsider = -1, xaanOutsiders = 0, lotOutsiders = 0, kazaliOutsiders = 0, atheistOutsiders = 0) {
  if (!baseBag) return null;
  let [tf, out, min, dem] = baseBag;
  const notes = [];
  const seenMulti = new Set();
  for (const id of bagIds) {
    const d = SETUP_DELTAS[id];
    if (d) {
      let add = { ...d };
      if (id === 'godfather') {
        // Sign-flippable while keeping total = player count.
        add = {
          townsfolk: -godfatherSign,
          outsider:  +godfatherSign,
          note: `Godfather: ${godfatherSign > 0 ? '+' : '−'}1 outsider, ${godfatherSign > 0 ? '−' : '+'}1 townsfolk (ST choice).`,
        };
      }
      if (id === 'balloonist') {
        // ST chooses +0 or +1 outsider; +1 is the default. +0 means no swap at all.
        const n = balloonistOutsider === 0 ? 0 : 1;
        add = {
          townsfolk: -n,
          outsider:  +n,
          note: `Balloonist: +${n} outsider (ST choice — toggle on the bag page).`,
        };
      }
      if (id === 'hermit') {
        // ST chooses −0 or −1 outsider; −1 is the default. −0 means no swap at all.
        const n = hermitOutsider === 0 ? 0 : -1;
        add = {
          townsfolk: -n,    // n is 0 or -1 → townsfolk gets 0 or +1
          outsider:  +n,    // outsider gets 0 or -1
          note: `Hermit: ${n === 0 ? '−0' : '−1'} outsider (ST choice — toggle on the bag page).`,
        };
      }
      let tfAdd  = add.townsfolk || 0;
      let outAdd = add.outsider  || 0;
      const minAdd = add.minion  || 0;
      const demAdd = add.demon   || 0;
      // Guard against negative outsider counts: if a modifier asks to remove
      // more outsiders than we actually have (e.g. Vigormortis/Hermit on a script
      // whose base bag already has 0 outsiders), cap the removal at what's
      // available and trim the paired townsfolk increment by the same amount so
      // total bag size stays equal to the player count.
      if (outAdd < 0 && out + outAdd < 0) {
        const unrealizable = -(out + outAdd); // portion we couldn't subtract
        outAdd += unrealizable;               // shrink the subtraction
        tfAdd  -= unrealizable;               // shrink the paired addition
        notes.push(`${CHAR_BY_ID[id]?.name || id}: outsider already 0 — skipping the −outsider/+townsfolk swap (nothing to remove).`);
      }
      tf  += tfAdd;
      out += outAdd;
      min += minAdd;
      dem += demAdd;
      if (add.note) notes.push(add.note);
    }
    // Multi-instance note, once per character (uses contextual lookup so the
    // Lunatic-makes-demons-multi note fires when applicable).
    const m = getMultiMeta(id, bagIds, baseBag.reduce((a, b) => a + b, 0));
    if (m && !seenMulti.has(id)) {
      seenMulti.add(id);
      if (m.note) notes.push(m.note);
    }
  }
  // Lord of Typhon post-pass: setup is [+1 Minion, ST-chosen Outsider count, evil players
  // sit in a line]. Minions are placed manually by the ST (not drawn from the bag) so all
  // evil sit together. The physical bag is padded with extra townsfolk (= number of minions
  // in play) so every player still draws a token. The SELECTION target reflects this — TF
  // bumps up by the minion count. Run BEFORE Xaan so Xaan can still tweak afterward if combined.
  if (bagIds.includes('lordoftyphon')) {
    const playerCount = baseBag.reduce((a, b) => a + b, 0);
    const baseMin = baseBag[2];
    out = Math.max(0, lotOutsiders | 0);
    min = baseMin + 1;                  // LOT's +1 Minion
    dem = 1;                            // just LOT (no other demon)
    tf  = Math.max(0, playerCount - out - 1); // padded so physical bag = playerCount when minions are held out
    notes.push(`Lord of Typhon: ${out} outsider${out === 1 ? '' : 's'} (ST choice), ${min} minion${min === 1 ? '' : 's'} placed by the ST after the deal. TF count is bumped by ${min} so the physical bag fills every seat.`);
  }
  // Kazali post-pass: setup is "[You choose which players are which Minions. -? to +? Outsiders]".
  // The Kazali chooses which players become Minions during the game, so no minions go in
  // the bag at setup — those slots are filled with extra Townsfolk so the bag still fills
  // every seat. ST sets outsider count via the toggle (0-4).
  if (bagIds.includes('kazali')) {
    const playerCount = baseBag.reduce((a, b) => a + b, 0);
    out = Math.max(0, kazaliOutsiders | 0);
    min = 0;                             // Kazali picks minions later
    dem = 1;                             // just Kazali
    tf  = Math.max(0, playerCount - out - 1);
    notes.push(`Kazali: ${out} outsider${out === 1 ? '' : 's'} (ST choice). No minions in the bag — Kazali picks which Townsfolk become Minions during the game. TF target is bumped so the bag fills every seat.`);
  }
  // Legion post-pass: "Most players are Legion." All good slots become Legion tokens;
  // the remainder of the player count is TF + outsiders (outsider count stays at base).
  // No minions in play.
  if (bagIds.includes('legion')) {
    const playerCount = baseBag.reduce((a, b) => a + b, 0);
    const legionCount = baseBag[0] + baseBag[1];   // good count for this player count
    out = baseBag[1];                              // outsider count unchanged from base
    min = 0;                                       // no minions
    dem = legionCount;                             // every Legion token sits in the demon row
    tf  = Math.max(0, playerCount - out - legionCount);
    notes.push(`Legion: ${legionCount} player${legionCount === 1 ? '' : 's'} are Legion (the good count for ${playerCount} players). ${out} outsider${out === 1 ? '' : 's'} unchanged. No minions in play.`);
  }
  // Atheist post-pass: "[No evil characters]". No minions or demons in the bag —
  // the ST plays the evil side by breaking the rules. ST picks 0-4 outsiders;
  // townsfolk fills the rest of the player count.
  if (bagIds.includes('atheist')) {
    const playerCount = baseBag.reduce((a, b) => a + b, 0);
    out = Math.max(0, atheistOutsiders | 0);
    min = 0;
    dem = 0;
    tf  = Math.max(0, playerCount - out);
    notes.push(`Atheist: ${out} outsider${out === 1 ? '' : 's'} (ST choice). No minions or demons — the ST breaks the rules and decides if evil wins.`);
  }
  // Xaan post-pass: setup ability "[X Outsiders]" FORCES the outsider count to X
  // (not a delta). Run after all other modifiers so Xaan wins regardless of
  // Balloonist/Hermit/Godfather/Baron/etc. Townsfolk absorbs the difference so the
  // total bag size still equals the player count. Clamped at outsider >= 0.
  if (bagIds.includes('xaan')) {
    const target = Math.max(0, xaanOutsiders | 0);
    const delta = target - out;            // positive: +outsiders/-townsfolk
    tf -= delta;
    out = target;
    if (delta !== 0) {
      notes.push(`Xaan: forcing ${target} outsider${target === 1 ? '' : 's'} (X = ${target}) — ${delta > 0 ? `+${delta}` : `${delta}`} outsider / ${delta > 0 ? `−${delta}` : `+${-delta}`} townsfolk swap.`);
    } else {
      notes.push(`Xaan: X = ${target} outsider${target === 1 ? '' : 's'} (already matches base bag).`);
    }
  }
  return { bag: [tf, out, min, dem], notes };
}

// Group character IDs by team
function groupByTeam(ids) {
  const g = Object.fromEntries(TEAM_ORDER.map(t => [t, []]));
  for (const id of ids) {
    const c = CHAR_BY_ID[id];
    if (!c) continue;
    if (!g[c.team]) g[c.team] = [];
    g[c.team].push(c);
  }
  return g;
}

// Natural good/evil alignment for a character, derived from its team.
// Travellers and Fabled vary — default Good and the ST can flip via the alignment toggle.
function naturalAlignment(charId) {
  const c = CHAR_BY_ID[charId];
  if (!c) return 'good';
  return (c.team === 'minion' || c.team === 'demon') ? 'evil' : 'good';
}

// Return a local path to the character icon (WebP) bundled in data/icons/.
function iconUrl(charId) {
  const c = CHAR_BY_ID[charId];
  if (!c) return null;
  return `data/icons/${c.team}/${charId}.webp`;
}

// Find jinxes that apply to a set of character IDs
function getActiveJinxes(charIds) {
  const set = new Set(charIds);
  const out = [];
  for (const j of JINXES) {
    if (!set.has(j.id)) continue;
    for (const pair of (j.jinx || [])) {
      if (set.has(pair.id)) {
        out.push({ a: j.id, b: pair.id, reason: pair.reason });
      }
    }
  }
  return out;
}

// Parse a script JSON (official format from the script tool). Returns { name, author, ids, customCharacters }
function parseScriptJson(jsonText) {
  const data = JSON.parse(jsonText);
  if (!Array.isArray(data)) throw new Error('Expected a JSON array');
  let name = '', author = '';
  const ids = [];
  const customs = [];
  for (const entry of data) {
    if (typeof entry === 'string') {
      ids.push(entry.replace(/_/g,'').toLowerCase());
    } else if (entry && typeof entry === 'object') {
      if (entry.id === '_meta') {
        name = entry.name || '';
        author = entry.author || '';
      } else if (entry.id) {
        const id = entry.id.replace(/_/g,'').toLowerCase();
        if (CHAR_BY_ID[id]) {
          ids.push(id);
        } else {
          // Custom homebrew character — keep its inline definition
          customs.push({ ...entry, id });
          ids.push(id);
        }
      }
    }
  }
  return { name, author, ids, customs };
}

function buildScriptJson(state) {
  const meta = { id: '_meta', name: state.scriptName || 'Untitled', author: state.scriptAuthor || '' };
  return JSON.stringify([meta, ...state.characterIds], null, 2);
}

// ---------------- Top-level App ----------------
// A blank "placeholder" seat — the role fields are null and the rest is reset.
// Used so seats exist (and players can claim them + enter names) BEFORE the ST
// has actually generated roles. When generateRoles runs, each seat's playerName
// + claims are carried over but perceivedRoleId / actualRoleId get filled in.
function placeholderSeat(seatNum) {
  return {
    seatNum,
    perceivedRoleId: null,
    actualRoleId: null,
    isDead: false,
    reminders: [],
    playerName: '',
    claims: [],
    roleDealt: false,
    playerStatus: null,
  };
}
function makeEmptySeats(n) {
  return Array.from({ length: Math.max(0, n | 0) }, (_, i) => placeholderSeat(i + 1));
}
// Grow or shrink a seats array to a target length, preserving existing per-seat
// data (playerName + claims especially) for the kept seats. Dropped seats lose
// their claim — those players will see SeatPicker again next time they connect.
// Firebase Realtime Database silently drops nulls from arrays — so saving
// [null, null, null] disappears entirely, and ['mayor', null, null] round-trips
// as just ['mayor']. That breaks our fixed-3-slot bluff UIs. Normalize on read.
// Accepts arrays, sparse arrays, the {0:.., 1:.., 2:..} object form that Firebase
// sometimes returns, or null/undefined. Always returns a [a, b, c] of length 3.
function padBluffs(b) {
  if (b == null) return [null, null, null];
  if (Array.isArray(b)) return [b[0] || null, b[1] || null, b[2] || null];
  if (typeof b === 'object') return [b[0] || b['0'] || null, b[1] || b['1'] || null, b[2] || b['2'] || null];
  return [null, null, null];
}

// Apply padBluffs across every place bluffs are stored in a grimoire snapshot.
// Called once at read time so downstream components can assume length-3 arrays.
function normalizeGrimoireBluffs(grim) {
  if (!grim) return grim;
  const fixed = {
    ...grim,
    demonBluffs: padBluffs(grim.demonBluffs),
    lunaticBluffs: padBluffs(grim.lunaticBluffs),
  };
  if (grim.minionBluffs && typeof grim.minionBluffs === 'object') {
    const m = {};
    for (const k in grim.minionBluffs) m[k] = padBluffs(grim.minionBluffs[k]);
    fixed.minionBluffs = m;
  }
  if (Array.isArray(grim.days)) {
    fixed.days = grim.days.map(d => d ? ({ ...d, demonBluffs: padBluffs(d.demonBluffs) }) : d);
  }
  return fixed;
}

function resizeSeats(prev, target) {
  const list = prev || [];
  const t = Math.max(0, target | 0);
  if (list.length === t) return list;
  if (list.length > t) return list.slice(0, t);
  const extras = [];
  for (let i = list.length; i < t; i++) extras.push(placeholderSeat(i + 1));
  return [...list, ...extras];
}

const DEFAULT_STATE = {
  scriptName: 'Trouble Brewing',
  scriptAuthor: '',
  sourceEdition: 'tb',
  characterIds: charactersForEdition('tb'),
  playerCount: 8,
  page: 'script',          // 'script' | 'bag' | 'grimoire'
  bagCharacterIds: [],     // characters chosen for tonight's bag
  godfatherSign: +1,       // +1 or -1 outsider when Godfather is in the bag
  balloonistOutsider: 1,   // 0 or 1 outsider when Balloonist is in the bag
  hermitOutsider: -1,      // 0 or -1 outsider when Hermit is in the bag
  xaanOutsiders: 0,        // X — total outsider count forced by Xaan's [X Outsiders]
  lotOutsiders: 0,         // 0-4 — outsider count when Lord of Typhon is in the bag
  kazaliOutsiders: 0,      // 0-4 — outsider count when Kazali is in the bag
  atheistOutsiders: 0,     // 0-4 — outsider count when Atheist is in the bag
  features: {              // optional ST features toggled from the bag-setup panel
    automation: false,     // walk the night order interactively; prompt player phones for choices
  },
  grimoireView: 'circular',// 'circular' | 'list'
  grimoire: {
    generated: false,
    // Start with placeholder seats matching the default player count so players
    // can claim seats + enter names before the storyteller has run "Generate roles".
    seats: makeEmptySeats(8),

    pendingAssignments: [],// e.g. ['drunk','marionette'] — ST manually picks seats
    demonBluffs: [null, null, null], // 3 out-of-play good roles shown to the Demon on N1
    rolesDealt: false,     // ST has pushed roles to all players' phones (legacy; per-seat roleDealt is canonical)
    townSquareNotes: { above: '', below: '' }, // freeform notes shown in the centerpiece
    gameStarted: false,    // Begin Game has been clicked
    days: [],              // snapshots of each finished day (frozen for endgame summary)
    viewingDayIndex: 0,    // 0..days.length-1 = past snapshots; days.length = current/live
    nominationsByDay: {},  // { dayIdx: [{ id, nominatorSeat, nomineeSeat, votes, minionNominated, demonNominated }] }
    nominationsViewingDayIndex: 0, // independent day selector on the Nominations tab
    grimoireShownToSeat: null, // seatNum that should see the full grimoire snapshot (Spy)
    lunaticBluffs: [null, null, null], // 3 bluffs for the Lunatic; any script role allowed
    minionBluffs: {},                  // keyed by seatNum: { [seatNum]: [charId, charId, charId] } — only used when Snitch is in play
    travellers: [],                    // [{ travellerNum, insertAfterSeat, charId, alignment, playerName, claims, roleDealt, playerStatus, isDead, reminders }]
    travellerSeq: 0,                   // monotonic counter so traveller numbers (T#1, T#2) never reuse after a removal
    setupRemindersDone: {},            // { '<reminder-id>': true } — ST manually marked done
    setupRemindersSkipped: false,      // ST explicitly skipped any remaining setup reminders
  },
};

function App() {
  // The room code drives which Firebase node we read/write. Picked from the URL
  // first (so shared/bookmarked links land in the right room), else the most
  // recent room this browser opened, else a fresh new code.
  const [roomCode, setRoomCodeState] = useState(() => {
    const fromUrl = getRoomFromUrl();
    if (fromUrl) return fromUrl.toUpperCase();
    const fromStorage = getLastRoom();
    if (fromStorage) return fromStorage;
    const fresh = generateRoomCode();
    return fresh;
  });
  // Spectator mode: ?view=spectator on the URL. Read-only grimoire, no Firebase
  // writes, no PIN required (the ST shares this URL with bystanders).
  const isSpectator = useMemo(() => {
    try { return new URLSearchParams(window.location.search).get('view') === 'spectator'; } catch { return false; }
  }, []);
  // Keep URL + localStorage in sync whenever roomCode changes. Spectator URLs
  // also keep their ?view=spectator param around.
  useEffect(() => {
    if (!roomCode) return;
    setRoomInUrl(roomCode);
    // Don't pollute "last room" with a room the user is just spectating —
    // otherwise next time they open storyteller.html, they'd land in spectator
    // mode on a room they don't own.
    if (!isSpectator) setLastRoom(roomCode);
  }, [roomCode, isSpectator]);

  // State starts as DEFAULT_STATE; the first Firebase snapshot will replace it
  // with the cloud copy. `loaded` flips true once we've heard back from the
  // server (so we don't show a blank grimoire while waiting).
  const [state, setState] = useState(DEFAULT_STATE);
  const [loaded, setLoaded] = useState(false);
  const [isOnline, setIsOnline] = useState(true);
  // PIN auth — null = haven't heard from Firebase yet; '' = no pin set; <string> = pin set.
  const [knownPin, setKnownPin] = useState(null);
  const [authChecked, setAuthChecked] = useState(false);
  const [authed, setAuthed] = useState(false);
  // String version of the last state we wrote — used to short-circuit echo
  // writes when Firebase fires .on('value') with our own update.
  const lastSavedRef = useRef('');
  const saveTimerRef = useRef(null);

  // Subscribe to the room's state node. Disposed + re-subscribed when roomCode changes.
  useEffect(() => {
    const ref = roomRef(roomCode);
    if (!ref) {
      // Firebase didn't load — fall back to local-only behavior so the page still works.
      setLoaded(true);
      return;
    }
    const handleValue = (snap) => {
      const value = snap.val();
      if (value) {
        // Deep-merge with DEFAULT_STATE so any new fields we've added since the
        // room was created still get reasonable defaults. Then normalize the
        // bluff arrays — Firebase drops trailing nulls, which would otherwise
        // make our fixed-length bluff UIs lose slots.
        const merged = {
          ...DEFAULT_STATE,
          ...value,
          grimoire: normalizeGrimoireBluffs({ ...DEFAULT_STATE.grimoire, ...(value.grimoire || {}) }),
        };
        lastSavedRef.current = JSON.stringify(merged);
        setState(merged);
      } else {
        // Fresh room with no data yet — seed Firebase with DEFAULT_STATE.
        const seed = DEFAULT_STATE;
        lastSavedRef.current = JSON.stringify(seed);
        setState(seed);
        ref.set(seed).catch(e => console.error('seed write failed:', e));
      }
      setLoaded(true);
    };
    ref.on('value', handleValue);
    // Connection indicator
    const connRef = window.__BOTC_DB__.ref('.info/connected');
    const connHandler = (snap) => setIsOnline(!!snap.val());
    connRef.on('value', connHandler);
    return () => {
      ref.off('value', handleValue);
      connRef.off('value', connHandler);
    };
  }, [roomCode]);

  // Subscribe to the room's auth node so we know whether a PIN has been set
  // and what it is (so we can validate the one stored in localStorage).
  useEffect(() => {
    if (!roomCode || !window.__BOTC_DB__) {
      setAuthChecked(true);
      return;
    }
    const authRef = window.__BOTC_DB__.ref('rooms/' + roomCode + '/auth');
    const handler = (snap) => {
      const v = snap.val();
      setKnownPin(v && typeof v.pin === 'string' ? v.pin : '');
      setAuthChecked(true);
    };
    authRef.on('value', handler);
    return () => authRef.off('value', handler);
  }, [roomCode]);

  // When the auth state lands, decide whether this client is authorized.
  // Spectators bypass auth (they get a read-only view). Otherwise we look for
  // a PIN previously stored on this device for this room.
  useEffect(() => {
    if (!authChecked) return;
    if (isSpectator) { setAuthed(true); return; }
    if (knownPin === '' || knownPin === null) {
      // No PIN set yet on this room — first-time creator, will see PinSetup.
      setAuthed(false);
      return;
    }
    let stored = null;
    try { stored = localStorage.getItem('botc-pin-' + roomCode); } catch {}
    setAuthed(stored === knownPin);
  }, [authChecked, knownPin, isSpectator, roomCode]);

  // Debounced write to Firebase. Skips if state hasn't actually changed since
  // our last write (prevents echoing the value we just received from the server
  // back as a write). ALSO skipped for spectators (they can't change anything)
  // and while we don't have auth yet (so a PIN prompt doesn't clobber state).
  useEffect(() => {
    if (!loaded) return;
    if (isSpectator) return;
    if (!authed) return;
    const ref = roomRef(roomCode);
    if (!ref) return;
    const json = JSON.stringify(state);
    if (json === lastSavedRef.current) return; // no real change
    clearTimeout(saveTimerRef.current);
    saveTimerRef.current = setTimeout(() => {
      lastSavedRef.current = json;
      ref.set(state).catch(e => console.error('write failed:', e));
    }, 200);
    return () => clearTimeout(saveTimerRef.current);
  }, [state, roomCode, loaded, isSpectator, authed]);

  // Allow other parts of the UI to switch rooms (the new-game button etc).
  const setRoomCode = (next) => {
    if (!next) return;
    const code = String(next).toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 8);
    if (!code) return;
    setLoaded(false);
    lastSavedRef.current = '';
    setRoomCodeState(code);
  };

  // Mark a one-time setup reminder as done (e.g. ST placed the Red Herring on a
  // Good player). The banner watches state.grimoire.setupRemindersDone for the
  // item's id and also derives "auto-done" from grimoire reminders being present.
  const markSetupReminder = (id, done = true) => {
    const cur = { ...(state.grimoire.setupRemindersDone || {}) };
    if (done) cur[id] = true; else delete cur[id];
    update({ grimoire: { ...state.grimoire, setupRemindersDone: cur } });
  };
  const setSetupRemindersSkipped = (v) => {
    update({ grimoire: { ...state.grimoire, setupRemindersSkipped: !!v } });
  };

  // Transient UI state — not persisted.
  const [swapSourceSeat, setSwapSourceSeat] = useState(null);
  const [assigningRoleId, setAssigningRoleId] = useState(null);
  // For local players: ST hands their phone to the player to show the role.
  // This tracks which seat's role we're currently showing in the overlay.
  const [showRoleForSeat, setShowRoleForSeat] = useState(null);
  // Clear pickers if the grimoire changes underneath us
  useEffect(() => {
    setSwapSourceSeat(null);
    setAssigningRoleId(null);
    setShowRoleForSeat(null);
  }, [state.grimoire.generated, state.page]);

  // `update` accepts either a patch object OR a function (s => patch). The
  // function form is required when chaining multiple updates in the same
  // synchronous flow because React batches setState calls and a patch built
  // from closure-captured state will overwrite earlier updates' changes.
  const update = (patchOrFn) => setState(s => ({
    ...s,
    ...(typeof patchOrFn === 'function' ? patchOrFn(s) : patchOrFn),
  }));

  // Toggle an optional ST feature (e.g. automation). Stored under state.features
  // so it round-trips through Firebase and survives reloads.
  const setFeature = (key, value) => {
    update({ features: { ...(state.features || {}), [key]: value } });
  };

  const loadEdition = (id) => {
    const ed = DEFAULT_SCRIPTS[id];
    if (!ed) return;
    update({
      scriptName: ed.name,
      scriptAuthor: '',
      sourceEdition: id,
      characterIds: charactersForEdition(id),
      bagCharacterIds: [],
    });
  };

  const blankScript = () => update({
    scriptName: 'New Custom Script', scriptAuthor: '',
    sourceEdition: 'custom', characterIds: [],
    bagCharacterIds: [],
  });

  const importScript = (text) => {
    try {
      const parsed = parseScriptJson(text);
      const knownIds = parsed.ids.filter(id => CHAR_BY_ID[id]);
      update({
        scriptName: parsed.name || 'Imported Script',
        scriptAuthor: parsed.author || '',
        sourceEdition: 'custom',
        characterIds: knownIds,
        bagCharacterIds: [],
      });
      const unknown = parsed.ids.length - knownIds.length;
      alert(`Imported ${knownIds.length} characters` +
            (unknown ? `\n(${unknown} custom/unknown characters skipped — homebrew support coming later)` : ''));
    } catch (e) {
      alert('Could not parse script JSON:\n' + e.message);
    }
  };

  const addCharacter = (id) => {
    if (state.characterIds.includes(id)) return;
    const next = [...state.characterIds, id];
    // Auto-add forced partner (e.g. Choirboy → King, Huntsman → Damsel) if absent.
    const partner = FORCED_PAIRS[id];
    if (partner && CHAR_BY_ID[partner] && !next.includes(partner)) {
      next.push(partner);
    }
    update({ characterIds: next });
  };
  const removeCharacter = (id) => {
    update({
      characterIds: state.characterIds.filter(x => x !== id),
      bagCharacterIds: state.bagCharacterIds.filter(x => x !== id),
    });
  };

  // ---- bag handlers ----
  // Click on a card. For multi-instance characters, this adds one (up to max).
  // For regular characters, this toggles between in and out of the bag.
  const incrementInBag = (id) => {
    const meta = getMultiMeta(id, state.bagCharacterIds, state.playerCount);
    const count = state.bagCharacterIds.filter(x => x === id).length;
    // Helper: when adding `id`, auto-add its forced partner to bag (and to script,
    // if missing) so the required pair stays satisfied.
    const withPartner = (bag) => {
      const partner = FORCED_PAIRS[id];
      if (!partner || !CHAR_BY_ID[partner]) return { bag, characterIds: state.characterIds };
      const ensureBag = bag.includes(partner) ? bag : [...bag, partner];
      const ensureScript = state.characterIds.includes(partner)
        ? state.characterIds
        : [...state.characterIds, partner];
      return { bag: ensureBag, characterIds: ensureScript };
    };
    if (meta) {
      if (count >= meta.max) return;
      const next = withPartner([...state.bagCharacterIds, id]);
      update({ bagCharacterIds: next.bag, characterIds: next.characterIds });
    } else if (count > 0) {
      // Toggling off — don't touch the partner.
      update({ bagCharacterIds: state.bagCharacterIds.filter(x => x !== id) });
    } else {
      const next = withPartner([...state.bagCharacterIds, id]);
      update({ bagCharacterIds: next.bag, characterIds: next.characterIds });
    }
  };
  // Remove one occurrence (used by the − button on multi-instance cards).
  const decrementInBag = (id) => {
    const idx = state.bagCharacterIds.lastIndexOf(id);
    if (idx === -1) return;
    const next = [...state.bagCharacterIds];
    next.splice(idx, 1);
    update({ bagCharacterIds: next });
  };
  const randomizeBagForTeam = (team, target) => {
    // Distinct random picks from the script's characters of this team.
    const pool = state.characterIds.filter(id => CHAR_BY_ID[id]?.team === team);
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    const picked = pool.slice(0, Math.max(0, target));
    const others = state.bagCharacterIds.filter(id => CHAR_BY_ID[id]?.team !== team);
    update({ bagCharacterIds: [...others, ...picked] });
  };
  const clearBagForTeam = (team) => {
    update({
      bagCharacterIds: state.bagCharacterIds.filter(id => CHAR_BY_ID[id]?.team !== team),
    });
  };
  const clearBag = () => update({ bagCharacterIds: [] });
  // Changing player count also resizes the placeholder seats array so the live
  // seat picker on player.html reflects the new count immediately. Existing
  // player names + claims on kept seats are preserved.
  const setPlayerCount = (n) => {
    const seats = resizeSeats(state.grimoire?.seats || [], n);
    update({ playerCount: n, grimoire: { ...state.grimoire, seats } });
  };
  const setGodfatherSign = (sign) => update({ godfatherSign: sign });
  const setBalloonistOutsider = (n) => update({ balloonistOutsider: n });
  const setHermitOutsider = (n) => update({ hermitOutsider: n });
  const setXaanOutsiders = (n) => update({ xaanOutsiders: Math.max(0, n) });
  const setLotOutsiders  = (n) => update({ lotOutsiders: Math.max(0, n) });
  const setKazaliOutsiders = (n) => update({ kazaliOutsiders: Math.max(0, n) });
  const setAtheistOutsiders = (n) => update({ atheistOutsiders: Math.max(0, n) });

  // ---- grimoire handlers ----
  const generateRoles = () => {
    // When Lord of Typhon is in play, all minions are placed by the ST (so all evil
    // sit in a line). They don't go in the physical bag; players draw townsfolk
    // tokens (the TF target has already been bumped to fill the seats), and the ST
    // manually assigns each minion to a seat via the pending-assignment flow.
    const lotInBag = state.bagCharacterIds.includes('lordoftyphon');
    const isLotHeldMinion = (id) => lotInBag && CHAR_BY_ID[id]?.team === 'minion';

    // Shuffle physical bag and deal to numbered seats
    const physical = state.bagCharacterIds.filter(id =>
      !NOT_IN_PHYSICAL_BAG.has(id) && !isLotHeldMinion(id));
    const shuffled = [...physical];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    // Re-shuffle should NOT kick existing players out of their seats. Carry over
    // playerName and claims from the previous seat at the same seat number; everything
    // else (role, deaths, reminders, deal status) is reset. New seats added beyond
    // the old count get a fresh blank player slot. Old seats beyond the new count are
    // dropped — the ST should release seats explicitly if they want a different
    // player to claim them.
    const prevSeats = state.grimoire?.seats || [];
    const prevBySeat = Object.fromEntries(prevSeats.map(s => [s.seatNum, s]));
    const seats = shuffled.map((tokenId, i) => {
      const seatNum = i + 1;
      const prev = prevBySeat[seatNum] || {};
      return {
        seatNum,
        perceivedRoleId: tokenId,
        actualRoleId: tokenId,
        isDead: false,
        reminders: [],
        playerName: prev.playerName || '',
        claims: prev.claims || [], // [{ clientId, timestamp }] — for duplicate detection
        roleDealt: false,          // ST has pushed the role to this player's phone
        playerStatus: null,        // null | 'pending' | 'asking' | 'accepted'
      };
    });
    // Drunk/Marionette/Lunatic aren't randomized — the ST picks seats manually.
    // Lil' Monsta is in NOT_IN_PHYSICAL_BAG but doesn't get assigned to any seat
    // (it's a token passed between minions), so it's excluded here.
    // Plus, when LOT is in play, every minion becomes pending so the ST can build
    // the evil line.
    const pending = state.bagCharacterIds.filter(id =>
      (NOT_IN_PHYSICAL_BAG.has(id) && !NO_SEAT_ASSIGNMENT.has(id))
      || isLotHeldMinion(id));
    // Carry travellers across the re-shuffle. They keep their seat position, role,
    // alignment, player name, claims, reminders, deal status — re-shuffle only
    // touches the regular bag, not the travellers who were added mid-game.
    const prevTravellers = state.grimoire?.travellers || [];
    const prevTravellerSeq = state.grimoire?.travellerSeq || 0;
    update({
      grimoire: { generated: true, seats, pendingAssignments: pending, demonBluffs: [null, null, null],
                  rolesDealt: false, townSquareNotes: { above: '', below: '' },
                  gameStarted: false, days: [], viewingDayIndex: 0,
                  nominationsByDay: {}, nominationsViewingDayIndex: 0,
                  grimoireShownToSeat: null, lunaticBluffs: [null, null, null],
                  minionBluffs: {},          // tied to specific seats — wipe on reshuffle
                  kazaliPicks: [],           // ditto
                  travellers: prevTravellers,
                  travellerSeq: prevTravellerSeq },
      page: 'grimoire',
    });
  };

  // Manually assign a pending role to a specific seat.
  //   • Hidden-role style (Drunk / Marionette / Lunatic): the player keeps their PERCEIVED
  //     role and an "Is the X" marker is dropped onto the seat. They're misregistered.
  //   • Full-swap style (Lord of Typhon's minion placements, or any other future case
  //     where HIDDEN_ROLE_REMINDER_LABEL has no entry): both perceivedRoleId and
  //     actualRoleId become the new role. The seat's roleDealt is reset so the ST
  //     re-pushes the new role to the player's phone.
  const assignPendingRole = (seatNum, charId) => {
    const c = CHAR_BY_ID[charId];
    if (!c) return;
    const isHiddenStyle = !!HIDDEN_ROLE_REMINDER_LABEL[charId];
    const seats = state.grimoire.seats.map(s => {
      if (s.seatNum !== seatNum) return s;
      if (isHiddenStyle) {
        const label = HIDDEN_ROLE_REMINDER_LABEL[charId];
        const existing = s.reminders || [];
        const alreadyMarked = existing.some(r => r.hiddenRoleMarker && r.charId === charId);
        const reminders = alreadyMarked
          ? existing
          : [...existing, { charId, label, hiddenRoleMarker: true }];
        return { ...s, actualRoleId: charId, reminders };
      }
      // Full swap — the player sees the new role next time it's dealt.
      return { ...s, perceivedRoleId: charId, actualRoleId: charId,
               roleDealt: false, playerStatus: null };
    });
    const pendingAssignments = state.grimoire.pendingAssignments.filter(id => id !== charId);
    update({ grimoire: { ...state.grimoire, seats, pendingAssignments } });
  };

  // Undo a hidden-role assignment for a seat (puts the hidden role back in the pending list).
  // Also strips the auto-generated marker reminder for that role.
  const unassignPendingRole = (seatNum) => {
    const seat = state.grimoire.seats.find(s => s.seatNum === seatNum);
    if (!seat || seat.actualRoleId === seat.perceivedRoleId) return;
    const hiddenId = seat.actualRoleId;
    const seats = state.grimoire.seats.map(s => {
      if (s.seatNum !== seatNum) return s;
      return {
        ...s,
        actualRoleId: s.perceivedRoleId,
        reminders: (s.reminders || []).filter(r => !(r.hiddenRoleMarker && r.charId === hiddenId)),
      };
    });
    update({
      grimoire: {
        ...state.grimoire,
        seats,
        pendingAssignments: [...state.grimoire.pendingAssignments, hiddenId],
      },
    });
  };

  const toggleSeatDead = (seatNum) => {
    const seats = state.grimoire.seats.map(s =>
      s.seatNum === seatNum ? { ...s, isDead: !s.isDead } : s
    );
    update({ grimoire: { ...state.grimoire, seats } });
  };

  // Set the player's name on a seat. Storyteller-editable for testing; players
  // will set it from their phone once we wire up the player page.
  const setPlayerName = (seatNum, name) => {
    const seats = state.grimoire.seats.map(s =>
      s.seatNum === seatNum ? { ...s, playerName: name } : s
    );
    update({ grimoire: { ...state.grimoire, seats } });
  };

  // Release a seat — clears player name and claims (useful if someone picks the wrong seat).
  const releaseSeat = (seatNum) => {
    const seats = state.grimoire.seats.map(s =>
      s.seatNum === seatNum ? { ...s, playerName: '', claims: [], isLocal: false } : s
    );
    update({ grimoire: { ...state.grimoire, seats } });
  };

  // Promote the Scarlet Woman to the dead Demon's role. Triggered from the
  // SW-promotion step in the night phase. Swaps the SW's role, resets dealing
  // so the player phone re-shows role reveal (with demon bluffs etc.), and
  // places a permanent "Was the Scarlet Woman" reminder.
  const promoteScarletWoman = (swSeatNum, demonRoleId) => {
    if (!swSeatNum || !demonRoleId) return;
    const swSeat = state.grimoire.seats.find(s => s.seatNum === swSeatNum);
    const demonName = CHAR_BY_ID[demonRoleId]?.name || demonRoleId;
    const seats = state.grimoire.seats.map(s => {
      if (s.seatNum !== swSeatNum) return s;
      return {
        ...s,
        previousRoleId: 'scarletwoman',
        changedBy:      'scarletwoman',
        perceivedRoleId: demonRoleId,
        actualRoleId:    demonRoleId,
        // Per official rules, the promoted SW does NOT get demon bluffs —
        // bluffs are a first-night thing for the original demon only. The
        // player's RoleReveal honors this flag and omits the bluffs section.
        skipDemonBluffs: true,
        // Re-deal: player phone re-renders RoleReveal with the new role
        // (no bluffs — see skipDemonBluffs above).
        roleDealt:    true,
        playerStatus: 'pending',
        reminders: [
          ...(s.reminders || []),
          // scarletWomanOriginal flag → isReminderPermanent keeps this across nights.
          { charId: 'scarletwoman', label: 'Was the Scarlet Woman', scarletWomanOriginal: true },
        ],
      };
    });
    update({ grimoire: { ...state.grimoire, seats } });
    // For a local SW, auto-open the role overlay so the ST can hand the phone
    // to the player without remembering to click Show role.
    if (swSeat && swSeat.isLocal) {
      setShowRoleForSeat(swSeatNum);
    }
  };

  // Toggle a seat between "remote" (player connects from a phone) and "local"
  // (no phone — ST shows the role on their own device). Marking a seat local
  // also clears any existing claims so a dead-phone client doesn't keep showing
  // an empty role-reveal screen.
  const setSeatLocal = (seatNum, isLocal) => {
    const seats = state.grimoire.seats.map(s => {
      if (s.seatNum !== seatNum) return s;
      const patch = { isLocal: !!isLocal };
      if (isLocal) patch.claims = [];   // any old phone claim becomes irrelevant
      return { ...s, ...patch };
    });
    update({ grimoire: { ...state.grimoire, seats } });
  };

  // Flip alignment between good and evil. Natural alignment derives from the perceived role's team.
  const toggleAlignment = (seatNum) => {
    const seats = state.grimoire.seats.map(s => {
      if (s.seatNum !== seatNum) return s;
      const current = s.alignment || naturalAlignment(s.perceivedRoleId);
      return { ...s, alignment: current === 'good' ? 'evil' : 'good' };
    });
    update({ grimoire: { ...state.grimoire, seats } });
  };

  // Add a reminder token to a seat. If hiddenRoleMarker is true (Drunk/Marionette
  // marker selected from the picker), route to the assignment flow instead — that
  // sets actualRoleId, clears pending, and adds the marker reminder atomically.
  const addReminder = (seatNum, charId, label, hiddenRoleMarker = false) => {
    if (hiddenRoleMarker) {
      assignPendingRole(seatNum, charId);
      return;
    }
    let queueDeath = false;
    update(s => {
      const seats = (s.grimoire.seats || []).map(seat =>
        seat.seatNum === seatNum
          ? { ...seat, reminders: [...(seat.reminders || []), { charId, label }] }
          : seat
      );
      if (label === 'Dead') {
        const target = seats.find(seat => seat.seatNum === seatNum);
        if (target && !target.isDead) queueDeath = true;
      }
      return { grimoire: { ...s.grimoire, seats } };
    });
    // Side effect outside the functional updater so it runs once even if React
    // re-invokes the updater (e.g. StrictMode). queueDeathConfirm only updates
    // a different state variable, so it's safe to call here.
    if (queueDeath) queueDeathConfirm(seatNum, charId);
  };

  // ---------------- Night-automation handlers ----------------
  //
  // Prompts live at state.grimoire.nightPrompts[seatNum]. ST writes the prompt
  // metadata; the player's phone writes status='submitted'/'question' + targets
  // back. An effect on the ST side watches for 'submitted' and auto-places the
  // reminder, transitions the prompt to 'done', and pushes a toast.
  const startNightPrompt = (seatNum, step, infoPayload) => {
    if (!seatNum) return;
    const defForRole = NIGHT_ACTIONS[step.char.id] || {};
    // For canSkip oncePerGame abilities (Courtier, Assassin, Philosopher…),
    // ask the player Use/Skip first instead of going straight to the picker.
    // Info-st prompts (Washerwoman etc.) and prompts that already have an
    // infoPayload (the ST has chosen info to deliver) skip this step.
    const seatNow = (state.grimoire.seats || []).find(s => s.seatNum === seatNum);
    const alreadyUsed = (seatNow?.reminders || []).some(r => r && /no ability/i.test(String(r.label || '')));
    const useDecision = !!defForRole.canSkip && !infoPayload && !alreadyUsed;
    update(s => {
      const np = { ...(s.grimoire.nightPrompts || {}) };
      // sc-reveal-info: stamp the player's NEW role as prompt.roleId so the
      // NightInfoScreen header shows the new role icon/name (no SC reference).
      const effectiveRoleId = step.scRevealRoleId || step.char.id;
      // Cannibal stealth: if the destination seat has any 'cannibal' charId
      // reminder (Was Cannibal / Drunk), stamp the prompt so the player UI
      // hides the role identity regardless of mySeat sync state.
      const destSeat = (s.grimoire.seats || []).find(x => x.seatNum === seatNum);
      const stealthCannibal = !!(destSeat && (destSeat.reminders || []).some(r =>
        r && r.charId === 'cannibal'));
      np[seatNum] = {
        roleId:        effectiveRoleId,
        action:        step.action,
        instruction:   step.instruction || '',
        reminderLabel: step.reminderLabel || '',
        eligible:      defForRole.eligible || 'all',
        roleClaimFilter: defForRole.roleClaimFilter || null,
        scRevealKind:   step.scRevealKind || null,
        cannibalStealth: stealthCannibal,
        status:        useDecision ? 'use-decision' : 'awaiting',
        targets:       null,
        infoPayload:   infoPayload || null,
        startedAt:     Date.now(),
        nightIdx:      (s.grimoire.viewingDayIndex || 0),
      };
      return { grimoire: { ...s.grimoire, nightPrompts: np } };
    });
  };
  const cancelNightPrompt = (seatNum) => {
    if (!seatNum) return;
    const np = { ...(state.grimoire.nightPrompts || {}) };
    delete np[seatNum];
    update({ grimoire: { ...state.grimoire, nightPrompts: np } });
  };
  const markStepDone = (seatNum) => {
    if (!seatNum) return;
    const np = { ...(state.grimoire.nightPrompts || {}) };
    np[seatNum] = { ...(np[seatNum] || {}), status: 'done', doneAt: Date.now() };
    update({ grimoire: { ...state.grimoire, nightPrompts: np } });
  };
  const clearAllNightPrompts = () => {
    update({ grimoire: { ...state.grimoire, nightPrompts: {} } });
  };
  // sendCeremonyInfo — auto-pushes 'team-reveal' info prompts to the relevant
  // players for the Minions wake / Demon wakes ceremonies.
  //   - 'minioninfo': each real Minion sees the other Minions + the Demon.
  //     If a Magician is in play, the Minions see the Magician AS the demon
  //     (per the Magician rule: "Minions think you are the Demon").
  //   - 'demoninfo': the actual Demon sees the Minions + 3 bluffs. If a
  //     Magician is in play, the Demon also sees the Magician among the
  //     Minions. If a Lunatic is in play, they receive the same minion
  //     list + the LUNATIC bluffs (they think they are the Demon).
  // Drunk/poisoned demons / minions still receive normal info — the ST
  // can manually override if a malfunction is appropriate.
  const sendCeremonyInfo = (ceremonyId) => {
    update(s => {
      const g = s.grimoire;
      const np = { ...(g.nightPrompts || {}) };
      const seats = g.seats || [];
      const magician = seats.find(x => x.actualRoleId === 'magician' && !x.isDead);
      const realDemon = seats.find(x => (CHAR_BY_ID[x.actualRoleId] || {}).team === 'demon');
      const realMinions = seats.filter(x => (CHAR_BY_ID[x.actualRoleId] || {}).team === 'minion');
      const seatMini = (sx) => ({ seatNum: sx.seatNum, playerName: sx.playerName || null });
      if (ceremonyId === 'minioninfo') {
        const demonShown = magician || realDemon;
        const demonInfo = demonShown ? seatMini(demonShown) : null;
        const minionList = realMinions.map(seatMini);
        // Damsel-in-play flag: minions learn that a Damsel exists (no seat).
        const damselInPlay = !!seats.find(x => x.actualRoleId === 'damsel');
        for (const m of realMinions) {
          const others = minionList.filter(x => x.seatNum !== m.seatNum);
          np[m.seatNum] = {
            roleId: m.actualRoleId,
            action: 'info-st',
            instruction: 'Minion info — learn your fellow Minions and the Demon.' + (damselInPlay ? ' A Damsel is in play.' : ''),
            reminderLabel: '',
            eligible: 'all',
            status: 'awaiting',
            targets: null,
            infoPayload: {
              type: 'team-reveal',
              viewerRole: 'minion',
              minions: others,
              demon: demonInfo,
              damselInPlay,
            },
            ceremony: 'minioninfo',
            startedAt: Date.now(),
            nightIdx: 0,
          };
        }
      } else if (ceremonyId === 'demoninfo') {
        const minionList = realMinions.map(seatMini);
        const minionsForDemon = magician
          ? [...minionList, seatMini(magician)]
          : minionList;
        const bluffs = (g.demonBluffs || []).filter(Boolean);
        if (realDemon) {
          // If a Lunatic is in play, tell the Demon the Lunatic's seat + name
          // (NEVER the perceived role) so they know there's a Lunatic out
          // there masquerading as a demon. The Demon-info display uses the
          // lunatic icon for this card.
          const lunaticInPlay = (g.seats || []).find(x => x.actualRoleId === 'lunatic');
          const lunaticInfo = lunaticInPlay
            ? { seatNum: lunaticInPlay.seatNum, playerName: lunaticInPlay.playerName || null }
            : null;
          np[realDemon.seatNum] = {
            roleId: realDemon.actualRoleId,
            action: 'info-st',
            instruction: 'You wake. Learn your Minions and 3 bluff roles that are not in play.',
            reminderLabel: '',
            eligible: 'all',
            status: 'awaiting',
            targets: null,
            infoPayload: {
              type: 'team-reveal',
              viewerRole: 'demon',
              viewerRoleId: realDemon.actualRoleId,
              minions: minionsForDemon,
              bluffs,
              lunaticSeat: lunaticInfo,
            },
            ceremony: 'demoninfo',
            startedAt: Date.now(),
            nightIdx: 0,
          };
        }
      }
      return { grimoire: { ...g, nightPrompts: np } };
    });
    // For lunaticinfo we OPEN the ST picker instead of pushing a prompt
    // directly — the ST needs to choose which seats to represent as the
    // Lunatic's "Minions" first. After Confirm, finishLunaticCeremony
    // places the reminders + pushes the prompt.
    if (ceremonyId === 'lunaticinfo') {
      const seats = state.grimoire.seats || [];
      const lunatic = seats.find(x => x.actualRoleId === 'lunatic');
      if (!lunatic) return;
      const realMinions = seats.filter(x => (CHAR_BY_ID[x.actualRoleId] || {}).team === 'minion');
      const magician = seats.find(x => x.actualRoleId === 'magician');
      const targetCount = Math.max(1, realMinions.length + (magician ? 1 : 0));
      setLunaticPickerData({ lunaticSeat: lunatic, targetCount });
    }
  };
  // Lunatic minion picker state — opened by sendCeremonyInfo('lunaticinfo').
  const [lunaticPickerData, setLunaticPickerData] = useState(null);
  const cancelLunaticPicker = () => setLunaticPickerData(null);
  // After ST picks the fake-minion seats, place 'Lunatic: Minion N' reminders
  // on each + push the team-reveal prompt to the Lunatic. The prompt uses
  // viewerRoleId = lunatic.perceivedRoleId so the player sees their fake
  // demon role name (e.g. "You are the Imp") rather than "You are the Lunatic".
  const finishLunaticCeremony = (pickedSeatNums) => {
    const data = lunaticPickerData;
    if (!data) return;
    const lunaticSeatNum = data.lunaticSeat.seatNum;
    update(s => {
      const g = s.grimoire;
      const seats = g.seats || [];
      const lunatic = seats.find(x => x.seatNum === lunaticSeatNum);
      // Strip any prior Lunatic Minion N reminders + place fresh ones on the
      // chosen seats (idempotent if ST re-runs the picker).
      const stripped = seats.map(seat => ({
        ...seat,
        reminders: (seat.reminders || []).filter(r =>
          !(r && r.charId === 'lunatic' && /^minion\s*\d+$/i.test(String(r.label || '')))),
      }));
      const withPicks = stripped.map(seat => {
        const idx = pickedSeatNums.indexOf(seat.seatNum);
        if (idx === -1) return seat;
        return { ...seat, reminders: [...(seat.reminders || []), { charId: 'lunatic', label: 'Minion ' + (idx + 1), fromPrompt: true }] };
      });
      // Build the prompt payload using the picked seats as the "minions".
      const pickedSeatObjs = pickedSeatNums
        .map(n => seats.find(x => x.seatNum === n))
        .filter(Boolean)
        .map(x => ({ seatNum: x.seatNum, playerName: x.playerName || null }));
      const lunaticBluffs = (g.lunaticBluffs || []).filter(Boolean);
      const np = { ...(g.nightPrompts || {}) };
      np[lunaticSeatNum] = {
        roleId: 'lunatic',
        action: 'info-st',
        instruction: 'You wake. Learn your Minions and 3 bluff roles that are not in play.',
        reminderLabel: '',
        eligible: 'all',
        status: 'awaiting',
        targets: null,
        infoPayload: {
          type: 'team-reveal',
          viewerRole: 'demon',
          viewerRoleId: lunatic?.perceivedRoleId || null,
          minions: pickedSeatObjs,
          bluffs: lunaticBluffs,
        },
        ceremony: 'lunaticinfo',
        startedAt: Date.now(),
        nightIdx: 0,
      };
      return { grimoire: { ...g, seats: withPicks, nightPrompts: np } };
    });
    setLunaticPickerData(null);
  };
  // ST responds to a two-step prompt (Fortune Teller, Innkeeper, Gambler, …).
  // Player has already submitted targets — now ST sets the infoPayload. For
  // actions whose player needs to ack info (FT, RK, Chambermaid) we flip to
  // 'awaiting' so the phone shows NightInfoScreen. For actions where the ST's
  // response IS the resolution and the player doesn't see anything new
  // (Innkeeper picks who's drunk, Gambler verdict) we jump straight to
  // 'submitted' so the effect runs immediately.
  const NO_PLAYER_ACK_ACTIONS = new Set(['target2+st-pick', 'target1+st-pick', 'target1+guess']);
  const respondToNightPrompt = (seatNum, infoPayload) => {
    if (!seatNum) return;
    // Lunatic Send-to-Demon — push a 'lunatic-actions' info prompt to the
    // real Demon's seat and mark the Lunatic's prompt as done. Intercepts
    // before the normal flow.
    if (infoPayload && infoPayload.type === 'lunatic-send-demon') {
      update(s => {
        const g = s.grimoire;
        const np2 = { ...(g.nightPrompts || {}) };
        const lunPrompt = np2[seatNum];
        if (!lunPrompt) return { grimoire: g };
        const lunSeat = (g.seats || []).find(x => x.seatNum === seatNum);
        const demonSeat = (g.seats || []).find(x =>
          (CHAR_BY_ID[x.actualRoleId] || {}).team === 'demon' && !x.isDead);
        if (demonSeat) {
          const rawTargets = lunPrompt.targets;
          const tgts = Array.isArray(rawTargets)
            ? rawTargets
            : (rawTargets && typeof rawTargets === 'object'
                ? Object.keys(rawTargets).sort((a, b) => Number(a) - Number(b)).map(k => rawTargets[k])
                : []);
          const picks = tgts
            .map(tn => (g.seats || []).find(x => x.seatNum === tn))
            .filter(Boolean)
            .map(ts => ({ seatNum: ts.seatNum, playerName: ts.playerName || null }));
          const perceived = CHAR_BY_ID[lunSeat?.perceivedRoleId];
          const perceivedName = perceived?.name || lunSeat?.perceivedRoleId || 'their role';
          np2[demonSeat.seatNum] = {
            roleId: 'lunatic',
            action: 'info-st',
            instruction: 'The Lunatic just acted. They believe they are you. Their picks are shown below - wake and take your real action next.',
            reminderLabel: '',
            eligible: 'all',
            status: 'awaiting',
            targets: null,
            infoPayload: {
              type: 'lunatic-actions',
              lunaticSeat: { seatNum: lunSeat?.seatNum, playerName: lunSeat?.playerName || null },
              perceivedRoleId: lunSeat?.perceivedRoleId || null,
              perceivedRoleName: perceivedName,
              picks,
            },
            ceremony: 'lunatic-actions',
            startedAt: Date.now(),
            nightIdx: g.viewingDayIndex || 0,
          };
        }
        np2[seatNum] = { ...lunPrompt, status: 'done', doneAt: Date.now() };
        return { grimoire: { ...g, nightPrompts: np2 } };
      });
      return;
    }
    const np = { ...(state.grimoire.nightPrompts || {}) };
    const p = np[seatNum];
    if (!p) return;
    const noAck = NO_PLAYER_ACK_ACTIONS.has(p.action);
    const newStatus = noAck ? 'submitted' : 'awaiting';
    np[seatNum] = { ...p, status: newStatus, infoPayload, respondedAt: Date.now() };
    update({ grimoire: { ...state.grimoire, nightPrompts: np } });
    // For player-ack actions on a local seat, open the local overlay with the
    // info display so the local player can see the result on this device.
    // Otherwise the player's phone (remote) picks up the 'awaiting' change.
    // For no-ack actions, neither phone nor overlay needs to render — the
    // existing 'submitted' effect runs the resolution.
    if (noAck) return;

    const isPickerSubmitForTwoStep = (step.action === 'target2+yesno' || step.action === 'target1+role' || step.action === 'target1+role-pair' || step.action === 'target2+number' || step.action === 'target2+st-pick' || step.action === 'target1+st-pick' || step.action === 'target1+guess') && !infoPayload;
