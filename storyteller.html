        actions: [{ label: 'OK', primary: true }],
      });
    } else if (tgtAlign === 'evil') {
      addCornerPrompt({
        kind: 'warn',
        title: 'Klutz picked evil — Good loses',
        body: klLabel + ' (Klutz) publicly chose ' + tgtLabel + ', who is evil. The Good team loses. Announce the game end.',
        actions: [{ label: 'OK', primary: true }],
      });
    } else {
      addCornerPrompt({
        kind: 'success',
        title: 'Klutz picked good',
        body: klLabel + ' (Klutz) publicly chose ' + tgtLabel + ', who is good. Nothing happens — the game continues.',
        actions: [{ label: 'OK', primary: true }],
      });
    }
  };
  // Fool — automated first-death protection. Returns true when the kill
  // attempt should be silently absorbed (the Fool's ability fires); false
  // when the kill should proceed normally. When firing, this also strips
  // any pending 'Dead' reminder on the Fool's seat (placed moments earlier
  // by the kill path) and drops the once-per-game 'No ability' marker.
  // Bypasses: cause === 'assassin', Fool drunk/poisoned, already used.
  const tryFoolProtection = (seatNum, causeCharId) => {
    const seat = (state.grimoire.seats || []).find(s => s.seatNum === seatNum);
    if (!seat) return false;
    if (seat.actualRoleId !== 'fool') return false;
    const used = (seat.reminders || []).some(r =>
      r && r.charId === 'fool' && /no ability/i.test(String(r.label || '')));
    if (used) return false;
    if (causeCharId === 'assassin') return false;
    if (isDrunkOrPoisoned(seat)) return false;
    // Fire!  Strip any 'Dead' reminders + add 'No ability'.
    update(s => {
      const seats = (s.grimoire.seats || []).map(s0 => {
        if (s0.seatNum !== seatNum) return s0;
        const reminders = (s0.reminders || []).filter(r =>
          !(r && r.label === 'Dead'));
        const hasNo = reminders.some(r =>
          r && r.charId === 'fool' && /no ability/i.test(String(r.label || '')));
        return {
          ...s0,
          reminders: hasNo ? reminders : [...reminders, { charId: 'fool', label: 'No ability', fromPrompt: true }],
        };
      });
      return { grimoire: { ...s.grimoire, seats } };
    });
    const causeName = (CHAR_BY_ID[causeCharId] || {}).name || causeCharId || 'unknown source';
    addCornerPrompt({
      kind: 'success',
      title: 'Fool ability fired',
      body: `${seat.playerName || 'Seat #' + seatNum} (Fool) was about to die (from ${causeName}) but survives — first-death prevented. Their ability is now used.`,
      actions: [{ label: 'OK', primary: true }],
    });
    return true;
  };
  // Sailor automated protection (parallel to tryFoolProtection).
  const trySailorProtection = (seatNum, causeCharId) => {
    const seat = (state.grimoire.seats || []).find(s => s.seatNum === seatNum);
    if (!seat) return false;
    if (seat.actualRoleId !== 'sailor') return false;
    if (causeCharId === 'assassin') return false;
    if (isDrunkOrPoisoned(seat)) return false;
    const hasProtect = (seat.reminders || []).some(r =>
      r && r.charId === 'sailor' && /^protected$/i.test(String(r.label || '')));
    if (!hasProtect) return false;
    update(s => {
      const seats = (s.grimoire.seats || []).map(s0 => {
        if (s0.seatNum !== seatNum) return s0;
        const reminders = (s0.reminders || []).filter(r =>
          !(r && r.label === 'Dead'));
        return { ...s0, reminders };
      });
      return { grimoire: { ...s.grimoire, seats } };
    });
    const causeName = (CHAR_BY_ID[causeCharId] || {}).name || causeCharId || 'unknown source';
    addCornerPrompt({
      kind: 'success',
      title: 'Sailor cannot die',
      body: (seat.playerName || ('Seat #' + seatNum)) + ' (Sailor) was targeted by ' + causeName + ' but is protected.',
      actions: [{ label: 'OK', primary: true }],
    });
    return true;
  };
  // Corner-popup-driven death confirm. Shows protection reasons +
  // drunk/poisoned warning + Confirm/Cancel. Replaces the old
  // DeathConfirmModal path. The actual death routine lives in
  // doConfirmDeathTriggers below.
  const queueDeathConfirm = (seatNum, causeCharId) => {
    if (tryFoolProtection(seatNum, causeCharId)) return;
    if (trySailorProtection(seatNum, causeCharId)) return;
    const seat = (state.grimoire.seats || []).find(s => s.seatNum === seatNum);
    if (!seat || seat.isDead) return;
    const protectionInfo = checkDeathProtection(seat, state.grimoire.seats || [], causeCharId);
    const seatLabel = seat.playerName ? seat.playerName + ' (seat #' + seat.seatNum + ')' : 'seat #' + seat.seatNum;
    const causeName = causeCharId ? ((CHAR_BY_ID[causeCharId] || {}).name || causeCharId) : 'unknown source';
    const reasonsBlock = protectionInfo.reasons.length > 0
      ? '\n\nProtection:\n• ' + protectionInfo.reasons.join('\n• ')
      : '';
    const afflictedBlock = protectionInfo.afflicted
      ? '\n\n⚠ Target is drunk/poisoned — their own abilities malfunction.'
      : '';
    addCornerPrompt({
      kind: 'warn',
      title: 'Confirm kill',
      body: causeName + ' would kill ' + seatLabel + '.' + reasonsBlock + afflictedBlock,
      actions: [
        { label: 'Confirm kill', primary: true, onClick: () => doConfirmDeathTriggers(seatNum, causeCharId) },
        { label: 'Cancel' },
      ],
    });
  };
  // The actual death routine: sets isDead on the chosen seat, runs the
  // Tea Lady strip, Moonchild trigger, and Grandmother trigger. Called from
  // the corner-popup Confirm action above (and from the legacy confirmDeath
  // stub below in case anything still references it).
  const doConfirmDeathTriggers = (dyingSeatNum, causeCharId) => {
    if (tryLleechImmunity(dyingSeatNum, causeCharId)) return;
    update(s => {
      let seats = (s.grimoire.seats || []).map(s0 =>
        s0.seatNum === dyingSeatNum ? { ...s0, isDead: true } : s0
      );
      const killed = seats.find(s0 => s0.seatNum === dyingSeatNum);
      if (killed && killed.actualRoleId === 'tealady') {
        seats = applyTeaLadyProtection(seats);
      }
      return { grimoire: { ...s.grimoire, seats } };
    });
    // Re-snapshot locally so the Grandmother trigger below sees the death.
    const seats = (state.grimoire.seats || []).map(s0 =>
      s0.seatNum === dyingSeatNum ? { ...s0, isDead: true } : s0
    );
    // Passive on-death triggers — Sweetheart (any), Farmer (night-only),
    // Banshee (demon-only). isDayDeath=false because this path fires for
    // night kills via queueDeathConfirm.
    const dyingForPassive = seats.find(s => s.seatNum === dyingSeatNum);
    firePassiveDeathTriggers(dyingForPassive, causeCharId, false);
    // Grandmother trigger — if the seat that just died has the Grandmother's
    // Grandchild reminder AND the killer is a Demon, ask the ST to also kill
    // the Grandmother (corner popup, dismissable).
    try {
      const dying = seats.find(s => s.seatNum === dyingSeatNum);
      if (!dying) return;
      // Moonchild: if Moonchild just died (any cause during the night), place
      // 'Triggered' so her natural night-order slot becomes an active step.
      if (dying.actualRoleId === 'moonchild') {
        const hasTrigger = (dying.reminders || []).some(r =>
          r && r.charId === 'moonchild' && /trigger/i.test(String(r.label || '')));
        if (!hasTrigger) {
          const seatsT = state.grimoire.seats.map(s =>
            s.seatNum === dyingSeatNum
              ? { ...s, isDead: true, reminders: [...(s.reminders || []), { charId: 'moonchild', label: 'Triggered', fromPrompt: true }] }
              : s
          );
          update({ grimoire: { ...state.grimoire, seats: seatsT } });
        }
      }
      const hasGrandchild = (dying.reminders || []).some(r =>
        r && r.charId === 'grandmother' && /grandchild|child/i.test(String(r.label || '')));
      const causeTeam = causeCharId ? (CHAR_BY_ID[causeCharId] || {}).team : null;
      if (!hasGrandchild || causeTeam !== 'demon') return;
      const gmSeat = seats.find(s => s.actualRoleId === 'grandmother' && !s.isDead);
      if (!gmSeat) return;
      const gmLabel = `#${gmSeat.seatNum}${gmSeat.playerName ? ' · ' + gmSeat.playerName : ''}`;
      const dyingLabel = `#${dying.seatNum}${dying.playerName ? ' · ' + dying.playerName : ''}`;
      const demonName = (CHAR_BY_ID[causeCharId] || {}).name || causeCharId;
      addCornerPrompt({
        kind: 'warn',
        title: 'Grandmother trigger',
        body: `The Grandchild (${dyingLabel}) was killed by the ${demonName}. The Grandmother (${gmLabel}) dies too.`,
        actions: [
          { label: 'Kill Grandmother', primary: true, onClick: () => {
            _killSeatDirect(gmSeat.seatNum, 'grandmother');
          }},
          { label: 'Skip' },
        ],
      });
    } catch (_) { /* never let the trigger break the kill */ }
  };
  // Legacy stub: any caller that still invokes confirmDeath() with no args
  // (e.g. from a stray DeathConfirmModal) routes through the new flow.
  const confirmDeath = () => {
    if (!deathConfirmInfo) return;
    const { seatNum, causeCharId } = deathConfirmInfo;
    setDeathConfirmInfo(null);
    doConfirmDeathTriggers(seatNum, causeCharId);
  };
  const dismissDeathConfirm = () => setDeathConfirmInfo(null);
  const dismissResponsePopup = (seatNum) => {
    setDismissedResponses(prev => {
      const next = new Set(prev);
      next.add(seatNum);
      return next;
    });
  };
  // show-grimoire completion detector: when the player (Spy) clears
  // grimoireShownToSeat by tapping Got it on their phone, transition any
  // matching show-grimoire prompt from 'awaiting' to 'submitted' so the
  // night-phase row marks done and the toast fires via the normal effect.
  // Skips local seats — those are handled by the LocalGrimoireOverlay flow.
  useEffect(() => {
    if (!loaded || isSpectator) return;
    const np = state.grimoire.nightPrompts || {};
    const shown = state.grimoire.grimoireShownToSeat;
    let updated = null;
    for (const [k, p] of Object.entries(np)) {
      if (!p || p.action !== 'show-grimoire' || p.status !== 'awaiting') continue;
      const seatNum = Number(k);
      const seat = (state.grimoire.seats || []).find(s => s.seatNum === seatNum);
      if (seat?.isLocal) continue; // local handled by LocalGrimoireOverlay
      if (shown !== seatNum) {
        updated = updated || { ...np };
        updated[k] = { ...p, status: 'submitted', decidedAt: Date.now() };
      }
    }
    if (updated) {
      update({ grimoire: { ...state.grimoire, nightPrompts: updated } });
    }
  }, [state.grimoire.grimoireShownToSeat, JSON.stringify(state.grimoire.nightPrompts || {})]);

  // When a prompt leaves 'awaiting-st-response', drop it from the dismissed set
  // so a future re-prompt for the same seat re-opens the popup.
  useEffect(() => {
    const stillAwaiting = new Set(
      Object.entries(state.grimoire.nightPrompts || {})
        .filter(([_, p]) => p && p.status === 'awaiting-st-response')
        .map(([k]) => Number(k))
    );
    setDismissedResponses(prev => {
      let changed = false;
      const next = new Set();
      for (const n of prev) {
        if (stillAwaiting.has(n)) next.add(n);
        else changed = true;
      }
      return changed ? next : prev;
    });
  }, [JSON.stringify(state.grimoire.nightPrompts || {})]);

  // Effect: Shabaloth queue processor — fires popups one at a time so
  // pick 1 is fully resolved before pick 2 is built. Each fire reads
  // fresh state via the effect closure (re-runs when seats change).
  useEffect(() => {
    if (!loaded || isSpectator) return;
    if (!shabPending) {
      shabLastIdxRef.current = -1;
      return;
    }
    const { items, idx } = shabPending;
    if (idx >= items.length) {
      setShabPending(null);
      return;
    }
    if (shabLastIdxRef.current === idx) return;
    shabLastIdxRef.current = idx;
    const advance = () => setShabPending({ items, idx: idx + 1 });
    const item = items[idx];
    if (item.type === 'kill') {
      const seat = (state.grimoire.seats || []).find(s => s.seatNum === item.seatNum);
      if (!seat || seat.isDead) { advance(); return; }
      const protectionInfo = checkDeathProtection(seat, state.grimoire.seats || [], 'shabaloth');
      const seatLabel = seat.playerName ? seat.playerName + ' (seat #' + seat.seatNum + ')' : 'seat #' + seat.seatNum;
      const reasonsBlock = protectionInfo.reasons.length > 0
        ? '\n\nProtection:\n• ' + protectionInfo.reasons.join('\n• ')
        : '';
      const pickOrder = (idx + 1);
      const ordinal = pickOrder === 1 ? '1st' : (pickOrder === 2 ? '2nd' : pickOrder + 'th');
      addCornerPrompt({
        kind: 'warn',
        title: 'Shabaloth kill — pick ' + pickOrder,
        body: 'Shabaloth chose ' + seatLabel + ' (' + ordinal + ' pick) — they die tonight.' + reasonsBlock,
        actions: [
          { label: 'Kill', primary: true, onClick: () => {
            _killSeatDirect(item.seatNum, 'shabaloth');
            advance();
          }},
          { label: 'Skip — spare them', onClick: advance },
        ],
      });
    } else if (item.type === 'regurg') {
      const currentSeats = state.grimoire.seats || [];
      const eatenSeats = currentSeats.filter(s =>
        item.eatenSeatNums.includes(s.seatNum) && s.isDead &&
        (s.reminders || []).some(r => r && r.charId === 'shabaloth' && /^eaten$/i.test(String(r.label || ''))));
      if (eatenSeats.length === 0) { advance(); return; }
      const stripEatenFrom = (seatNumsList) => {
        update(s => {
          const seats = (s.grimoire.seats || []).map(s0 => {
            if (!seatNumsList.includes(s0.seatNum)) return s0;
            const reminders = (s0.reminders || []).filter(r =>
              !(r && r.charId === 'shabaloth' && /^eaten$/i.test(String(r.label || ''))));
            return { ...s0, reminders };
          });
          return { grimoire: { ...s.grimoire, seats } };
        });
      };
      const regurgitate = (seatNum) => {
        update(s => {
          const seats = (s.grimoire.seats || []).map(s0 => {
            if (s0.seatNum === seatNum) {
              const reminders = (s0.reminders || []).filter(r => {
                if (!r) return false;
                if (r.label === 'Dead') return false;
                if (/^eaten$/i.test(String(r.label || ''))) return false;
                if (/^no ability$/i.test(String(r.label || ''))) return false;
                if (/^used$/i.test(String(r.label || ''))) return false;
                return true;
              });
              return { ...s0, isDead: false, reminders };
            }
            if (!item.eatenSeatNums.includes(s0.seatNum)) return s0;
            const reminders = (s0.reminders || []).filter(r =>
              !(r && r.charId === 'shabaloth' && /^eaten$/i.test(String(r.label || ''))));
            return { ...s0, reminders };
          });
          return { grimoire: { ...s.grimoire, seats } };
        });
      };
      const labelFor = (s) => s.playerName ? s.playerName + ' (seat #' + s.seatNum + ')' : 'seat #' + s.seatNum;
      const actions = eatenSeats.map(es => ({
        label: 'Regurgitate ' + labelFor(es),
        onClick: () => { regurgitate(es.seatNum); advance(); },
      }));
      actions.push({ label: 'Skip — no regurgitation', onClick: () => { stripEatenFrom(item.eatenSeatNums); advance(); } });
      addCornerPrompt({
        kind: 'warn',
        title: 'Shabaloth regurgitation',
        body: 'Shabaloth may regurgitate one player from last night. Pick which, or skip. Regurgitation clears Dead + once-per-game trackers (No ability / Used).',
        actions,
      });
    } else {
      advance();
    }
  }, [shabPending, JSON.stringify(state.grimoire.seats || [])]);

  // Effect: Po reconcile — runs independently of the main submitted-prompts
  // effect. For every Po prompt in 'submitted' or 'done', ensures the seat's
  // Hungry reminder reflects the latest target count:
  //   - 0 targets → place 'Hungry' if missing
  //   - 3+ targets → strip 'Hungry' if present
  // Robust against races in the main effect's seat-copy accumulator (which
  // can silently lose writes if another branch overwrites __seatsCopy).
  useEffect(() => {
    if (!loaded || isSpectator) return;
    const prompts = state.grimoire.nightPrompts || {};
    let nextSeats = null;
    for (const [seatStr, p] of Object.entries(prompts)) {
      if (!p || p.roleId !== 'po') continue;
      if (p.status !== 'submitted' && p.status !== 'done') continue;
      const poSeatNum = Number(seatStr);
      const baseSeats = nextSeats || state.grimoire.seats || [];
      const poSeat = baseSeats.find(s => s.seatNum === poSeatNum);
      if (!poSeat) continue;
      const targets = Array.isArray(p.targets)
        ? p.targets
        : (p.targets ? [p.targets] : []);
      const hasHungry = (poSeat.reminders || []).some(r =>
        r && r.charId === 'po' && /hungry|3 to kill/i.test(String(r.label || '')));
      if (targets.length === 0 && !hasHungry) {
        nextSeats = baseSeats.map(s =>
          s.seatNum === poSeatNum
            ? { ...s, reminders: [...(s.reminders || []), { charId: 'po', label: 'Hungry', fromPrompt: true }] }
            : s
        );
      } else if (targets.length >= 3 && hasHungry) {
        nextSeats = baseSeats.map(s =>
          s.seatNum === poSeatNum
            ? { ...s, reminders: (s.reminders || []).filter(r =>
                !(r && r.charId === 'po' && /hungry|3 to kill/i.test(String(r.label || '')))) }
            : s
        );
      }
    }
    if (nextSeats) {
      update({ grimoire: { ...state.grimoire, seats: nextSeats } });
    }
  }, [JSON.stringify(state.grimoire.nightPrompts || {}), JSON.stringify(state.grimoire.seats || [])]);

  // Effect: Innkeeper-style intermediate placement. When the prompt parks at
  // 'awaiting-st-response' (player has submitted, ST hasn't responded yet)
  // we drop the target reminder on each chosen seat so the ST can see the
  // grimoire state while deciding. Idempotent — skips when already placed.
  useEffect(() => {
    if (!loaded || isSpectator) return;
    const prompts = state.grimoire.nightPrompts || {};
    let mutated = null;
    for (const [seatStr, p] of Object.entries(prompts)) {
      if (!p || p.status !== 'awaiting-st-response') continue;
      if (p.action !== 'target2+st-pick') continue;
      const tgts = Array.isArray(p.targets) ? p.targets : [];
      if (tgts.length === 0) continue;
      const label = p.reminderLabel || 'Safe';
      const seatsArr = mutated || (state.grimoire.seats || []);
      let changed = false;
      const nextSeats = seatsArr.map(s => {
        if (!tgts.includes(s.seatNum)) return s;
        const already = (s.reminders || []).some(r =>
          r && r.charId === p.roleId && r.label === label && r.fromPrompt);
        if (already) return s;
        changed = true;
        return { ...s, reminders: [...(s.reminders || []), { charId: p.roleId, label, fromPrompt: true }] };
      });
      if (changed) mutated = nextSeats;
    }
    if (mutated) {
      update({ grimoire: { ...state.grimoire, seats: mutated } });
    }
  }, [JSON.stringify(state.grimoire.nightPrompts || {}), JSON.stringify(state.grimoire.seats || [])]);

  // Effect: when a prompt transitions to 'submitted', auto-place the reminder
  // on each target seat, push a toast, and mark the prompt 'done'. When it
  // transitions to 'question', push a question-toast and leave the prompt
  // alone (the player's phone keeps showing "waiting for ST").
  //
  // We key the effect by a JSON snapshot of nightPrompts so we re-run on every
  // change but only act on prompts we haven't processed yet (tracked by status).
  // Local players don't push to a phone — they're handled inline by the ST
  // overlay below, so they bypass this effect entirely.
  useEffect(() => {
    if (!loaded || isSpectator) return;
    const prompts = state.grimoire.nightPrompts || {};
    let dirty = false;
    let next = { ...prompts };
    const newToasts = [];
    const newDeathConfirms = [];
    for (const [seatStr, p] of Object.entries(prompts)) {
      if (!p) continue;
      const seatNum = Number(seatStr);
      if (p.status === 'submitted') {
        const seat = state.grimoire.seats.find(s => s.seatNum === seatNum);
        const targets = Array.isArray(p.targets) ? p.targets : (p.targets ? [p.targets] : []);
        // Auto-place reminders.
        // For TARGET actions (no infoPayload): place p.reminderLabel on each
        //   chosen target (Poisoner → 'Poisoned' on chosen seat, etc.).
        // For INFO actions (infoPayload present): branch on the info type.
        //   - seats+role: find the seat in info.seats whose actualRoleId
        //     matches the chosen role; place the reminder there (the "true"
        //     target). If no match (e.g. FT/Wash/Lib/Inv was drunk/poisoned
        //     and ST gave false info), surface a "place manually" follow-up.
        //   - role:    place reminder on the receiver's seat (e.g.
        //              Undertaker sees a role → 'Saw' reminder on the U.).
        //   - yesno:   place reminder on the receiver's seat labelled YES/NO.
        //   - number:  place reminder on the receiver's seat labelled with
        //              the digit (Chef '1', Empath '2', etc.) — the icon is
        //              still the role's icon so the source is clear.
        const isInfo = !!p.infoPayload;
        // Lunatic-as-X detection. The Lunatic seat acts as a perceived demon
        // role (e.g. Pukka). Their picks should be recorded with the Lunatic
        // icon for ST clarity AND should NOT actually affect game state.
        // Exclude ceremony prompts (lunaticinfo, demoninfo, lunatic-actions
        // etc.) — those are info pushed TO the Lunatic, not the Lunatic
        // acting as their perceived role.
        const isLunaticActor = !!(seat && seat.actualRoleId === 'lunatic') && !p.ceremony;
        const charIdForReminder = isLunaticActor ? 'lunatic' : p.roleId;
        let manualNotePlease = null;          // toast suffix if we couldn't auto-place
        if (!isInfo && p.reminderLabel) {
          for (const tnum of targets) {
            const tseat = state.grimoire.seats.find(s => s.seatNum === tnum);
            if (!tseat) continue;
            const already = (tseat.reminders || []).some(r =>
              r.charId === charIdForReminder && r.label === p.reminderLabel && r.fromPrompt);
            if (already) continue;
            const seatsCopy = (next.__seatsCopy || state.grimoire.seats).map(s =>
              s.seatNum === tnum
                ? { ...s, reminders: [...(s.reminders || []), { charId: charIdForReminder, label: p.reminderLabel, fromPrompt: true }] }
                : s
            );
            next.__seatsCopy = seatsCopy;
            // Queue death-confirm for non-Lunatic actors only (Lunatic picks
            // are imaginary).
            if (p.reminderLabel === 'Dead' && !tseat.isDead && !isLunaticActor) {
              newDeathConfirms.push({ seatNum: tnum, causeCharId: p.roleId });
            }
          }
          // Exorcist: place a permanent 'Chose' marker (with exChose flag)
          // on the picked target — clears any prior exChose first so only the
          // latest pick is marked. If the picked target is the Demon, also
          // place an 'Exorcised' reminder on the demon (transient — cleared at
          // Go-to-Night) which dims the demon's wake step tonight and triggers
          // the synthetic 'Show Exorcism' step.
          if (p.roleId === 'exorcist' && targets.length > 0 && !isLunaticActor) {
            const newTarget = targets[0];
            const baseSeats = next.__seatsCopy || state.grimoire.seats;
            const tgtSeat = baseSeats.find(s => s.seatNum === newTarget);
            const tgtIsDemon = tgtSeat && (CHAR_BY_ID[tgtSeat.actualRoleId] || {}).team === 'demon';
            const seatsCopy = baseSeats.map(s => {
              // Strip any prior exChose markers from every seat.
              const stripped = (s.reminders || []).filter(r =>
                !(r && r.charId === 'exorcist' && r.exChose));
              if (s.seatNum === newTarget) {
                const hasChose = stripped.some(r =>
                  r && r.charId === 'exorcist' && r.exChose);
                let reminders = stripped;
                if (!hasChose) {
                  reminders = [...reminders, { charId: 'exorcist', label: 'Chose', fromPrompt: true, exChose: true }];
                }
                if (tgtIsDemon) {
                  const hasExorcised = reminders.some(r =>
                    r && r.charId === 'exorcist' && /exorcised/i.test(String(r.label || '')));
                  if (!hasExorcised) {
                    reminders = [...reminders, { charId: 'exorcist', label: 'Exorcised', fromPrompt: true }];
                  }
                }
                return { ...s, reminders };
              }
              return { ...s, reminders: stripped };
            });
            next.__seatsCopy = seatsCopy;
          }
          // oncePerGame target roles (Courtier, Assassin, etc.) place a
          // permanent 'No ability' on the actor's own seat so the night row
          // dims on subsequent nights.
          const defForRoleT = NIGHT_ACTIONS[p.roleId];
          if (defForRoleT && defForRoleT.oncePerGame && !isLunaticActor) {
            const baseSeats = next.__seatsCopy || state.grimoire.seats;
            const ownSeat = baseSeats.find(s => s.seatNum === seatNum);
            const alreadyNoAbility = (ownSeat?.reminders || []).some(r =>
              r && /no ability/i.test(String(r.label || '')));
            if (!alreadyNoAbility && ownSeat) {
              const seatsCopy = baseSeats.map(s =>
                s.seatNum === seatNum
                  ? { ...s, reminders: [...(s.reminders || []), { charId: p.roleId, label: 'No ability', fromPrompt: true }] }
                  : s
              );
              next.__seatsCopy = seatsCopy;
            }
          }
        } else if (isInfo && p.reminderLabel) {
          const info = p.infoPayload || {};
          // Helper: append a reminder. Lunatic asker → 'lunatic' charId.
          const placeOn = (targetSeatNum, label) => {
            const seatsCopy = (next.__seatsCopy || state.grimoire.seats).map(s =>
              s.seatNum === targetSeatNum
                ? { ...s, reminders: [...(s.reminders || []), { charId: charIdForReminder, label, fromPrompt: true }] }
                : s
            );
            next.__seatsCopy = seatsCopy;
          };
          if (info.type === 'seats+role') {
            // For each picked seat: if it actually IS the chosen role, place the
            // correct team-label reminder (e.g. "Outsider"); else place a "Wrong"
            // reminder so the ST can always see what was shown to whom — both for
            // truthful info AND for false info to drunk/poisoned players.
            if (!info.none) {
              const pickedSeats = (info.seats || [])
                .map(n => state.grimoire.seats.find(s => s.seatNum === n))
                .filter(Boolean);
              let anyMatch = false;
              for (const ps of pickedSeats) {
                const isMatch = ps.actualRoleId === info.roleId;
                const label = isMatch ? p.reminderLabel : 'Wrong';
                if (isMatch) anyMatch = true;
                const already = (ps.reminders || []).some(r =>
                  r.charId === p.roleId && r.label === label && r.fromPrompt);
                if (!already) placeOn(ps.seatNum, label);
              }
              if (!anyMatch) {
                manualNotePlease = `both picks marked "Wrong" — neither is the ${(CHAR_BY_ID[info.roleId] || {}).name || info.roleId} (player likely drunk/poisoned).`;
              }
            }
          } else if (info.type === 'role') {
            const rName = (CHAR_BY_ID[info.roleId] || {}).name || info.roleId || '';
            const label = rName || p.reminderLabel;
            placeOn(seatNum, label);
          } else if (info.type === 'number') {
            placeOn(seatNum, String(info.number));
          } else if (info.type === 'yesno') {
            placeOn(seatNum, info.yes ? 'YES' : 'NO');
          } else if (info.type === 'alignment') {
            // Synthetic Goon step resolved — strip the 'Show alignment'
            // marker from the Goon so the step doesn't re-emit. No new
            // reminder is placed; the alignment override on the Goon's
            // seat (set at trigger time) remains.
            const baseSeats = next.__seatsCopy || state.grimoire.seats;
            const seatsCopy = baseSeats.map(s0 => {
              if (s0.actualRoleId !== 'goon') return s0;
              const reminders = (s0.reminders || []).filter(r =>
                !(r && r.charId === 'goon' && /^show alignment$/i.test(String(r.label || ''))));
              if (reminders.length === (s0.reminders || []).length) return s0;
              return { ...s0, reminders };
            });
            next.__seatsCopy = seatsCopy;
          } else if (info.type === 'seat' || info.type === 'seats') {
            // Knight/Noble/Steward/High Priestess: place the role's
            // standard 'Saw' marker on the asking seat to mark the
            // step as resolved. The actual revealed seat(s) live in
            // info.askSeat / info.askSeats — visible on the player's phone.
            placeOn(seatNum, p.reminderLabel || 'Saw');
          } else if (info.type === 'direction') {
            // Shugenja — record the shown direction on the asking seat.
            const label = info.direction === 'cw' ? 'Saw CW' : 'Saw CCW';
            placeOn(seatNum, label);
          } else if (info.type === 'seat+role-pair') {
            // Dreamer: place 2 'Shown: <Role>' reminders on the PICKED
            // player (info.askSeat). The charId='dreamer' so the visual icon
            // is the Dreamer's. The two roles are stored on the payload.
            const askSeatNum = info.askSeat;
            const roles = info.roles || [];
            if (askSeatNum != null && roles.length > 0) {
              const baseSeats = next.__seatsCopy || state.grimoire.seats;
              const seatsCopy = baseSeats.map(seat => {
                if (seat.seatNum !== askSeatNum) return seat;
                const newReminders = (seat.reminders || []).slice();
                for (const rid of roles) {
                  const rName = (CHAR_BY_ID[rid] || {}).name || rid;
                  const label = 'Shown: ' + rName;
                  const already = newReminders.some(r =>
                    r && r.charId === 'dreamer' && r.label === label && r.fromPrompt);
                  if (already) continue;
                  newReminders.push({ charId: 'dreamer', label, fromPrompt: true });
                }
                return { ...seat, reminders: newReminders };
              });
              next.__seatsCopy = seatsCopy;
            }
          } else if (info.type === 'seat+role') {
            // Grandmother — the 'Saw: <role>' marker goes on the SHOWN seat
            // (info.askSeat), which may differ from the true Grandchild if
            // the Grandmother is drunk/poisoned and the ST gave false info.
            // The label includes the revealed role name so the ST can later
            // see exactly what was shown to the Grandmother.
            if (info.askSeat != null) {
              // First, sweep any prior grandmother 'Saw*' markers off every
              // seat — both to wipe leftovers from the earlier bug (where the
              // marker was misplaced on the Grandmother) and to avoid stacking
              // multiple 'Saw' markers if the ST re-runs the step in one night.
              const sweepBase = next.__seatsCopy || state.grimoire.seats;
              const swept = sweepBase.map(s => ({
                ...s,
                reminders: (s.reminders || []).filter(r =>
                  !(r && r.charId === 'grandmother' && /^saw/i.test(String(r.label || '')))),
              }));
              next.__seatsCopy = swept;
              const shownRoleName = (CHAR_BY_ID[info.roleId] || {}).name || info.roleId || '';
              const label = shownRoleName ? `Saw: ${shownRoleName}` : (p.reminderLabel || 'Saw');
              placeOn(info.askSeat, label);
            }
          }
          // Lunatic acted — DON'T push the demon prompt here. Instead the
          // status flip below (gated on isLunaticActor) parks the prompt at
          // 'awaiting-st-response' so STResponseCard renders a Send-to-Demon
          // button. Pushing the demon prompt happens in respondToNightPrompt
          // when the ST hits Send.
          // Two-step picker actions (target2+yesno, target2+number,
          // target1+role) only land on 'submitted' AFTER the ST has responded
          // and the player has acked the info — by then isInfo is true so the
          // target-action branch above is skipped. Place the target reminders
          // here so two-step roles (Chambermaid, etc.) still get their per-
          // target markers in the grimoire.
          const defForTwoStep = NIGHT_ACTIONS[p.roleId] || {};
          const twoStepActions = new Set(['target2+yesno', 'target2+number', 'target1+role', 'target2+st-pick', 'target1+guess']);
          const tgtList = Array.isArray(p.targets)
            ? p.targets
            : (p.targets && typeof p.targets === 'object'
                ? Object.keys(p.targets).sort((a, b) => Number(a) - Number(b)).map(k => p.targets[k])
                : []);
          if (twoStepActions.has(p.action) && tgtList.length > 0) {
            const perTarget = Array.isArray(defForTwoStep.reminderPerTarget)
              ? defForTwoStep.reminderPerTarget
              : null;
            const baseLabel = defForTwoStep.reminder || p.reminderLabel || 'Chose';
            for (let i = 0; i < tgtList.length; i++) {
              const tnum = tgtList[i];
              const label = perTarget ? (perTarget[i] || perTarget[perTarget.length - 1]) : baseLabel;
              const baseSeats = next.__seatsCopy || state.grimoire.seats;
              const tseat = baseSeats.find(s => s.seatNum === tnum);
              if (!tseat) continue;
              const already = (tseat.reminders || []).some(r =>
                r && r.charId === p.roleId && r.label === label && r.fromPrompt);
              if (already) continue;
              const seatsCopy = baseSeats.map(s =>
                s.seatNum === tnum
                  ? { ...s, reminders: [...(s.reminders || []), { charId: p.roleId, label, fromPrompt: true }] }
                  : s
              );
              next.__seatsCopy = seatsCopy;
            }
          }
          // oncePerGame roles (Ravenkeeper) also place a permanent
          // "No ability" reminder on their own seat so the night-phase row
          // dims on subsequent nights (and the start-button gate reads
          // "Already used this game" instead of the death prompt).
          const defForRole = NIGHT_ACTIONS[p.roleId];
          if (defForRole && defForRole.oncePerGame) {
            const seatNow = (next.__seatsCopy || state.grimoire.seats).find(s => s.seatNum === seatNum);
            const alreadyNoAbility = (seatNow?.reminders || []).some(r =>
              r && /no ability/i.test(String(r.label || '')));
            if (!alreadyNoAbility) {
              placeOn(seatNum, 'No ability');
            }
          }
          // Innkeeper: place 'Drunk' on the chosen seat and remove 'Safe'
          // from any seats the ST untoggled (drunk/poisoned Innkeeper case).
          if (p.action === 'target2+st-pick' && p.infoPayload) {
            const ipl = p.infoPayload || {};
            const drunkSeat = (typeof ipl.drunkSeat === 'number') ? ipl.drunkSeat : null;
            const safesToKeep = new Set(Array.isArray(ipl.safeSeats) ? ipl.safeSeats : (Array.isArray(p.targets) ? p.targets : []));
            const targetsArr = Array.isArray(p.targets) ? p.targets : [];
            const baseSeats = next.__seatsCopy || state.grimoire.seats;
            const seatsCopy = baseSeats.map(s => {
              if (!targetsArr.includes(s.seatNum)) return s;
              let reminders = (s.reminders || []).slice();
              // Remove our placed 'Safe' if this seat is NOT in safesToKeep.
              if (!safesToKeep.has(s.seatNum)) {

              }
              // Place 'Drunk' on the chosen seat (if any) — idempotent.
              if (drunkSeat === s.seatNum) {
                const hasDrunk = reminders.some(r =>
                  r && r.charId === p.roleId && /drunk/i.test(String(r.label || '')) && r.fromPrompt);
                if (!hasDrunk) {

            });
            next.__seatsCopy = seatsCopy;
          }

          // with charId='gambler' so the marker icon is the Gambler).
          if (p.action === 'target1+guess' && p.infoPayload) {
            const ipl = p.infoPayload || {};
            if (ipl.lives === false) {
              const baseSeats = next.__seatsCopy || state.grimoire.seats;
              const gSeat = baseSeats.find(s => s.seatNum === seatNum);
              if (gSeat && !gSeat.isDead) {
                const hasDead = (gSeat.reminders || []).some(r =>
                  r && r.charId === 'gambler' && /^dead$/i.test(String(r.label || '')));
                const seatsCopy = baseSeats.map(s =>
                  s.seatNum === seatNum
                    ? { ...s,
                        isDead: true,
                        reminders: hasDead
                          ? s.reminders
                          : [...(s.reminders || []), { charId: 'gambler', label: 'Dead', fromPrompt: true }],
                      }
                    : s

                next.__seatsCopy = seatsCopy;
              }
            }
          }
          // Godfather: after they act, remove the "Died Today" trigger.
          if (p.roleId === 'godfather') {
            const seatsBase = next.__seatsCopy || state.grimoire.seats;
            const seatsCopy = seatsBase.map(s =>
              s.seatNum === seatNum
                ? { ...s, reminders: (s.reminders || []).filter(r => !(r && r.charId === 'godfather' && /died today/i.test(String(r.label || '')))) }
                : s
            );
            next.__seatsCopy = seatsCopy;
          }
        }
        // Cerenovus: player picked seat + role on their phone. Push a
        // 'mad-claim' info prompt to the target + place a 'Mad: RoleName'
        // reminder on them. Only runs once per prompt (gated by absence of
        // an already-pushed mark on the prompt).
        if (p.roleId === 'cerenovus' && p.guess && !p.cerenovusPushed) {
          const targetSeatNum = targets[0];
          if (targetSeatNum != null) {
            const madRole = CHAR_BY_ID[p.guess];
            const madRoleName = madRole?.name || p.guess;
            const baseSeats = next.__seatsCopy || state.grimoire.seats;
            const seatsCopy = baseSeats.map(seat => {
              if (seat.seatNum !== targetSeatNum) return seat;
              const alreadyMad = (seat.reminders || []).some(r =>
                r && r.charId === 'cerenovus' && r.label === ('Mad: ' + madRoleName) && r.fromPrompt);
              if (alreadyMad) return seat;
              return { ...seat, reminders: [...(seat.reminders || []), { charId: 'cerenovus', label: 'Mad: ' + madRoleName, fromPrompt: true }] };
            });
            next.__seatsCopy = seatsCopy;
            // Push the wake-target prompt and flag this prompt so we don't
            // double-push if the effect re-runs.
            next[String(targetSeatNum)] = {
              roleId: 'cerenovus',
              action: 'info-st',
              instruction: 'You are mad about being the role below. Claim it tomorrow or you may be executed.',
              reminderLabel: '',
              eligible: 'all',
              status: 'awaiting',
              targets: null,
              infoPayload: { type: 'mad-claim', roleId: p.guess },
              ceremony: 'cerenovus-mad',
              startedAt: Date.now(),
              nightIdx: state.grimoire.viewingDayIndex || 0,
            };
            next[seatStr] = { ...next[seatStr], cerenovusPushed: true };
            // Notify ST so they know to wake the target next.
            const targetSeat = (next.__seatsCopy || state.grimoire.seats || []).find(x => x.seatNum === targetSeatNum);
            const targetLabel = targetSeat ? ('seat #' + targetSeat.seatNum + (targetSeat.playerName ? ' · ' + targetSeat.playerName : '')) : ('seat #' + targetSeatNum);
            setTimeout(() => addCornerPrompt({
              kind: 'warn',
              title: 'Cerenovus chose — wake the target',
              body: 'Cerenovus picked ' + targetLabel + ' and chose ' + madRoleName + ' as the mad-claim character. Wake them now — their phone (or local overlay) will show the mad-claim card.',
              actions: [{ label: 'OK', primary: true }],
            }), 0);
          }
        }
        // Evil Twin: when both pair prompts are submitted, flip a flag on
        // the Evil Twin's seat prompt so NightStepActionRow shows completion.
        if (p.ceremony === 'eviltwin-pair' && p.status === 'submitted') {

          const pairKeys = Object.keys(allPrompts).filter(k => {
            const q = allPrompts[k];
            return q && q.ceremony === 'eviltwin-pair';
          });
          const allSubmitted = pairKeys.length === 2 && pairKeys.every(k =>
            (allPrompts[k] || {}).status === 'submitted' || (allPrompts[k] || {}).status === 'done');
          if (allSubmitted) {
            const etActualSeat = (state.grimoire.seats || []).find(x => x.actualRoleId === 'eviltwin');
            if (etActualSeat) {
              const etKey = String(etActualSeat.seatNum);
              next[etKey] = { ...(next[etKey] || allPrompts[etKey] || {}), evilTwinBothSubmitted: true };
            }
          }
        }
        // Barber Yes/No (barber-ask): when the demon submits, the targets
        // sentinel encodes the Yes/No (we don't have a Yes/No payload type
        // on player side yet, so we use a 'barber-yesno' status field).
        if (p.ceremony === 'barber-ask' && p.status === 'submitted' && !p.barberAskHandled) {
          // targets=[1] (or any non-empty array) means YES, [] means NO.
          const tArr = Array.isArray(targets) ? targets : (targets && typeof targets === 'object' ? Object.keys(targets).map(k => targets[k]) : []);
          const isYes = tArr.length > 0;
          const isNo = !isYes;
          // Mark handled so we don't re-process when next() updates.
          next[seatStr] = { ...next[seatStr], barberAskHandled: true };
          const barberSeatNum = p.barberSourceSeatNum;
          if (isNo) {
            // Place 'No swap' on barber seat + clear the demon's barber-ask prompt.
            const baseSeats = next.__seatsCopy || state.grimoire.seats;
            const seatsCopy = baseSeats.map(sx => {
              if (sx.seatNum !== barberSeatNum) return sx;
              const has = (sx.reminders || []).some(r =>
                r && r.charId === 'barber' && /^no swap$/i.test(String(r.label || '')));
              if (has) return sx;
              return { ...sx, reminders: [...(sx.reminders || []), { charId: 'barber', label: 'No swap', fromPrompt: true }] };
            });
            next.__seatsCopy = seatsCopy;
            delete next[seatStr];
          } else if (isYes) {
            // Replace the demon's prompt with a 2-player picker (barber-pick).
            next[seatStr] = {
              roleId: p.roleId,
              action: 'target2',
              instruction: 'Pick 2 players whose characters will be swapped.',
              reminderLabel: '',
              eligible: 'all',
              status: 'awaiting',
              targets: null,
              infoPayload: null,
              ceremony: 'barber-pick',
              barberSourceSeatNum: barberSeatNum,
              startedAt: Date.now(),
              nightIdx: state.grimoire.viewingDayIndex || 0,
            };
          }
        }
        // Barber 2-player pick: when demon submits 2 targets, fire ST popup
        // with Ignore / Swap (drunk/poison aware).
        if (p.ceremony === 'barber-pick' && p.status === 'submitted' && Array.isArray(targets) && targets.length === 2 && !p.barberPickHandled) {
          const baseSeats = next.__seatsCopy || state.grimoire.seats;
          const a = (baseSeats || []).find(x => x.seatNum === targets[0]);
          const b = (baseSeats || []).find(x => x.seatNum === targets[1]);
          const aLabel = a && (a.playerName ? a.playerName + ' (#' + a.seatNum + ')' : '#' + a.seatNum);
          const bLabel = b && (b.playerName ? b.playerName + ' (#' + b.seatNum + ')' : '#' + b.seatNum);
          const aRoleName = a && ((CHAR_BY_ID[a.actualRoleId] || {}).name || a.actualRoleId);
          const bRoleName = b && ((CHAR_BY_ID[b.actualRoleId] || {}).name || b.actualRoleId);
          const demonSeat0 = (baseSeats || []).find(x => x.seatNum === seatNum);
          const demonAfflicted = demonSeat0 ? isDrunkOrPoisoned(demonSeat0) : false;
          const barberSeatNum = p.barberSourceSeatNum;
          next[seatStr] = { ...next[seatStr], barberPickHandled: true };
          setTimeout(() => addCornerPrompt({
            kind: 'warn',
            title: 'Barber: confirm swap',
            body: 'Demon chose ' + aLabel + ' (' + aRoleName + ') and ' + bLabel + ' (' + bRoleName + ')' + (demonAfflicted ? ' — Demon is drunk/poisoned, swap may malfunction.' : '') + '. Swap their roles?',
            actions: [
              { label: 'Swap', primary: true, onClick: () => {
                update(s => {
                  const seats = (s.grimoire.seats || []).map(seat => {
                    if (seat.seatNum === a.seatNum) {
                      return { ...seat, actualRoleId: b.actualRoleId, perceivedRoleId: b.actualRoleId,

                    }

                      return { ...seat, actualRoleId: a.actualRoleId, perceivedRoleId: a.actualRoleId,
                        reminders: [...(seat.reminders || []), { charId: 'barber', label: 'Reveal: new role', fromPrompt: true }] };
                    }
                    // Strip the demon's barber-pick prompt.
                    return seat;
                  });
                  const np = { ...(s.grimoire.nightPrompts || {}) };
                  delete np[String(seatNum)];
                  return { grimoire: { ...s.grimoire, seats, nightPrompts: np } };
                });
              } },
              { label: 'Ignore', onClick: () => {
                update(s => {
                  const np = { ...(s.grimoire.nightPrompts || {}) };
                  delete np[String(seatNum)];
                  return { grimoire: { ...s.grimoire, nightPrompts: np } };
                });
              } },
            ],
          }), 0);
        }
        // Snake Charmer reveal steps: when the role-alignment info prompt
        // comes back submitted/done, strip the 'Reveal: ...' marker from
        // the affected seat so the synthetic step retires.
        if (p.infoPayload && p.infoPayload.type === 'role-alignment' && (p.status === 'submitted' || p.status === 'done')) {
          const baseSeats = next.__seatsCopy || state.grimoire.seats;
          const seatsCopy = baseSeats.map(sx => {
            if (sx.seatNum !== seatNum) return sx;
            const reminders = (sx.reminders || []).filter(r => {
              if (!r) return true;
              if (r.charId === 'snakecharmer' && /^reveal:/i.test(String(r.label || ''))) return false;
              if (r.charId === 'barber' && /^reveal: new role$/i.test(String(r.label || ''))) return false;
              if (r.charId === 'fanggu' && /^reveal: new fanggu$/i.test(String(r.label || ''))) return false;
              if (r.charId === 'huntsman' && /^reveal: huntsman-converted$/i.test(String(r.label || ''))) return false;
              return true;
            });
            if (reminders.length === (sx.reminders || []).length) return sx;
            return { ...sx, reminders };
          });
          next.__seatsCopy = seatsCopy;
        }
        // Snake Charmer: picked a player. If sober & target is the Demon,
        // fire an ST popup offering Ignore / Swap.
        if (p.roleId === 'snakecharmer' && targets.length === 1 && !p.snakecharmerPrompted) {
          const targetSeatNum = targets[0];
          const baseSeats = next.__seatsCopy || state.grimoire.seats;
          const scSeat = (baseSeats || []).find(x => x.seatNum === seatNum);
          const tgt = (baseSeats || []).find(x => x.seatNum === targetSeatNum);
          const scAfflicted = scSeat ? isDrunkOrPoisoned(scSeat) : false;
          const tgtTeam = tgt ? (CHAR_BY_ID[tgt.actualRoleId] || {}).team : null;
          if (tgt && tgtTeam === 'demon' && !scAfflicted) {
            const scLabel = scSeat?.playerName ? scSeat.playerName + ' (seat #' + scSeat.seatNum + ')' : 'seat #' + seatNum;
            const tgtLabel = tgt.playerName ? tgt.playerName + ' (seat #' + tgt.seatNum + ')' : 'seat #' + tgt.seatNum;
            const demonName = (CHAR_BY_ID[tgt.actualRoleId] || {}).name || tgt.actualRoleId;
            setTimeout(() => addCornerPrompt({
              kind: 'warn',
              title: 'Snake Charmer hit the Demon',
              body: scLabel + ' (Snake Charmer) picked ' + tgtLabel + ', who IS the ' + demonName + '. Swap roles (SC becomes ' + demonName + ', original Demon becomes SC and is poisoned) or Ignore (just place a Chose marker).',
              actions: [
                { label: 'Swap', primary: true, onClick: () => {
                  // Swap roles + alignment. Place persistent markers that
                  // the step builder converts into 2 synthetic 'sc-reveal'
                  // steps directly under SC's row. The ST starts each one
                  // to push a clean role+alignment info prompt to the
                  // affected player. NOTHING auto-sends here.
                  update(s => {

                    if (/^used$/i.test(String(r.label || ''))) return false;
                    return true;
                  }) }
                : s
            );
            next.__seatsCopy = seatsCopy;
            addCornerPrompt({
              kind: 'success',
              title: 'Professor resurrected',
              body: tgtLabel + ' is a Townsfolk and the Professor is sober — they are now alive again.',
              actions: [{ label: 'OK', primary: true }],
            });
          } else if (tgtSeat) {
            const reason = profAfflicted
              ? 'the Professor is drunk/poisoned, so the ability malfunctioned'
              : !tgtSeat.isDead
                ? 'the chosen player is alive, so the ability has no effect'
                : tgtLabel + ' is not a Townsfolk, so they stay dead';
            addCornerPrompt({
              kind: 'warn',
              title: 'Professor — no resurrection',
              body: "Professor's ability is used but " + reason + '.',
              actions: [{ label: 'OK', primary: true }],
            });
          }
        }
        // Moonchild: same — runs unconditionally on 'submitted'.
        if (p.roleId === 'moonchild' && targets.length === 1) {
          const baseSeats = next.__seatsCopy || state.grimoire.seats;
          const tgtSeat = baseSeats.find(s => s.seatNum === targets[0]);
          const tgtTeam = (CHAR_BY_ID[tgtSeat?.actualRoleId] || {}).team;
          const tgtIsGood = tgtTeam === 'townsfolk' || tgtTeam === 'outsider';
          const mcSeat = baseSeats.find(s => s.seatNum === seatNum);
          const mcAfflicted = mcSeat ? isDrunkOrPoisoned(mcSeat) : false;
          const seatsCopy = baseSeats.map(s => {
            if (s.seatNum === seatNum) {
              const stripped = (s.reminders || []).filter(r =>
                !(r && r.charId === 'moonchild' && /trigger/i.test(String(r.label || ''))));
              const hasChose = stripped.some(r =>
                r && r.charId === 'moonchild' && /^chose$/i.test(String(r.label || '')));
              return { ...s, reminders: hasChose ? stripped : [...stripped, { charId: 'moonchild', label: 'Chose', fromPrompt: true }] };
            }
            if (s.seatNum === targets[0] && tgtIsGood && !mcAfflicted) {
              const hasDead = (s.reminders || []).some(r =>
                r && r.charId === 'moonchild' && /^dead$/i.test(String(r.label || '')));
              if (hasDead || s.isDead) return s;
              return { ...s, isDead: true, reminders: [...(s.reminders || []), { charId: 'moonchild', label: 'Dead', fromPrompt: true }] };
            }
            return s;
          });
          next.__seatsCopy = seatsCopy;
        }
        // Lunatic: park at 'awaiting-st-response' so STResponseCard renders
        // with a Send-to-Demon button. All other roles flip straight to 'done'.
        //
        // BUT: if an upstream handler in this loop replaced next[seatStr]
        // with a new prompt (e.g. Barber YES → barber-pick target2) or
        // deleted it (e.g. Barber NO), don't clobber that with status='done'.
        // Detect via startedAt mismatch / absence of next[seatStr].
        const _curr = next[seatStr];
        const _replaced = _curr && _curr !== p && (_curr.startedAt !== p.startedAt || _curr.action !== p.action || _curr.ceremony !== p.ceremony);
        const _deleted = !(seatStr in next);
        if (isLunaticActor) {
          next[seatStr] = { ...p, status: 'awaiting-st-response', respondedAt: Date.now() };
        } else if (_replaced || _deleted) {
          // Leave the upstream replacement/delete in place.
        } else {
          next[seatStr] = { ...p, status: 'done', doneAt: Date.now() };
        }
        dirty = true;
        const charName = (CHAR_BY_ID[p.roleId] || {}).name || p.roleId;
        const targetLabels = targets.map(t => {
          const ts = state.grimoire.seats.find(s => s.seatNum === t);
          return `#${t}${ts?.playerName ? ' ' + ts.playerName : ''}`;
        }).join(' & ');
        const isInfoToast = !!p.infoPayload;
        // For info prompts, summarize what was shown rather than what was picked.
        let toastText;
        const manualSuffix = manualNotePlease ? ` · ${manualNotePlease}` : '';
        if (p.action === 'show-grimoire') {
          toastText = `${charName} (seat #${seatNum}${seat?.playerName ? ' · ' + seat.playerName : ''}) viewed the grimoire and dismissed it.`;
        } else if (isInfoToast) {
          const info = p.infoPayload || {};
          const seatList = (info.seats || []).map(n => {
            const ts = state.grimoire.seats.find(s => s.seatNum === n);
            return `#${n}${ts?.playerName ? ' ' + ts.playerName : ''}`;
          }).join(' & ');
          let shown = '';
          if (info.type === 'seats+role') {
            const r = CHAR_BY_ID[info.roleId];
            shown = info.roleId ? `${seatList} → ${r?.name || info.roleId}` : `${seatList} → (none)`;
          } else if (info.type === 'number') shown = `count = ${info.number}`;
          else if (info.type === 'yesno')  shown = info.yes ? 'YES' : 'NO';
          else if (info.type === 'role')   shown = (CHAR_BY_ID[info.roleId] || {}).name || info.roleId || '(none)';
          else if (info.type === 'seat+role-pair') {
            const askS = state.grimoire.seats.find(s => s.seatNum === info.askSeat);
            const names = (info.roles || []).map(id => (CHAR_BY_ID[id] || {}).name || id).join(' / ');
            shown = `about #${info.askSeat}${askS?.playerName ? ' ' + askS.playerName : ''} → ${names}`;
          }
          else if (info.type === 'seat+role') {
            const askS = state.grimoire.seats.find(s => s.seatNum === info.askSeat);
            const rName = (CHAR_BY_ID[info.roleId] || {}).name || info.roleId || '?';
            shown = `Grandchild = #${info.askSeat}${askS?.playerName ? ' ' + askS.playerName : ''} · ${rName}`;
          }
          else shown = JSON.stringify(info);
          toastText = `${charName} (seat #${seatNum}${seat?.playerName ? ' · ' + seat.playerName : ''}) acknowledged: ${shown}${manualSuffix}`;
        } else {
          toastText = `${charName} (seat #${seatNum}${seat?.playerName ? ' · ' + seat.playerName : ''}) chose ${targetLabels || '—'}${p.reminderLabel ? ` · "${p.reminderLabel}" placed` : ''}`;
        }
        newToasts.push({
          id: `${seatNum}-${p.startedAt || Date.now()}`,
          seatNum,
          kind: 'submitted',
          text: toastText,
        });
      } else if (p.status === 'question' && !p.toastShown) {
        next[seatStr] = { ...p, toastShown: true };
        dirty = true;
        const charName = (CHAR_BY_ID[p.roleId] || {}).name || p.roleId;
        const seat = state.grimoire.seats.find(s => s.seatNum === seatNum);
        newToasts.push({
          id: `${seatNum}-q-${p.startedAt || Date.now()}`,
          seatNum,
          kind: 'question',
          text: `⚠ ${charName} (seat #${seatNum}${seat?.playerName ? ' · ' + seat.playerName : ''}) has a question — pull them aside.`,
        });
      } else if (p.status === 'declined') {
        next[seatStr] = { ...p, status: 'done', declined: true, doneAt: Date.now() };
        dirty = true;
        const charName = (CHAR_BY_ID[p.roleId] || {}).name || p.roleId;
        const seat = state.grimoire.seats.find(s => s.seatNum === seatNum);
        newToasts.push({
          id: `${seatNum}-skip-${p.startedAt || Date.now()}`,
          seatNum,
          kind: 'submitted',
          text: `${charName} (seat #${seatNum}${seat?.playerName ? ' · ' + seat.playerName : ''}) chose NOT to use their ability tonight. (Ability saved for later.)`,
        });
      }
    }
    if (dirty) {
      const seats = next.__seatsCopy || state.grimoire.seats;
      delete next.__seatsCopy;
      update({ grimoire: { ...state.grimoire, seats, nightPrompts: next } });
    }
    if (newToasts.length) {
      setToasts(t => {
        // Dedupe by id so we don't double-push when the effect re-runs before write.
        const existing = new Set(t.map(x => x.id));
        return [...t, ...newToasts.filter(n => !existing.has(n.id))];
      });
    }
    // Trigger a death-confirm prompt for the first newly-killed seat (others
    // queue conceptually — overwriting deathConfirmSeat is harmless since each
    // dismiss returns to null and the next reminder placement will re-queue).
    if (newDeathConfirms.length) {
      queueDeathConfirm(newDeathConfirms[0].seatNum, newDeathConfirms[0].causeCharId);
    }
  }, [JSON.stringify(state.grimoire.nightPrompts || {})]);

  // Per-seat role dealing. Each seat has roleDealt + playerStatus.
  const dealRoleToSeat = (seatNum) => {
    const seats = state.grimoire.seats.map(s =>
      s.seatNum === seatNum ? { ...s, roleDealt: true, playerStatus: 'pending' } : s
    );
    update({ grimoire: { ...state.grimoire, seats } });
  };
  const undealSeat = (seatNum) => {
    const seats = state.grimoire.seats.map(s =>
      s.seatNum === seatNum ? { ...s, roleDealt: false, playerStatus: null } : s
    );
    update({ grimoire: { ...state.grimoire, seats } });
  };
  const dealAllRoles = () => {
    const seats = state.grimoire.seats.map(s => ({ ...s, roleDealt: true, playerStatus: 'pending' }));
    update({ grimoire: { ...state.grimoire, seats } });
  };
  const undealAllRoles = () => {
    const seats = state.grimoire.seats.map(s => ({ ...s, roleDealt: false, playerStatus: null }));
    update({ grimoire: { ...state.grimoire, seats } });
  };
  const setPlayerStatus = (seatNum, status) => {
    const seats = state.grimoire.seats.map(s =>
      s.seatNum === seatNum ? { ...s, playerStatus: status } : s
    );
    update({ grimoire: { ...state.grimoire, seats } });
  };

  // --- Travellers ---
  // Travellers can join or leave at any time during the game. They don't go in
  // the bag — the ST picks the role + alignment directly. The traveller's player
  // joins via player.html?t=<travellerNum> instead of the regular seat picker.
  const addTraveller = ({ charId, alignment, insertAfterSeat, playerName }) => {
    const g = state.grimoire;
    const seq = (g.travellerSeq || 0) + 1;
    const t = {
      travellerNum: seq,
      insertAfterSeat: insertAfterSeat ?? 0,  // 0 = before seat 1
      charId,
      alignment: alignment || 'good',
      playerName: playerName || '',
      claims: [],
      roleDealt: false,
      playerStatus: null,
      isDead: false,
      reminders: [],
    };
    update({ grimoire: { ...g, travellers: [...(g.travellers || []), t], travellerSeq: seq } });
  };
  const removeTraveller = (travellerNum) => {
    const g = state.grimoire;
    update({ grimoire: { ...g, travellers: (g.travellers || []).filter(t => t.travellerNum !== travellerNum) } });
  };
  const updateTraveller = (travellerNum, patch) => {
    const g = state.grimoire;
    update({
      grimoire: {
        ...g,
        travellers: (g.travellers || []).map(t =>
          t.travellerNum === travellerNum ? { ...t, ...patch } : t),
      },
    });
  };
  const setTravellerName       = (n, name)    => updateTraveller(n, { playerName: name });
  const releaseTravellerSeat   = (n)          => updateTraveller(n, { playerName: '', claims: [] });
  const setTravellerInsertion  = (n, after)   => updateTraveller(n, { insertAfterSeat: after });
  const setTravellerRole       = (n, charId)  => updateTraveller(n, { charId, roleDealt: false, playerStatus: null });
  const setTravellerAlignment  = (n, align)   => updateTraveller(n, { alignment: align });
  const dealRoleToTraveller    = (n)          => updateTraveller(n, { roleDealt: true, playerStatus: 'pending' });
  const undealTraveller        = (n)          => updateTraveller(n, { roleDealt: false, playerStatus: null });
  const toggleTravellerDead    = (n)          => {
    const t = (state.grimoire.travellers || []).find(x => x.travellerNum === n);
    if (t) updateTraveller(n, { isDead: !t.isDead });
  };
  const toggleTravellerAlignment = (n) => {
    const t = (state.grimoire.travellers || []).find(x => x.travellerNum === n);
    if (t) updateTraveller(n, { alignment: t.alignment === 'evil' ? 'good' : 'evil' });
  };
  const addTravellerReminder = (n, charId, label) => {
    const t = (state.grimoire.travellers || []).find(x => x.travellerNum === n);
    if (!t) return;
    updateTraveller(n, { reminders: [...(t.reminders || []), { charId, label }] });
  };
  const removeTravellerReminder = (n, idx) => {
    const t = (state.grimoire.travellers || []).find(x => x.travellerNum === n);
    if (!t) return;
    const reminders = [...(t.reminders || [])];
    reminders.splice(idx, 1);
    updateTraveller(n, { reminders });
  };

  // --- Day phases ---
  // Tea Lady — at game start and at every Go-to-Night, recompute her
  // 'Protected' markers. Walks each alive Tea Lady's two nearest alive
  // neighbours (wrap-around, skipping dead). If BOTH are good, drop
  // 'Tea Lady: Protected' on each. Stale markers from prior state are
  // stripped first so the placement is always fresh.
  const applySailorProtection = (seats) => {
    let result = (seats || []).map(s => ({
      ...s,
      reminders: (s.reminders || []).filter(r =>
        !(r && r.charId === 'sailor' && /^protected$/i.test(String(r.label || '')))),
    }));
    result = result.map(s =>
      s.actualRoleId === 'sailor' && !s.isDead
        ? { ...s, reminders: [...(s.reminders || []), { charId: 'sailor', label: 'Protected', fromPrompt: true }] }
        : s
    );
    return result;
  };

  const applyTeaLadyProtection = (seats) => {
    let result = (seats || []).map(s => ({
      ...s,
      reminders: (s.reminders || []).filter(r =>
        !(r && r.charId === 'tealady' && /^protected$/i.test(String(r.label || '')))),
    }));
    const teaLadies = result.filter(s => s.actualRoleId === 'tealady' && !s.isDead);
    const n = result.length;
    for (const tl of teaLadies) {
      const idx = result.findIndex(s => s.seatNum === tl.seatNum);
      if (idx < 0) continue;
      const findAlive = (step) => {
        for (let i = 1; i < n; i++) {
          const cand = result[((idx + step * i) % n + n) % n];
          if (cand.seatNum === tl.seatNum) return null;
          if (!cand.isDead && cand.actualRoleId) return cand;
        }
        return null;
      };
      const left = findAlive(-1);
      const right = findAlive(+1);
      if (!left || !right) continue;
      const leftAlign  = left.alignment  || naturalAlignment(left.actualRoleId);
      const rightAlign = right.alignment || naturalAlignment(right.actualRoleId);
      if (leftAlign !== 'good' || rightAlign !== 'good') continue;
      const protectedSeats = new Set([left.seatNum, right.seatNum]);
      result = result.map(s =>
        protectedSeats.has(s.seatNum)
          ? { ...s, reminders: [...(s.reminders || []), { charId: 'tealady', label: 'Protected', fromPrompt: true }] }
          : s
      );
    }
    return result;
  };

  // applyNoDashiiPoison — each night (and at Begin Game), the No Dashii's
  // 2 Townsfolk neighbours (nearest clockwise + counter-clockwise — DOES NOT
  // skip dead seats, DOES skip non-Townsfolk) get a 'Poisoned' marker.
  // Markers are scrubbed and replaced so a shifted neighbour layout (e.g.
  // No Dashii dies / role changes) is automatically refreshed.
  const applyNoDashiiPoison = (seats) => {
    let result = (seats || []).map(s => ({
      ...s,
      reminders: (s.reminders || []).filter(r =>
        !(r && r.charId === 'nodashii' && /^poisoned$/i.test(String(r.label || '')))),
    }));
    const noDashii = result.find(s => s.actualRoleId === 'nodashii' && !s.isDead);
    if (!noDashii) return result;
    if (isDrunkOrPoisoned(noDashii)) return result;
    const n = result.length;
    if (n < 2) return result;
    const isTownsfolk = (s) => {
      const c = CHAR_BY_ID[s.actualRoleId];
      return c && c.team === 'townsfolk';
    };
    const sortedByNum = [...result].sort((a, b) => a.seatNum - b.seatNum);
    const ndIdx = sortedByNum.findIndex(s => s.seatNum === noDashii.seatNum);
    if (ndIdx === -1) return result;
    const findTF = (step) => {
      for (let i = 1; i < n; i++) {
        const idx = ((ndIdx + step * i) % n + n) % n;
        if (idx === ndIdx) return null;
        if (isTownsfolk(sortedByNum[idx])) return sortedByNum[idx];
      }
      return null;
    };
    const cw  = findTF(+1);
    const ccw = findTF(-1);
    const poisonSeatNums = new Set();
    if (cw)  poisonSeatNums.add(cw.seatNum);
    if (ccw) poisonSeatNums.add(ccw.seatNum);
    result = result.map(s =>
      poisonSeatNums.has(s.seatNum)
        ? { ...s, reminders: [...(s.reminders || []), { charId: 'nodashii', label: 'Poisoned', fromPrompt: true }] }
        : s
    );
    return result;
  };

  // tryLleechImmunity — Lleech cannot die while their Host (marked with a
  // 'lleech' 'Host' reminder placed on the first night) is alive. Returns
  // true if the kill was blocked (with a corner popup fired).
  const tryLleechImmunity = (seatNum, causeCharId) => {
    if (!state.features?.automation) return false;
    const seats = state.grimoire.seats || [];
    const dying = seats.find(s => s.seatNum === seatNum);
    if (!dying || dying.actualRoleId !== 'lleech') return false;
    if (dying.isDead) return false;
    if (isDrunkOrPoisoned(dying)) return false;
    const host = seats.find(s => (s.reminders || []).some(r =>
      r && r.charId === 'lleech' && /^host$/i.test(String(r.label || ''))));
    if (!host || host.isDead) return false;
    const lLabel = dying.playerName ? dying.playerName + ' (seat #' + seatNum + ')' : 'seat #' + seatNum;
    const hLabel = host.playerName ? host.playerName + ' (seat #' + host.seatNum + ')' : 'seat #' + host.seatNum;
    const causeName = causeCharId ? ((CHAR_BY_ID[causeCharId] || {}).name || causeCharId) : 'unknown source';
    setTimeout(() => addCornerPrompt({
      kind: 'success',
      title: 'Lleech immune',
      body: lLabel + ' (Lleech) cannot die — their Host (' + hLabel + ') is still alive. ' + causeName + ' tried to kill them but failed.',
      actions: [{ label: 'OK', primary: true }],
    }), 0);
    return true;
  };

  const beginGame = () => {
    update(s => {
      let protectedSeats = applyTeaLadyProtection(s.grimoire.seats || []);
      protectedSeats = applySailorProtection(protectedSeats);
      protectedSeats = applyNoDashiiPoison(protectedSeats);
      return { grimoire: { ...s.grimoire, gameStarted: true, days: [], viewingDayIndex: 0, seats: protectedSeats } };
    });
  };
  // Snapshot the current state as a finished day and start the next.
  // Top note persists across days; bottom note clears.
  //
  // Uses functional `update(s => ...)` so prior synchronous updates this
  // batch (e.g. _executePlayer marking the on-block player dead, lastExecution
  // being recorded) are preserved instead of being clobbered by a stale-
  // closure spread.
  const advanceToNight = () => {
    update(s => {
      const g = s.grimoire;
      const idx = (g.days || []).length;
      const snapshot = {
        label: `Night ${idx} / Day ${idx + 1}`,
        seats: JSON.parse(JSON.stringify(g.seats || [])),
        demonBluffs: [...(g.demonBluffs || [])],
        townSquareNotes: { ...(g.townSquareNotes || { above: '', below: '' }) },
      };
      // Filter transient reminders, then bump Courtier "Drunk N" labels:
      //   Drunk 1 → Drunk 2, Drunk 2 → Drunk 3, Drunk 3 → removed.
      const filterReminders = (rs) => (rs || []).filter(isReminderPermanent);
      const bumpCourtier = (rs) => (rs || []).map(r => {
        if (!r || r.charId !== 'courtier') return r;
        const m = String(r.label || '').match(/^drunk\s*(\d+)?$/i);
        if (!m) return r;
        const n = m[1] ? parseInt(m[1], 10) : 1;
        if (n >= 3) return null;     // remove on what would be the 4th night
        return { ...r, label: `Drunk ${n + 1}` };
      }).filter(Boolean);
      // Minstrel: 2-night countdown. Placed when a minion is executed; the
      // marker should last through this night + the following day, ending
      // at the second Go-to-Night.  Drunk 1 -> Drunk 2 -> null.
      const bumpMinstrel = (rs) => (rs || []).map(r => {
        if (!r || r.charId !== 'minstrel') return r;
        const m = String(r.label || '').match(/^drunk\s*(\d+)?$/i);
        if (!m) return r;
        const n = m[1] ? parseInt(m[1], 10) : 1;
        if (n >= 2) return null;     // remove at the next Go-to-Night
        return { ...r, label: `Drunk ${n + 1}` };
      }).filter(Boolean);
      // Barber 'Haircuts tonight' markers: keep only those tagged with the
      // day being snapshotted now (dayIdx === idx). Once the Go-to-Night that
      // matches their day passes, the next Go-to-Night sweeps them — the
      // Demon already had this night to do the swap.
      const stripStaleHaircuts = (rs) => (rs || []).filter(r => {
        if (r && r.charId === 'barber' && /haircuts tonight/i.test(String(r.label || ''))) {
          return r.dayIdx === idx;
        }
        return true;
      });
      // Zombuul 'Died today' markers: keep only those tagged with the
      // day being snapshotted now (dayIdx === idx). Older markers are
      // stale (from previous active periods) and get stripped.
      const stripStaleDiedToday = (rs) => (rs || []).filter(r => {
        if (r && r.charId === 'zombuul' && /^died today$/i.test(String(r.label || ''))) {
          return r.dayIdx === idx;
        }
        return true;
      });
      const seatsForNewNight = (g.seats || []).map(seat => ({
        ...seat,
        reminders: stripStaleHaircuts(stripStaleDiedToday(bumpMinstrel(bumpCourtier(filterReminders(seat.reminders))))),
      }));
      const travellersForNewNight = (g.travellers || []).map(t => ({
        ...t,
        reminders: filterReminders(t.reminders),
      }));
      const seatsWithTL = applyTeaLadyProtection(seatsForNewNight);
      const seatsWithSailor = applySailorProtection(seatsWithTL);
      const seatsWithND = applyNoDashiiPoison(seatsWithSailor);
      // Pukka conversion — at end-of-day, every 'Pukka: Poisoned' marker
      // becomes 'Pukka: Poison Dead' so it both (a) signals the next Pukka
      // pick to resolve the kill on that seat and (b) continues to count
      // as a poison marker (isDrunkOrPoisoned matches 'poison').
      const seatsWithPukka = seatsWithND.map(seat => ({
        ...seat,
        reminders: (seat.reminders || []).map(r => {
          if (r && r.charId === 'pukka' && /^poisoned$/i.test(String(r.label || ''))) {
            return { ...r, label: 'Poison Dead' };
          }
          return r;
        }),
      }));
      // Shabaloth conversion — last night's 'Dead' picks become 'Eaten'
      // so the next pick can offer to regurgitate one of them.
      const seatsWithShab = seatsWithPukka.map(seat => ({
        ...seat,
        reminders: (seat.reminders || []).map(r => {
          if (r && r.charId === 'shabaloth' && /^dead$/i.test(String(r.label || ''))) {
            return { ...r, label: 'Eaten' };
          }
          return r;
        }),
      }));
      return {
        grimoire: {
          ...g,
          seats: seatsWithShab,
          travellers: travellersForNewNight,
          nightPrompts: {},
          days: [...(g.days || []), snapshot],
          townSquareNotes: { above: g.townSquareNotes?.above || '', below: '' },
          viewingDayIndex: (g.days || []).length + 1,
        },
      };
    });
  };
  const setViewingDayIndex = (idx) => {
    update({ grimoire: { ...state.grimoire, viewingDayIndex: idx } });
  };

  // Wrapper around advanceToNight that first checks if there's a player on the
  // chopping block (live day's nominations) and if so prompts the ST to execute
  // them before snapshotting the day. Used by BOTH Go-to-night buttons (grim +
  // nominations tab) so behavior is consistent.
  const advanceToNightWithExecution = () => {
    const g = state.grimoire;
    const dayIdx = g.days ? g.days.length : 0;  // live day index
    const dayRaw = (g.nominationsByDay || {})[dayIdx];
    const noms = dayRaw ? normalizeDayNoms(dayRaw).nominations : [];
    const aliveCount = (g.seats || []).filter(s => !s.isDead && s.actualRoleId).length;
    const { onBlock } = computeChoppingBlock(noms, aliveCount);
    // Vortox win condition: "Each day, if no execution occurs, evil wins."
    // Fire a corner popup when Go-to-Night happens with no execution AND a
    // Vortox is in play (the ST decides whether to honor the trigger —
    // e.g. dead Vortox, drunk/poisoned Vortox, jinxes).
    const fireVortoxNoExecIfApplicable = () => {
      const vortoxSeat = (g.seats || []).find(s => s.actualRoleId === 'vortox');
      if (!vortoxSeat) return;
      const vLabel = vortoxSeat.playerName
        ? vortoxSeat.playerName + ' (seat #' + vortoxSeat.seatNum + ')'
        : 'seat #' + vortoxSeat.seatNum;
      const deadNote = vortoxSeat.isDead ? ' (note: the Vortox is dead — ability gone, this trigger does not apply)' : '';
      addCornerPrompt({
        kind: 'warn',
        title: 'Vortox: no execution today',
        body: 'No execution occurred on Day ' + (dayIdx + 1) + '. The Vortox (' + vLabel + ') wins for evil — announce the game end' + deadNote + '.',
        actions: [{ label: 'OK', primary: true }],
      });
    };
    const proceed = () => {
      if (confirm(`Snapshot Night ${dayIdx} / Day ${dayIdx + 1} and move to Night ${dayIdx + 1} / Day ${dayIdx + 2}?`)) {
        fireVortoxNoExecIfApplicable();
        advanceToNight();
      }
    };
    if (!onBlock) { proceed(); return; }
    const blockSeat = (g.seats || []).find(s => s.seatNum === onBlock.nomineeSeat);
    if (!blockSeat || blockSeat.isDead) { proceed(); return; }
    // Devil's Advocate protection check.
    const daProtection = (blockSeat.reminders || []).some(r => r && r.charId === 'devilsadvocate' && /safe from execution/i.test(String(r.label || '')));
    const daSeat = (g.seats || []).find(s => s.actualRoleId === 'devilsadvocate');
    const daAfflicted = daSeat ? isDrunkOrPoisoned(daSeat) : false;
    // Pacifist check: target on the block is good AND a Pacifist is alive
    // AND not drunk/poisoned.
    const blockAlignment = blockSeat.alignment || naturalAlignment(blockSeat.actualRoleId);
    const targetIsGood = blockAlignment === 'good';
    const pacifistSeat = (g.seats || []).find(s => s.actualRoleId === 'pacifist' && !s.isDead);
    const pacifistAfflicted = pacifistSeat ? isDrunkOrPoisoned(pacifistSeat) : false;
    const pacifistApplies = !!pacifistSeat && !pacifistAfflicted && targetIsGood;

    const blockLabel = blockSeat.playerName ? blockSeat.playerName + ' (seat #' + blockSeat.seatNum + ')' : 'Seat #' + blockSeat.seatNum;
    const warnings = [];
    if (daProtection) {
      warnings.push(`Devil's Advocate${daSeat ? ' (' + (daSeat.playerName || 'seat #' + daSeat.seatNum) + ')' : ''} protection${daAfflicted ? ' — DA is drunk/poisoned, may not apply' : ''}`);
    }
    if (pacifistApplies) {
      warnings.push(`Pacifist (${pacifistSeat.playerName || 'seat #' + pacifistSeat.seatNum}) is alive & sober and the target is good — Pacifist may save them`);
    }
    // Tea Lady protection — the chopping-block player has the 'Tea Lady:
    // Protected' marker (both alive neighbours are good). Per the rule
    // "they can't die" this also blocks executions.
    const teaLadyProtects = (blockSeat.reminders || []).some(r =>
      r && r.charId === 'tealady' && /^protected$/i.test(String(r.label || '')));
    const sailorOnBlockProtects = blockSeat.actualRoleId === 'sailor' &&
      (blockSeat.reminders || []).some(r =>
        r && r.charId === 'sailor' && /^protected$/i.test(String(r.label || '')));
    if (sailorOnBlockProtects) {
      warnings.push("Sailor protection \u2014 Sailor cannot die (Assassin would bypass, but execution does not)");
    }
    if (teaLadyProtects) {
      warnings.push("Tea Lady protection — both alive neighbours are good, the rule \u201Cthey can't die\u201D applies to executions too");
    }
    const body = warnings.length > 0
      ? `${blockLabel} is on the chopping block with ${onBlock.votes} votes — BUT:\n• ${warnings.join('\n• ')}\n\nExecute anyway?`
      : `${blockLabel} is on the chopping block with ${onBlock.votes} votes. Execute them and advance?`;
    let title = 'Execute before night?';
    if (warnings.length >= 2) title = 'Execute (multiple concerns)?';
    else if (daProtection) title = 'Execute (DA-protected)?';
    else if (pacifistApplies) title = 'Execute (Pacifist concern)?';
    else if (teaLadyProtects) title = 'Execute (Tea Lady-protected)?';
    else if (sailorOnBlockProtects) title = 'Execute (Sailor-protected)?';
    const executeLabel = warnings.length > 0 ? 'Execute anyway' : 'Execute & advance';
    const skipLabel = teaLadyProtects && warnings.length === 1 ? 'Skip — Tea Lady protects'
                    : pacifistApplies && warnings.length === 1 ? 'Skip — Pacifist saves'
                    : daProtection && warnings.length === 1 ? 'Skip — DA protects'
                    : warnings.length > 0 ? 'Skip — let them live'
                    : 'Skip execution';
    addCornerPrompt({
      kind: 'warn',
      title,
      body,
      actions: [
        { label: executeLabel, primary: true, onClick: () => {
          // Capture metadata about the executed seat BEFORE we mutate.
          const execSeat = (g.seats || []).find(s => s.seatNum === onBlock.nomineeSeat);
