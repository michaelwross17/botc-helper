          const execTeam = (CHAR_BY_ID[execSeat?.actualRoleId] || {}).team;
          const mmSeat = (g.seats || []).find(s => s.actualRoleId === 'mastermind' && !s.isDead && s.seatNum !== onBlock.nomineeSeat);
          const minstrelSeat = (g.seats || []).find(s => s.actualRoleId === 'minstrel' && !s.isDead && s.seatNum !== onBlock.nomineeSeat);
          const minstrelAfflicted = minstrelSeat ? isDrunkOrPoisoned(minstrelSeat) : false;
          const masterFires  = execTeam === 'demon'  && !!mmSeat;
          const minstrelFires = execTeam === 'minion' && !!minstrelSeat;

          _executePlayer(onBlock.nomineeSeat);
          update(s => ({ grimoire: { ...s.grimoire, lastExecution: { seatNum: onBlock.nomineeSeat, dayIdx } } }));

          // Minstrel: place 'Drunk 1' on every non-Minstrel seat. The
          // marker is permanent (handled by isReminderPermanent above) and
          // ticks down via bumpMinstrel in subsequent advanceToNight calls.
          // Helper closes over minstrelSeat so the Minstrel herself is
          // excluded.
          const _applyMinstrel = () => {
            update(s => {
              const seats = (s.grimoire.seats || []).map(seat => {
                if (!minstrelSeat || seat.seatNum === minstrelSeat.seatNum) return seat;
                const has = (seat.reminders || []).some(r =>
                  r && r.charId === 'minstrel' && /^drunk\s*\d*$/i.test(String(r.label || '')));
                if (has) return seat;
                return { ...seat, reminders: [...(seat.reminders || []), { charId: 'minstrel', label: 'Drunk 1', fromPrompt: true }] };
              });
              return { grimoire: { ...s.grimoire, seats } };
            });
          };
          const _cancelMinstrel = () => {
            update(s => {
              const seats = (s.grimoire.seats || []).map(seat => {
                const reminders = (seat.reminders || []).filter(r =>
                  !(r && r.charId === 'minstrel' && /^drunk\s*\d*$/i.test(String(r.label || ''))));
                if (reminders.length === (seat.reminders || []).length) return seat;
                return { ...seat, reminders };
              });
              return { grimoire: { ...s.grimoire, seats } };
            });
          };

          if (minstrelFires) {
            // Always place markers immediately so they're present through
            // the Go-to-Night that's about to fire (and get bumped to
            // 'Drunk 2'). The afflicted popup includes a Cancel action that
            // strips them after the fact.
            _applyMinstrel();
            const minstrelLabel = minstrelSeat.playerName ? minstrelSeat.playerName + ' (seat #' + minstrelSeat.seatNum + ')' : 'seat #' + minstrelSeat.seatNum;
            const execLabel    = execSeat?.playerName    ? execSeat.playerName    + ' (seat #' + execSeat.seatNum    + ')' : 'seat #' + execSeat?.seatNum;
            if (minstrelAfflicted) {
              addCornerPrompt({
                kind: 'warn',
                title: 'Minstrel ability (afflicted)',
                body: `Minion ${execLabel} was executed and the Minstrel ${minstrelLabel} is alive but DRUNK/POISONED. 'Drunk' markers have been placed on every other player; cancel them if her ability shouldn't fire.`,
                actions: [
                  { label: 'Keep markers', primary: true },
                  { label: 'Cancel markers', onClick: _cancelMinstrel },
                ],
              });
            } else {
              addCornerPrompt({
                kind: 'success',
                title: 'Minstrel ability fired',
                body: `Minion ${execLabel} was executed. The Minstrel ${minstrelLabel} is alive and sober — every other non-traveller player is now drunk until dusk tomorrow.`,
                actions: [{ label: 'OK', primary: true }],
              });
            }
          }

          if (masterFires) {
            const mmLabel = mmSeat.playerName ? mmSeat.playerName + ' (seat #' + mmSeat.seatNum + ')' : 'seat #' + mmSeat.seatNum;
            const execLabel = execSeat?.playerName ? execSeat.playerName + ' (seat #' + execSeat.seatNum + ')' : 'seat #' + execSeat?.seatNum;
            addCornerPrompt({
              kind: 'warn',
              title: 'Mastermind alive — game continues',
              body: `The Demon ${execLabel} was executed, BUT the Mastermind ${mmLabel} is alive. The game does NOT end. Do not announce the Demon's death. Play 1 more day — if anyone is executed tomorrow, their team loses.`,
              actions: [{ label: 'Got it', primary: true }],
            });
          }

          advanceToNight();
        }},
        { label: skipLabel, onClick: () => { fireVortoxNoExecIfApplicable(); advanceToNight(); } },
      ],
    });
  };

  // --- Nominations ---
  // Each day's entry shape: { nominations: [...], minionVoted: bool, demonVoted: bool }.
  // (Legacy localStorage may still have a bare array; normalizeDayNoms() handles it.)
  const dayEntry = (dayIdx) => {
    const g = state.grimoire;
    return normalizeDayNoms((g.nominationsByDay || {})[dayIdx]);
  };
  const writeDay = (dayIdx, next) => {
    update(s => {
      const g = s.grimoire;
      const by = { ...(g.nominationsByDay || {}) };
      by[dayIdx] = next;
      return { grimoire: { ...g, nominationsByDay: by } };
    });
  };
  // Append an arbitrary entry to a given day's nominations list (used for
  // claim/special audit entries). Uses functional update for the same reason.
  const appendDayEntry = (dayIdx, entry) => {
    if (dayIdx == null) return;
    update(s => {
      const g = s.grimoire;
      const by = { ...(g.nominationsByDay || {}) };
      const cur = normalizeDayNoms(by[dayIdx]);
      const id = 'e_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
      by[dayIdx] = { ...cur, nominations: [...cur.nominations, { id, ...entry }] };
      return { grimoire: { ...g, nominationsByDay: by } };
    });
  };

  const addNomination = (dayIdx, nominatorSeat, nomineeSeat) => {
    const day = dayEntry(dayIdx);
    writeDay(dayIdx, {
      ...day,
      nominations: [...day.nominations, {
        id: 'n_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
        nominatorSeat, nomineeSeat,
        votes: 0,
      }],
    });
    // Auto-trigger Virgin if automation is on and the nominee is the Virgin.
    if (state.features?.automation) {
      tryFireVirgin(nominatorSeat, nomineeSeat, dayIdx);
    }
    // Witch curse — if the nominator carries a 'Cursed' Witch marker and the
    // Witch is sober, prompt the ST to kill them. They die from the curse.
    if (state.features?.automation) {
      const nominator = (state.grimoire.seats || []).find(s => s.seatNum === nominatorSeat);
      if (nominator && !nominator.isDead) {
        const hasCurse = (nominator.reminders || []).some(r =>
          r && r.charId === 'witch' && /^cursed$/i.test(String(r.label || '')));
        if (hasCurse) {
          const witchSeat = (state.grimoire.seats || []).find(s => s.actualRoleId === 'witch');
          const witchAfflicted = witchSeat ? isDrunkOrPoisoned(witchSeat) : false;
          if (!witchAfflicted) {
            const nLabel = nominator.playerName
              ? nominator.playerName + ' (seat #' + nominatorSeat + ')'
              : 'seat #' + nominatorSeat;
            setTimeout(() => addCornerPrompt({
              kind: 'warn',
              title: 'Witch curse fires',
              body: nLabel + ' is Cursed by the Witch and just nominated — they die.',
              actions: [
                { label: 'Kill', primary: true, onClick: () => _killSeatDirect(nominatorSeat, 'witch', 'Dead', true) },
                { label: 'Skip' },
              ],
            }), 0);
          }
        }
      }
    }
  };
  const updateNomination = (dayIdx, id, patch) => {
    const day = dayEntry(dayIdx);
    writeDay(dayIdx, {
      ...day,
      nominations: day.nominations.map(n => n.id === id ? { ...n, ...patch } : n),
    });
  };
  const removeNomination = (dayIdx, id) => {
    const day = dayEntry(dayIdx);
    writeDay(dayIdx, {
      ...day,
      nominations: day.nominations.filter(n => n.id !== id),
    });
  };
  const setDayVoting = (dayIdx, which, value) => {
    const day = dayEntry(dayIdx);
    writeDay(dayIdx, { ...day, [which]: !!value });
  };
  const setNominationsViewingDayIndex = (idx) => {
    update({ grimoire: { ...state.grimoire, nominationsViewingDayIndex: idx } });
  };

  // --- Spy / special grimoire-share action ---
  // For LOCAL seats, route through the on-ST LocalGrimoireOverlay (two-phase
  // privacy) instead of writing grimoireShownToSeat — there's no remote phone
  // to render the snapshot, so the legacy path was a no-op for local players.
  const showGrimoireToSeat = (seatNum) => {
    const seat = (state.grimoire.seats || []).find(s => s.seatNum === seatNum);
    if (seat?.isLocal) {
      setLocalGrimoireSeat(seatNum);
      setLocalGrimoirePhase('input');
    } else {
      update({ grimoire: { ...state.grimoire, grimoireShownToSeat: seatNum } });
    }
  };
  const cancelGrimoireShow = () => {
    // Also dismiss any open local grimoire overlay (in case the ST clicked
    // "Recall" from the Tokens tab while the overlay was up).
    if (localGrimoireSeat != null) {
      setLocalGrimoireSeat(null);
      setLocalGrimoirePhase('input');
    }
    update({ grimoire: { ...state.grimoire, grimoireShownToSeat: null } });
  };

  // Night-phase Spy automation: track the prompt status via nightPrompts +
  // dispatch the actual grimoire presentation based on whether the seat is
  // remote (use the existing grimoireShownToSeat → player overlay flow) or
  // LOCAL (open a two-phase LocalGrimoireOverlay on the ST device).
  const startShowGrimoire = (seatNum, step) => {
    if (!seatNum) return;
    const g = state.grimoire;
    const seat = (g.seats || []).find(s => s.seatNum === seatNum);
    const np = { ...(g.nightPrompts || {}) };
    np[seatNum] = {
      roleId:        step?.char?.id || 'spy',
      action:        'show-grimoire',
      instruction:   step?.instruction || '',
      reminderLabel: '',  // no auto-reminder for show-grimoire
      eligible:      'all',
      status:        'awaiting',
      targets:       null,
      infoPayload:   null,
      startedAt:     Date.now(),
      nightIdx:      (g.viewingDayIndex || 0),
      isLocal:       !!seat?.isLocal,
    };
    if (seat?.isLocal) {
      // Local: nothing to send to a phone — open the overlay on this device.
      update({ grimoire: { ...g, nightPrompts: np } });
      setLocalGrimoireSeat(seatNum);
      setLocalGrimoirePhase('input');
    } else {
      // Remote: reuses the existing player-side GrimoireSnapshotOverlay flow.
      update({ grimoire: { ...g, nightPrompts: np, grimoireShownToSeat: seatNum } });
    }
  };

  // Update one of the two Town Square freeform notes ('above' | 'below').
  const setTownSquareNote = (which, text) => {
    const notes = state.grimoire.townSquareNotes || { above: '', below: '' };
    update({ grimoire: { ...state.grimoire, townSquareNotes: { ...notes, [which]: text } } });
  };

  // Set or clear one of the three demon-bluff slots.
  const setDemonBluff = (slotIdx, charId) => {
    const demonBluffs = [...(state.grimoire.demonBluffs || [null,null,null])];
    demonBluffs[slotIdx] = charId;
    update({ grimoire: { ...state.grimoire, demonBluffs } });
  };

  // Set or clear one of the three Lunatic-bluff slots (any role allowed; for fake info).
  const setLunaticBluff = (slotIdx, charId) => {
    const lunaticBluffs = [...(state.grimoire.lunaticBluffs || [null,null,null])];
    lunaticBluffs[slotIdx] = charId;
    update({ grimoire: { ...state.grimoire, lunaticBluffs } });
  };

  // Change a seat's role outright (e.g. Summoner picks a Demon on Night 3, Pit-Hag
  // transforms a player, Cerenovus, etc.). Sets BOTH perceivedRoleId and actualRoleId
  // so the player sees their new role on the next deal. Resets roleDealt + playerStatus
  // so the ST has to re-push the role to the phone. Leaves alignment override and
  // existing reminders alone — the ST can clean those up manually if needed.
  const changeSeatRole = (seatNum, newCharId) => {
    if (!CHAR_BY_ID[newCharId]) return;
    const seats = state.grimoire.seats.map(s => {
      if (s.seatNum !== seatNum) return s;
      return {
        ...s,
        perceivedRoleId: newCharId,
        actualRoleId: newCharId,
        roleDealt: false,
        playerStatus: null,
      };
    });
    update({ grimoire: { ...state.grimoire, seats } });
  };

  // Set or clear one of a specific minion's 3 bluff slots (Snitch: each Minion gets 3 bluffs).
  // Keyed by seatNum so the bluffs follow the specific minion seat, not a role.
  const setMinionBluff = (seatNum, slotIdx, charId) => {
    const all = { ...(state.grimoire.minionBluffs || {}) };
    const cur = [...((all[seatNum]) || [null, null, null])];
    cur[slotIdx] = charId;
    all[seatNum] = cur;
    update({ grimoire: { ...state.grimoire, minionBluffs: all } });
  };

  // Remove a reminder by index.
  const removeReminder = (seatNum, idx) => {
    const seats = state.grimoire.seats.map(s => {
      if (s.seatNum !== seatNum) return s;
      const reminders = [...(s.reminders || [])];
      reminders.splice(idx, 1);
      return { ...s, reminders };
    });
    update({ grimoire: { ...state.grimoire, seats } });
  };

  // ---------------- Day-phase ability resolution ----------------
  //
  // Each handler is called when the ST records a day-phase claim from the
  // Nominations tab (Slayer claim, Psychopath claim, Mutant claim) or from
  // a triggered nomination (Virgin). Steps:
  //   1. Check whether the claimant actually has the role.
  //   2. Check whether they're drunk or poisoned (ability malfunctions).
  //   3. Check whether they've already used the ability (once-per-game roles).
  //   4. Branch: fire / ask-ST-to-fire-anyway / no-op.
  //
  // Outcomes are surfaced via dayBanners (dismissable on grimoire) and/or
  // cornerPrompts (active ST prompts). When an ability fires, the relevant
  // reminders are auto-placed in the grimoire.
  const _seatBy = (n) => (state.grimoire.seats || []).find(s => s.seatNum === n);
  const _seatLabel = (s) => s ? `seat #${s.seatNum}${s.playerName ? ' · ' + s.playerName : ''}` : '?';

  // Place an arbitrary reminder on a seat (used by ability resolvers).
  const _placeReminderInline = (seatNum, charId, label, extra = {}) => {
    update(s => {
      const seats = (s.grimoire.seats || []).map(seat =>
        seat.seatNum === seatNum
          ? { ...seat, reminders: [...(seat.reminders || []), { charId, label, ...extra }] }
          : seat
      );
      return { grimoire: { ...s.grimoire, seats } };
    });
  };

  // firePassiveDeathTriggers — when a seat dies, fire corner popups for any
  // role with an on-death passive ability (Sweetheart, Barber, Farmer,
  // Banshee). Called from _executePlayer (isDayDeath=true), _killSeatDirect
  // (isDayDeath=isDayKill), and doConfirmDeathTriggers (assumed night).
  // Drunk/poisoned seats don't fire (their ability malfunctions).
  const firePassiveDeathTriggers = (dyingSeat, causeCharId, isDayDeath) => {
    if (!dyingSeat) return;
    const seatLabel = dyingSeat.playerName
      ? dyingSeat.playerName + ' (seat #' + dyingSeat.seatNum + ')'
      : 'seat #' + dyingSeat.seatNum;
    const afflicted = isDrunkOrPoisoned(dyingSeat);
    // Sweetheart — death no longer triggers a popup. The sweetheart night
    // row activates whenever the seat is dead and the ability is unused;
    // the ST starts it there and picks the player to become drunk.
    // Barber — sober death (any cause). Auto-place 'Haircuts tonight' on
    // the Barber's seat (dayIdx-tagged so it persists exactly one Go-to-Night).
    if (dyingSeat.actualRoleId === 'barber' && !afflicted) {
      setTimeout(() => {
        update(s => {
          const idx = (s.grimoire.days || []).length;
          const seats = (s.grimoire.seats || []).map(seat => {
            if (seat.seatNum !== dyingSeat.seatNum) return seat;
            const has = (seat.reminders || []).some(r =>
              r && r.charId === 'barber' && /haircuts tonight/i.test(String(r.label || '')));
            if (has) return seat;
            return { ...seat, reminders: [...(seat.reminders || []), { charId: 'barber', label: 'Haircuts tonight', dayIdx: idx, fromPrompt: true }] };
          });
          return { grimoire: { ...s.grimoire, seats } };
        });
        addCornerPrompt({
          kind: 'warn',
          title: 'Barber died',
          body: seatLabel + ' (Barber) died. A "Haircuts tonight" reminder has been placed. Open the Barber\'s night row and Start the haircut sequence — the Demon will be prompted to swap 2 player roles.',
          actions: [{ label: 'OK', primary: true }],
        });
      }, 0);
    }
    // Farmer — night death only. ST picks 1 alive good player to also become Farmer.
    if (dyingSeat.actualRoleId === 'farmer' && !isDayDeath && !afflicted) {
      setTimeout(() => addCornerPrompt({
        kind: 'warn',
        title: 'Farmer died (night)',
        body: seatLabel + ' (Farmer) died at night. Pick 1 alive good player and use "Change role" on their seat to make them a Farmer too.',
        actions: [{ label: 'OK', primary: true }],
      }), 0);
    }
    // Vigormortis — killed a Minion: Minion keeps ability + ST may pick 1
    // of their Townsfolk neighbours to poison. Popup is Ignore + Make
    // selection (the latter opens VigormortisPickModal with the 2 nearest
    // Townsfolk on each side — skipping non-Townsfolk seats but including
    // dead Townsfolk).
    if (causeCharId === 'vigormortis' && !isDayDeath) {
      const cDef = CHAR_BY_ID[dyingSeat.actualRoleId];
      if (cDef && cDef.team === 'minion') {
        setTimeout(() => {
          update(s => {
            const newSeats = (s.grimoire.seats || []).map(seat => {
              if (seat.seatNum !== dyingSeat.seatNum) return seat;
              const has = (seat.reminders || []).some(r =>
                r && r.charId === 'vigormortis' && /keeps ability/i.test(String(r.label || '')));
              if (has) return seat;
              return { ...seat, reminders: [...(seat.reminders || []), { charId: 'vigormortis', label: 'Keeps ability', fromPrompt: true }] };
            });
            return { grimoire: { ...s.grimoire, seats: newSeats } };
          });
          const findTownsfolkNeighbour = (allSeats, originNum, direction) => {
            if (!allSeats || allSeats.length < 2) return null;
            const sorted = [...allSeats].sort((a, b) => a.seatNum - b.seatNum);
            const n = sorted.length;
            const startIdx = sorted.findIndex(x => x.seatNum === originNum);
            if (startIdx === -1) return null;
            for (let step = 1; step < n; step++) {
              const idx = direction === 'cw' ? (startIdx + step) % n : (startIdx - step + n) % n;
              const cand = sorted[idx];
              if (!cand || !cand.actualRoleId) continue;
              const team = (CHAR_BY_ID[cand.actualRoleId] || {}).team;
              if (team === 'townsfolk') return cand;
            }
            return null;
          };
          const liveSeats = state.grimoire.seats || [];
          const cw = findTownsfolkNeighbour(liveSeats, dyingSeat.seatNum, 'cw');
          const ccw = findTownsfolkNeighbour(liveSeats, dyingSeat.seatNum, 'ccw');
          const candidates = [];
          if (ccw) candidates.push(ccw);
          if (cw && (!ccw || cw.seatNum !== ccw.seatNum)) candidates.push(cw);
          addCornerPrompt({
            kind: 'warn',
            title: 'Vigormortis hit a Minion',
            body: seatLabel + ' was killed by the Vigormortis and KEEPS their ability (marker placed). Optionally poison one of their nearest Townsfolk neighbours.',
            actions: [
              { label: 'Make selection', primary: true, onClick: () => {
                setVigorPickData({
                  dyingSeatNum: dyingSeat.seatNum,
                  dyingLabel: seatLabel,
                  candidates,
                });
              } },
              { label: 'Ignore' },
            ],
          });
        }, 0);
      }
    }
    // Fang Gu — killed an Outsider. Two paths:
    //   1. If ANY seat already carries the fanggu 'Changed' / 'Swapped'
    //      marker (swap already happened earlier this game), the kill
    //      stands and no popup fires.
    //   2. Otherwise the ST sees an Ignore / Make Fang Gu popup. Make Fang
    //      Gu un-dies the outsider, converts them to fanggu (evil), places
    //      the permanent 'Changed' marker + a transient 'Reveal: new fanggu'
    //      marker that drives the synthetic post-FG role-reveal step, and
    //      kills the original demon directly.
    if (causeCharId === 'fanggu' && !isDayDeath) {
      const cDef = CHAR_BY_ID[dyingSeat.actualRoleId];
      if (cDef && cDef.team === 'outsider') {
        setTimeout(() => {
          const seats = state.grimoire.seats || [];
          const alreadyChanged = seats.some(s => (s.reminders || []).some(r =>
            r && r.charId === 'fanggu' && /^(changed|swapped)$/i.test(String(r.label || ''))));
          if (alreadyChanged) return;  // kill stands, no popup
          const origFanggu = seats.find(s => s.actualRoleId === 'fanggu');
          if (!origFanggu) return;
          const origLabel = origFanggu.playerName
            ? origFanggu.playerName + ' (seat #' + origFanggu.seatNum + ')'
            : 'seat #' + origFanggu.seatNum;
          addCornerPrompt({
            kind: 'warn',
            title: 'Fang Gu hit an Outsider',
            body: seatLabel + ' is an Outsider. They may become the evil Fang Gu instead, and the original Fang Gu (' + origLabel + ') dies. Make Fang Gu performs both swaps + queues a wake step to reveal the new role and alignment.',
            actions: [
              { label: 'Make Fang Gu', primary: true, onClick: () => {
                update(s => {
                  const seats2 = (s.grimoire.seats || []).map(seat => {
                    if (seat.seatNum === dyingSeat.seatNum) {
                      // Un-die outsider, strip Dead reminder placed moments
                      // ago by _killSeatDirect, swap to fanggu + evil, place
                      // Changed (permanent) + Reveal: new fanggu (drives
                      // the synthetic step).
                      const reminders = (seat.reminders || []).filter(r =>
                        !(r && r.label === 'Dead'));
                      return { ...seat,
                        isDead: false,
                        actualRoleId: 'fanggu',
                        perceivedRoleId: 'fanggu',
                        alignment: 'evil',
                        reminders: [...reminders,
                          { charId: 'fanggu', label: 'Changed', fromPrompt: true },
                          { charId: 'fanggu', label: 'Reveal: new fanggu', fromPrompt: true }] };
                    }
                    if (seat.seatNum === origFanggu.seatNum) {
                      // Original Fang Gu dies. Place a Dead reminder by
                      // 'fanggu' so it's clear they died via the swap, but
                      // skip the trigger re-fire (the alreadyChanged guard
                      // above prevents recursion regardless).
                      const has = (seat.reminders || []).some(r =>
                        r && r.charId === 'fanggu' && /^dead$/i.test(String(r.label || '')));
                      return { ...seat, isDead: true, reminders: has ? seat.reminders : [...(seat.reminders || []), { charId: 'fanggu', label: 'Dead', fromPrompt: true }] };
                    }
                    return seat;
                  });
                  return { grimoire: { ...s.grimoire, seats: seats2 } };
                });
              } },
              { label: 'Ignore' },
            ],
          });
        }, 0);
      }
    }
    // Klutz — sober death. DAY death opens the picker immediately;
    // NIGHT death places a 'Triggered' marker, deferring the picker to the
    // synthetic post-Dawn klutz-capture step (mirrors Moonchild).
    if (dyingSeat.actualRoleId === 'klutz' && !afflicted) {
      if (isDayDeath) {
        setTimeout(() => setKlutzPickSeat(dyingSeat.seatNum), 0);
      } else {
        setTimeout(() => update(s => {
          const seats = (s.grimoire.seats || []).map(seat => {
            if (seat.seatNum !== dyingSeat.seatNum) return seat;
            const has = (seat.reminders || []).some(r =>
              r && r.charId === 'klutz' && /^triggered$/i.test(String(r.label || '')));
            if (has) return seat;
            return { ...seat, reminders: [...(seat.reminders || []), { charId: 'klutz', label: 'Triggered', fromPrompt: true }] };
          });
          return { grimoire: { ...s.grimoire, seats } };
        }), 0);
      }
    }
    // Pixie — if the Pixie's 'Mad about <Role>' marker matches the dying
    // seat's actualRoleId, fire the gain-ability popup (drunk/poison aware
    // on the Pixie). Accept: place permanent 'Pixie is: <Role>' on the
    // Pixie + flip Pixie's perceivedRoleId so the step builder wakes them
    // with that role's slot.
    {
      const pixie = (state.grimoire.seats || []).find(s => s.actualRoleId === 'pixie');
      const pixieAfflicted = pixie ? isDrunkOrPoisoned(pixie) : false;
      const madMarker = pixie && (pixie.reminders || []).find(r =>
        r && r.charId === 'pixie' && /^mad about\s+/i.test(String(r.label || '')));
      if (pixie && !pixieAfflicted && madMarker && dyingSeat && dyingSeat.actualRoleId) {
        const madRoleName = String(madMarker.label).replace(/^mad about\s+/i, '').trim();
        const dyingRoleName = (CHAR_BY_ID[dyingSeat.actualRoleId] || {}).name || '';
        if (madRoleName && dyingRoleName && madRoleName.toLowerCase() === dyingRoleName.toLowerCase()) {
          const alreadyGot = (pixie.reminders || []).some(r =>
            r && r.charId === 'pixie' && /^pixie is:/i.test(String(r.label || '')));
          if (!alreadyGot) {
            const pixieLabel = pixie.playerName ? pixie.playerName + ' (seat #' + pixie.seatNum + ')' : 'seat #' + pixie.seatNum;
            const matchedRoleId = dyingSeat.actualRoleId;
            setTimeout(() => addCornerPrompt({
              kind: 'warn',
              title: 'Pixie\'s mad-about role died',
              body: 'The ' + dyingRoleName + ' just died, and the Pixie (' + pixieLabel + ') is mad about being the ' + dyingRoleName + '. The Pixie may now gain that ability.',
              actions: [
                { label: 'Pixie gets ability', primary: true, onClick: () => {
                  update(s => {
                    const seats2 = (s.grimoire.seats || []).map(seat => {
                      if (seat.seatNum !== pixie.seatNum) return seat;
                      // Place 'Pixie is: <Role>' marker (permanent) and
                      // flip perceivedRoleId so night-order wakes them.
                      return { ...seat,
                        perceivedRoleId: matchedRoleId,
                        reminders: [...(seat.reminders || []), { charId: 'pixie', label: 'Pixie is: ' + dyingRoleName, fromPrompt: true }] };
                    });
                    return { grimoire: { ...s.grimoire, seats: seats2 } };
                  });
                  addCornerPrompt({
                    kind: 'success',
                    title: 'Pixie gained ' + dyingRoleName,
                    body: 'The Pixie is now treated as the ' + dyingRoleName + ' for wake order. Their actual role is still Pixie; the "Pixie is" marker tracks the new ability.',
                    actions: [{ label: 'OK', primary: true }],
                  });
                } },
                { label: 'Ignore' },
              ],
            }), 0);
          }
        }
      }
    }
    // Boomdandy — on execution, the ST may execute additional players so only
    // 3 remain alive. Fire Ignore / Execute popup; Execute opens a picker.
    if (dyingSeat.actualRoleId === 'boomdandy' && isDayDeath) {
      setTimeout(() => {
        // Compute candidates AT POPUP TIME so the alive count is accurate.
        const seatsNow = state.grimoire.seats || [];
        const alive = seatsNow.filter(s => !s.isDead && s.actualRoleId && s.seatNum !== dyingSeat.seatNum);
        const targetKeep = 3;
        const toKill = Math.max(0, alive.length - targetKeep);
        if (toKill <= 0) {
          addCornerPrompt({
            kind: 'warn',
            title: 'Boomdandy executed — already at ≤3 alive',
            body: seatLabel + ' (Boomdandy) was executed. There are already ' + alive.length + ' alive players (target: 3). No additional executions needed.',
            actions: [{ label: 'OK', primary: true }],
          });
          return;
        }
        addCornerPrompt({
          kind: 'warn',
          title: 'Boomdandy executed',
          body: seatLabel + ' (Boomdandy) was executed. You may execute ' + toKill + ' more player' + (toKill === 1 ? '' : 's') + ' so only 3 remain alive.',
          actions: [
            { label: 'Execute players', primary: true, onClick: () => {
              setBoomdandyPickData({
                dyingLabel: seatLabel,
                candidates: alive,
                needKill: toKill,
              });
            } },
            { label: 'Ignore' },
          ],
        });
      }, 0);
    }
    // Banshee — killed by the Demon. ST announces + Banshee gains new ability.
    if (dyingSeat.actualRoleId === 'banshee' && !afflicted) {
      const causeTeam = causeCharId ? (CHAR_BY_ID[causeCharId] || {}).team : null;
      if (causeTeam === 'demon') {
        setTimeout(() => {
          // Place a Banshee 'Triggered' marker (permanent via the
          // PERMANENT_REMINDER_CHARS allow-list for 'banshee').
          update(s => {
            const newSeats = (s.grimoire.seats || []).map(seat => {
              if (seat.seatNum !== dyingSeat.seatNum) return seat;
              const has = (seat.reminders || []).some(r =>
                r && r.charId === 'banshee' && /trigger/i.test(String(r.label || '')));
              if (has) return seat;
              return { ...seat, reminders: [...(seat.reminders || []), { charId: 'banshee', label: 'Triggered', fromPrompt: true }] };
            });
            return { grimoire: { ...s.grimoire, seats: newSeats } };
          });
          addCornerPrompt({
            kind: 'warn',
            title: 'Banshee triggered',
            body: seatLabel + ' (Banshee) was killed by the Demon. Announce loudly to all players. From tomorrow on, the Banshee may nominate twice each day.',
            actions: [{ label: 'OK', primary: true }],
          });
        }, 0);
      }
    }
  };

  // _killSeatDirect — places a Dead reminder AND marks seat.isDead in one
  // atomic update, BYPASSING the death-confirm modal. Used by automation flows
  // (Slayer, Virgin, etc.) where the ST has already approved the kill via the
  // upstream corner popup — re-confirming via the generic death modal would be
  // redundant.
  // isDayKill (4th param) — when true, also place a 'Died today' marker
  // (charId='zombuul') tagged with the current day index so Zombuul's
  // night step can check whether anyone died today. Day callers (Slayer,
  // Virgin, Psychopath etc.) pass true; night callers (Shabaloth, Pukka,
  // Grandmother trigger) leave it false.
  const _killSeatDirect = (seatNum, causeCharId, label = 'Dead', isDayKill = false) => {
    if (tryLleechImmunity(seatNum, causeCharId)) return;
    if (tryFoolProtection(seatNum, causeCharId)) return;
    if (trySailorProtection(seatNum, causeCharId)) return;
    update(s => {
      const idx = (s.grimoire.days || []).length;
      const zombuulInPlay = (s.grimoire.seats || []).some(x => x.actualRoleId === 'zombuul');
      let seats = (s.grimoire.seats || []).map(seat => {
        if (seat.seatNum !== seatNum) return seat;
        const additions = [{ charId: causeCharId, label }];
        if (isDayKill && zombuulInPlay) {
          additions.push({ charId: 'zombuul', label: 'Died today', dayIdx: idx, fromPrompt: true });
        }
        return { ...seat, isDead: true, reminders: [...(seat.reminders || []), ...additions] };
      });
      // Tea Lady death: strip her stale Protected markers immediately so
      // any subsequent kill in the same tick sees the updated state.
      const killed = seats.find(s0 => s0.seatNum === seatNum);
      if (killed && killed.actualRoleId === 'tealady') {
        seats = applyTeaLadyProtection(seats);
      }
      return { grimoire: { ...s.grimoire, seats } };
    });
    // Passive on-death triggers (Sweetheart, Barber, Farmer, Banshee).
    const dyingSeat = (state.grimoire.seats || []).find(s => s.seatNum === seatNum);
    firePassiveDeathTriggers(dyingSeat, causeCharId, !!isDayKill);
  };

  // _executePlayer — marks a seat dead WITHOUT placing a reminder (regular
  // town execution at end of day). Atomic functional update. Also fires the
  // Godfather trigger: if the executed seat is an Outsider and the Godfather
  // is alive, place a "Died Today" reminder on the Godfather so their row
  // un-dims for tonight.
  const _executePlayer = (seatNum) => {
    if (tryLleechImmunity(seatNum, null)) return;
    update(s => {
      // Zombuul + day-death tracking. Three Zombuul cases:
      //   first-evade  → sober + no 'Executed once' yet: die (isDead=true)
      //                  AND place 'Executed once' AND skip 'Died today'
      //                  (gameplay-wise no death — they evaded via ability).
      //   truly-dead   → sober + has 'Executed once': die, strip the marker
      //                  (ability is gone), place 'Died today'.
      //   drunk-died   → drunk/poisoned: die for real, no marker mutations,
      //                  place 'Died today'.
      // Non-Zombuul executions: just die + place 'Died today'.
      const idxForDeath = (s.grimoire.days || []).length;
      const liveSeats0 = s.grimoire.seats || [];
      const targetSeat = liveSeats0.find(seat => seat.seatNum === seatNum);
      let zombuulCase = null;
      if (targetSeat && targetSeat.actualRoleId === 'zombuul') {
        const hasExecOnce = (targetSeat.reminders || []).some(r =>
          r && r.charId === 'zombuul' && /^executed once$/i.test(String(r.label || '')));
        if (isDrunkOrPoisoned(targetSeat))      zombuulCase = 'drunk-died';
        else if (!hasExecOnce)                  zombuulCase = 'first-evade';
        else                                    zombuulCase = 'truly-dead';
      }
      const seats0 = liveSeats0.map(seat => {
        if (seat.seatNum !== seatNum) return seat;
        let reminders = seat.reminders || [];
        if (zombuulCase === 'first-evade') {
          reminders = [...reminders, { charId: 'zombuul', label: 'Executed once', fromPrompt: true }];
        } else if (zombuulCase === 'truly-dead') {
          reminders = reminders.filter(r =>
            !(r && r.charId === 'zombuul' && /^executed once$/i.test(String(r.label || ''))));
        }
        const zombuulInPlayE = liveSeats0.some(x => x.actualRoleId === 'zombuul');
        if (zombuulCase !== 'first-evade' && zombuulInPlayE) {
          reminders = [...reminders, { charId: 'zombuul', label: 'Died today', dayIdx: idxForDeath, fromPrompt: true }];
        }
        return { ...seat, isDead: true, reminders };
      });
      // Zombuul info popups (outside the updater).
      if (zombuulCase) {
        const zLabel = targetSeat.playerName ? targetSeat.playerName + ' (seat #' + seatNum + ')' : 'seat #' + seatNum;
        if (zombuulCase === 'first-evade') {
          setTimeout(() => addCornerPrompt({
            kind: 'success',
            title: 'Zombuul registers as dead',
            body: zLabel + ' (Zombuul) is marked dead so Tea Lady etc. treat them as dead, but their ability is still active. A second execution kills them for real.',
            actions: [{ label: 'OK', primary: true }],
          }), 0);
        } else if (zombuulCase === 'truly-dead') {
          setTimeout(() => addCornerPrompt({
            kind: 'warn',
            title: 'Zombuul truly dies',
            body: zLabel + ' (Zombuul) was executed a second time — their ability is gone.',
            actions: [{ label: 'OK', primary: true }],
          }), 0);
        } else if (zombuulCase === 'drunk-died') {
          setTimeout(() => addCornerPrompt({
            kind: 'warn',
            title: 'Zombuul died for real',
            body: zLabel + ' (Zombuul) was drunk/poisoned during execution — the evasion ability fizzled and they truly die.',
            actions: [{ label: 'OK', primary: true }],
          }), 0);
        }
      }
      const executed = seats0.find(seat => seat.seatNum === seatNum);
      // Moonchild execution: place 'Triggered' AND 'Dead' on the Moonchild,
      // then queue the popup so the ST picks her target. 'Dead' is required
      // by the requiresDeath activation path so the night-step row lights up
      // (executed seats normally have isDead=true but no Dead reminder).
      if (executed && executed.actualRoleId === 'moonchild') {
        seats0.forEach((seat, i) => {
          if (seat.seatNum !== seatNum) return;
          const existing = seat.reminders || [];
          const hasTrigger = existing.some(r =>
            r && r.charId === 'moonchild' && /trigger/i.test(String(r.label || '')));
          const hasDead = existing.some(r =>
            r && r.label === 'Dead');
          const additions = [];
          if (!hasTrigger) additions.push({ charId: 'moonchild', label: 'Triggered', fromPrompt: true });
          if (!hasDead)    additions.push({ charId: 'moonchild', label: 'Dead',      fromPrompt: true });
          if (additions.length > 0) {
            seats0[i] = { ...seat, reminders: [...existing, ...additions] };
          }
        });
        // Fire popup outside the updater on next tick.
        setTimeout(() => setMoonchildPickSeat(seatNum), 0);
      }
      const wasOutsider = executed && CHAR_BY_ID[executed.actualRoleId]?.team === 'outsider';
      let seats = seats0;
      if (wasOutsider) {
        seats = seats0.map(seat => {
          if (seat.actualRoleId !== 'godfather' || seat.isDead) return seat;
          const has = (seat.reminders || []).some(r => r && r.charId === 'godfather' && /died today/i.test(String(r.label || '')));
          if (has) return seat;
          return { ...seat, reminders: [...(seat.reminders || []), { charId: 'godfather', label: 'Died Today' }] };
        });
      }
      if (executed && executed.actualRoleId === 'tealady') {
        seats = applyTeaLadyProtection(seats);
      }
      return { grimoire: { ...s.grimoire, seats } };
    });
    // Passive on-death triggers (Sweetheart any-death, Barber day-death etc.)
    const dyingExecuted = (state.grimoire.seats || []).find(s => s.seatNum === seatNum);
    firePassiveDeathTriggers(dyingExecuted, null, true);
    // Cannibal: dynamically gain the executed player's ability.
    //   Good executed (TF/Outsider) → swap Cannibal's role to the executed
    //   role, place 'Was Cannibal · <OriginalRole>' marker for revert.
    //   Evil executed (Minion/Demon) → place 'Cannibal: Drunk' marker.
    //   Either way, revert any prior swap first (re-eats fresh each day).
    try {
      const seatsForCan = state.grimoire.seats || [];
      // Find Cannibal seat: either still actualRoleId='cannibal' OR has a
      // 'Was Cannibal · ...' marker indicating prior swap.
      const canSeat = seatsForCan.find(s =>
        s.actualRoleId === 'cannibal' ||
        (s.reminders || []).some(r => r && r.charId === 'cannibal' && /^was cannibal/i.test(String(r.label || '')))
      );
      if (canSeat && !canSeat.isDead && dyingExecuted && dyingExecuted.seatNum !== canSeat.seatNum) {
        // Determine the executed player's ORIGINAL role (Cannibals don't
        // chain — if the executed was a previously-swapped Cannibal, use
        // their original role from the marker. Normally just actualRoleId.)
        let execRoleId = dyingExecuted.actualRoleId;
        const execWasCannibal = (dyingExecuted.reminders || []).find(r =>
          r && r.charId === 'cannibal' && /^was cannibal/i.test(String(r.label || '')));
        // (We don't strip the executed seat's swap data — they're dead now.)
        const execRole = CHAR_BY_ID[execRoleId];
        const execTeam = execRole?.team || null;
        const isGoodTeam = execTeam === 'townsfolk' || execTeam === 'outsider';
        const isEvilTeam = execTeam === 'minion' || execTeam === 'demon';
        if (isGoodTeam || isEvilTeam) {
          // Compute original Cannibal role for revert (from prior marker).
          const priorMarker = (canSeat.reminders || []).find(r =>
            r && r.charId === 'cannibal' && /^was cannibal/i.test(String(r.label || '')));
          let originalRoleId = 'cannibal';
          if (priorMarker) {
            const namePart = String(priorMarker.label).replace(/^was cannibal[^\w]*/i, '').trim();
            if (namePart) {
              const match = Object.values(CHAR_BY_ID).find(c => c && c.name && c.name.toLowerCase() === namePart.toLowerCase());
              originalRoleId = (match && match.id) || 'cannibal';
            }
          }
          const canSeatNum = canSeat.seatNum;
          const canOriginalName = (CHAR_BY_ID['cannibal'] || {}).name || 'Cannibal';
          const canLabel = canSeat.playerName
            ? canSeat.playerName + ' (seat #' + canSeat.seatNum + ')'
            : 'seat #' + canSeat.seatNum;
          const execLabel = dyingExecuted.playerName
            ? dyingExecuted.playerName + ' (seat #' + dyingExecuted.seatNum + ')'
            : 'seat #' + dyingExecuted.seatNum;
          const execName = (CHAR_BY_ID[execRoleId] || {}).name || execRoleId;
          // Helper that performs the swap + marker placement (used by both
          // the auto good-execution path and the Choose role popup action).
          const applyCannibalSwap = (newRoleId, addDrunk) => {
            update(s => {
              const seats2 = (s.grimoire.seats || []).map(seat => {
                if (seat.seatNum !== canSeatNum) return seat;
                const reminders = (seat.reminders || []).filter(r => {
                  if (!r) return true;
                  if (r.charId === 'cannibal') return false;
                  if (/^no ability$/i.test(String(r.label || ''))) return false;
                  return true;
                });
                const newReminders = [...reminders,
                  { charId: 'cannibal', label: 'Was ' + canOriginalName, fromPrompt: true }];
                if (addDrunk) {
                  newReminders.push({ charId: 'cannibal', label: 'Drunk', fromPrompt: true });
                }
                return {
                  ...seat,
                  actualRoleId: newRoleId,
                  perceivedRoleId: newRoleId,
                  reminders: newReminders,
                };
              });
              return { grimoire: { ...s.grimoire, seats: seats2 } };
            });
          };
          const applyCannibalRevertAndDrunk = () => {
            // Revert to original role + place drunk marker only.
            update(s => {
              const seats2 = (s.grimoire.seats || []).map(seat => {
                if (seat.seatNum !== canSeatNum) return seat;
                const reminders = (seat.reminders || []).filter(r => {
                  if (!r) return true;
                  if (r.charId === 'cannibal') return false;
                  if (/^no ability$/i.test(String(r.label || ''))) return false;
                  return true;
                });
                return {
                  ...seat,
                  actualRoleId: originalRoleId,
                  perceivedRoleId: originalRoleId,
                  reminders: [...reminders, { charId: 'cannibal', label: 'Drunk', fromPrompt: true }],
                };
              });
              return { grimoire: { ...s.grimoire, seats: seats2 } };
            });
          };
          if (isGoodTeam) {
            applyCannibalSwap(execRoleId, false);
            setTimeout(() => addCornerPrompt({
              kind: 'success',
              title: 'Cannibal: gained ' + execName,
              body: 'The Cannibal (' + canLabel + ') has eaten ' + execLabel + ' (' + execName + ') and now has the ' + execName + ' ability until the next execution. Their role has been swapped; once-per-game tracker reset.',
              actions: [{ label: 'OK', primary: true }],
            }), 0);
          } else {
            // Evil execution: ST chooses to either let the Cannibal go drunk
            // (default) or pick a good role to swap them into (for false-info).
            setTimeout(() => addCornerPrompt({
              kind: 'warn',
              title: 'Cannibal ate an evil player',
              body: 'The Cannibal (' + canLabel + ') ate ' + execLabel + ' (' + execName + ', evil). Ignore makes them drunk only; Choose role lets you pick any good role for them (they will still be drunk — useful for false info).',
              actions: [
                { label: 'Choose role', primary: true, onClick: () => {
                  const scriptIds = state.characterIds || [];
                  const candidates = scriptIds
                    .map(id => CHAR_BY_ID[id])
                    .filter(rc => rc && (rc.team === 'townsfolk' || rc.team === 'outsider'));
                  setCannibalChooseData({
                    canSeatNum,
                    canLabel,
                    candidates,
                    onPick: (pickedRoleId) => {
                      applyCannibalSwap(pickedRoleId, true);
                      const pickName = (CHAR_BY_ID[pickedRoleId] || {}).name || pickedRoleId;
                      addCornerPrompt({
                        kind: 'success',
                        title: 'Cannibal: swapped to ' + pickName + ' (drunk)',
                        body: 'The Cannibal is now treated as the ' + pickName + ' and is drunk — they will receive false info from this role\'s abilities.',
                        actions: [{ label: 'OK', primary: true }],
                      });
                    },
                  });
                } },
                { label: 'Ignore', onClick: () => {
                  applyCannibalRevertAndDrunk();
                  addCornerPrompt({
                    kind: 'warn',
                    title: 'Cannibal drunk',
                    body: 'The Cannibal is now drunk until the next execution. Any prior borrowed role has been reverted.',
                    actions: [{ label: 'OK', primary: true }],
                  });
                } },
              ],
            }), 0);
          }
        }
      }
    } catch (_) { /* never let the trigger break the kill */ }
    // Evil Twin: if the executed seat carries the 'Twin' reminder placed by
    // Evil Twin AND the Evil Twin is still alive, announce that the good
    // twin has been executed (the Evil Twin's team typically wins).
    try {
      if (dyingExecuted) {
        const hasTwinMarker = (dyingExecuted.reminders || []).some(r =>
          r && r.charId === 'eviltwin' && /^twin$/i.test(String(r.label || '')));
        if (hasTwinMarker) {
          const etSeat = (state.grimoire.seats || []).find(s =>
            s.actualRoleId === 'eviltwin' && !s.isDead);
          if (etSeat) {
            const twinLabel = dyingExecuted.playerName
              ? dyingExecuted.playerName + ' (seat #' + dyingExecuted.seatNum + ')'
              : 'seat #' + dyingExecuted.seatNum;
            const etLabel = etSeat.playerName
              ? etSeat.playerName + ' (seat #' + etSeat.seatNum + ')'
              : 'seat #' + etSeat.seatNum;
            setTimeout(() => addCornerPrompt({
              kind: 'warn',
              title: 'Good Twin executed - Evil Twin still lives',
              body: 'The good twin (' + twinLabel + ') was executed while the Evil Twin (' + etLabel + ') is still alive. The Evil Twin\'s team typically wins - announce the game end if appropriate.',
              actions: [{ label: 'OK', primary: true }],
            }), 0);
          }
        }
      }
    } catch (_) { /* never let the trigger break the kill */ }
  };

  // Slayer / Psychopath: claim + target. If real + sober → target dies +
  // "No ability" placed on claimant. If real + drunk/poisoned → ask ST. If
  // fake → dismissable banner only.
  // Damsel guess — claimant is the minion making the guess, target is the
  // player they guess is the Damsel. Special-case before generic kill flow.
  const _resolveDamselGuess = ({ claimantSeatNum, targetSeatNum, dayIdx }) => {
    const claimant = _seatBy(claimantSeatNum);
    const target = _seatBy(targetSeatNum);
    if (!claimant || !target) return;
    const claimantLabel = _seatLabel(claimant);
    const targetLabel = _seatLabel(target);
    const claimantTeam = (CHAR_BY_ID[claimant.actualRoleId] || {}).team;
    const isMinion = claimantTeam === 'minion';
    const logAudit = (outcome) => appendDayEntry(dayIdx, {
      kind: 'claim', roleId: 'damsel', claimantSeat: claimantSeatNum, targetSeat: targetSeatNum, outcome,
    });
    if (!isMinion) {
      logAudit('damsel-no-minion');
      addCornerPrompt({
        kind: 'warn',
        title: 'Damsel guess — not a Minion',
        body: claimantLabel + ' is not a Minion. The guess has no effect.',
        actions: [{ label: 'OK', primary: true }],
      });
      return;
    }
    const damselSeat = (state.grimoire.seats || []).find(s => s.actualRoleId === 'damsel');
    if (!damselSeat) {
      logAudit('damsel-not-in-play');
      addCornerPrompt({
        kind: 'warn',
        title: 'Damsel guess — no Damsel in play',
        body: 'No Damsel is currently in play (may have been swapped by Huntsman).',
        actions: [{ label: 'OK', primary: true }],
      });
      return;
    }
    const alreadyGuessed = (damselSeat.reminders || []).some(r =>
      r && r.charId === 'damsel' && /guess used/i.test(String(r.label || '')));
    const targetIsDamsel = target.seatNum === damselSeat.seatNum;
    if (targetIsDamsel && !alreadyGuessed) {
      logAudit('damsel-correct-win');
      addCornerPrompt({
        kind: 'warn',
        title: 'Damsel guessed correctly — Evil wins!',
        body: claimantLabel + ' (Minion) correctly guessed ' + targetLabel + ' as the Damsel. The Evil team wins — announce the game end.',
        actions: [{ label: 'OK', primary: true }],
      });
    } else if (targetIsDamsel && alreadyGuessed) {
      logAudit('damsel-already-guessed');
      addCornerPrompt({
        kind: 'warn',
        title: 'Damsel guess already used',
        body: 'The Damsel guess has already been used this game (marker on the Damsel\'s seat). No further guesses can win.',
        actions: [{ label: 'OK', primary: true }],
      });
    } else {
      // Wrong guess — place 'Guess used' on damsel seat.
      logAudit('damsel-wrong');
      _placeReminderInline(damselSeat.seatNum, 'damsel', 'Guess used');
      const damselLabel = damselSeat.playerName ? damselSeat.playerName + ' (seat #' + damselSeat.seatNum + ')' : 'seat #' + damselSeat.seatNum;
      addCornerPrompt({
        kind: 'success',
        title: 'Damsel guess wrong',
        body: claimantLabel + ' (Minion) guessed ' + targetLabel + ' — that is NOT the Damsel. "Guess used" reminder placed on the Damsel (' + damselLabel + '). No more Damsel guesses allowed.',
        actions: [{ label: 'OK', primary: true }],
      });
    }
  };

  // Puzzlemaster guess — claimant claims Puzzlemaster, target is the player
  // they guess is drunk. Special-case before generic kill flow.
  const _resolvePuzzlemasterGuess = ({ claimantSeatNum, targetSeatNum, dayIdx }) => {
    const claimant = _seatBy(claimantSeatNum);
    const target = _seatBy(targetSeatNum);
    if (!claimant || !target) return;
    const claimantLabel = _seatLabel(claimant);
    const targetLabel = _seatLabel(target);
    const isReal = claimant.actualRoleId === 'puzzlemaster';
    const logAudit = (outcome) => appendDayEntry(dayIdx, {
      kind: 'claim', roleId: 'puzzlemaster', claimantSeat: claimantSeatNum, targetSeat: targetSeatNum, outcome,
    });
    if (!isReal) {
      logAudit('pm-fake');
      addCornerPrompt({
        kind: 'warn',
        title: 'Puzzlemaster guess — not the Puzzlemaster',
        body: claimantLabel + ' is not the Puzzlemaster. The guess has no effect.',
        actions: [{ label: 'OK', primary: true }],
      });
      return;
    }
    // Real Puzzlemaster. Always place ability-used marker.
    _placeReminderInline(claimantSeatNum, 'puzzlemaster', 'No ability');
    const targetIsDrunk = (target.reminders || []).some(r =>
      r && r.charId === 'puzzlemaster' && /drunk/i.test(String(r.label || '')));
    if (targetIsDrunk) {
      logAudit('pm-correct');
      addCornerPrompt({
        kind: 'success',
        title: 'Puzzlemaster guessed correctly',
        body: claimantLabel + ' (Puzzlemaster) correctly guessed ' + targetLabel + ' as the drunk player. Privately confirm to the Puzzlemaster.',
        actions: [{ label: 'OK', primary: true }],
      });
    } else {
      logAudit('pm-wrong');
      addCornerPrompt({
        kind: 'warn',
        title: 'Puzzlemaster guessed wrong',
        body: claimantLabel + ' (Puzzlemaster) guessed ' + targetLabel + ', but that is NOT the drunk player. Privately give them false info (point at any seat).',
        actions: [{ label: 'OK', primary: true }],
      });
    }
  };

  const resolveClaimAndKill = ({ roleId, label, claimantSeatNum, targetSeatNum, dayIdx }) => {
    // Damsel guess: dispatch to its own handler.
    if (roleId === 'damsel') {
      return _resolveDamselGuess({ claimantSeatNum, targetSeatNum, dayIdx });
    }
    if (roleId === 'puzzlemaster') {
      return _resolvePuzzlemasterGuess({ claimantSeatNum, targetSeatNum, dayIdx });
    }
    const claimant = _seatBy(claimantSeatNum);
    const target = _seatBy(targetSeatNum);
    if (!claimant || !target) return;
    const isReal = claimant.actualRoleId === roleId;
    const afflicted = isDrunkOrPoisoned(claimant);
    const alreadyUsed = (claimant.reminders || []).some(r => r && /no ability/i.test(String(r.label || '')));
    const claimantLabel = _seatLabel(claimant);
    const targetLabel = _seatLabel(target);
    const roleName = (CHAR_BY_ID[roleId] || {}).name || label;
    const targetChar = CHAR_BY_ID[target.actualRoleId];
    const targetIsDemon = targetChar?.team === 'demon';
    const targetIsRecluse = target.actualRoleId === 'recluse';
    // Slayer requires a Demon target (or Recluse via ST decision). Psychopath
    // kills any target. Configure per role:
    const requiresDemonTarget = roleId === 'slayer';
    const oncePerGame        = roleId === 'slayer';
    // Audit: log every claim to the nominations table (even fake / no-effect).
    const logAudit = (outcome) => appendDayEntry(dayIdx, {
      kind: 'claim', roleId, claimantSeat: claimantSeatNum, targetSeat: targetSeatNum, outcome,
    });
    // Already-used real claimant → warn, log, no other effect.
    if (alreadyUsed && isReal) {
      logAudit('already-used');
      addCornerPrompt({
        kind: 'warn',
        title: `${roleName} already used`,
        body: `${claimantLabel} IS the ${roleName} but the ability has already been used. No effect on ${targetLabel}.`,
        actions: [{ label: 'Got it', primary: true }],
      });
      return;
    }
    // Fake claim — silently log, no popup.
    if (!isReal) {
      logAudit('fake');
      return;
    }
    // REAL claimant. Mark "No ability" for once-per-game roles regardless of
    // whether the kill succeeds (the ability is consumed by the claim itself).
    if (oncePerGame) {
      _placeReminderInline(claimantSeatNum, roleId, 'No ability');
    }
    // Drunk/poisoned real claimant → ability malfunctions, no kill, no popup.
    if (afflicted) {
      logAudit('drunk-no-kill');
      return;
    }
    // Sober real claimant → resolve based on target / role rules.
    if (requiresDemonTarget) {
      if (targetIsDemon) {
        // Real Slayer hits the Demon → kill immediately (no death-confirm).
        _killSeatDirect(targetSeatNum, roleId, 'Dead', true);
        logAudit('killed-demon');
        addCornerPrompt({
          kind: 'success',
          title: `${roleName} fired`,
          body: `${claimantLabel} killed ${targetLabel} (${targetChar?.name || target.actualRoleId}).`,
          actions: [{ label: 'Got it', primary: true }],
        });
      } else if (targetIsRecluse) {
        // Recluse may register as Demon → ask ST.
        addCornerPrompt({
          kind: 'warn',
          title: `${roleName} on Recluse`,
          body: `${claimantLabel} (real ${roleName}) targeted ${targetLabel} who is the Recluse. Recluse may register as the Demon — fire and kill?`,
          actions: [
            { label: 'Yes, kill', primary: true, onClick: () => {
              _killSeatDirect(targetSeatNum, roleId, 'Dead', true);
              logAudit('killed-recluse');
            }},
            { label: 'No', onClick: () => logAudit('recluse-spared') },
          ],
        });
      } else {
        // Real Slayer + non-Demon non-Recluse target → no kill, no popup. Audit only.
        logAudit('no-effect');
      }
    } else {
      // Psychopath-style: kills any target. Direct kill (no death-confirm).
      _killSeatDirect(targetSeatNum, roleId, 'Dead', true);
      logAudit('killed');
      addCornerPrompt({
        kind: 'success',
        title: `${roleName} fired`,
        body: `${claimantLabel} killed ${targetLabel}.`,
        actions: [{ label: 'Got it', primary: true }],
      });
    }
  };

  // Mutant: claim only (publicly claims to be an Outsider while being the
  // Mutant). If real → prompt ST that they may be executed. If fake → banner.
  const resolveMutantClaim = ({ claimantSeatNum, dayIdx }) => {
    const claimant = _seatBy(claimantSeatNum);
    if (!claimant) return;
    const claimantLabel = _seatLabel(claimant);
    const isReal = claimant.actualRoleId === 'mutant';
    const afflicted = isDrunkOrPoisoned(claimant);
    const logAudit = (outcome) => appendDayEntry(dayIdx, {
      kind: 'claim', roleId: 'mutant', claimantSeat: claimantSeatNum, targetSeat: null, outcome,
    });
    if (!isReal) {
      logAudit('fake');
      return;
    }
    logAudit(afflicted ? 'mutant-drunk' : 'mutant-real');
    addCornerPrompt({
      kind: 'warn',
      title: `Mutant publicly claimed Outsider`,
      body: `${claimantLabel} IS the Mutant${afflicted ? ' (but is drunk/poisoned — ST may waive)' : ''}. You may execute them (BotC rule).`,
      actions: [
        { label: 'Ignore' },
        { label: 'Execute', primary: true, onClick: () => {
          _executePlayer(claimantSeatNum);
          setTimeout(() => addCornerPrompt({
            kind: 'success',
            title: 'Mutant executed',
            body: claimantLabel + ' was executed. The day phase should end now — click "Go to night".',
            actions: [{ label: 'OK', primary: true }],
          }), 0);
        }},
      ],
    });
  };

  // Artist: claim-only day ability (once-per-game).
  const resolveArtistClaim = ({ claimantSeatNum, dayIdx }) => {
    const claimant = _seatBy(claimantSeatNum);
    if (!claimant) return;
    const claimantLabel = _seatLabel(claimant);
    const isReal = claimant.actualRoleId === 'artist';
    const afflicted = isDrunkOrPoisoned(claimant);
    const alreadyUsed = (claimant.reminders || []).some(r =>
      r && r.charId === 'artist' && /no ability|used/i.test(String(r.label || '')));
    const logAudit = (outcome) => appendDayEntry(dayIdx, {
      kind: 'claim', roleId: 'artist', claimantSeat: claimantSeatNum, targetSeat: null, outcome,
    });
    if (!isReal) { logAudit('fake'); return; }
    if (alreadyUsed) {
      logAudit('already-used');
      addCornerPrompt({
        kind: 'warn',
        title: 'Artist already used',
        body: claimantLabel + ' IS the Artist but the ability has already been used this game.',
        actions: [{ label: 'OK', primary: true }],
      });
      return;
    }
    logAudit(afflicted ? 'artist-drunk' : 'artist-real');
    _placeReminderInline(claimantSeatNum, 'artist', 'No ability');
    addCornerPrompt({
      kind: afflicted ? 'warn' : 'success',
      title: afflicted ? 'Artist drunk/poisoned' : 'Artist used ability',
      body: claimantLabel + ' IS the Artist' + (afflicted ? ' (drunk/poisoned — they may receive false info).' : '. Answer their yes/no question truthfully.'),
      actions: [{ label: 'OK', primary: true }],
    });
  };

  // Fisherman: claim-only day ability, once per game (Artist-clone).
  // Real Fisherman + sober → ST gives advice (private). Drunk/poisoned →
  // popup notes the advice may be false. Fake claim → no effect.
  const resolveFishermanClaim = ({ claimantSeatNum, dayIdx }) => {
    const claimant = _seatBy(claimantSeatNum);
    if (!claimant) return;
    const claimantLabel = _seatLabel(claimant);
    const isReal = claimant.actualRoleId === 'fisherman';
    const afflicted = isDrunkOrPoisoned(claimant);
    const alreadyUsed = (claimant.reminders || []).some(r =>
      r && r.charId === 'fisherman' && /no ability|used/i.test(String(r.label || '')));
    const logAudit = (outcome) => appendDayEntry(dayIdx, {
      kind: 'claim', roleId: 'fisherman', claimantSeat: claimantSeatNum, targetSeat: null, outcome,
    });
    if (!isReal) { logAudit('fake'); return; }
    if (alreadyUsed) {
      logAudit('already-used');
      addCornerPrompt({
        kind: 'warn',
        title: 'Fisherman already used',
        body: claimantLabel + ' IS the Fisherman but the ability has already been used this game.',
        actions: [{ label: 'OK', primary: true }],
      });
      return;
    }
    logAudit(afflicted ? 'fisherman-drunk' : 'fisherman-real');
    _placeReminderInline(claimantSeatNum, 'fisherman', 'No ability');
    addCornerPrompt({
      kind: afflicted ? 'warn' : 'success',
      title: afflicted ? 'Fisherman drunk/poisoned' : 'Fisherman used ability',
      body: claimantLabel + ' IS the Fisherman' + (afflicted ? ' (drunk/poisoned — your advice may be wrong).' : '. Privately give them strategic advice.'),
      actions: [{ label: 'OK', primary: true }],
    });
  };

  // Savant: claim-only day ability, REPEATABLE (no once-per-game tracker).
  // Real Savant + sober → ST delivers 2 facts (1 true, 1 false).
  // Real Savant + drunk/poisoned → both facts may be false.
  // Fake claim → no effect (logged only).
  const resolveSavantClaim = ({ claimantSeatNum, dayIdx }) => {
    const claimant = _seatBy(claimantSeatNum);
    if (!claimant) return;
    const claimantLabel = _seatLabel(claimant);
    const isReal = claimant.actualRoleId === 'savant';
    const afflicted = isDrunkOrPoisoned(claimant);
    const logAudit = (outcome) => appendDayEntry(dayIdx, {
      kind: 'claim', roleId: 'savant', claimantSeat: claimantSeatNum, targetSeat: null, outcome,
    });
    if (!isReal) { logAudit('fake'); return; }
    logAudit(afflicted ? 'savant-drunk' : 'savant-real');
    addCornerPrompt({
      kind: afflicted ? 'warn' : 'success',
      title: afflicted ? 'Savant drunk/poisoned' : 'Savant used ability',
      body: claimantLabel + ' IS the Savant. Privately tell them 2 facts: '
        + (afflicted
            ? 'they are drunk/poisoned, so BOTH facts may be false.'
            : '1 must be true and 1 must be false.'),
      actions: [{ label: 'OK', primary: true }],
    });
  };

  // Juggler: 5 (player + character) guesses on Day 1. Real Juggler + sober →
  // compare each guess in order, place 'Juggler: Correct' / 'Juggler: Wrong'
  // markers on the guessed players. Place 'No ability' on the Juggler.
  const resolveJugglerClaim = ({ claimantSeatNum, picks, dayIdx }) => {
    const claimant = _seatBy(claimantSeatNum);
    if (!claimant) return;
    const claimantLabel = _seatLabel(claimant);
    const isReal = claimant.actualRoleId === 'juggler';
    const afflicted = isDrunkOrPoisoned(claimant);
    const alreadyUsed = (claimant.reminders || []).some(r =>
      r && r.charId === 'juggler' && /no ability|used/i.test(String(r.label || '')));
    const logAudit = (outcome, extras = {}) => appendDayEntry(dayIdx, {
      kind: 'claim', roleId: 'juggler', claimantSeat: claimantSeatNum, targetSeat: null,
      outcome, jugglerPicks: picks, ...extras,
    });
    if (!isReal) { logAudit('fake'); return; }
    if (alreadyUsed) {
      logAudit('already-used');
      addCornerPrompt({
        kind: 'warn',
        title: 'Juggler already used',
        body: claimantLabel + ' IS the Juggler but the ability has already been used this game.',
        actions: [{ label: 'OK', primary: true }],
      });
      return;
    }
    if (afflicted) {
      logAudit('juggler-drunk');
      _placeReminderInline(claimantSeatNum, 'juggler', 'No ability');
      addCornerPrompt({
        kind: 'warn',
        title: 'Juggler drunk/poisoned',
        body: claimantLabel + ' IS the Juggler but is drunk/poisoned — no Correct/Wrong markers placed. The night step reads 0 correct.',
        actions: [{ label: 'OK', primary: true }],
      });
      return;
    }
    const results = picks.map(p => {
      const ts = _seatBy(p.seatNum);
      return ts && ts.actualRoleId === p.roleId ? 'correct' : 'wrong';
    });
    update(s => {
      const seats0 = (s.grimoire.seats || []).map(seat => {
        if (seat.seatNum !== claimantSeatNum) return seat;
        return { ...seat, reminders: [...(seat.reminders || []), { charId: 'juggler', label: 'No ability', fromPrompt: true }] };
      });
      const withMarkers = seats0.map(seat => {
        const myPickIdxs = picks.map((p, i) => p.seatNum === seat.seatNum ? i : -1).filter(i => i >= 0);
        if (myPickIdxs.length === 0) return seat;
        const newReminders = (seat.reminders || []).slice();
        for (const idx of myPickIdxs) {
          newReminders.push({ charId: 'juggler', label: results[idx] === 'correct' ? 'Correct' : 'Wrong', fromPrompt: true });
        }
        return { ...seat, reminders: newReminders };
      });
      return { grimoire: { ...s.grimoire, seats: withMarkers } };
    });
    const correctCount = results.filter(r => r === 'correct').length;
    logAudit('juggler-real', { jugglerResults: results, correctCount });
    addCornerPrompt({
      kind: 'success',
      title: 'Juggler guesses recorded',
      body: claimantLabel + ' (Juggler) had ' + correctCount + ' correct out of ' + picks.length + '. Markers placed. The night step will auto-suggest ' + correctCount + '.',
      actions: [{ label: 'OK', primary: true }],
    });
  };

  // Virgin: auto-triggered when a Townsfolk nominates a Virgin who hasn't used
  // the ability yet. Pops a corner prompt so the ST confirms execution (handles
  // edge cases like Recluse registration).
  const tryFireVirgin = (nominatorSeatNum, nomineeSeatNum, dayIdx) => {
    const nominator = _seatBy(nominatorSeatNum);
    const nominee = _seatBy(nomineeSeatNum);
    if (!nominator || !nominee) return;
    if (nominee.actualRoleId !== 'virgin') return;
    const virginAlreadyUsed = (nominee.reminders || []).some(r => r && /no ability/i.test(String(r.label || '')));
    if (virginAlreadyUsed) return;
    // Per rules: "1st time you are nominated" — the ability is consumed by
    // the first nomination regardless of who nominated. Mark used now so a
    // later Townsfolk nomination won't re-trigger.
    _placeReminderInline(nomineeSeatNum, 'virgin', 'No ability');
    const nominatorTeam = (CHAR_BY_ID[nominator.actualRoleId] || {}).team;
    const nominatorAfflicted = isDrunkOrPoisoned(nominee);
    const isRecluse = nominator.actualRoleId === 'recluse';
    const isTownsfolk = nominatorTeam === 'townsfolk';
    if (!isTownsfolk && !isRecluse) {
      // Non-townsfolk (and not Recluse) — no execution. Audit banner.
      pushDayBanner({
        kind: 'info',
        text: `${_seatLabel(nominator)} (${nominatorTeam || 'no role'}) nominated the Virgin (${_seatLabel(nominee)}) — not a Townsfolk, no execution. Virgin ability consumed.`,
      });
      return;
    }
    const fire = () => {
      // Execute the nominator directly (no death-confirm modal — ST already
      // approved via the popup that called this fire()).
      _killSeatDirect(nominatorSeatNum, 'virgin', 'Dead', true);
      // Audit: log a special entry only on actual execution.
      appendDayEntry(dayIdx, {
        kind: 'special',
        text: `Virgin ability fired — ${_seatLabel(nominator)} executed for nominating the Virgin (${_seatLabel(nominee)}).`,
        subjectSeat: nominatorSeatNum,
        sourceRoleId: 'virgin',
      });
      addCornerPrompt({
        kind: 'success',
        title: 'Virgin ability fired',
        body: `${_seatLabel(nominator)} nominated the Virgin (${_seatLabel(nominee)}) and is executed immediately.`,
        actions: [{ label: 'Got it', primary: true }],
      });
    };
    if (nominatorAfflicted) {
      // Virgin's ability is malfunctioning — ST may still choose to execute
      // the nominator (rule of cool / drunk override). Only ask for Townsfolk
      // and Recluse nominators since other teams never trigger Virgin anyway.
      if (isTownsfolk || isRecluse) {
        const whoLabel = isRecluse ? 'Recluse (may register as Townsfolk)' : 'Townsfolk';
        addCornerPrompt({
          kind: 'warn',
          title: 'Virgin drunk/poisoned',
          body: `${_seatLabel(nominator)} (${whoLabel}) nominated the Virgin (${_seatLabel(nominee)}). The Virgin is drunk/poisoned — execute the nominator anyway? (ST decision)`,
          actions: [
            { label: 'Yes, execute', primary: true, onClick: () => fire() },
            { label: 'No', onClick: () => pushDayBanner({
                kind: 'info',
                text: `Virgin (drunk/poisoned) did not execute ${_seatLabel(nominator)} — ST waived. Ability consumed.`,
              }) },
          ],
        });
      } else {
        pushDayBanner({
          kind: 'info',
          text: `${_seatLabel(nominator)} nominated the Virgin (${_seatLabel(nominee)}) — Virgin is drunk/poisoned, ability does not fire. Ability consumed.`,
        });
      }
      return;
    }
    if (isRecluse) {
      // ST may choose to fire (Recluse may register as Townsfolk).
      addCornerPrompt({
        kind: 'warn',
        title: 'Virgin nominated by Recluse',
        body: `Recluse may register as Townsfolk. Fire the Virgin ability and execute ${_seatLabel(nominator)}?`,
        actions: [
          { label: 'Yes, fire', primary: true, onClick: fire },
          { label: 'No', onClick: () => {} },
        ],
      });
      return;
    }
    // Townsfolk nominator + sober Virgin → confirm prompt.
    addCornerPrompt({
      kind: 'warn',
      title: 'Virgin ability triggered',
      body: `Townsfolk ${_seatLabel(nominator)} nominated the Virgin (${_seatLabel(nominee)}). Execute ${_seatLabel(nominator)} immediately?`,
      actions: [
        { label: 'Yes, execute', primary: true, onClick: fire },
        { label: 'Cancel', onClick: () => {} },
      ],
    });
  };

  // Pickup a hidden role (Drunk / Marionette) for assignment. Toggle on re-pickup.
  const pickupAssignment = (roleId) => {
    setAssigningRoleId(prev => (prev === roleId ? null : roleId));
    setSwapSourceSeat(null);
  };
  const cancelAssignment = () => setAssigningRoleId(null);

  // Undo a Drunk/Marionette assignment, putting it back in the pending list.
  // (Wraps unassignPendingRole so the SetupNeedsPanel can call by character ID.)
  const undoAssignmentByCharId = (charId) => {
    const seat = state.grimoire.seats.find(s => s.actualRoleId === charId && s.actualRoleId !== s.perceivedRoleId);
    if (seat) unassignPendingRole(seat.seatNum);
  };

  // Tap-to-swap and tap-to-assign in one handler. Assignment takes priority when active.
  const handleSeatTap = (seatNum) => {
    if (assigningRoleId) {
      const eligible = eligibleSeatsForPending(assigningRoleId, state.grimoire.seats);
      if (eligible.has(seatNum)) {
        assignPendingRole(seatNum, assigningRoleId);
        setAssigningRoleId(null);
      }
      // Tapping a non-eligible seat in assignment mode is a no-op (keeps mode active).
      return;
    }
    if (swapSourceSeat === seatNum) {
      setSwapSourceSeat(null);
    } else if (swapSourceSeat != null) {
      swapSeats(swapSourceSeat, seatNum);
      setSwapSourceSeat(null);
    } else {
      setSwapSourceSeat(seatNum);
    }
  };
  const cancelSwap = () => setSwapSourceSeat(null);

  // Swap roles between two seats (perceived + actual travel together; seat position stays).
  const swapSeats = (seatA, seatB) => {
    if (seatA === seatB) return;
    const a = state.grimoire.seats.find(s => s.seatNum === seatA);
    const b = state.grimoire.seats.find(s => s.seatNum === seatB);
    if (!a || !b) return;
    const seats = state.grimoire.seats.map(s => {
      if (s.seatNum === seatA) return { ...s, perceivedRoleId: b.perceivedRoleId, actualRoleId: b.actualRoleId };
      if (s.seatNum === seatB) return { ...s, perceivedRoleId: a.perceivedRoleId, actualRoleId: a.actualRoleId };
      return s;
    });
    update({ grimoire: { ...state.grimoire, seats } });
  };

  const setGrimoireView = (v) => update({ grimoireView: v });

  const grouped = useMemo(() => groupByTeam(state.characterIds), [state.characterIds]);
  const bag = getBag(state.playerCount);
  const setupMods = useMemo(() => getSetupModifiers(state.characterIds), [state.characterIds]);
  const jinxes = useMemo(() => getActiveJinxes(state.characterIds), [state.characterIds]);

  // While we're waiting for the very first Firebase snapshot OR the auth check,
  // show a small loader rather than a blank page or a flash of DEFAULT_STATE.
  if (!loaded || !authChecked) {
    return (
      <div className="text-center py-24">
        <div className="text-amber-200 text-lg">Loading room <span className="font-bold tracking-widest">{roomCode}</span>…</div>
        <p className="text-xs text-stone-500 mt-2">Connecting to the cloud. First-time loads can take a couple seconds.</p>
      </div>
    );
  }

  // Auth gate (skipped for spectators). Two sub-screens:
  //   • No PIN set yet → PinSetup (the user is the room creator)
  //   • PIN set but this device hasn't passed → PinEntry
  if (!isSpectator && !authed) {
    if (knownPin === '' || knownPin === null) {
      return <PinSetup
        roomCode={roomCode}
        onSet={(pin) => {
          const ref = window.__BOTC_DB__.ref('rooms/' + roomCode + '/auth');
          ref.set({ pin }).catch(e => console.error('pin set failed:', e));
          try { localStorage.setItem('botc-pin-' + roomCode, pin); } catch {}
          setAuthed(true);
        }}
      />;
    }
    return <PinEntry
      roomCode={roomCode}
      expectedPin={knownPin}
      onSuccess={(pin) => {
        try { localStorage.setItem('botc-pin-' + roomCode, pin); } catch {}
        setAuthed(true);
      }}
      onSwitchToSpectator={() => {
        const url = new URL(window.location.href);
        url.searchParams.set('view', 'spectator');
        window.location.href = url.toString();
      }}
    />;
  }

  return (
    <div className="space-y-6">
      <header className="flex flex-wrap items-baseline justify-between gap-4">
        <div>
          <h1 className="text-2xl sm:text-3xl font-semibold tracking-tight text-amber-200">
            {isSpectator ? 'Spectator — Blood on the Clocktower' : 'Storyteller — Blood on the Clocktower'}
          </h1>
          <p className="text-sm text-stone-400 mt-1">
            {isSpectator
              ? 'Read-only grimoire view. You can see the game but not change anything.'
              : 'Build your script and set up the game. Players never see this screen.'}
          </p>
        </div>
        <a href="index.html" className="text-xs text-stone-400 hover:text-amber-300 underline underline-offset-2">← back to start</a>
      </header>

      <RoomBar roomCode={roomCode} isOnline={isOnline} onSetRoom={setRoomCode} isSpectator={isSpectator} />

      {!isSpectator && (
        <PageNav active={state.page} onChange={(p) => update({ page: p })}
          grimoireReady={state.grimoire.generated}
          gameStarted={state.grimoire.gameStarted} />
      )}

      {state.page === 'script' && !isSpectator && (
        <ScriptBuilderPage
          state={state}
          grouped={grouped}
          jinxes={jinxes}
          onLoadEdition={loadEdition}
          onBlank={blankScript}
          onImport={importScript}
          onRename={(name) => update({ scriptName: name })}
          onRenameAuthor={(author) => update({ scriptAuthor: author })}
          onAdd={addCharacter}
          onRemove={removeCharacter}
          onExport={() => {
            const blob = new Blob([buildScriptJson(state)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `${(state.scriptName||'script').replace(/\s+/g,'_')}.json`;
            a.click(); URL.revokeObjectURL(url);
          }}
        />
      )}

      {state.page === 'bag' && !isSpectator && (
        <BagSetupPage
          state={state}
          bag={bag}
          grouped={grouped}
          setupMods={setupMods}
          onCount={setPlayerCount}
          onJumpToScript={() => update({ page: 'script' })}
          onIncrementInBag={incrementInBag}
          onDecrementInBag={decrementInBag}
          onRandomizeTeam={randomizeBagForTeam}
          onClearTeam={clearBagForTeam}
          onClearBag={clearBag}
          onSetGodfatherSign={setGodfatherSign}
          onSetBalloonistOutsider={setBalloonistOutsider}
          onSetHermitOutsider={setHermitOutsider}
          onSetXaanOutsiders={setXaanOutsiders}
          onSetLotOutsiders={setLotOutsiders}
          onSetKazaliOutsiders={setKazaliOutsiders}
          onSetAtheistOutsiders={setAtheistOutsiders}
          onSetFeature={setFeature}
          onGenerate={generateRoles}
        />
      )}

      {state.page === 'tokens' && !isSpectator && (
        <TokensPage state={state}
          onShowGrimoireToSeat={showGrimoireToSeat}
          onCancelGrimoireShow={cancelGrimoireShow}
        />
      )}

      {state.page === 'nominations' && !isSpectator && (
        <NominationsPage
          state={state}
          onAdd={addNomination}
          onUpdate={updateNomination}
          onRemove={removeNomination}
          onSetDayVoting={setDayVoting}
          onSetViewingDay={setNominationsViewingDayIndex}
          onJumpToGrimoire={() => update({ page: 'grimoire' })}
          onAdvanceToNight={advanceToNightWithExecution}
          onResolveClaimAndKill={resolveClaimAndKill}
          onResolveMutantClaim={resolveMutantClaim}
          onResolveArtistClaim={resolveArtistClaim}
          onResolveSavantClaim={resolveSavantClaim}
          onResolveFishermanClaim={resolveFishermanClaim}
          onResolveJugglerClaim={resolveJugglerClaim}
        />
      )}

      {(isSpectator || state.page === 'grimoire') && (
        <GrimoirePage
          nightToasts={toasts}
          onDismissNightToast={dismissPromptToast}
          onStartNightPrompt={startNightPrompt}
          onCancelNightPrompt={cancelNightPrompt}
