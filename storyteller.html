    requiresDeath: !!def.requiresDeath,
    oncePerGame:   !!def.oncePerGame,
    canSkip:       !!def.canSkip,
  };
}

// ---------------- Reminder lifetime (transient vs permanent) ----------------
//
// When the ST advances to the next night, transient reminders are cleared so
// the grimoire isn't littered with last-night's Poisoned/Safe/Chose tokens.
// A reminder is PERMANENT (kept) when:
//   - it's a hidden-role marker (Drunk/Marionette/Lunatic etc. "Is the X")
//   - it's a Kazali "Was X" conversion marker
//   - its label is 'No ability' or 'Used' (universal state markers)
//   - its charId is in PERMANENT_REMINDER_CHARS (once-per-game / passive trigger
//     roles whose reminders mark a one-time state change)
//   - it's a Courtier "Drunk" countdown (3 nights, ST decrements manually)
//
// Anything else is transient — removed on Go-to-Night. Tweak the lists below
// as you discover edge cases in play.
const PERMANENT_REMINDER_CHARS = new Set([
  // First-night-only info roles (their reminders are placed once at setup)
  'washerwoman', 'librarian', 'investigator', 'chef',
  // Once-per-game ability tracker roles
  'fool', 'philosopher', 'ravenkeeper', 'professor', 'sage',
  // Huntsman: 'Was Damsel' marker on the converted Damsel seat.
  'huntsman',
  // Passive trigger roles (their reminders mark a one-time event)
  'klutz', 'mutant', 'goon', 'lycanthrope',
  // Once-per-game evil
  'assassin',
  // Snitch (minion bluffs marker)
  'snitch',
  // Mezepheles (mad word — permanent ability loss)
  'mezepheles',
  // Juggler: 'Correct' / 'Wrong' / 'No ability' markers from Day 1 picks persist
  // long enough for the Night 2 info-st step to count them.
  'juggler',
  // Sweetheart: 'Drunk' marker placed on the chosen player when Sweetheart dies — permanent.
  'sweetheart',
  // Snake Charmer: 'Poisoned' marker on the swapped player and 'Reveal: ...'
  // markers driving the synthetic post-swap reveal steps.
  'snakecharmer',
  // Damsel: 'Guess used' marker — permanent (only 1 guess allowed per game).
  'damsel',
  // Cannibal: 'Was Cannibal · <Role>' (stores original role for revert) +
  // 'Cannibal: Drunk' (evil-execution drunkenness, persists until next exec).
  'cannibal',
  // Banshee: 'Triggered' marker placed when killed by Demon — permanent ability gain.
  'banshee',
  // Pit-Hag: 'Was X' marker tracks the previous role for converted players.
  'pithag',
  // Lleech: 'Host' marker on the chosen player (first night) — permanent immunity gate.
  'lleech',
  // Vigormortis: 'Keeps ability' marker on killed Minions + 'Poisoned' marker on a TF neighbour.
  'vigormortis',
  // Fang Gu: 'Swapped' marker tracks that the first-Outsider-kill swap happened.
  'fanggu',
  // (Lunatic was previously here for the fake-Minion markers — now
  // handled by a specific rule in isReminderPermanent so action-related
  // placements (Pukka's 'Poisoned' etc. when Lunatic-as-Pukka picks) are
  // transient and clear at Go-to-Night like the real role's placements.)
]);
const PERMANENT_REMINDER_LABELS = new Set(['No ability', 'Used']);
// Compute today's chopping-block state from a day's nominations + alive count.
// Returns { minVotes, onBlock: { nomineeSeat, votes } | null, nextNeeded }.
//   - minVotes:    ceil(aliveCount / 2) — minimum to ever be on the block
//   - onBlock:     the unique nominee with the most votes (if >= minVotes and
//                  no tie). null if no candidate or a tie exists.
//   - nextNeeded:  minimum votes needed for a subsequent nominee to take the
//                  block. = max(minVotes, currentBlockVotes + 1) when blocked,
//                  or maxVotes+1 if a tie exists at the top, or minVotes if
//                  no candidate yet.
function computeChoppingBlock(nominations, aliveCount) {
  const minVotes = Math.max(1, Math.ceil((aliveCount || 0) / 2));
  const noms = (nominations || []).filter(n => !n.kind || n.kind === 'nomination');
  const qualifying = noms.filter(n => (n.votes || 0) >= minVotes);
  if (qualifying.length === 0) {
    return { minVotes, onBlock: null, nextNeeded: minVotes };
  }
  const maxVotes = Math.max(...qualifying.map(n => n.votes || 0));
  const top = qualifying.filter(n => (n.votes || 0) === maxVotes);
  if (top.length === 1) {
    return { minVotes, onBlock: { nomineeSeat: top[0].nomineeSeat, votes: maxVotes }, nextNeeded: maxVotes + 1 };
  }
  // Tie at the top → no one on the block; next nomination needs to exceed the tie.
  return { minVotes, onBlock: null, nextNeeded: maxVotes + 1 };
}

function isReminderPermanent(reminder) {
  if (!reminder) return false;
  if (reminder.hiddenRoleMarker) return true;
  if (reminder.kazaliOriginal) return true;
  if (reminder.scarletWomanOriginal) return true;
  if (PERMANENT_REMINDER_LABELS.has(reminder.label)) return true;
  if (PERMANENT_REMINDER_CHARS.has(reminder.charId)) return true;
  // Courtier countdown — 3-night "Drunk 1/2/3" persists; advanceToNight
  // increments and removes.
  if (reminder.charId === 'courtier' && /^drunk\s*\d*$/i.test(reminder.label || '')) return true;
  // Minstrel countdown — 2-night "Drunk 1/2" placed on every non-Minstrel
  // seat after a minion is executed. advanceToNight bumps + removes.
  if (reminder.charId === 'minstrel' && /^drunk\s*\d*$/i.test(reminder.label || '')) return true;
  // Godfather "Died Today" persists into the night so the Godfather can
  // wake and use the trigger. After they act, it's cleared programmatically.
  if (reminder.charId === 'godfather' && /died today/i.test(reminder.label || '')) return true;
  // Exorcist 'Chose' (with exChose flag) tracks previous-night pick so the
  // picker excludes the same player two nights in a row. Cleared+replaced.
  if (reminder.charId === 'exorcist' && reminder.exChose) return true;
  // Po 'Hungry' / '3 to kill' persists until Po next picks 3 players.
  if (reminder.charId === 'po' && /hungry|3 to kill/i.test(reminder.label || '')) return true;
  // Moonchild 'Triggered' (just died) persists until ST resolves the pick.
  if (reminder.charId === 'moonchild' && /trigger/i.test(reminder.label || '')) return true;
  // Barber: Haircuts tonight (dayIdx-tagged, stripped by stripStaleHaircuts);
  // No swap (demon declined); Reveal: new role (drives sub-reveal steps).
  if (reminder.charId === 'barber' && /haircuts tonight/i.test(reminder.label || '')) return true;
  if (reminder.charId === 'barber' && /^(no swap|reveal:)/i.test(reminder.label || '')) return true;
  // Lunatic: only the ST-assigned 'Minion N' markers from the Lunatic-wakes
  // picker persist; ANY OTHER lunatic-charId reminder (e.g. 'Poisoned' /
  // 'Dead' placed when Lunatic-as-Pukka or Lunatic-as-Imp picks) is transient
  // and gets cleared at Go-to-Night with the rest of the role placements.
  if (reminder.charId === 'lunatic' && /^minion\s*\d+$/i.test(reminder.label || '')) return true;
  // Zombuul 'Executed once' marker persists for the whole game — it
  // tracks the one-time death-evasion trigger.
  if (reminder.charId === 'zombuul' && /^executed once$/i.test(reminder.label || '')) return true;
  // Zombuul 'Died today' marker survives the Go-to-Night transient sweep
  // so Zombuul's night step can check it. Stale markers (from older days)
  // are stripped by stripStaleDiedToday in advanceToNight via dayIdx tag.
  if (reminder.charId === 'zombuul' && /^died today$/i.test(reminder.label || '')) return true;
  // Pukka 'Poisoned' and 'Dead' markers — Poisoned persists through the
  // day, gets converted to 'Dead' at Go-to-Night, and 'Dead' persists
  // until the next Pukka pick resolves the kill (or the ST skips).
  if (reminder.charId === 'pukka' && /^poisoned$/i.test(reminder.label || '')) return true;
  if (reminder.charId === 'pukka' && /^(poison\s+)?dead$/i.test(reminder.label || '')) return true;
  // Shabaloth 'Dead' marker survives through the day and gets converted
  // to 'Eaten' at Go-to-Night so the next pick can offer to regurgitate.
  // 'Eaten' itself persists until the next Shabaloth pick resolves it
  // (regurgitate one or skip → marker stripped from all eligible).
  if (reminder.charId === 'shabaloth' && /^(dead|eaten)$/i.test(reminder.label || '')) return true;
  // Moonchild 'Dead' marker (placed on the chosen target at capture)
  // persists across nights until the ST resolves at the natural slot.
  if (reminder.charId === 'moonchild' && /^dead$/i.test(reminder.label || '')) return true;
  // Moonchild 'Chose' audit marker — she only fires once per game; the
  // marker stays so post-resolution the natural-slot row reads "already
  // resolved" instead of "has not died yet".
  if (reminder.charId === 'moonchild' && /^chose$/i.test(reminder.label || '')) return true;
  // Demon 'Exorcised' persists for the night so the demon's wake step
  // remains dim. Cleared at Go-to-Night (transient by default — see below).
  // Note: this is intentionally NOT made permanent here; the standard
  // transient-clearing on advanceToNight removes it automatically.
  // Grandmother — both the 'Grandchild' marker AND the first-night 'Saw: <role>'
  // info marker persist for the whole game. The Grandmother only ever sees her
  // grandchild once (on the first night) so the Saw marker stays placed for
  // the rest of the game as a reference.
  if (reminder.charId === 'grandmother' && /grandchild|child/i.test(reminder.label || '')) return true;
  if (reminder.charId === 'grandmother' && /^saw/i.test(reminder.label || '')) return true;
  return false;
}

// ---------------- Info-role auto-suggestion helpers ----------------
//
// When the ST opens InfoPickerModal for a factual number role (Chef, Empath,
// Oracle, Mathematician), we compute what the TRUE answer would be from the
// current grimoire state and surface it as a suggestion. The ST can accept the
// suggestion or pick anything else (e.g. to give false info to a drunk/poisoned
// player). Misregistration (Recluse / Spy) is NOT applied — those are
// ST-discretion choices the ST can make manually.

// Effective alignment of a seat: explicit override wins, else derived from the
// actual role's team (minion/demon = evil; everyone else = good).
function effectiveAlignment(seat) {
  if (!seat) return 'good';
  if (seat.alignment === 'good' || seat.alignment === 'evil') return seat.alignment;
  const team = CHAR_BY_ID[seat.actualRoleId]?.team;
  return (team === 'minion' || team === 'demon') ? 'evil' : 'good';
}
function isEvilSeat(seat) { return effectiveAlignment(seat) === 'evil'; }

// Drunk-or-poisoned detector. Catches:
//   - Drunk / Marionette by role (their actualRoleId)
//   - Any reminder token whose label contains "drunk" or "poisoned"
//     (covers Poisoner, Goon-drunk, Sweetheart-drunk, Innkeeper-drunk, Courtier,
//      Vortox/Vigormortis-imposed drunkenness, etc. — all standard reminder labels)
function isDrunkOrPoisoned(seat) {
  if (!seat) return false;
  if (seat.actualRoleId === 'drunk' || seat.actualRoleId === 'marionette') return true;
  return (seat.reminders || []).some(r => {
    if (!r) return false;
    // Lunatic-charId reminders are informational only — the Lunatic
    // thinks they are the demon and may "place" tokens (e.g. 'Poisoned'
    // when acting as Pukka), but those should NOT affect game state.
    if (r.charId === 'lunatic') return false;
    const label = String(r.label || '').toLowerCase();
    if (label.includes('drunk')) return true;
    return /\bpoison(ed)?\b/.test(label);
  });
}

// Detect known protections that could keep a seat alive even when a Dead
// reminder is placed. Returns { reasons: [...], afflicted: bool } where
// `reasons` is a human-readable list (empty = no protection found). Used by
// the death-confirm modal so the ST can make an informed call.
// Scarlet Woman: if she's alive, the Demon is dead, and there are 5+ alive
// players (Travellers don't count), she becomes the Demon on the next night.
// Returns null when conditions aren't met, otherwise { swSeat, deadDemonSeat,
// demonRoleId, aliveCount }.
function detectScarletWomanPromotion(seats) {
  if (!seats || seats.length === 0) return null;
  const swSeat = seats.find(s => s.actualRoleId === 'scarletwoman' && !s.isDead);
  if (!swSeat) return null;
  const deadDemonSeat = seats.find(s => {
    if (!s.isDead) return false;
    const team = CHAR_BY_ID[s.actualRoleId]?.team;
    return team === 'demon';
  });
  if (!deadDemonSeat) return null;
  const aliveCount = seats.filter(s => !s.isDead && s.actualRoleId).length;
  if (aliveCount < 5) return null;
  return { swSeat, deadDemonSeat, demonRoleId: deadDemonSeat.actualRoleId, aliveCount };
}

function checkDeathProtection(seat, allSeats, causeCharId) {
  if (!seat) return { reasons: [], afflicted: false };
  const reasons = [];
  // Cause filtering: Monk/Innkeeper/Angel "Safe", Soldier, Mayor only apply
  // to demon-team causes. Sailor/Fool/Tea Lady apply to any cause.
  const _causeChar = causeCharId ? CHAR_BY_ID[causeCharId] : null;
  const isDemonCause = !causeCharId || _causeChar?.team === 'demon';
  // Reminder-based: Monk / Innkeeper / Angel "Safe" or "Protect" tokens.
  for (const r of (isDemonCause ? (seat.reminders || []) : [])) {
    if (!r) continue;
    const label = String(r.label || '');
    if (r.charId === 'monk' && /safe/i.test(label)) reasons.push("Monk \u2018Safe\u2019 reminder \u2014 protected from Demon kills");
    if (r.charId === 'innkeeper' && /safe/i.test(label)) reasons.push("Innkeeper \u2018Safe\u2019 reminder \u2014 protected from Demon kills");
    if (r.charId === 'angel' && /protect|safe/i.test(label)) reasons.push("Angel \u2018Protect\u2019 reminder");
  }
  // Role-based self-protections — only fire when the protected player is
  // sober. Pukka poison (or any other drunk/poisoned marker) disables
  // these abilities, so the protection list correctly omits them.
  const role = seat.actualRoleId;
  const afflictedForSelf = isDrunkOrPoisoned(seat);
  if (!afflictedForSelf) {
    if (isDemonCause && role === 'soldier') reasons.push("Soldier role \u2014 cannot die at night to the Demon");
    // Sailor — marker-based check (Begin Game / Go-to-Night places it,
    // ST stripping it when choosing Sailor as drunk). Assassin bypasses.
    if (role === 'sailor' && causeCharId !== 'assassin') {
      const hasSailorProtect = (seat.reminders || []).some(r =>
        r && r.charId === 'sailor' && /^protected$/i.test(String(r.label || '')));
      if (hasSailorProtect) reasons.push("Sailor protection \u2014 cannot die (Assassin bypasses)");
    }
    if (isDemonCause && role === 'mayor') reasons.push("Mayor role \u2014 night death may be redirected to another player (ST choice)");
    if (role === 'fool') {
      const used = (seat.reminders || []).some(r => r && r.charId === 'fool' && /no ability/i.test(String(r.label || '')));
      if (!used) reasons.push("Fool role \u2014 first death is prevented (no \u2018No ability\u2019 reminder yet)");
    }
  }
  // Tea Lady — definitive check from the 'Tea Lady: Protected' marker
  // placed by applyTeaLadyProtection at Begin Game / Go-to-Night.
  const hasTLProtect = (seat.reminders || []).some(r =>
    r && r.charId === 'tealady' && /^protected$/i.test(String(r.label || '')));
  if (hasTLProtect) {
    reasons.push("Tea Lady protection \u2014 both alive neighbours are good, so this player cannot die");
  }
  const afflicted = isDrunkOrPoisoned(seat);
  return { reasons, afflicted };
}

// Chef: count pairs of evil players sitting next to each other (circular).
// Returns { value, evilSeats } so the modal can render a breakdown.
function computeChefPairs(seats) {
  if (!seats || seats.length < 2) return null;
  const flags = seats.map(s => !!s.actualRoleId && isEvilSeat(s));
  let pairs = 0;
  const n = seats.length;
  for (let i = 0; i < n; i++) {
    if (flags[i] && flags[(i + 1) % n]) pairs++;
  }
  const evilSeats = seats.filter((s, i) => flags[i]).map(s => s.seatNum);
  return { value: pairs, breakdown: { evilSeats } };
}

// Empath: how many of the empath's 2 nearest alive neighbours are evil.
// Walks left and right of the empath's seat, skipping dead seats, until it
// finds an alive seat (or wraps back to the empath). Returns 0/1/2.
function computeEmpathCount(empathSeat, seats) {
  if (!empathSeat || !seats || seats.length < 2) return null;
  const n = seats.length;
  const idx = seats.findIndex(s => s.seatNum === empathSeat.seatNum);
  if (idx < 0) return null;
  const findAlive = (step) => {
    for (let i = 1; i < n; i++) {
      const cand = seats[((idx + step * i) % n + n) % n];
      if (cand.seatNum === empathSeat.seatNum) return null;
      if (!cand.isDead && cand.actualRoleId) return cand;
    }
    return null;
  };
  const left  = findAlive(-1);
  const right = findAlive(+1);
  let count = 0;
  if (left  && isEvilSeat(left))  count++;
  if (right && isEvilSeat(right)) count++;
  return {
    value: count,
    breakdown: {
      leftSeat:  left?.seatNum  || null,
      leftEvil:  left  ? isEvilSeat(left)  : false,
      rightSeat: right?.seatNum || null,
      rightEvil: right ? isEvilSeat(right) : false,
    },
  };
}

// Oracle: how many dead players are evil.
function computeOracleCount(seats) {
  if (!seats) return null;
  const deadEvil = seats.filter(s => s.isDead && s.actualRoleId && isEvilSeat(s));
  return { value: deadEvil.length, breakdown: { deadEvilSeats: deadEvil.map(s => s.seatNum) } };
}

// Mathematician (approximation): how many seats are currently drunk OR poisoned.
// The official rule is "abilities that malfunctioned today/tonight" which the
// ST tracks more precisely; this is a sensible default the ST can override.
function computeMathematicianCount(seats) {
  if (!seats) return null;
  const aff = seats.filter(s => s.actualRoleId && isDrunkOrPoisoned(s));
  return { value: aff.length, breakdown: { affectedSeats: aff.map(s => s.seatNum), approximate: true } };
}

// Flower Girl: did a Demon vote on the previous day? Reads from the
// nominationsByDay entry, identified by prevDayIdx (viewingDayIndex - 1).
function computeFlowerGirlSuggestion(ctx) {
  const prev = (ctx?.viewingDayIndex || 0) - 1;
  if (prev < 0) return null;
  const raw = (ctx?.nominationsByDay || {})[prev];
  // If there's no nominations entry for the previous day at all, default to
  // "no demon vote" so the NO suggestion still fires (instead of going blank).
  const entry = raw ? normalizeDayNoms(raw) : { demonVoted: false };
  return { value: !!entry.demonVoted, breakdown: { prevDayNumber: prev + 1 } };
}

// Town Crier: did any Minion nominate on the previous day? Inspects the
// previous day's nomination records and looks up each nominator's actualRoleId
// from the previous day's seat snapshot (so role changes mid-game don't
// retroactively distort the truth).
function computeTownCrierSuggestion(ctx) {
  const prev = (ctx?.viewingDayIndex || 0) - 1;
  if (prev < 0) return null;
  const raw = (ctx?.nominationsByDay || {})[prev];
  // No nominations entry → no minion nominators by definition; still surface
  // the NO suggestion instead of leaving the picker blank.
  const entry = raw ? normalizeDayNoms(raw) : { nominations: [] };
  const prevSeats = (ctx?.daysSnapshots && ctx.daysSnapshots[prev]?.seats) || ctx?.seats || [];
  const seatById = Object.fromEntries(prevSeats.map(s => [s.seatNum, s]));
  const minionNominators = (entry.nominations || []).filter(n => {
    const ns = seatById[n.nominatorSeat];
    return ns && CHAR_BY_ID[ns.actualRoleId]?.team === 'minion';
  });
  return {
    value: minionNominators.length > 0,
    breakdown: { prevDayNumber: prev + 1, minionNominatorSeats: minionNominators.map(n => n.nominatorSeat) },
  };
}

// Undertaker: the ACTUAL role of whoever was executed on the previous day.
// Reads from ctx.lastExecution (set by advanceToNightWithExecution when the ST
// confirms an execution). Only fires when:
//   - lastExecution.dayIdx === viewingDayIndex - 1 (it was *yesterday's* exec)
//   - the recorded seat is still dead (ST hasn't manually revived them)
// Uses actualRoleId — if a Drunk-who-thinks-they're-the-FT is executed, the
// Undertaker learns "Drunk" (the real character), not "Fortune Teller".
// Clockmaker — minimum steps from the Demon to the nearest Minion in either
// direction around the circle. Counts seats (alive or dead).
function computeClockmakerSteps(seats) {
  if (!seats || seats.length < 2) return null;
  const sorted = [...seats].sort((a, b) => a.seatNum - b.seatNum);
  const n = sorted.length;
  const demonIdx = sorted.findIndex(s => (CHAR_BY_ID[s.actualRoleId] || {}).team === 'demon');
  if (demonIdx === -1) return null;
  let minSteps = Infinity;
  let nearestIdx = -1;
  for (let i = 0; i < n; i++) {
    if (i === demonIdx) continue;
    const team = (CHAR_BY_ID[sorted[i].actualRoleId] || {}).team;
    if (team !== 'minion') continue;
    const cw = ((i - demonIdx) % n + n) % n;
    const ccw = ((demonIdx - i) % n + n) % n;
    const dist = Math.min(cw, ccw);
    if (dist < minSteps) { minSteps = dist; nearestIdx = i; }
  }
  if (minSteps === Infinity) return null;
  return { value: minSteps, breakdown: { demonSeat: sorted[demonIdx].seatNum, minionSeat: sorted[nearestIdx].seatNum } };
}

function computeUndertakerSuggestion(ctx) {
  if (!ctx) return null;
  const lastEx = ctx.lastExecution;
  if (!lastEx || lastEx.seatNum == null) return null;
  if (lastEx.dayIdx !== (ctx.viewingDayIndex || 0) - 1) return null;
  const seat = (ctx.seats || []).find(s => s.seatNum === lastEx.seatNum);
  if (!seat || !seat.isDead) return null;
  const roleId = seat.actualRoleId || seat.perceivedRoleId;
  if (!roleId) return null;
  const rc = CHAR_BY_ID[roleId];
  return {
    value: roleId,
    breakdown: {
      seatNum: lastEx.seatNum,
      playerName: seat.playerName || null,
      roleName: rc?.name || roleId,
      misregistered: seat.actualRoleId !== seat.perceivedRoleId,
    },
  };
}

// Grandmother first-night suggestion: find the seat with the Grandchild
// reminder placed by 'grandmother' (or 'Child' as a forgiving fallback) and
// return that seat + its actual role.
function computeGrandmotherSuggestion(seats) {
  const child = (seats || []).find(s => (s.reminders || []).some(r =>
    r && r.charId === 'grandmother' && /grandchild|child/i.test(String(r.label || ''))));
  if (!child) return null;
  return {
    value: { askSeat: child.seatNum, roleId: child.actualRoleId || null },
    breakdown: {
      seatNum: child.seatNum,
      playerName: child.playerName || null,
      roleId: child.actualRoleId || null,
      roleName: (CHAR_BY_ID[child.actualRoleId] || {}).name || child.actualRoleId || null,
    },
  };
}

// Chambermaid suggestion: count how many of the 2 chosen seats wake tonight
// per the real night-order data (firstNight vs otherNight lists). We check
// perceivedRoleId so Drunk-as-X / Marionette-as-X count when the player
// THINKS they have an ability (the engine wakes them based on perceived).
// Falls back to actualRoleId when perceived is missing.
function computeChambermaidSuggestion(targetSeats, isFirstNight) {
  if (!Array.isArray(targetSeats) || targetSeats.length === 0) return null;
  const nightOrder = window.BOTC_DATA?.nightOrder || { firstNight: [], otherNight: [] };
  const orderList = isFirstNight ? (nightOrder.firstNight || []) : (nightOrder.otherNight || []);
  const wakeSet = new Set(orderList);
  const wakeable = (seat) => {
    const id = seat?.perceivedRoleId || seat?.actualRoleId;
    if (!id) return false;
    return wakeSet.has(id);
  };
  const woke = targetSeats.filter(wakeable);
  return {
    value: woke.length,
    breakdown: {
      wokeSeats: woke.map(s => s.seatNum),
    },
  };
}

// Top-level dispatch — returns a suggestion for any info role we can compute.
// ctx supplies extra context for roles that need history (viewingDayIndex,
// nominationsByDay, daysSnapshots, etc.).
function infoSuggestion(roleId, mySeat, seats, ctx) {
  switch (roleId) {
    case 'chef':          return computeChefPairs(seats);
    case 'empath':        return computeEmpathCount(mySeat, seats);
    case 'oracle':        return computeOracleCount(seats);
    case 'mathematician': return computeMathematicianCount(seats);
    case 'flowergirl':    return computeFlowerGirlSuggestion(ctx);
    case 'towncrier':     return computeTownCrierSuggestion(ctx);
    case 'clockmaker':    return computeClockmakerSteps(seats);
    case 'undertaker':    return computeUndertakerSuggestion(ctx);
    case 'grandmother':   return computeGrandmotherSuggestion(seats);
    case 'juggler':       return computeJugglerCorrectCount(seats);
    default:              return null;
  }
}

// Juggler night step — count 'Correct' reminders across ALL seats. The
// day-time resolveJugglerClaim places one 'Correct' / 'Wrong' marker on
// each player the juggler guessed (so they live on the guessed players,
// not on the juggler's own seat). Suggestion = total Correct count.
function computeJugglerCorrectCount(seats) {
  if (!seats) return null;
  let correct = 0;
  for (const s of seats) {
    for (const r of (s.reminders || [])) {
      if (r && r.charId === 'juggler' && /^correct$/i.test(String(r.label || ''))) correct += 1;
    }
  }
  return { value: correct, breakdown: { correctCount: correct } };
}

// ---------------- Night Step Action Row (automation) ----------------
//
// Per-step controls that appear under each character row when automation is on.
// Behavior depends on the action type:
//   - 'target1/target1self/target2/target1any' → Start sends a prompt to the
//     player's phone (or to the ST device if isLocal). Status badge shows
//     "awaiting…" → "submitted" or "question".
//   - 'info-st' → Start opens an ST-side picker modal so the ST chooses the
//     info, which is then pushed to the player.
//   - 'manual' → "Mark done" button only; the ST handles the ability in person.
//
// PHASE A NOTE: Wiring to Firebase (push prompt / receive response / place
// reminder / fire toast) is not yet implemented. The Start button currently
// shows a placeholder confirming what *would* happen. Phase B replaces this
// placeholder with the real flow.
function NightStepActionRow({ step, readOnly, onStartPrompt, onCancelPrompt, onMarkDone: onMarkDoneProp, onOpenInfoPicker, onOpenLocalPrompt, onStartShowGrimoire, onOpenMoonchildCapture, onResolveMoonchild, onOpenEvilTwinModal, onOpenBarberFlow, gameStarted = false }) {
  const { action, seat, instruction, reminderLabel, prompt, requiresDeath, oncePerGame,
          moonchildTargetSeatNum, moonchildTargetIsGood, moonchildAfflicted } = step;
  if (readOnly) return null;
  if (!seat) return (
    <div className="mt-1.5 text-[11px] text-stone-500 italic">No seat — handle manually.</div>
  );
  // requiresDeath roles (Ravenkeeper) only fire when the seat is dead AND has
  // a "Dead" reminder — i.e. they died this night (Dead reminders are cleared
  // at Go to Night). This catch comes before the generic "seat is dead — skip"
  // check below, since for these roles death is the trigger, not a skip reason.
  const hasDeadReminder = (seat.reminders || []).some(r => r && r.label === 'Dead');
  const hasNoAbility = (seat.reminders || []).some(r => r && /no ability/i.test(String(r.label || '')));
  if (oncePerGame && hasNoAbility) {
    return (
      <div className="mt-1.5 text-[11px] text-stone-500 italic">Already used this game.</div>
    );
  }
  if (action === 'passive') {
    // Barber: when the 'Haircuts tonight' reminder is on the Barber's seat,
    // surface a Mark resolved button so the ST can complete the demon swap.
    if (step.char && step.char.id === 'barber') {
      if (step.barberHasHaircut) {
        const hasNoSwap = (seat.reminders || []).some(r =>
          r && r.charId === 'barber' && /^no swap$/i.test(String(r.label || '')));
        const askPrompt = prompt && prompt.action === 'barber-ask';
        const askStatus = askPrompt && askPrompt.status;
        if (hasNoSwap) {
          return (
            <div className="mt-1.5 text-[11px] text-stone-500 italic">
              Demon chose not to swap tonight — no haircut.
            </div>
          );
        }
        return (
          <div className="mt-2 pt-2 border-t border-stone-800/70">
            <div className="text-[11px] text-stone-400 mb-1.5 italic">
              Automation: <span className="text-amber-300/90 not-italic">prompt Demon to swap 2 player roles</span>
            </div>
            <div className="text-xs text-stone-300 mb-2 leading-snug">{instruction || 'The Barber died — Start the haircut sequence to prompt the Demon.'}</div>
            <div className="flex items-center gap-2 flex-wrap">
              {askStatus === 'awaiting' ? (
                <span className="text-xs text-amber-300 font-medium">Awaiting demon yes/no…</span>
              ) : askStatus === 'submitted' ? (
                <span className="text-xs text-amber-300 font-medium">Demon picks (next phase)…</span>
              ) : (
                <button onClick={() => onOpenBarberFlow && onOpenBarberFlow(seat.seatNum)}
                  className="text-xs px-3 py-1 rounded pill hover:border-amber-500 hover:text-amber-200">
                  ▶ Start
                </button>
              )}
            </div>
          </div>
        );
      }
      return (
        <div className="mt-1.5 text-[11px] text-stone-500 italic">
          Barber has not died yet — no swap tonight. Passive trigger fires on death.
        </div>
      );
    }
    return (
      <div className="mt-1.5 text-[11px] text-stone-400 italic">
        {instruction || 'Passive — triggers automatically when conditions are met.'}
      </div>
    );
  }
  // Zombuul gating — runs BEFORE the generic isDead skip so a Zombuul
  // with the 'Executed once' marker (registers as dead but ability is
  // still active) still gets a working step. Also dims the step when
  // someone died today (zombuulDayDeath is set in the step builder).
  if (step.char && step.char.id === 'zombuul') {
    const hasExecOnce = (seat?.reminders || []).some(r =>
      r && r.charId === 'zombuul' && /^executed once$/i.test(String(r.label || '')));
    const functionallyAlive = !seat?.isDead || hasExecOnce;
    if (!functionallyAlive) {
      return (
        <div className="mt-1.5 text-[11px] text-stone-500 italic">Zombuul is truly dead — no ability.</div>
      );
    }
    if (step.zombuulDayDeath) {
      return (
        <div className="mt-1.5 text-[11px] text-stone-500 italic">Someone died today — Zombuul has no ability tonight.</div>
      );
    }
    // Otherwise fall through to the normal target1 flow below. The
    // generic isDead skip is suppressed for Zombuul via the explicit
    // exclusion in the next check.
  }
  // Juggler only wakes on the night following Day 1 — suppress the Start/Skip
  // buttons on every other night and surface a short explainer instead.
  if (step.jugglerWrongNight) {
    return (
      <div className="mt-1.5 text-[11px] text-stone-500 italic">
        Juggler only wakes the night after Day 1 — they learn how many of their guesses were correct. No action tonight.
      </div>
    );
  }
  // Sage only fires when killed BY THE DEMON — needs a Dead reminder whose
  // charId belongs to a demon-team character. Comes BEFORE the generic
  // requiresDeath check so a stale "Dead" placed by something else (e.g.
  // Slayer false-claim) doesn't accidentally activate it.
  if (step.char && step.char.id === 'sage') {
    const killedByDemon = (seat.reminders || []).some(r => {
      if (!r || !r.charId) return false;
      const c = CHAR_BY_ID[r.charId];
      return c && c.team === 'demon' && /^dead$/i.test(String(r.label || ''));
    });
    if (!(seat.isDead && hasDeadReminder && killedByDemon)) {
      return (
        <div className="mt-1.5 text-[11px] text-stone-500 italic">
          Sage only fires if killed by the Demon (needs seat-dead + a "Dead" reminder placed by a Demon).
        </div>
      );
    }
    // Killed by demon — fall through to the normal info-st flow.
  }
  // Sweetheart: activate only when DEAD (any death), regardless of whether a
  // 'Dead' reminder is still on the seat. Comes BEFORE the generic
  // requiresDeath / seat-dead gates so they don't reject a dead Sweetheart.
  if (step.char && step.char.id === 'sweetheart') {
    if (!seat.isDead) {
      return (
        <div className="mt-1.5 text-[11px] text-stone-500 italic">
          Sweetheart is alive — no ability tonight. Activates once Sweetheart dies.
        </div>
      );
    }
    // Dead + ability used: handled by the generic oncePerGame check above.
    // Dead + not used: fall through to the normal info-st flow below.
  }
  if (requiresDeath && action !== 'moonchild-resolve' && !(seat.isDead && hasDeadReminder)) {
    return (
      <div className="mt-1.5 text-[11px] text-stone-500 italic">
        Wakes only when this seat dies at night (needs both seat-dead and a "Dead" reminder).
      </div>
    );
  }
  // Vigormortis "Keeps ability" — if a Minion was killed by Vigor and has
  // this marker, their ability is still active despite being dead.
  const vigorKeepsAbility = (seat?.reminders || []).some(r =>
    r && r.charId === 'vigormortis' && /keeps ability/i.test(String(r.label || '')));
  if (seat.isDead && action !== 'manual' && action !== 'moonchild-resolve' && !requiresDeath && (!step.char || step.char.id !== 'zombuul') && (!step.char || step.char.id !== 'sweetheart') && !vigorKeepsAbility) return (
    <div className="mt-1.5 text-[11px] text-stone-500 italic">Seat is dead — skip.</div>
  );
  if (action === 'moonchild-resolve') {
    const canExecute = moonchildTargetIsGood && !moonchildAfflicted;
    return (
      <div className="mt-2 pt-2 border-t border-stone-800/70">
        <div className="text-[11px] text-stone-400 mb-1.5 italic">
          Automation: <span className="text-amber-300/90 not-italic">resolve Moonchild's kill</span>
        </div>
        <div className="text-xs text-stone-300 mb-2 leading-snug">{instruction}</div>
        <div className="flex items-center gap-2 flex-wrap">
          {canExecute ? (
            <button onClick={() => onResolveMoonchild && onResolveMoonchild(moonchildTargetSeatNum, true)}
              className="text-xs px-3 py-1.5 rounded bg-red-700 hover:bg-red-600 text-stone-100 font-semibold">
              ✕ Execute seat #{moonchildTargetSeatNum}
            </button>
          ) : (
            <button onClick={() => onResolveMoonchild && onResolveMoonchild(moonchildTargetSeatNum, false)}
              className="text-xs px-3 py-1.5 rounded pill hover:border-amber-500 hover:text-amber-200">
              ✓ Mark done (no kill)
            </button>
          )}
        </div>
      </div>
    );
  }
  if (!gameStarted) {
    return (
      <div className="mt-1.5 text-[11px] text-stone-500 italic">Click "Begin Game" first before sending night prompts.</div>
    );
  }
  // (Local-player UI: same controls as remote, but Start opens an on-ST overlay
  // — see the dispatch in onStart below. We still annotate the row visually.)

  const actionLabel = ({
    target1:         'Asks for 1 player',
    target1self:     'Asks for 1 player (self ok)',
    target1any:      'Asks for 1 player (dead ok)',
    target2:         'Asks for 2 players',
    'target2+yesno': 'Asks for 2 players → you respond YES/NO',
    'target1+role':  'Asks for 1 player → you respond with a role',
    'info-st':       'You pick the info to reveal',
    'show-grimoire': 'Show the player the grimoire',
    passive:         'Passive — triggers automatically when conditions are met',
    manual:          'No automation — handle in person',
  })[action] || action;

  const onStart = () => {
    if (action === 'info-st') {
      // Info flow always goes through the InfoPickerModal first; that modal
      // routes to a local overlay (if applicable) on Send.
      onOpenInfoPicker && onOpenInfoPicker(step);
      return;
    }
    if (action === 'moonchild-capture') {
      // ST-side picker — no player prompt. The Moonchild is dead and the
      // ST records her public choice on the ST device.
      onOpenMoonchildCapture && onOpenMoonchildCapture(seat.seatNum);
      return;
    }
    if (action === 'show-grimoire') {
      // Spy-style: send the grimoire snapshot to the player phone (re-uses the
      // existing 'Show grimoire to a player' mechanism).
      onStartShowGrimoire && onStartShowGrimoire(seat.seatNum, step);
      return;
    }
    if (seat.isLocal) {
      // Local target action — skip the awaiting-on-Firebase step and open the
      // on-ST overlay so the phoneless player can pick on this device.
      onOpenLocalPrompt && onOpenLocalPrompt(step);
      return;
    }
    onStartPrompt && onStartPrompt(seat.seatNum, step);
  };
  const onCancel = () => {
    onCancelPrompt && onCancelPrompt(seat.seatNum);
  };
  const onMarkDone = () => {
    onMarkDoneProp && onMarkDoneProp(seat.seatNum);
  };

  let statusBadge = null;
  if (prompt?.status === 'use-decision') {
    statusBadge = <span className="text-[10px] uppercase text-amber-300 font-semibold">⌛ player choosing use/skip</span>;
  } else if (prompt?.status === 'declined') {
    statusBadge = <span className="text-[10px] uppercase text-stone-400 font-semibold">✕ skipped (saved for later)</span>;
  } else if (prompt?.status === 'awaiting') {
    statusBadge = <span className="text-[10px] uppercase text-amber-300 font-semibold">⌛ awaiting player</span>;
  } else if (prompt?.status === 'submitted') {
    statusBadge = <span className="text-[10px] uppercase text-emerald-300 font-semibold">✓ submitted</span>;
  } else if (prompt?.status === 'question') {
    statusBadge = <span className="text-[10px] uppercase text-red-300 font-semibold">⚠ question raised</span>;
  } else if (prompt?.status === 'done') {
    statusBadge = <span className="text-[10px] uppercase text-stone-400">done</span>;
  }

  return (
    <div className="mt-2 pt-2 border-t border-stone-800/70">
      <div className="text-[11px] text-stone-400 mb-1.5 italic">
        Automation: <span className="text-amber-300/90 not-italic">{actionLabel}</span>
        {reminderLabel && <> · auto-places <span className="text-amber-200 not-italic">"{reminderLabel}"</span></>}
        {statusBadge && <span className="ml-2">{statusBadge}</span>}
      </div>
      <div className="flex items-center gap-2 flex-wrap">
        {action === 'klutz-capture' ? (
          <button onClick={() => onOpenMoonchildCapture && onOpenMoonchildCapture(seat.seatNum, 'klutz')}
            className="text-xs px-3 py-1 rounded pill hover:border-amber-500 hover:text-amber-200">
            ▶ Start
          </button>
        ) : action === 'sc-reveal' ? (
          (() => {
            const sentMatches = prompt && prompt.scRevealKind === (step.scReveal && step.scReveal.kind);
            const isDone = sentMatches && (prompt.status === 'done' || prompt.status === 'submitted');
            const isAwaiting = sentMatches && prompt.status === 'awaiting';
            const startStep = {
              ...step,
              char: CHAR_BY_ID[(step.scReveal && step.scReveal.roleId) || step.char.id] || step.char,
              action: 'sc-reveal-info',
              scRevealKind: step.scReveal && step.scReveal.kind,
              scRevealRoleId: step.scReveal && step.scReveal.roleId,
              scRevealAlignment: step.scReveal && step.scReveal.alignment,
            };
            const payload = {
              type: 'role-alignment',
              roleId: step.scReveal && step.scReveal.roleId,
              alignment: step.scReveal && step.scReveal.alignment,
            };
            const onStartReveal = () => {
              if (seat.isLocal) {
                onOpenLocalPrompt && onOpenLocalPrompt(startStep, payload);
              } else {
                onStartPrompt && onStartPrompt(seat.seatNum, startStep, payload);
              }
            };
            return isDone ? (
              <span className="text-xs text-emerald-300 font-medium">✓ Sent</span>
            ) : isAwaiting ? (
              <span className="text-xs text-amber-300 font-medium">Sent — waiting on player</span>
            ) : (
              <button onClick={onStartReveal}
                className="text-xs px-3 py-1 rounded pill hover:border-amber-500 hover:text-amber-200">
                ▶ Start
              </button>
            );
          })()
        ) : action === 'manual' && step.char && step.char.id === 'eviltwin' ? (
          (() => {
            const twinNum = step.eviltwinTwinSeatNum;
            const etPrompt = prompt;
            const haveBoth = etPrompt?.evilTwinBothSubmitted;
            if (haveBoth) {
              return (
                <span className="text-xs text-emerald-300 font-medium">
                  ✓ Both Evil Twins acknowledged.
                </span>
              );
            }
            return (
              <button onClick={() => onOpenEvilTwinModal && onOpenEvilTwinModal(seat.seatNum, twinNum)}
                className="text-xs px-3 py-1 rounded pill hover:border-amber-500 hover:text-amber-200">
                ▶ Start
              </button>
            );
          })()
        ) : action === 'manual' ? (
          <button onClick={onMarkDone}
            className={`text-xs px-3 py-1 rounded pill hover:border-amber-500 hover:text-amber-200 ${prompt?.status === 'done' ? 'opacity-50' : ''}`}>
            {prompt?.status === 'done' ? '✓ Done' : 'Mark done'}
          </button>
        ) : prompt?.status === 'use-decision' ? (
          <>
            <span className="text-xs text-amber-300 font-medium">Player deciding use/skip…</span>
            <button onClick={onCancel}
              className="text-xs px-2.5 py-1 rounded pill hover:border-red-500 hover:text-red-300 text-stone-400">
              Cancel
            </button>
          </>
        ) : prompt?.status === 'declined' ? (
          <>
            <span className="text-xs text-stone-400 font-medium">Saved for later</span>
            <button onClick={onCancel}
              className="text-xs px-2.5 py-1 rounded pill hover:border-stone-400 hover:text-stone-200">
              Clear
            </button>
            <button onClick={onStart}
              className="text-xs px-2.5 py-1 rounded pill hover:border-amber-500 hover:text-amber-200">
              Re-prompt
            </button>
          </>
        ) : prompt?.status === 'awaiting' ? (
          <>
            <span className="text-xs text-amber-300 font-medium">Sent to player\'s phone…</span>
            <button onClick={onCancel}
              className="text-xs px-2.5 py-1 rounded pill hover:border-red-500 hover:text-red-300 text-stone-400">
              Cancel
            </button>
          </>
        ) : prompt?.status === 'question' ? (
          <>
            <span className="text-xs text-red-300 font-medium">Player raised a question</span>
            <button onClick={onCancel}
              className="text-xs px-2.5 py-1 rounded bg-stone-800 hover:bg-stone-700 text-stone-200">
              Dismiss prompt
            </button>
            <button onClick={onStart}
              className="text-xs px-2.5 py-1 rounded pill hover:border-amber-500 hover:text-amber-200">
              Re-send
            </button>
          </>
        ) : prompt?.status === 'done' ? (
          <>
            <span className="text-xs text-emerald-300 font-medium">✓ Done</span>
            <button onClick={onStart}
              className="text-xs px-2.5 py-1 rounded pill hover:border-amber-500 hover:text-amber-200">
              Re-prompt
            </button>
          </>
        ) : (
          <>
            <button onClick={onStart}
              className="text-xs px-3 py-1 rounded bg-amber-700 hover:bg-amber-600 text-stone-950 font-medium">
              ▶ Start
            </button>
            <button onClick={onMarkDone}
              className="text-xs px-2.5 py-1 rounded pill hover:border-stone-400 hover:text-stone-200 text-stone-400">
              Skip
            </button>
          </>
        )}
      </div>
    </div>
  );
}

// ---------------- Setup Reminders ----------------
//
// One-time tasks the ST should do at game setup (before clicking Begin Game).
// Currently: Fortune Teller "Red Herring" placement. The list is derived from
// the current seats — items are auto-detected as done when the relevant
// reminder is present on a seat, OR the ST can mark them manually.
function listSetupReminders(seats, doneMap) {
  const items = [];
  const ftSeat = (seats || []).find(s => s.actualRoleId === 'fortuneteller');
  if (ftSeat) {
    const auto = (seats || []).some(s => (s.reminders || []).some(r =>
      r && r.charId === 'fortuneteller' && /red\s*herring/i.test(r.label || '')
    ));
    const manual = !!doneMap['fortuneteller-redherring'];
    items.push({
      id: 'fortuneteller-redherring',
      title: 'Place the Red Herring',
      description: 'Place the "Red Herring" reminder on any Good player. The Fortune Teller will register them as the Demon.',
      icon: 'fortuneteller',
      done: auto || manual,
      autoDetected: auto,
    });
  }
  const etSeat = (seats || []).find(s => s.actualRoleId === 'eviltwin');
  if (etSeat) {
    const auto = (seats || []).some(s => (s.reminders || []).some(r =>
      r && r.charId === 'eviltwin' && /^twin$/i.test(r.label || '')
    ));
    const manual = !!doneMap['eviltwin-twin'];
    items.push({
      id: 'eviltwin-twin',
      title: 'Place the Twin marker',
      description: 'Pick 1 good player as the Evil Twin\'s Twin and place the "Twin" reminder on that seat. The Evil Twin and the Twin learn each other on the first night.',
      icon: 'eviltwin',
      done: auto || manual,
      autoDetected: auto,
    });
  }
  const pixieSeat = (seats || []).find(s => s.actualRoleId === 'pixie');
  if (pixieSeat) {
    const auto = (seats || []).some(s => (s.reminders || []).some(r =>
      r && r.charId === 'pixie' && /^mad about/i.test(r.label || '')
    ));
    const manual = !!doneMap['pixie-madabout'];
    items.push({
      id: 'pixie-madabout',
      title: 'Place the Pixie\'s "Mad about" marker',
      description: 'Pick 1 in-play Townsfolk and place a "Pixie: Mad about <Role>" reminder on the Pixie\'s seat. The Pixie learns this character on the first night and inherits the ability if that player dies while the Pixie is mad about them.',
      icon: 'pixie',
      done: auto || manual,
      autoDetected: auto,
      actionLabel: auto ? null : 'Pick character',
      actionKind: 'pixie-madabout',
    });
  }
  const pmSeat = (seats || []).find(s => s.actualRoleId === 'puzzlemaster');
  if (pmSeat) {
    const auto = (seats || []).some(s => (s.reminders || []).some(r =>
      r && r.charId === 'puzzlemaster' && /drunk/i.test(r.label || '')
    ));
    const manual = !!doneMap['puzzlemaster-drunk'];
    items.push({
      id: 'puzzlemaster-drunk',
      title: 'Place the Puzzlemaster\'s Drunk marker',
      description: 'Pick any good player (not the Puzzlemaster) and place a "Puzzlemaster: Drunk" reminder on their seat. They are drunk for the whole game; the Puzzlemaster learns who they are when they guess correctly.',
      icon: 'puzzlemaster',
      done: auto || manual,
      autoDetected: auto,
    });
  }
  const gmSeat = (seats || []).find(s => s.actualRoleId === 'grandmother');
  if (gmSeat) {
    const auto = (seats || []).some(s => (s.reminders || []).some(r =>
      r && r.charId === 'grandmother' && /grandchild|child/i.test(r.label || '')
    ));
    const manual = !!doneMap['grandmother-grandchild'];
    items.push({
      id: 'grandmother-grandchild',
      title: 'Place the Grandchild marker',
      description: 'Place the "Grandchild" reminder on any player. On the first night the Grandmother will be shown this player and their character; if a Demon kills them later, the Grandmother dies too.',
      icon: 'grandmother',
      done: auto || manual,
      autoDetected: auto,
    });
  }
  return items;
}

function SetupRemindersBanner({ seats, remindersDone, skipped, onMark, onSkip }) {
  const items = listSetupReminders(seats, remindersDone);
  if (items.length === 0) return null;
  const allDone = items.every(it => it.done);
  return (
    <section className={`parchment rounded-lg p-3 sm:p-4 border-2 ${allDone || skipped ? 'border-emerald-700/60 bg-emerald-950/20' : 'border-amber-700/70 bg-amber-950/15'}`}>
      <div className="flex items-baseline justify-between gap-2 mb-2">
        <h3 className={`font-semibold text-sm ${allDone || skipped ? 'text-emerald-200' : 'text-amber-200'}`}>
          {allDone ? '✓ Setup reminders' : skipped ? '⏭ Setup reminders skipped' : 'Setup reminders'}
        </h3>
        <span className="text-[11px] text-stone-400">
          {items.filter(it => it.done).length} / {items.length} done
        </span>
      </div>
      <ul className="space-y-1.5">
        {items.map(it => (
          <li key={it.id} className={`card rounded p-2 flex items-start gap-2 ${it.done ? 'opacity-70' : ''}`}>
            {iconUrl(it.icon) && (
              <img src={iconUrl(it.icon)} alt=""
                className="w-9 h-9 rounded-full border border-stone-700 object-cover flex-shrink-0" />
            )}
            <div className="flex-1 min-w-0">
              <div className={`text-sm font-medium ${it.done ? 'text-emerald-300 line-through' : 'text-amber-200'}`}>
                {it.title}
              </div>
              <div className="text-xs text-stone-400 mt-0.5">{it.description}</div>
            </div>
            <button onClick={() => onMark(it.id, !it.done)}
              disabled={it.autoDetected}
              title={it.autoDetected ? 'Auto-detected from grimoire reminders' : undefined}
              className={`text-[11px] px-2 py-1 rounded transition flex-shrink-0
                ${it.done
                  ? 'pill text-emerald-300 cursor-default'
                  : 'pill hover:border-amber-500 hover:text-amber-200'}
                ${it.autoDetected ? 'cursor-not-allowed' : ''}`}>
              {it.done ? '✓ Done' : 'Mark done'}
            </button>
          </li>
        ))}
      </ul>
      {!allDone && (
        <div className="mt-2 pt-2 border-t border-stone-800 flex items-center justify-between gap-2">
          <span className="text-[10px] text-stone-500">
            Setup reminders block Begin Game until done or skipped.
          </span>
          <button onClick={() => onSkip(!skipped)}
            className={`text-[11px] px-2 py-1 rounded pill
              ${skipped ? 'border-amber-500 text-amber-200' : 'hover:border-amber-500 hover:text-amber-200 text-stone-300'}`}>
            {skipped ? '↺ Un-skip' : 'Skip remaining'}
          </button>
        </div>
      )}
    </section>
  );
}

// ---------------- ST Response Inline (Fortune Teller etc.) ----------------
//
// Renders at the top of the grimoire whenever any night prompt has status
// 'awaiting-st-response' — i.e. a two-step action where the player has picked
// their targets and now the ST needs to respond with info. Currently only
// Fortune Teller uses this (action='target2+yesno'), but the component is
// designed generically.
function STResponseInline({ prompts, seats, scriptCharIds = [], onSend }) {
  const pending = Object.entries(prompts || {})
    .filter(([_, p]) => p && p.status === 'awaiting-st-response')
    .map(([k, p]) => ({ seatNum: Number(k), prompt: p }));
  if (pending.length === 0) return null;
  return (
    <div className="space-y-2">
      {pending.map(({ seatNum, prompt }) => (
        <STResponseCard key={seatNum}
          seatNum={seatNum}
          prompt={prompt}
          seats={seats}
          scriptCharIds={scriptCharIds}
          onSend={(payload) => onSend(seatNum, payload)}
        />
      ))}
    </div>
  );
}

function STResponseCard({ seatNum, prompt, seats, scriptCharIds = [], onSend }) {
  const c = CHAR_BY_ID[prompt.roleId];
  const mySeat = seats.find(s => s.seatNum === seatNum);
  // Firebase may round-trip arrays as { 0: x, 1: y } objects; coerce back.
  const targets = Array.isArray(prompt.targets)
    ? prompt.targets
    : (prompt.targets && typeof prompt.targets === 'object'
        ? Object.keys(prompt.targets).sort((a, b) => Number(a) - Number(b)).map(k => prompt.targets[k])
        : []);
  const targetSeats = targets.map(n => seats.find(s => s.seatNum === n)).filter(Boolean);
  const askerAfflicted = isDrunkOrPoisoned(mySeat);
  const isRolePick = prompt.action === 'target1+role';
  const isNumberPick = prompt.action === 'target2+number';
  const isInnkeeperPick = prompt.action === 'target2+st-pick';
  const isSailorPick = prompt.action === 'target1+st-pick';
  const isGambler = prompt.action === 'target1+guess';
  // Lunatic-as-X: the actor seat is actually the Lunatic; the card shows
  // their picks and the ST hits 'Send to Demon' to push a lunatic-actions
  // info prompt to the real Demon's seat (chambermaid-style two-step).
  const isLunatic = mySeat?.actualRoleId === 'lunatic';
  const lunaticPerceived = isLunatic ? CHAR_BY_ID[mySeat?.perceivedRoleId] : null;
  // Dreamer two-step: player picked seat; ST picks 2 roles (1 true, 1 false).
  const isRolePair = prompt.action === 'target1+role-pair';
  // Auto-suggested role for target1+role = the chosen seat's actualRoleId.
  const suggestedRoleId = isRolePick && targetSeats[0] ? targetSeats[0].actualRoleId : null;
  const [pickedRole, setPickedRole] = useState('');
  const [pickedFalseRole, setPickedFalseRole] = useState('');
  const [pickedNumber, setPickedNumber] = useState(null);
  // Dreamer helpers — placed AFTER pickedRole/pickedFalseRole useState to
  // avoid Temporal-Dead-Zone errors during the first render.
  const dreamerTrueRoleSuggested = isRolePair && targetSeats[0] ? targetSeats[0].actualRoleId : null;
  const dreamerTrueIsEvil = isRolePair && targetSeats[0]
    ? ((CHAR_BY_ID[targetSeats[0].actualRoleId] || {}).team === 'minion' || (CHAR_BY_ID[targetSeats[0].actualRoleId] || {}).team === 'demon')
    : null;
  const dreamerFalseCandidates = (scriptCharIds || [])
    .map(id => CHAR_BY_ID[id])
    .filter(rc => {
      if (!rc) return false;
      if (rc.id === pickedRole) return false;
      if (dreamerTrueIsEvil === true) return rc.team === 'townsfolk' || rc.team === 'outsider';
      if (dreamerTrueIsEvil === false) return rc.team === 'minion' || rc.team === 'demon';
      return true;
    })
    .sort((a, b) => (a.name || '').localeCompare(b.name || ''));
  // Innkeeper state: which target gets Drunk, and which Safes to keep
  // (only relevant when the Innkeeper is drunk/poisoned).
  const [drunkSeat, setDrunkSeat] = useState(null);
  const [safeSeats, setSafeSeats] = useState(() => targetSeats.map(s => s.seatNum));
  // Gambler verdict: null (unset) → true (lives) / false (dies).
  const [verdict, setVerdict] = useState(null);
  // Gambler correctness suggestion = guess matches the target's actualRoleId.
  const gamblerTarget = isGambler ? targetSeats[0] : null;
  const gamblerGuess = isGambler ? (prompt.guess || null) : null;
  const gamblerCorrect = isGambler && gamblerTarget && gamblerGuess
    ? gamblerTarget.actualRoleId === gamblerGuess
    : null;
  const gamblerSuggestion = isGambler ? gamblerCorrect : null;  // true = lives suggested, false = dies suggested
  // Number-pick suggestion (Chambermaid): count seats whose role wakes tonight.
  // The night phase isn't tracked on the prompt itself; infer from viewingDayIndex
  // when present, else default to other-night (Chambermaid is rarely a first-night
  // resolve target since the ST sees both nights identically).
  const numberSuggestion = isNumberPick
    ? computeChambermaidSuggestion(targetSeats, (prompt.nightIdx || 0) === 0)
    : null;
  // Auto-suggest yes/no. Role-aware:
  //   - Seamstress: YES if both targets are the SAME natural alignment.
  //   - Fortune Teller / others: YES if a target is demon-team or has Red Herring.
  const isSeamstress = prompt.roleId === 'seamstress';
  const yesReason = [];
  let suggestedYes = false;
  if (isSeamstress) {
    if (targetSeats.length === 2) {
      const a = naturalAlignment(targetSeats[0].actualRoleId);
      const b = naturalAlignment(targetSeats[1].actualRoleId);
      suggestedYes = (a && b && a === b);
      if (suggestedYes) {
        yesReason.push(`both #${targetSeats[0].seatNum} (${a}) and #${targetSeats[1].seatNum} (${b}) are the same alignment`);
      } else if (a && b) {
        yesReason.push(`#${targetSeats[0].seatNum} is ${a}, #${targetSeats[1].seatNum} is ${b}`);
      }
    }
  } else {
    for (const ts of targetSeats) {
      const team = (CHAR_BY_ID[ts.actualRoleId] || {}).team;
      if (team === 'demon') yesReason.push(`#${ts.seatNum} is the ${CHAR_BY_ID[ts.actualRoleId]?.name}`);
      const hasRH = (ts.reminders || []).some(r => r && r.charId === 'fortuneteller' && /red\s*herring/i.test(r.label || ''));
      if (hasRH) yesReason.push(`#${ts.seatNum} is the Red Herring`);
    }
    suggestedYes = yesReason.length > 0;
  }
  const recluseAmong = targetSeats.some(ts => (CHAR_BY_ID[ts.actualRoleId] || {}).id === 'recluse');

  // Candidate roles for the role-pick variant (any in-script role).
  const candidateRoles = isRolePick
    ? (scriptCharIds || [])
        .map(id => CHAR_BY_ID[id])
        .filter(Boolean)
        .sort((a, b) => (a.name || '').localeCompare(b.name || ''))
    : [];

  return (
    <section className="parchment rounded-lg p-3 sm:p-4 border-2 border-amber-600/70 bg-amber-950/15 space-y-3">
      <div className="flex items-center gap-3">
        {iconUrl(prompt.roleId) && (
          <img src={iconUrl(prompt.roleId)} alt=""
            className="w-12 h-12 rounded-full border-2 border-amber-700 object-cover flex-shrink-0" />
        )}
        <div className="flex-1 min-w-0">
          <div className={`text-xs uppercase tracking-wider team-${c?.team || 'townsfolk'}`}>{c?.team || 'role'}</div>
          <div className="text-amber-200 text-lg font-bold leading-tight">
            {c?.name || prompt.roleId} — needs your response
          </div>
          <div className="text-xs text-stone-400 mt-0.5">
            seat #{seatNum}{mySeat?.playerName ? ' · ' + mySeat.playerName : ''}
          </div>
        </div>
      </div>

      {askerAfflicted && (
        <div className="rounded-md p-2.5 border-2 border-red-600/70 bg-red-950/40 text-red-100 text-xs">
          <span className="font-semibold">⚠ Drunk or poisoned</span> — you may give false info.
        </div>
      )}

      <div>
        <div className="text-xs uppercase tracking-wider text-amber-300 mb-1.5">
          {isRolePick ? 'Player chosen' : 'Players chosen'}
        </div>
        <ul className="grid grid-cols-1 sm:grid-cols-2 gap-1.5">
          {targetSeats.map(ts => {
            const rc = CHAR_BY_ID[ts.actualRoleId];
            const isDemon = rc?.team === 'demon';
            const hasRH = (ts.reminders || []).some(r => r && r.charId === 'fortuneteller' && /red\s*herring/i.test(r.label || ''));
            const isRecluse = rc?.id === 'recluse';
            return (
              <li key={ts.seatNum} className="card rounded p-2 flex items-start gap-2">
                <span className="text-amber-200/80 text-xs w-6 text-center flex-shrink-0 pt-1">#{ts.seatNum}</span>
                {iconUrl(ts.actualRoleId) && (
                  <img src={iconUrl(ts.actualRoleId)} alt=""
                    className="w-9 h-9 rounded-full border border-stone-700 object-cover flex-shrink-0" />
                )}
                <div className="flex-1 min-w-0 leading-tight">
                  <div className="text-sm truncate">{ts.playerName || <span className="text-stone-500 italic">—</span>}</div>
                  <div className={`text-[10px] uppercase tracking-wider truncate ${rc ? `team-${rc.team}` : 'text-stone-500'}`}>
                    {rc?.name || '(no role)'}
                  </div>
                  {!isRolePick && (isDemon || hasRH || isRecluse) && (
                    <div className="text-[10px] mt-0.5 space-x-1">
                      {isDemon && <span className="text-red-300">⚑ Demon</span>}
                      {hasRH && <span className="text-amber-300">⚑ Red Herring</span>}
                      {isRecluse && <span className="text-stone-300">⚑ Recluse — may register as Demon</span>}
                    </div>
                  )}
                </div>
              </li>
            );
          })}
        </ul>
      </div>

      {/* Branch on response shape: yes/no buttons for FT, role grid for RK-style, number buttons for Chambermaid, Innkeeper/Gambler get their own forms, Sailor 2-option picker. Lunatic gets a simple Send-to-Demon button. Dreamer/Cerenovus get bespoke forms. */}
      {isRolePair ? (
        <div className="space-y-3">
          <div>
            <div className="flex items-baseline justify-between gap-2 mb-1.5">
              <span className="text-xs uppercase tracking-wider text-amber-300">True role (suggested = chosen seat's actual)</span>
              {dreamerTrueRoleSuggested && (
                <button onClick={() => setPickedRole(dreamerTrueRoleSuggested)}
                  className={`text-[11px] px-2 py-1 rounded transition
                    ${pickedRole === dreamerTrueRoleSuggested
                      ? 'bg-emerald-700/60 text-emerald-100 border border-emerald-600'
                      : 'pill hover:border-emerald-500 hover:text-emerald-200 text-emerald-300'}`}>
                  {pickedRole === dreamerTrueRoleSuggested ? '✓ Suggested: ' : 'Suggested: '}
                  <span className="font-bold">{(CHAR_BY_ID[dreamerTrueRoleSuggested] || {}).name || dreamerTrueRoleSuggested}</span>
                </button>
              )}
            </div>
            <ul className="grid grid-cols-2 sm:grid-cols-3 gap-1.5 max-h-40 overflow-y-auto">
              {(scriptCharIds || []).map(id => CHAR_BY_ID[id]).filter(Boolean)
                .sort((a, b) => (a.name || '').localeCompare(b.name || '')).map(rc => (
                <li key={rc.id}>
                  <button onClick={() => { setPickedRole(rc.id); setPickedFalseRole(''); }}
                    className={`w-full card rounded px-2 py-1.5 flex items-center gap-2 text-left text-sm
                      ${pickedRole === rc.id ? 'border-amber-500 bg-amber-900/30 ring-1 ring-amber-700' : 'hover:border-amber-500'}`}>
                    {iconUrl(rc.id) && <img src={iconUrl(rc.id)} alt="" className="w-7 h-7 rounded-full border border-stone-700 object-cover flex-shrink-0" />}
                    <span className={`flex-1 min-w-0 truncate team-${rc.team}`}>{rc.name}</span>
                  </button>
                </li>
              ))}
            </ul>
          </div>
          {pickedRole && (
            <div>
              <div className="text-xs uppercase tracking-wider text-amber-300 mb-1.5">
                False role (opposite alignment)
              </div>
              <ul className="grid grid-cols-2 sm:grid-cols-3 gap-1.5 max-h-40 overflow-y-auto">
                {dreamerFalseCandidates.map(rc => (
                  <li key={rc.id}>
                    <button onClick={() => setPickedFalseRole(rc.id)}
                      className={`w-full card rounded px-2 py-1.5 flex items-center gap-2 text-left text-sm
                        ${pickedFalseRole === rc.id ? 'border-amber-500 bg-amber-900/30 ring-1 ring-amber-700' : 'hover:border-amber-500'}`}>
                      {iconUrl(rc.id) && <img src={iconUrl(rc.id)} alt="" className="w-7 h-7 rounded-full border border-stone-700 object-cover flex-shrink-0" />}
                      <span className={`flex-1 min-w-0 truncate team-${rc.team}`}>{rc.name}</span>
                    </button>
                  </li>
                ))}
              </ul>
            </div>
          )}
          <button onClick={() => {
              const roles = [pickedRole, pickedFalseRole];
              if (Math.random() < 0.5) roles.reverse();
              onSend({ type: 'seat+role-pair', askSeat: targetSeats[0]?.seatNum, roles });
            }}
            disabled={!pickedRole || !pickedFalseRole}
            className={`w-full py-3 rounded-lg text-base font-bold transition
              ${(pickedRole && pickedFalseRole)
                ? 'bg-amber-600 hover:bg-amber-500 text-stone-950 shadow-lg shadow-amber-900/40'
                : 'bg-stone-800 text-stone-500 cursor-not-allowed'}`}>
            Send role pair →
          </button>
        </div>
      ) : isLunatic ? (
        <div className="space-y-3">
          <div className="rounded-md p-3 border-2 border-purple-700/70 bg-purple-950/40 text-purple-100 text-xs leading-snug">
            <span className="font-semibold">⚠ Lunatic acted as {lunaticPerceived?.name || mySeat?.perceivedRoleId || 'their perceived role'}.</span>{' '}
            Reminders with the Lunatic icon have been placed on their chosen players. Hit
            <span className="font-semibold"> Send to Demon</span> to push a notification of the Lunatic's picks to the real Demon's phone.
          </div>
          <button onClick={() => onSend({ type: 'lunatic-send-demon' })}
            className="w-full py-3 rounded-lg text-base font-bold bg-amber-600 hover:bg-amber-500 text-stone-950 shadow-lg shadow-amber-900/40">
            Send to Demon →
          </button>
        </div>
      ) : isSailorPick ? (
        <div>
          <div className="text-xs uppercase tracking-wider text-amber-300 mb-1.5">
            Choose who is drunk until dusk
          </div>
          <div className="text-[11px] text-stone-400 mb-2">
            (Choosing the Sailor strips her Protected marker — she can die tonight.)
          </div>
          <div className="grid grid-cols-2 gap-2">
            {(() => {
              const tgtSeat = targetSeats[0];
              const tgtLabel = tgtSeat ? ((tgtSeat.playerName || ('seat #' + tgtSeat.seatNum))) : 'Target';
              const meLabel  = (mySeat?.playerName || ('seat #' + (mySeat?.seatNum || seatNum)));
              return (
                <>
                  <button onClick={() => onSend({ type: 'sailor-pick', drunkSeat: seatNum })}
                    className="py-3 rounded-lg text-sm font-semibold bg-amber-700 hover:bg-amber-600 text-stone-50">
                    Sailor drunk<div className="text-[10px] font-normal opacity-80">{meLabel}</div>
                  </button>
                  <button onClick={() => onSend({ type: 'sailor-pick', drunkSeat: tgtSeat?.seatNum })}
                    disabled={!tgtSeat}
                    className={`py-3 rounded-lg text-sm font-semibold ${tgtSeat ? 'bg-amber-700 hover:bg-amber-600 text-stone-50' : 'bg-stone-800 text-stone-500 cursor-not-allowed'}`}>
                    Target drunk<div className="text-[10px] font-normal opacity-80">{tgtLabel}</div>
                  </button>
                </>
              );
            })()}
          </div>
        </div>
      ) : isInnkeeperPick ? (
        <div>
          {askerAfflicted && (
            <div className="text-[11px] text-amber-200/90 mb-2">
              Innkeeper is drunk/poisoned — you may remove either or both Safe markers (and skip the Drunk pick).
            </div>
          )}
          <div className="text-xs uppercase tracking-wider text-amber-300 mb-1.5">
            Pick which is drunk{askerAfflicted ? ' (optional)' : ''} · uncheck Safe to remove that marker
          </div>
          <ul className="space-y-1.5">
            {targetSeats.map(ts => {
              const rc = CHAR_BY_ID[ts.actualRoleId];
              const isDrunk = drunkSeat === ts.seatNum;
              const keepSafe = safeSeats.includes(ts.seatNum);
              return (
                <li key={ts.seatNum} className="card rounded p-2">
                  <div className="flex items-start gap-2">
                    <span className="text-amber-200/80 text-xs w-6 text-center flex-shrink-0 pt-1">#{ts.seatNum}</span>
                    {iconUrl(ts.actualRoleId) && (
                      <img src={iconUrl(ts.actualRoleId)} alt=""
                        className="w-9 h-9 rounded-full border border-stone-700 object-cover flex-shrink-0" />
                    )}
                    <div className="flex-1 min-w-0 leading-tight">
                      <div className="text-sm truncate">{ts.playerName || <span className="text-stone-500 italic">—</span>}</div>
                      <div className={`text-[10px] uppercase tracking-wider truncate ${rc ? `team-${rc.team}` : 'text-stone-500'}`}>
                        {rc?.name || '(no role)'}
                      </div>
                    </div>
                  </div>
                  <div className="flex items-center gap-3 mt-2 pl-8">
                    <button onClick={() => setDrunkSeat(isDrunk ? null : ts.seatNum)}
                      className={`text-[11px] px-2 py-1 rounded transition
                        ${isDrunk
                          ? 'bg-amber-600 text-stone-950 font-semibold'
                          : 'pill hover:border-amber-500 hover:text-amber-200'}`}>
                      {isDrunk ? '✓ Drunk' : 'Make drunk'}
                    </button>
                    <label className={`text-[11px] flex items-center gap-1 cursor-pointer ${askerAfflicted ? 'text-stone-300' : 'text-stone-500'}`}>
                      <input type="checkbox"
                        checked={keepSafe}
                        disabled={!askerAfflicted}
                        onChange={(e) => {
                          if (e.target.checked) setSafeSeats(prev => [...new Set([...prev, ts.seatNum])]);
                          else setSafeSeats(prev => prev.filter(n => n !== ts.seatNum));
                        }}
                        className="w-3.5 h-3.5 accent-amber-600" />
                      Keep Safe marker
                    </label>
                  </div>
                </li>
              );
            })}
          </ul>
          <div className="grid grid-cols-1 gap-2 pt-3">
            <button onClick={() => onSend({ type: 'innkeeper', drunkSeat, safeSeats: [...safeSeats] })}
              disabled={!askerAfflicted && drunkSeat == null}
              className={`py-3 rounded-lg text-base font-bold transition
                ${(askerAfflicted || drunkSeat != null)
                  ? 'bg-amber-600 hover:bg-amber-500 text-stone-950 shadow-lg shadow-amber-900/40'
                  : 'bg-stone-800 text-stone-500 cursor-not-allowed'}`}>
              Apply →
            </button>
          </div>
        </div>
      ) : isGambler ? (
        <div>
          <div className="text-xs uppercase tracking-wider text-amber-300 mb-1.5">Gambler's guess</div>
          {gamblerGuess ? (() => {
            const guessRc = CHAR_BY_ID[gamblerGuess];
            const targetRc = gamblerTarget ? CHAR_BY_ID[gamblerTarget.actualRoleId] : null;
            return (
              <div className="card rounded p-2 flex items-center gap-2 mb-2">
                {iconUrl(gamblerGuess) && (
                  <img src={iconUrl(gamblerGuess)} alt=""
                    className="w-9 h-9 rounded-full border border-stone-700 object-cover flex-shrink-0" />
                )}
                <div className="flex-1 min-w-0 leading-tight">
                  <div className={`text-sm font-semibold truncate team-${guessRc?.team || 'townsfolk'}`}>
                    Guessed: {guessRc?.name || gamblerGuess}
                  </div>
                  {gamblerTarget && (
                    <div className="text-[11px] text-stone-400 truncate">
                      About #{gamblerTarget.seatNum}{gamblerTarget.playerName ? ' · ' + gamblerTarget.playerName : ''} (actually <span className={`team-${targetRc?.team || 'townsfolk'} font-medium`}>{targetRc?.name || '?'}</span>)
                    </div>
                  )}
                </div>
                {gamblerCorrect != null && (
                  <span className={`text-[11px] px-2 py-0.5 rounded font-bold ${gamblerCorrect ? 'bg-emerald-700/60 text-emerald-100' : 'bg-red-700/60 text-red-100'}`}>
                    {gamblerCorrect ? 'CORRECT' : 'WRONG'}
                  </span>
                )}
              </div>
            );
          })() : (
            <div className="text-[11px] text-stone-500 italic mb-2">No guess recorded.</div>
          )}
          <div className="flex items-baseline justify-between gap-2 mb-1.5">
            <span className="text-xs uppercase tracking-wider text-amber-300">Verdict</span>
            {gamblerSuggestion != null && (
              <span className={`text-[10px] ${gamblerSuggestion ? 'text-emerald-300' : 'text-red-300'} font-bold`}>
                Suggested: {gamblerSuggestion ? 'LIVES' : 'DIES'}
              </span>
            )}
          </div>
          <div className="grid grid-cols-2 gap-2">
            <button onClick={() => setVerdict(true)}
              className={`py-3 rounded-lg text-sm font-bold transition
                ${verdict === true
                  ? 'bg-emerald-600 text-stone-950'
                  : gamblerSuggestion === true
                    ? 'pill border-emerald-600/70 text-emerald-200 hover:border-emerald-500'
                    : 'pill hover:border-emerald-500 hover:text-emerald-200'}`}>
              Gambler LIVES
            </button>
            <button onClick={() => setVerdict(false)}
              className={`py-3 rounded-lg text-sm font-bold transition
                ${verdict === false
                  ? 'bg-red-600 text-stone-100'
                  : gamblerSuggestion === false
                    ? 'pill border-red-600/70 text-red-200 hover:border-red-500'
                    : 'pill hover:border-red-500 hover:text-red-200'}`}>
              Gambler DIES
            </button>
          </div>
          <div className="grid grid-cols-1 gap-2 pt-3">
            <button onClick={() => onSend({ type: 'verdict', lives: verdict, guess: gamblerGuess })}
              disabled={verdict == null}
              className={`py-3 rounded-lg text-base font-bold transition
                ${verdict != null
                  ? 'bg-amber-600 hover:bg-amber-500 text-stone-950 shadow-lg shadow-amber-900/40'
                  : 'bg-stone-800 text-stone-500 cursor-not-allowed'}`}>
              Apply →
            </button>
          </div>
        </div>
      ) : isNumberPick ? (
        <div>
          <div className="flex items-baseline justify-between gap-2 mb-1.5">
            <span className="text-xs uppercase tracking-wider text-amber-300">Send the count</span>
            {numberSuggestion != null && (
              <button onClick={() => setPickedNumber(numberSuggestion.value)}
                className={`text-[11px] px-2 py-1 rounded transition
                  ${pickedNumber === numberSuggestion.value
                    ? 'bg-emerald-700/60 text-emerald-100 border border-emerald-600'
                    : 'pill hover:border-emerald-500 hover:text-emerald-200 text-emerald-300'}`}>
                {pickedNumber === numberSuggestion.value ? '✓ Suggested: ' : 'Suggested: '}
                <span className="font-bold">{numberSuggestion.value}</span>
              </button>
            )}
          </div>
          {numberSuggestion?.breakdown?.wokeSeats && numberSuggestion.breakdown.wokeSeats.length > 0 && (
            <div className="text-[10px] text-stone-400 mb-1.5">
              Wakeful chosen: {numberSuggestion.breakdown.wokeSeats.map(n => '#' + n).join(', ')}
            </div>
          )}
          <div className="flex items-center justify-center gap-3 py-2">
            {[0, 1, 2].map(n => {
              const isSug = numberSuggestion?.value === n;
              return (
                <button key={n} onClick={() => setPickedNumber(n)}
                  className={`w-14 h-14 rounded-lg text-2xl font-bold transition
                    ${pickedNumber === n
                      ? 'bg-amber-600 text-stone-950'
                      : isSug
                        ? 'pill border-emerald-600/70 text-emerald-200 hover:border-emerald-500'
                        : 'pill hover:border-amber-500'}`}>
                  {n}
                </button>
              );
            })}
          </div>
          <div className="grid grid-cols-1 gap-2 pt-3">
            <button onClick={() => onSend({ type: 'number', number: pickedNumber })}
              disabled={pickedNumber == null}
              className={`py-3 rounded-lg text-base font-bold transition
                ${pickedNumber != null
                  ? 'bg-amber-600 hover:bg-amber-500 text-stone-950 shadow-lg shadow-amber-900/40'
                  : 'bg-stone-800 text-stone-500 cursor-not-allowed'}`}>
              Send count →
            </button>
          </div>
        </div>
      ) : isRolePick ? (
        <div>
          <div className="flex items-baseline justify-between gap-2 mb-1.5">
            <span className="text-xs uppercase tracking-wider text-amber-300">Pick the role to reveal</span>
            {suggestedRoleId && (
              <button onClick={() => setPickedRole(suggestedRoleId)}
                className={`text-[11px] px-2 py-1 rounded transition
                  ${pickedRole === suggestedRoleId
                    ? 'bg-emerald-700/60 text-emerald-100 border border-emerald-600'
                    : 'pill hover:border-emerald-500 hover:text-emerald-200 text-emerald-300'}`}>
                {pickedRole === suggestedRoleId ? '✓ Suggested: ' : 'Suggested: '}
                <span className="font-bold">{(CHAR_BY_ID[suggestedRoleId] || {}).name || suggestedRoleId}</span>
              </button>
            )}
          </div>
          <ul className="grid grid-cols-2 sm:grid-cols-3 gap-1.5 max-h-60 overflow-y-auto">
            {candidateRoles.map(rc => (
              <li key={rc.id}>
                <button onClick={() => setPickedRole(rc.id)}
                  className={`w-full card rounded px-2 py-1.5 flex items-center gap-2 text-left text-sm
                    ${pickedRole === rc.id ? 'border-amber-500 bg-amber-900/30 ring-1 ring-amber-700' : 'hover:border-amber-500'}`}>
                  {iconUrl(rc.id) && <img src={iconUrl(rc.id)} alt="" className="w-7 h-7 rounded-full border border-stone-700 object-cover flex-shrink-0" />}
                  <span className={`flex-1 min-w-0 truncate team-${rc.team}`}>{rc.name}</span>
                </button>
              </li>
            ))}
          </ul>
          <div className="grid grid-cols-1 gap-2 pt-3">
            <button onClick={() => onSend({ type: 'role', roleId: pickedRole })}
              disabled={!pickedRole}
              className={`py-3 rounded-lg text-base font-bold transition
                ${pickedRole
                  ? 'bg-amber-600 hover:bg-amber-500 text-stone-950 shadow-lg shadow-amber-900/40'
                  : 'bg-stone-800 text-stone-500 cursor-not-allowed'}`}>
              Send role →
            </button>
          </div>
        </div>
      ) : (
        <div>
          <div className="flex items-baseline justify-between gap-2 mb-1.5">
            <span className="text-xs uppercase tracking-wider text-amber-300">Send the answer</span>
            <span className="text-[10px] text-stone-400">
              Suggested: <span className={suggestedYes ? 'text-emerald-300 font-bold' : 'text-red-300 font-bold'}>
                {suggestedYes ? 'YES' : 'NO'}
              </span>
              {recluseAmong && !suggestedYes && <span className="text-stone-500"> (or YES via Recluse)</span>}
            </span>
          </div>
          {yesReason.length > 0 && (
