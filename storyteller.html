          onMarkStepDone={markStepDone}
          onClearAllNightPrompts={clearAllNightPrompts}
          onOpenMoonchildCapture={(seatNum, kind) => {
            if (kind === 'klutz') setKlutzPickSeat(seatNum);
            else setMoonchildPickSeat(seatNum);
          }}
          onResolveMoonchild={resolveMoonchild}
          onOpenEvilTwinModal={openEvilTwinModal}
          onOpenBarberFlow={openBarberFlow}
          onSweetheartPick={applySweetheartPick}
          onOpenLocalPrompt={openLocalPrompt}
          onMarkSetupReminder={markSetupReminder}
          onSetupReminderAction={onSetupReminderActionApp}
          onSkipSetupReminders={setSetupRemindersSkipped}
          onRespondToNightPrompt={respondToNightPrompt}
          dismissedResponses={dismissedResponses}
          onDismissResponsePopup={dismissResponsePopup}
          onPromoteScarletWoman={promoteScarletWoman}
          onStartShowGrimoire={startShowGrimoire}
          onSendCeremonyInfo={sendCeremonyInfo}
          dayBanners={dayBanners}
          onDismissDayBanner={dismissDayBanner}
          forceReadOnly={isSpectator}
          state={state}
          swapSourceSeat={swapSourceSeat}
          assigningRoleId={assigningRoleId}
          onSeatTap={handleSeatTap}
          onCancelSwap={cancelSwap}
          onPickupAssignment={pickupAssignment}
          onCancelAssignment={cancelAssignment}
          onUndoAssignmentByCharId={undoAssignmentByCharId}
          onUnassignPending={unassignPendingRole}
          onToggleDead={toggleSeatDead}
          onToggleAlignment={toggleAlignment}
          onSwap={swapSeats}
          onAddReminder={addReminder}
          onRemoveReminder={removeReminder}
          onChangeRole={changeSeatRole}
          onSetDemonBluff={setDemonBluff}
          onSetLunaticBluff={setLunaticBluff}
          onSetMinionBluff={setMinionBluff}
          onSetTownSquareNote={setTownSquareNote}
          onSetPlayerName={setPlayerName}
          onReleaseSeat={releaseSeat}
          onDealRoleToSeat={dealRoleToSeat}
          onUndealSeat={undealSeat}
          onDealAllRoles={dealAllRoles}
          onUndealAllRoles={undealAllRoles}
          onSetSeatLocal={setSeatLocal}
          onShowLocalRole={(n) => setShowRoleForSeat(n)}
          onAddTraveller={addTraveller}
          onRemoveTraveller={removeTraveller}
          onSetTravellerName={setTravellerName}
          onReleaseTravellerSeat={releaseTravellerSeat}
          onSetTravellerInsertion={setTravellerInsertion}
          onSetTravellerRole={setTravellerRole}
          onSetTravellerAlignment={setTravellerAlignment}
          onDealRoleToTraveller={dealRoleToTraveller}
          onUndealTraveller={undealTraveller}
          onToggleTravellerDead={toggleTravellerDead}
          onToggleTravellerAlignment={toggleTravellerAlignment}
          onAddTravellerReminder={addTravellerReminder}
          onRemoveTravellerReminder={removeTravellerReminder}
          dealBlockedReason={(state.grimoire.pendingAssignments || []).includes('lunatic')
            ? 'Assign the Lunatic on the Grimoire first — otherwise the demon-token player who is actually the Lunatic would see the real Demon bluffs.'
            : null}
          onBeginGame={beginGame}
          onAdvanceToNight={advanceToNightWithExecution}
          onSetViewingDayIndex={setViewingDayIndex}
          onSetView={setGrimoireView}
          onRegenerate={generateRoles}
          onJumpToBag={() => update({ page: 'bag' })}
        />
      )}

      <footer className="text-xs text-stone-500 pt-6 border-t border-stone-800/60">
        Saved automatically to this browser. Stage 1 — storyteller setup. Player phones come in Stage 2.
      </footer>

      {localOverlayStep && (
        <LocalNightPromptOverlay
          step={localOverlayStep.step}
          infoPayload={localOverlayStep.infoPayload}
          seats={state.grimoire.seats || []}
          scriptCharIds={state.characterIds || []}
          onSubmit={submitLocalPrompt}
          onClose={closeLocalPrompt}
        />
      )}

      {localGrimoireSeat != null && (
        <LocalGrimoireOverlay
          seat={(state.grimoire.seats || []).find(s => s.seatNum === localGrimoireSeat)}
          grimoire={state.grimoire}
          phase={localGrimoirePhase}
          onAck={ackLocalGrimoire}
          onReturn={returnLocalGrimoire}
          onCancel={cancelLocalGrimoire}
        />
      )}

      {/* Corner popups — deferred while a LocalNightPromptOverlay (or
          local grimoire / Moonchild pick modal) is open so the local
          player holding the ST phone never sees popup info that leaks
          game state about their own ability resolution (e.g. "Fool
          ability fired" leaking that they just targeted the Fool).
          The popups reappear the moment the ST taps "Return to
          storyteller" and the overlay closes. */}
      {cornerPrompts.length > 0 && localOverlayStep == null && localGrimoireSeat == null && moonchildPickSeat == null && klutzPickSeat == null && vigorPickData == null && pixiePickData == null && huntsmanPickData == null && boomdandyPickData == null && cannibalChooseData == null && evilTwinModalData == null && lunaticPickerData == null && (
        <STCornerPrompts
          prompts={cornerPrompts}
          onAction={(promptId, actionIdx) => {
            const p = cornerPrompts.find(x => x.id === promptId);
            if (!p) return;
            const a = (p.actions || [])[actionIdx];
            if (a && a.onClick) a.onClick();
            dismissCornerPrompt(promptId);
          }}
          onDismiss={dismissCornerPrompt}
        />
      )}

      {/* DeathConfirmModal is replaced by corner-popup-based confirm. The
          component and state remain in case any external code still calls
          confirmDeath() directly, but queueDeathConfirm() now fires a
          corner popup instead of opening the modal. */}
      {moonchildPickSeat != null && (
        <MoonchildPickModal
          mcSeat={(state.grimoire.seats || []).find(s => s.seatNum === moonchildPickSeat)}
          seats={state.grimoire.seats || []}
          onApply={applyMoonchildPick}
          onCancel={cancelMoonchildPick}
        />
      )}
      {klutzPickSeat != null && (
        <KlutzPickModal
          klSeat={(state.grimoire.seats || []).find(s => s.seatNum === klutzPickSeat)}
          seats={state.grimoire.seats || []}
          onApply={applyKlutzPick}
          onCancel={cancelKlutzPick}
        />
      )}
      {vigorPickData != null && (
        <VigormortisPickModal
          data={vigorPickData}
          onApply={applyVigorPick}
          onCancel={cancelVigorPick}
        />
      )}
      {pixiePickData != null && (
        <PixiePickerModal
          data={pixiePickData}
          onApply={applyPixiePick}
          onCancel={cancelPixiePick}
        />
      )}
      {huntsmanPickData != null && (
        <HuntsmanPickerModal
          data={huntsmanPickData}
          onApply={applyHuntsmanPick}
          onCancel={cancelHuntsmanPick}
        />
      )}
      {boomdandyPickData != null && (
        <BoomdandyPickModal
          data={boomdandyPickData}
          onApply={applyBoomdandyPick}
          onCancel={cancelBoomdandyPick}
        />
      )}
      {cannibalChooseData != null && (
        <CannibalChoosePickModal
          data={cannibalChooseData}
          onApply={applyCannibalChoose}
          onCancel={cancelCannibalChoose}
        />
      )}
      {evilTwinModalData != null && (
        <EvilTwinStartModal
          etSeat={(state.grimoire.seats || []).find(s => s.seatNum === evilTwinModalData.etSeatNum)}
          twinSeat={evilTwinModalData.twinSeatNum != null
            ? (state.grimoire.seats || []).find(s => s.seatNum === evilTwinModalData.twinSeatNum)
            : null}
          seats={state.grimoire.seats || []}
          onAccept={(pickedTwinNum) => acceptEvilTwinPair({ etSeatNum: evilTwinModalData.etSeatNum, twinSeatNum: pickedTwinNum })}
          onCancel={cancelEvilTwinModal}
        />
      )}
      {lunaticPickerData != null && (
        <LunaticMinionPickerModal
          lunaticSeat={lunaticPickerData.lunaticSeat}
          seats={state.grimoire.seats || []}
          targetCount={lunaticPickerData.targetCount}
          onConfirm={finishLunaticCeremony}
          onCancel={cancelLunaticPicker}
        />
      )}

      {showRoleForSeat != null && (() => {
        const seat = state.grimoire.seats.find(s => s.seatNum === showRoleForSeat);
        if (!seat) { setShowRoleForSeat(null); return null; }
        const close = () => setShowRoleForSeat(null);
        return (
          <LocalRoleOverlay
            seat={seat}
            state={state}
            onDismiss={close}
            onAccept={() => {
              // Mark the local seat as dealt + accepted so the rest of the app
              // (status pills, BeginGame gate) treats it like any other player
              // who's seen and accepted their role.
              const seats = state.grimoire.seats.map(s =>
                s.seatNum === showRoleForSeat
                  ? { ...s, roleDealt: true, playerStatus: 'accepted' }
                  : s
              );
              update({ grimoire: { ...state.grimoire, seats } });
              close();
            }}
          />
        );
      })()}
    </div>
  );
}

// ---------------- Page Nav ----------------
// Persistent room bar — shows the code, online status, copy/QR for the player
// join link, and lets the ST start a brand-new room or jump into another.
// In spectator mode the controls are replaced with a "spectator" badge so the
// bystander can't accidentally start a new game.
function RoomBar({ roomCode, isOnline, onSetRoom, isSpectator }) {
  const [showPlayerQr, setShowPlayerQr] = useState(false);
  const [showSpectatorQr, setShowSpectatorQr] = useState(false);
  const [joinInput, setJoinInput] = useState('');
  const [joining, setJoining] = useState(false);
  const playerUrl = playerJoinUrl(roomCode);
  const spectatorUrl = spectatorJoinUrl(roomCode);
  return (
    <section className="parchment rounded-lg p-3 sm:p-4 space-y-2">
      <div className="flex items-center gap-3 flex-wrap">
        <div className="flex items-baseline gap-2">
          <span className="text-xs uppercase tracking-wider text-stone-400">Room</span>
          <span className="text-2xl font-bold tracking-[0.3em] text-amber-200">{roomCode}</span>
        </div>
        <span className={`text-[10px] uppercase font-bold px-2 py-0.5 rounded border
          ${isOnline ? 'border-emerald-600 text-emerald-300' : 'border-red-600 text-red-300'}`}
          title={isOnline ? 'Live — changes sync to all players' : 'Disconnected — reconnecting'}>
          ● {isOnline ? 'online' : 'reconnecting'}
        </span>
        {isSpectator && (
          <span className="text-[10px] uppercase font-bold px-2 py-0.5 rounded border border-purple-600 text-purple-300"
            title="Read-only spectator view">
            👁 spectator
          </span>
        )}
        {!isSpectator && (
          <div className="flex items-center gap-1 ml-auto flex-wrap">
            <button onClick={() => { navigator.clipboard?.writeText(playerUrl); }}
              title="Copy the player join link"
              className="text-xs px-2.5 py-1 rounded pill hover:border-amber-500 hover:text-amber-200">
              copy player link
            </button>
            <button onClick={() => setShowPlayerQr(true)}
              className="text-xs px-2.5 py-1 rounded pill hover:border-amber-500 hover:text-amber-200">
              Player QR
            </button>
            <button onClick={() => setShowSpectatorQr(true)}
              title="Read-only grimoire view — share with bystanders"
              className="text-xs px-2.5 py-1 rounded pill hover:border-amber-500 hover:text-amber-200">
              👁 Spectator QR
            </button>
            <button onClick={() => setJoining(j => !j)}
              className="text-xs px-2.5 py-1 rounded pill hover:border-amber-500 hover:text-amber-200">
              {joining ? 'cancel' : 'New / join…'}
            </button>
          </div>
        )}
      </div>
      {!isSpectator && (
        <div className="text-[11px] text-stone-500 break-all">
          Player: {playerUrl}
          <br />
          Spectator: {spectatorUrl}
        </div>
      )}
      {joining && !isSpectator && (
        <div className="flex flex-wrap items-center gap-2 mt-2 pt-2 border-t border-stone-800">
          <button
            onClick={() => {
              if (!confirm('Start a brand-new game in a fresh room? You can always come back to ' + roomCode + ' by typing it in the join box.')) return;
              onSetRoom(generateRoomCode());
              setJoining(false);
            }}
            className="text-xs px-3 py-1.5 rounded pill border-emerald-700 text-emerald-300 hover:bg-emerald-950/30">
            + New game (new room)
          </button>
          <span className="text-stone-500 text-xs">or join existing:</span>
          <input value={joinInput} onChange={e => setJoinInput(e.target.value.toUpperCase())}
            onKeyDown={e => { if (e.key === 'Enter' && joinInput.trim()) { onSetRoom(joinInput.trim()); setJoining(false); setJoinInput(''); } }}
            maxLength={8} placeholder="ABCD"
            className="bg-stone-900 border border-stone-700 rounded px-2 py-1 text-sm w-28 tracking-widest font-mono" />
          <button
            onClick={() => { if (joinInput.trim()) { onSetRoom(joinInput.trim()); setJoining(false); setJoinInput(''); } }}
            disabled={!joinInput.trim()}
            className={`text-xs px-3 py-1.5 rounded pill ${joinInput.trim() ? 'border-amber-600 text-amber-200 hover:bg-amber-950/40' : 'opacity-40 cursor-not-allowed'}`}>
            Go
          </button>
        </div>
      )}
      {showPlayerQr && (
        <QrFullscreenOverlay url={playerUrl} label={`Players — scan to join room ${roomCode}`}
          onClose={() => setShowPlayerQr(false)} />
      )}
      {showSpectatorQr && (
        <QrFullscreenOverlay url={spectatorUrl} label={`Spectators — scan for read-only grimoire (room ${roomCode})`}
          onClose={() => setShowSpectatorQr(false)} />
      )}
    </section>
  );
}

// PIN setup screen — shown on a fresh room (no PIN yet). The ST picks a 4-digit
// code; we pre-fill it with a random suggestion so a hurried ST can just hit
// Save. The PIN is stored at /rooms/<code>/auth/pin in Firebase, and also kept
// in localStorage for this device so they don't have to re-enter.
function PinSetup({ roomCode, onSet }) {
  const [pin, setPin] = useState(() => Math.floor(1000 + Math.random() * 9000).toString());
  const trimmed = pin.trim();
  const valid = /^\d{4,8}$/.test(trimmed);
  return (
    <div className="max-w-md mx-auto py-16">
      <section className="parchment rounded-lg p-6 space-y-4 text-center">
        <div>
          <div className="text-xs uppercase tracking-wider text-amber-300">New room {roomCode}</div>
          <h2 className="text-amber-200 text-xl font-semibold mt-1">Set a storyteller PIN</h2>
          <p className="text-xs text-stone-400 mt-2">
            This PIN protects the grimoire from players who know the room code.
            Players don't need it; spectators get a separate read-only link.
          </p>
        </div>
        <input value={pin}
          onChange={e => setPin(e.target.value.replace(/\D/g, '').slice(0, 8))}
          onKeyDown={e => { if (e.key === 'Enter' && valid) onSet(trimmed); }}
          autoFocus inputMode="numeric"
          className="w-full bg-stone-900 border border-stone-700 rounded px-3 py-3 text-3xl tracking-[0.4em] font-mono text-center" />
        <button onClick={() => valid && onSet(trimmed)}
          disabled={!valid}
          className={`w-full py-3 rounded-lg text-base font-semibold
            ${valid ? 'bg-emerald-600 hover:bg-emerald-500 text-stone-950' : 'bg-stone-800 text-stone-500 cursor-not-allowed'}`}>
          Save PIN &amp; start storyteller view
        </button>
        <p className="text-[10px] text-stone-500">4–8 digits. Write it down somewhere if you might ST from another device.</p>
      </section>
    </div>
  );
}

// PIN entry screen — for ST returning from a different device, or anyone who
// happens to know the room code but not the PIN. Includes a "switch to
// spectator" escape hatch in case a bystander landed here by accident.
function PinEntry({ roomCode, expectedPin, onSuccess, onSwitchToSpectator }) {
  const [pin, setPin] = useState('');
  const [err, setErr] = useState(false);
  const tryPin = () => {
    if (pin === expectedPin) { setErr(false); onSuccess(pin); }
    else setErr(true);
  };
  return (
    <div className="max-w-md mx-auto py-16">
      <section className="parchment rounded-lg p-6 space-y-4 text-center">
        <div>
          <div className="text-xs uppercase tracking-wider text-amber-300">Room {roomCode}</div>
          <h2 className="text-amber-200 text-xl font-semibold mt-1">Storyteller PIN required</h2>
          <p className="text-xs text-stone-400 mt-2">Enter the PIN set when the room was created.</p>
        </div>
        <input value={pin}
          onChange={e => { setPin(e.target.value.replace(/\D/g, '').slice(0, 8)); setErr(false); }}
          onKeyDown={e => { if (e.key === 'Enter' && pin) tryPin(); }}
          autoFocus inputMode="numeric" placeholder="••••"
          className={`w-full bg-stone-900 border rounded px-3 py-3 text-3xl tracking-[0.4em] font-mono text-center
            ${err ? 'border-red-600' : 'border-stone-700'}`} />
        {err && <p className="text-xs text-red-400">Wrong PIN. Try again.</p>}
        <button onClick={tryPin}
          disabled={!pin}
          className={`w-full py-3 rounded-lg text-base font-semibold
            ${pin ? 'bg-emerald-600 hover:bg-emerald-500 text-stone-950' : 'bg-stone-800 text-stone-500 cursor-not-allowed'}`}>
          Unlock storyteller view
        </button>
        <div className="text-xs text-stone-500 pt-2 border-t border-stone-800">
          Not the storyteller?{' '}
          <button onClick={onSwitchToSpectator}
            className="text-amber-300 hover:text-amber-200 underline underline-offset-2">
            Open as spectator instead →
          </button>
        </div>
      </section>
    </div>
  );
}

// Strip the current filename from the URL pathname so we can build sibling
// URLs (player.html, storyteller.html) regardless of which page we're on.
// e.g. on https://x.com/foo/storyteller.html?bar → returns "https://x.com/foo/"
function siteBaseUrl() {
  const origin = window.location.origin;                 // e.g. https://botc-3bt.pages.dev
  const path = window.location.pathname.replace(/[^/]*$/, ''); // strip filename, keep dir
  return origin + (path.endsWith('/') ? path : path + '/');
}

// Build the URL a player opens to join this room. Used by the join QR/link
// and by traveller link generation.
function playerJoinUrl(roomCode) {
  return `${siteBaseUrl()}player.html?room=${roomCode}`;
}

// Read-only spectator URL — bypasses the PIN, renders the grimoire with all
// controls disabled. Lives on storyteller.html with ?view=spectator so the
// page is identical (one less file to load on a phone) but locked down.
function spectatorJoinUrl(roomCode) {
  return `${siteBaseUrl()}storyteller.html?room=${roomCode}&view=spectator`;
}

function BagSetupPage({ state, bag, grouped, setupMods, onCount, onJumpToScript,
                        onIncrementInBag, onDecrementInBag, onRandomizeTeam, onClearTeam, onClearBag,
                        onSetGodfatherSign, onSetBalloonistOutsider, onSetHermitOutsider, onSetXaanOutsiders, onSetLotOutsiders, onSetKazaliOutsiders, onSetAtheistOutsiders,
                        onSetFeature, onGenerate }) {
  const eff = getEffectiveBag(bag, state.bagCharacterIds, state.godfatherSign, state.balloonistOutsider, state.hermitOutsider, state.xaanOutsiders, state.lotOutsiders, state.kazaliOutsiders, state.atheistOutsiders);
  const teams = ['townsfolk','outsider','minion','demon'];
  const teamIdx = { townsfolk: 0, outsider: 1, minion: 2, demon: 3 };

  const bagIdsByTeam = teams.reduce((acc, t) => {
    acc[t] = state.bagCharacterIds.filter(id => CHAR_BY_ID[id]?.team === t);
    return acc;
  }, {});

  // Physical-only counts (per team) — excludes NOT_IN_PHYSICAL_BAG characters
  // (Drunk/Marionette/Lunatic/Lil' Monsta) since they don't take a physical token slot.
  // These drive the BagBuilder count display and the isReady check so e.g. selecting
  // Lil' Monsta doesn't push the Demon team's count over its target of 0.
  const physicalBagIdsByTeam = teams.reduce((acc, t) => {
    acc[t] = bagIdsByTeam[t].filter(id => !NOT_IN_PHYSICAL_BAG.has(id));
    return acc;
  }, {});

  // Per-team count of NOT_IN_PHYSICAL_BAG characters that were selected — these
  // characters count toward eff.bag's target (Drunk is still one of the
  // outsiders, etc.) but don't take a physical bag token. Their slot is filled
  // by another team's token via setup_delta (Drunk → +1 Townsfolk, Marionette
  // → +1 Townsfolk, Lunatic → +1 Demon, Lil' Monsta → +1 Minion / −1 Demon).
  // So the physical target to match for each team is (full target − non-physical
  // selected in that team).
  const nonPhysicalByTeam = teams.reduce((acc, t) => {
    acc[t] = bagIdsByTeam[t].filter(id => NOT_IN_PHYSICAL_BAG.has(id)).length;
    return acc;
  }, {});

  const isReady = bag && teams.every(t =>
    physicalBagIdsByTeam[t].length === ((eff?.bag[teamIdx[t]] || 0) - nonPhysicalByTeam[t])
  );

  return (
    <div className="space-y-6">
      <FeaturesPanel features={state.features || {}} onSetFeature={onSetFeature} />

      <ScriptSummary state={state} grouped={grouped} onEdit={onJumpToScript} />

      <PlayerCountPicker state={state} onCount={onCount} onClearBag={onClearBag} />

      {eff && eff.notes.length > 0 && (
        <section className="parchment rounded-lg p-3 sm:p-4">
          <div className="text-xs uppercase tracking-wider text-amber-300 mb-1">Setup adjustments active</div>
          <ul className="text-sm text-stone-300 space-y-0.5">
            {eff.notes.map((n,i) => <li key={i}>• {n}</li>)}
          </ul>
        </section>
      )}

      {!bag ? (
        <section className="parchment rounded-lg p-4 text-sm text-stone-400">
          Pick a player count above to see the bag composition.
        </section>
      ) : teams.map(t => (
        <React.Fragment key={t}>
          <BagBuilder
            team={t}
            target={eff.bag[teamIdx[t]]}
            scriptChars={grouped[t] || []}
            selectedIds={physicalBagIdsByTeam[t]}
            playerCount={state.playerCount}
            allBagIds={state.bagCharacterIds}
            onIncrement={onIncrementInBag}
            onDecrement={onDecrementInBag}
            onRandomize={() => onRandomizeTeam(t, eff.bag[teamIdx[t]])}
            onClear={() => onClearTeam(t)}
          />
          {/* Character-specific adjustments render directly under their team */}
          {t === 'minion' && (state.bagCharacterIds || []).includes('godfather') && (
            <GodfatherToggle sign={state.godfatherSign} onChange={onSetGodfatherSign} />
          )}
          {t === 'townsfolk' && (state.bagCharacterIds || []).includes('balloonist') && (
            <BalloonistToggle value={state.balloonistOutsider} onChange={onSetBalloonistOutsider} />
          )}
          {t === 'townsfolk' && (state.bagCharacterIds || []).includes('atheist') && (
            <AtheistToggle value={state.atheistOutsiders} onChange={onSetAtheistOutsiders} />
          )}
          {t === 'outsider' && (state.bagCharacterIds || []).includes('hermit') && (
            <HermitToggle value={state.hermitOutsider} onChange={onSetHermitOutsider} />
          )}
          {t === 'outsider' && (state.bagCharacterIds || []).includes('xaan') && (
            <XaanToggle value={state.xaanOutsiders} onChange={onSetXaanOutsiders} />
          )}
          {t === 'demon' && (state.bagCharacterIds || []).includes('lordoftyphon') && (
            <LordOfTyphonToggle value={state.lotOutsiders} onChange={onSetLotOutsiders} />
          )}
          {t === 'demon' && (state.bagCharacterIds || []).includes('kazali') && (
            <KazaliToggle value={state.kazaliOutsiders} onChange={onSetKazaliOutsiders} />
          )}
        </React.Fragment>
      ))}

      {bag && (
        <BagReadyBanner ready={isReady} eff={eff} bagIdsByTeam={bagIdsByTeam} playerCount={state.playerCount} />
      )}

      {bag && (
        <div className="flex justify-center pt-2">
          <button
            onClick={() => {
              if (state.grimoire.generated) {
                if (!confirm('This will replace the current grimoire with a new shuffle. Continue?')) return;
              }
              onGenerate();
            }}
            disabled={!isReady}
            className={`px-6 py-3 rounded-lg text-base font-semibold transition
              ${isReady
                ? 'bg-amber-600 hover:bg-amber-500 text-stone-950 shadow-lg shadow-amber-900/40'
                : 'bg-stone-800 text-stone-500 cursor-not-allowed'}`}>
            {state.grimoire.generated ? 'Re-shuffle & go to grimoire →' : 'Generate roles & go to grimoire →'}
          </button>
        </div>
      )}
    </div>
  );
}

function BagBuilder({ team, target, scriptChars, selectedIds, allBagIds, playerCount, onIncrement, onDecrement, onRandomize, onClear }) {
  const count = selectedIds.length;
  const status = count === target ? 'ok' : count > target ? 'over' : 'under';
  const statusColor = status === 'ok' ? 'text-emerald-400' : status === 'over' ? 'text-red-400' : 'text-amber-300';

  return (
    <section className="parchment rounded-lg p-4 sm:p-5">
      <header className="flex flex-wrap items-center justify-between gap-2 mb-3">
        <div className="flex items-center gap-3 flex-wrap">
          <TeamPill team={team} />
          <span className="text-2xl font-semibold">
            <span className={statusColor}>{count}</span>
            <span className="text-stone-500 text-sm font-normal"> / {target} for bag</span>
          </span>
          {status === 'ok' && <span className="text-xs text-emerald-400">✓ ready</span>}
          {status === 'over' && <span className="text-xs text-red-400">over by {count - target}</span>}
        </div>
        <div className="flex gap-1">
          <button onClick={onRandomize}
            className="text-xs px-2.5 py-1 rounded pill hover:border-amber-500 hover:text-amber-200"
            title={`Pick ${target} random ${team} from the script`}>
            Randomize
          </button>
          <button onClick={onClear}
            className="text-xs px-2.5 py-1 rounded pill hover:border-amber-500 hover:text-amber-200">
            Clear
          </button>
        </div>
      </header>

      {scriptChars.length === 0 ? (
        <p className="text-xs italic text-stone-500">
          No {TEAM_LABEL[team].toLowerCase()} in this script — add some on the Script Builder page.
        </p>
      ) : (
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2">
          {scriptChars.map(c => {
            // Per-card selection is taken from the FULL bag list (allBagIds) so that
            // NOT_IN_PHYSICAL_BAG characters (Drunk/Marionette/Lunatic/Lil' Monsta)
            // still show as ticked when selected — even though they don't add to the
            // physical-bag count shown in this section's header.
            const charCount = allBagIds.filter(id => id === c.id).length;
            return (
              <BagCharCard key={c.id}
                c={c}
                count={charCount}
                allBagIds={allBagIds}
                playerCount={playerCount}
                onIncrement={() => onIncrement(c.id)}
                onDecrement={() => onDecrement(c.id)}
              />
            );
          })}
        </div>

// Characters whose ability lets them register as a Demon for setup purposes.
// Used for the Marionette adjacency rule: the Marionette must sit next to the Demon,
// but the Recluse (and others below) may register as the Demon at the ST's discretion.
const REGISTERS_AS_DEMON_FOR_SETUP = new Set(['recluse']);

function countsAsDemonForMarionette(charId) {
  const c = CHAR_BY_ID[charId];
  return c?.team === 'demon' || REGISTERS_AS_DEMON_FOR_SETUP.has(charId);
}

// Townsfolk + Outsiders in the script that aren't currently in play — eligible to be
// shown to the Demon as bluffs on Night 1.
function availableBluffs(scriptIds, seats, pendingAssignments) {
  const inPlay = new Set([
    ...seats.map(s => s.actualRoleId),
    ...(pendingAssignments || []),
  ]);
  return scriptIds
    .map(id => CHAR_BY_ID[id])
    .filter(c => c && (c.team === 'townsfolk' || c.team === 'outsider'))
    .filter(c => !inPlay.has(c.id))
    .sort((a, b) => a.team.localeCompare(b.team) || a.name.localeCompare(b.name));
}

// Normalize a day-of-nominations entry into the canonical shape.
// Legacy localStorage may have stored just an array of nominations.
function normalizeDayNoms(entry) {
  if (!entry) return { nominations: [], minionVoted: false, demonVoted: false };
  if (Array.isArray(entry)) return { nominations: entry, minionVoted: false, demonVoted: false };
  return {
    nominations: entry.nominations || [],
    minionVoted: !!entry.minionVoted,
    demonVoted: !!entry.demonVoted,
  };
}

// Reminder tokens available from the characters currently in play (using actualRoleId
// because the perceived-but-not-actual characters don't have their abilities active).
// Also exposes "Is the Drunk" / "Is the Marionette" markers when those roles are in play
// or still pending — selecting them assigns the hidden role to the picker's seat.
function availableReminders(seats, pendingAssignments, extraCharIds = []) {
  const seen = new Set();
  const result = [];
  const pushHiddenMarker = (charId, c) => {
    if (HIDDEN_ROLE_REMINDER_LABEL[charId]) {
      result.push({
        charId,
        label: HIDDEN_ROLE_REMINDER_LABEL[charId],
        charName: c.name,
        team: c.team,
        hiddenRoleMarker: true,
      });
    }
  };
  const pushFor = (charId) => {
    if (!charId || seen.has(charId)) return;
    seen.add(charId);
    const c = CHAR_BY_ID[charId];
    if (!c) return;
    const removes = new Set(REMINDER_REMOVES[charId] || []);
    const labels = [
      ...(c.reminders || []).filter(l => !removes.has(l)),
      ...(REMINDER_AUGMENTS[charId] || []),
    ];
    for (const label of labels) {
      result.push({ charId, label, charName: c.name, team: c.team });
    }
    pushHiddenMarker(charId, c);
  };
  for (const seat of (seats || [])) pushFor(seat.actualRoleId);
  for (const charId of (pendingAssignments || [])) {
    if (seen.has(charId)) continue;
    seen.add(charId);
    const c = CHAR_BY_ID[charId];
    if (!c) continue;
    pushHiddenMarker(charId, c);
  }
  // Extras: characters that are in play but not on any seat (e.g. Lil' Monsta —
  // a token passed between minions each night). Their reminder labels still need
  // to be available so the ST can mark which minion is babysitting tonight.
  for (const charId of extraCharIds) pushFor(charId);
  result.sort((a, b) =>
    a.charName.localeCompare(b.charName) || a.label.localeCompare(b.label));
  return result;
}

// Seats that the storyteller can pick to assign a pending hidden role (Drunk, Marionette).
function eligibleSeatsForPending(roleId, seats) {
  const result = new Set();
  if (!roleId || !seats?.length) return result;

  if (roleId === 'drunk') {
    seats.forEach(s => {
      if (CHAR_BY_ID[s.perceivedRoleId]?.team === 'townsfolk' &&
          s.actualRoleId === s.perceivedRoleId) {
        result.add(s.seatNum);
      }
    });
    return result;
  }

  if (roleId === 'lunatic') {
    // Lunatic was given a Demon token. Eligible seats = those holding a demon-team token
    // that haven't already been re-assigned to a hidden role.
    seats.forEach(s => {
      if (CHAR_BY_ID[s.perceivedRoleId]?.team === 'demon' &&
          s.actualRoleId === s.perceivedRoleId) {
        result.add(s.seatNum);
      }
    });
    return result;
  }

  if (roleId === 'marionette') {
    const n = seats.length;
    // Demons — and characters that may register as Demon (e.g. Recluse) — count as the Demon for adjacency.
    const demonLikeSeats = seats.filter(s => countsAsDemonForMarionette(s.perceivedRoleId));
    for (const ds of demonLikeSeats) {
      const left  = ((ds.seatNum - 2 + n) % n) + 1;
      const right = (ds.seatNum % n) + 1;
      for (const sn of [left, right]) {
        const seat = seats.find(s => s.seatNum === sn);
        if (seat && CHAR_BY_ID[seat.perceivedRoleId]?.team === 'townsfolk' &&
            seat.actualRoleId === seat.perceivedRoleId) {
          result.add(sn);
        }
      }
    }
    return result;
  }

  // Generic Minion (Lord of Typhon: ST hand-places each minion to build the evil line).
  // Any townsfolk-token seat that hasn't already been re-assigned is eligible.
  if (CHAR_BY_ID[roleId]?.team === 'minion') {
    seats.forEach(s => {
      if (CHAR_BY_ID[s.perceivedRoleId]?.team === 'townsfolk' &&
          s.actualRoleId === s.perceivedRoleId) {
        result.add(s.seatNum);
      }
    });
    return result;
  }

  return result;
}
