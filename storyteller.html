// ---------------- Grimoire ----------------

// Characters whose ability lets them register as a Demon for setup purposes.
// Used for the Marionette adjacency rule: the Marionette must sit next to the Demon,
// but the Recluse (and others below) may register as the Demon at the ST's discretion.
const REGISTERS_AS_DEMON_FOR_SETUP = new Set(['recluse']);

function countsAsDemonForMarionette(charId) {
  const c = CHAR_BY_ID[charId];
  return c?.team === 'demon' || REGISTERS_AS_DEMON_FOR_SETUP.has(charId);
}

// Townsfolk + Outsiders in the script that aren't currently in play — eligible to be
// shown to the Demon as bluffs on Night 1.
function availableBluffs(scriptIds, seats, pendingAssignments) {
  const inPlay = new Set([
    ...seats.map(s => s.actualRoleId),
    ...(pendingAssignments || []),
  ]);
  return scriptIds
    .map(id => CHAR_BY_ID[id])
    .filter(c => c && (c.team === 'townsfolk' || c.team === 'outsider'))
    .filter(c => !inPlay.has(c.id))
    .sort((a, b) => a.team.localeCompare(b.team) || a.name.localeCompare(b.name));
}

// Normalize a day-of-nominations entry into the canonical shape.
// Legacy localStorage may have stored just an array of nominations.
function normalizeDayNoms(entry) {
  if (!entry) return { nominations: [], minionVoted: false, demonVoted: false };
  if (Array.isArray(entry)) return { nominations: entry, minionVoted: false, demonVoted: false };
  return {
    nominations: entry.nominations || [],
    minionVoted: !!entry.minionVoted,
    demonVoted: !!entry.demonVoted,
  };
}

// Reminder tokens available from the characters currently in play (using actualRoleId
// because the perceived-but-not-actual characters don't have their abilities active).
// Also exposes "Is the Drunk" / "Is the Marionette" markers when those roles are in play
// or still pending — selecting them assigns the hidden role to the picker's seat.
function availableReminders(seats, pendingAssignments, extraCharIds = []) {
  const seen = new Set();
  const result = [];
  const pushHiddenMarker = (charId, c) => {
    if (HIDDEN_ROLE_REMINDER_LABEL[charId]) {
      result.push({
        charId,
        label: HIDDEN_ROLE_REMINDER_LABEL[charId],
        charName: c.name,
        team: c.team,
        hiddenRoleMarker: true,
      });
    }
  };
  const pushFor = (charId) => {
    if (!charId || seen.has(charId)) return;
    seen.add(charId);
    const c = CHAR_BY_ID[charId];
    if (!c) return;
    const removes = new Set(REMINDER_REMOVES[charId] || []);
    const labels = [
      ...(c.reminders || []).filter(l => !removes.has(l)),
      ...(REMINDER_AUGMENTS[charId] || []),
    ];
    for (const label of labels) {
      result.push({ charId, label, charName: c.name, team: c.team });
    }
    pushHiddenMarker(charId, c);
  };
  for (const seat of (seats || [])) pushFor(seat.actualRoleId);
  for (const charId of (pendingAssignments || [])) {
    if (seen.has(charId)) continue;
    seen.add(charId);
    const c = CHAR_BY_ID[charId];
    if (!c) continue;
    pushHiddenMarker(charId, c);
  }
  // Extras: characters that are in play but not on any seat (e.g. Lil' Monsta —
  // a token passed between minions each night). Their reminder labels still need
  // to be available so the ST can mark which minion is babysitting tonight.
  for (const charId of extraCharIds) pushFor(charId);
  result.sort((a, b) =>
    a.charName.localeCompare(b.charName) || a.label.localeCompare(b.label));
  return result;
}

// Seats that the storyteller can pick to assign a pending hidden role (Drunk, Marionette).
function eligibleSeatsForPending(roleId, seats) {
  const result = new Set();
  if (!roleId || !seats?.length) return result;

  if (roleId === 'drunk') {
    seats.forEach(s => {
      if (CHAR_BY_ID[s.perceivedRoleId]?.team === 'townsfolk' &&
          s.actualRoleId === s.perceivedRoleId) {
        result.add(s.seatNum);
      }
    });
    return result;
  }

  if (roleId === 'lunatic') {
    // Lunatic was given a Demon token. Eligible seats = those holding a demon-team token
    // that haven't already been re-assigned to a hidden role.
    seats.forEach(s => {
      if (CHAR_BY_ID[s.perceivedRoleId]?.team === 'demon' &&
          s.actualRoleId === s.perceivedRoleId) {
        result.add(s.seatNum);
      }
    });
    return result;
  }

  if (roleId === 'marionette') {
    const n = seats.length;
    // Demons — and characters that may register as Demon (e.g. Recluse) — count as the Demon for adjacency.
    const demonLikeSeats = seats.filter(s => countsAsDemonForMarionette(s.perceivedRoleId));
    for (const ds of demonLikeSeats) {
      const left  = ((ds.seatNum - 2 + n) % n) + 1;
      const right = (ds.seatNum % n) + 1;
      for (const sn of [left, right]) {
        const seat = seats.find(s => s.seatNum === sn);
        if (seat && CHAR_BY_ID[seat.perceivedRoleId]?.team === 'townsfolk' &&
            seat.actualRoleId === seat.perceivedRoleId) {
          result.add(sn);
        }
      }
    }
    return result;
  }

  // Generic Minion (Lord of Typhon: ST hand-places each minion to build the evil line).
  // Any townsfolk-token seat that hasn't already been re-assigned is eligible.
  if (CHAR_BY_ID[roleId]?.team === 'minion') {
    seats.forEach(s => {
      if (CHAR_BY_ID[s.perceivedRoleId]?.team === 'townsfolk' &&
          s.actualRoleId === s.perceivedRoleId) {
        result.add(s.seatNum);
      }
    });
    return result;
  }

  return result;
}

function GrimoirePage({ state, swapSourceSeat, assigningRoleId, forceReadOnly,
                        onSeatTap, onCancelSwap, onPickupAssignment, onCancelAssignment,
                        onUndoAssignmentByCharId, onUnassignPending,
                        onToggleDead, onToggleAlignment, onSwap,
                        onAddReminder, onRemoveReminder, onChangeRole,
                        onSetDemonBluff, onSetLunaticBluff, onSetMinionBluff, onSetTownSquareNote,
                        onSetPlayerName, onReleaseSeat,
                        onDealRoleToSeat, onUndealSeat, onDealAllRoles, onUndealAllRoles, dealBlockedReason,
                        onAddTraveller, onRemoveTraveller, onSetTravellerName, onReleaseTravellerSeat,
                        onSetTravellerInsertion, onSetTravellerRole, onSetTravellerAlignment,
                        onDealRoleToTraveller, onUndealTraveller,
                        onToggleTravellerDead, onToggleTravellerAlignment,
                        onAddTravellerReminder, onRemoveTravellerReminder,
                        onBeginGame, onAdvanceToNight, onSetViewingDayIndex,
                        onSetView, onRegenerate, onJumpToBag }) {
  const grim = state.grimoire || {};
  const [pickerSeat, setPickerSeat] = useState(null);
  const [bluffPickerSlot, setBluffPickerSlot] = useState(null);
  const [lunaticBluffPickerSlot, setLunaticBluffPickerSlot] = useState(null);
  // For minion bluffs we need to track BOTH which seat and which slot is being picked.
  const [minionBluffPicker, setMinionBluffPicker] = useState(null); // { seatNum, slot } | null
  // Seat whose role is being changed (Summoner-picks-Demon, Pit-Hag, etc.)
  const [roleChangerSeat, setRoleChangerSeat] = useState(null);
  // Traveller-specific pickers — keyed by travellerNum.
  const [pickerTravellerNum, setPickerTravellerNum] = useState(null);
  const [roleChangerTravellerNum, setRoleChangerTravellerNum] = useState(null);
  // Close pickers if the grimoire is regenerated
  useEffect(() => {
    setPickerSeat(null);
    setBluffPickerSlot(null);
    setLunaticBluffPickerSlot(null);
    setMinionBluffPicker(null);
    setRoleChangerSeat(null);
    setPickerTravellerNum(null);
    setRoleChangerTravellerNum(null);
  }, [grim.generated, (grim.seats || []).length]);

  if (!grim.generated || grim.seats.length === 0) {
    return (
      <section className="parchment rounded-lg p-8 text-center space-y-4">
        <div className="text-amber-200 text-lg">No grimoire yet.</div>
        <div className="text-stone-400 text-sm">Set up your bag and hit "Generate roles" to deal the game.</div>
        <button onClick={onJumpToBag}
          className="px-4 py-2 rounded pill hover:border-amber-500 hover:text-amber-200">
          → Go to Bag Setup
        </button>
      </section>
    );
  }

  // Eligibility comes from whichever role the ST is currently "holding" via the SetupNeedsPanel.
  const eligibleSet = assigningRoleId
    ? eligibleSeatsForPending(assigningRoleId, grim.seats)
    : new Set();

  // Day-tab plumbing: viewingDayIndex < days.length means we're showing a past snapshot.
  const isViewingPastDay = grim.gameStarted && grim.viewingDayIndex < (grim.days?.length || 0);
  const displayedSeats = isViewingPastDay
    ? (grim.days[grim.viewingDayIndex]?.seats || grim.seats)
    : grim.seats;
  const displayedBluffs = isViewingPastDay
    ? (grim.days[grim.viewingDayIndex]?.demonBluffs || grim.demonBluffs)
    : grim.demonBluffs;
  const displayedNotes = isViewingPastDay
    ? (grim.days[grim.viewingDayIndex]?.townSquareNotes || grim.townSquareNotes)
    : grim.townSquareNotes;
  const readOnly = isViewingPastDay || !!forceReadOnly;

  // --- Night-info heads-up banners (Flower Girl, Town Crier) ---
  // On Day 2+, these characters wake each night* and learn something about the
  // previous in-game day. Surface that info at the top of the page so the ST
  // doesn't have to flip to the Nominations tab during the night phase.
  // We deliberately check ACTUAL role so a Drunk/Marionette version doesn't trigger,
  // and require the seat to be alive (dead character gets no info).
  const flowerGirlSeat = (grim.seats || []).find(s =>
    s.actualRoleId === 'flowergirl' && !s.isDead);
  const townCrierSeat = (grim.seats || []).find(s =>
    s.actualRoleId === 'towncrier' && !s.isDead);
  const liveDayIdx = (grim.days || []).length;            // 0 = Day 1, 1 = Day 2, …
  const prevDayIdx = liveDayIdx - 1;
  const onNightTwoPlus = grim.gameStarted && liveDayIdx >= 1;
  const showFlowerGirlBanner = !!flowerGirlSeat && onNightTwoPlus;
  const showTownCrierBanner  = !!townCrierSeat  && onNightTwoPlus;
  const prevDayEntry = onNightTwoPlus
    ? normalizeDayNoms((grim.nominationsByDay || {})[prevDayIdx])
    : null;
  // For Town Crier: did any nomination on the previous day come from a Minion?
  // Use the previous day's seat snapshot if available so role changes mid-game
  // are respected at the right point in time.
  const prevDaySeats = (grim.days?.[prevDayIdx]?.seats) || grim.seats || [];
  const prevDayMinionNominated = !!(showTownCrierBanner && prevDayEntry &&
    prevDayEntry.nominations.some(n => {
      const ns = prevDaySeats.find(s => s.seatNum === n.nominatorSeat);
      return ns && CHAR_BY_ID[ns.actualRoleId]?.team === 'minion';
    }));
  const prevDayDemonVoted = showFlowerGirlBanner && prevDayEntry
    ? prevDayEntry.demonVoted
    : false;

  return (
    <div className="space-y-4">
      {showFlowerGirlBanner && (
        <FlowerGirlBanner
          seat={flowerGirlSeat}
          prevDayNumber={prevDayIdx + 1}
          demonVoted={prevDayDemonVoted}
        />
      )}
      {showTownCrierBanner && (
        <TownCrierBanner
          seat={townCrierSeat}
          prevDayNumber={prevDayIdx + 1}
          minionNominated={prevDayMinionNominated}
        />
      )}
      {(grim.kazaliPicks || []).length > 0 && (
        <KazaliPicksBanner picks={grim.kazaliPicks} seats={grim.seats} />
      )}

      <GrimoireToolbar
        view={state.grimoireView}
        onSetView={onSetView}
        onRegenerate={onRegenerate}
        onJumpToBag={onJumpToBag}
      />

      <SetupNeedsPanel
        seats={grim.seats}
        pendingAssignments={grim.pendingAssignments}
        assigningRoleId={assigningRoleId}
        eligibleCount={eligibleSet.size}
        onPickup={onPickupAssignment}
        onCancel={onCancelAssignment}
        onUndo={onUndoAssignmentByCharId}
      />

      <PlayersPanel
        seats={grim.seats}
        travellers={grim.travellers || []}
        onSetName={onSetPlayerName}
        onRelease={onReleaseSeat}
        onDealRole={onDealRoleToSeat}
        onUndealSeat={onUndealSeat}
        dealBlockedReason={dealBlockedReason}
        onAddTraveller={onAddTraveller}
        onRemoveTraveller={onRemoveTraveller}
        onSetTravellerName={onSetTravellerName}
        onReleaseTravellerSeat={onReleaseTravellerSeat}
        onSetTravellerInsertion={onSetTravellerInsertion}
        onSetTravellerRole={onSetTravellerRole}
        onSetTravellerAlignment={onSetTravellerAlignment}
        onDealRoleToTraveller={onDealRoleToTraveller}
        onUndealTraveller={onUndealTraveller}
        onToggleTravellerDead={onToggleTravellerDead}
        onToggleTravellerAlignment={onToggleTravellerAlignment}
      />

      {grim.gameStarted && (
        <DayTabs
          days={grim.days || []}
          viewingDayIndex={grim.viewingDayIndex || 0}
          onSelect={onSetViewingDayIndex}
        />
      )}

      {swapSourceSeat != null && (
        <SwapBanner
          sourceSeat={grim.seats.find(s => s.seatNum === swapSourceSeat)}
          onCancel={onCancelSwap}
        />
      )}

      {state.grimoireView === 'circular' ? (
        <CircularGrimoire
          seats={displayedSeats}
          travellers={grim.travellers || []}
          eligibleSet={readOnly ? new Set() : eligibleSet}
          swapSourceSeat={readOnly ? null : swapSourceSeat}
          assigningRoleId={readOnly ? null : assigningRoleId}
          townSquareNotes={displayedNotes || { above: '', below: '' }}
          gameStarted={grim.gameStarted}
          days={grim.days || []}
          viewingDayIndex={grim.viewingDayIndex || 0}
          readOnly={readOnly}
          onSeatTap={readOnly ? undefined : onSeatTap}
          onUnassignPending={readOnly ? undefined : onUnassignPending}
          onToggleDead={readOnly ? undefined : onToggleDead}
          onToggleAlignment={readOnly ? undefined : onToggleAlignment}
          onSwap={readOnly ? undefined : onSwap}
          onOpenReminderPicker={readOnly ? undefined : setPickerSeat}
          onOpenRoleChanger={readOnly ? undefined : setRoleChangerSeat}
          onRemoveReminder={readOnly ? undefined : onRemoveReminder}
          onSetTownSquareNote={readOnly ? undefined : onSetTownSquareNote}
          onSetViewingDayIndex={onSetViewingDayIndex}
          onToggleTravellerDead={readOnly ? undefined : onToggleTravellerDead}
          onToggleTravellerAlignment={readOnly ? undefined : onToggleTravellerAlignment}
          onOpenTravellerReminderPicker={readOnly ? undefined : setPickerTravellerNum}
          onOpenTravellerRoleChanger={readOnly ? undefined : setRoleChangerTravellerNum}
          onRemoveTravellerReminder={readOnly ? undefined : onRemoveTravellerReminder}
        />
      ) : (
        <ListGrimoire
          seats={displayedSeats}
          travellers={grim.travellers || []}
          eligibleSet={readOnly ? new Set() : eligibleSet}
          swapSourceSeat={readOnly ? null : swapSourceSeat}
          assigningRoleId={readOnly ? null : assigningRoleId}
          onSeatTap={readOnly ? undefined : onSeatTap}
          onUnassignPending={readOnly ? undefined : onUnassignPending}
          onToggleDead={readOnly ? undefined : onToggleDead}
          onToggleAlignment={readOnly ? undefined : onToggleAlignment}
          onSwap={readOnly ? undefined : onSwap}
          onOpenReminderPicker={readOnly ? undefined : setPickerSeat}
          onOpenRoleChanger={readOnly ? undefined : setRoleChangerSeat}
          onRemoveReminder={readOnly ? undefined : onRemoveReminder}
          onToggleTravellerDead={readOnly ? undefined : onToggleTravellerDead}
          onToggleTravellerAlignment={readOnly ? undefined : onToggleTravellerAlignment}
          onOpenTravellerReminderPicker={readOnly ? undefined : setPickerTravellerNum}
          onOpenTravellerRoleChanger={readOnly ? undefined : setRoleChangerTravellerNum}

        />
      )}

      {readOnly && (
        <section className="parchment rounded-lg p-3 border-amber-700/60 text-center text-sm text-amber-300">
          📜 Viewing a past day's snapshot ({grim.days[grim.viewingDayIndex]?.label}). Read-only.
        </section>
      )}

      <DemonBluffs
        bluffs={displayedBluffs || [null, null, null]}
        onPick={readOnly ? () => {} : (slot) => setBluffPickerSlot(slot)}
        onClear={readOnly ? () => {} : (slot) => onSetDemonBluff(slot, null)}
      />

      {(state.bagCharacterIds || []).includes('lunatic') && (
        <LunaticBluffs
          bluffs={grim.lunaticBluffs || [null, null, null]}
          onPick={readOnly ? () => {} : (slot) => setLunaticBluffPickerSlot(slot)}
          onClear={readOnly ? () => {} : (slot) => onSetLunaticBluff(slot, null)}

      {/* Snitch ability: "Each Minion gets 3 bluffs." One panel per minion seat. */}
      {(state.bagCharacterIds || []).includes('snitch') && (
        <MinionBluffsPanel
          seats={grim.seats}
          minionBluffs={grim.minionBluffs || {}}

          onPick={(seatNum, slot) => setMinionBluffPicker({ seatNum, slot })}

      <NightPhaseSection
        seats={displayedSeats}
        viewingDayIndex={grim.viewingDayIndex || 0}

        seats={grim.seats}

        seats={grim.seats}
        gameStarted={grim.gameStarted}

      />

      {pickerSeat != null && (
        <ReminderPicker
          seat={grim.seats.find(s => s.seatNum === pickerSeat)}

          pendingAssignments={grim.pendingAssignments}
          extraCharIds={[
            ...(state.bagCharacterIds || []).filter(id => NO_SEAT_ASSIGNMENT.has(id)),
            ...((grim.travellers || []).map(t => t.charId).filter(Boolean)),

          scriptCharIds={state.characterIds}
          onSelect={(r) => onAddReminder(pickerSeat, r.charId, r.label, !!r.hiddenRoleMarker)}
          onClose={() => setPickerSeat(null)}
        />
      )}

      {pickerTravellerNum != null && (() => {
        const t = (grim.travellers || []).find(x => x.travellerNum === pickerTravellerNum);
        const c = CHAR_BY_ID[t?.charId];
        return (
          <ReminderPicker
            seat={{ seatNum: `T${pickerTravellerNum}` }}
            targetLabel={`T#${pickerTravellerNum}${t?.playerName ? ` · ${t.playerName}` : ''}${c ? ` (${c.name})` : ''}`}
            seats={grim.seats}
            pendingAssignments={grim.pendingAssignments}
            extraCharIds={[
              ...(state.bagCharacterIds || []).filter(id => NO_SEAT_ASSIGNMENT.has(id)),
              ...((grim.travellers || []).map(tt => tt.charId).filter(Boolean)),
            ]}
            scriptCharIds={state.characterIds}
            onSelect={(r) => onAddTravellerReminder(pickerTravellerNum, r.charId, r.label)}
            onClose={() => setPickerTravellerNum(null)}
          />
        );
      })()}

      {roleChangerTravellerNum != null && (() => {
        const t = (grim.travellers || []).find(x => x.travellerNum === roleChangerTravellerNum);
        const currentName = CHAR_BY_ID[t?.charId]?.name || `T#${roleChangerTravellerNum}`;
        return (
          <BluffPicker
            slot={0}
            title={`Change role for T#${roleChangerTravellerNum}${t?.playerName ? ` · ${t.playerName}` : ''}`}
            subtitle={`Currently ${currentName}. Pick any traveller role.`}
            options={allTravellerChars()}
            currentlyChosen={new Set()}
            onSelect={(charId) => { onSetTravellerRole(roleChangerTravellerNum, charId); setRoleChangerTravellerNum(null); }}
            onClose={() => setRoleChangerTravellerNum(null)}
          />
        );
      })()}

      {bluffPickerSlot != null && (
        <BluffPicker
          slot={bluffPickerSlot}
          options={availableBluffs(state.characterIds, grim.seats, grim.pendingAssignments)}
          currentlyChosen={new Set((grim.demonBluffs || []).filter(Boolean))}
          onSelect={(charId) => { onSetDemonBluff(bluffPickerSlot, charId); setBluffPickerSlot(null); }}
          onClose={() => setBluffPickerSlot(null)}
        />
      )}

      {lunaticBluffPickerSlot != null && (
        <BluffPicker
          slot={lunaticBluffPickerSlot}
          title="Pick Lunatic bluff"
          subtitle="Any role from the script (in or out of play). These are the fake bluffs shown to the Lunatic, who thinks they're the Demon."
          options={(state.characterIds || []).map(id => CHAR_BY_ID[id]).filter(Boolean).filter(c => ['townsfolk','outsider','minion','demon'].includes(c.team))}
          currentlyChosen={new Set((grim.lunaticBluffs || []).filter(Boolean))}
          onSelect={(charId) => { onSetLunaticBluff(lunaticBluffPickerSlot, charId); setLunaticBluffPickerSlot(null); }}
          onClose={() => setLunaticBluffPickerSlot(null)}
        />
      )}

      {roleChangerSeat != null && (() => {
        const seat = grim.seats.find(s => s.seatNum === roleChangerSeat);
        const currentName = CHAR_BY_ID[seat?.actualRoleId]?.name || `Seat #${roleChangerSeat}`;
        return (
          <BluffPicker
            slot={0}
            title={`Change role for Seat #${roleChangerSeat}${seat?.playerName ? ` · ${seat.playerName}` : ''}`}
            subtitle={`Currently ${currentName}. Pick any role from the script. The player will need their role re-dealt — the deal status resets automatically.`}
            options={(state.characterIds || []).map(id => CHAR_BY_ID[id]).filter(Boolean).filter(c => ['townsfolk','outsider','minion','demon'].includes(c.team))}
            currentlyChosen={new Set()}
            onSelect={(charId) => { onChangeRole(roleChangerSeat, charId); setRoleChangerSeat(null); }}
            onClose={() => setRoleChangerSeat(null)}
          />
        );
      })()}

      {minionBluffPicker != null && (() => {
        const { seatNum, slot } = minionBluffPicker;
        const minionSeat = grim.seats.find(s => s.seatNum === seatNum);
        const minionName = CHAR_BY_ID[minionSeat?.actualRoleId]?.name || `Seat #${seatNum}`;
        const currentForThisMinion = new Set(((grim.minionBluffs || {})[seatNum] || []).filter(Boolean));
        return (
          <BluffPicker
            slot={slot}
            title={`Pick ${minionName} bluff #${slot + 1}`}
            subtitle="Out-of-play Townsfolk and Outsiders from the script. These are the 3 bluffs the Snitch grants this minion."
            options={availableBluffs(state.characterIds, grim.seats, grim.pendingAssignments)}
            currentlyChosen={currentForThisMinion}
            onSelect={(charId) => { onSetMinionBluff(seatNum, slot, charId); setMinionBluffPicker(null); }}
            onClose={() => setMinionBluffPicker(null)}
          />
        );
      })()}
    </div>
  );
}

        <div className="flex-1 min-w-0">

            On Day {prevDayNumber}: <span className="font-bold">{big}</span>.

// Compact composite reminder token: round, character icon as background, label overlaid.
// `size` may be a pixel number (e.g. 36) or any CSS length (e.g. '100%') to fill the parent.
// `zoom` (from the grimoire pan/zoom layer) relaxes the label clamp at higher magnification.
function ReminderToken({ reminder, onRemove, size = 36, zoom = 1 }) {
  const c = CHAR_BY_ID[reminder.charId];
  const img = iconUrl(reminder.charId);
  const isFixed = typeof size === 'number';
  const cssSize = isFixed ? `${size}px` : size;
  const fontPx = isFixed ? Math.max(7, size * 0.18) : 8;
  // At default zoom keep labels to a single truncated line so they fit the small slot.
  // When the storyteller is zoomed in, let labels wrap (up to 3 lines at high zoom).
  const labelClampClass = zoom >= 2.5 ? '' : zoom >= 1.5 ? 'line-clamp-3' : 'truncate';
  // Slight bump to font when zoomed-in so the wrap-friendly layout uses the space well.
  const labelFontPx = zoom >= 2.5 ? fontPx * 1.25 : fontPx;
  return (
    <div className="relative inline-block group/rem"
      style={{ width: cssSize, height: isFixed ? cssSize : undefined, aspectRatio: '1 / 1' }}>
      <div className="rounded-full overflow-hidden border border-amber-700/70 bg-stone-900 relative w-full h-full"
        title={`${c?.name || reminder.charId}: ${reminder.label}`}
        style={{
          backgroundImage: 'url(data/tokens/character-token-noise.webp)',
          backgroundSize: 'cover',
        }}>
        {img && <img src={img} alt="" className="w-full h-full object-cover opacity-90" draggable={false} />}
        <div className={`absolute inset-x-0 bottom-0 bg-stone-950/85 text-amber-100 text-center leading-none px-0.5 ${labelClampClass}`}
          style={{ fontSize: `${labelFontPx}px` }}>
          {reminder.label}
        </div>
      </div>
      {onRemove && (
        <button onClick={(e) => { e.stopPropagation(); onRemove(); }}
          title="Remove reminder"
          className="touch-show absolute -top-1 -right-1 bg-stone-900 border border-stone-700 rounded-full w-4 h-4 flex items-center justify-center text-[10px] leading-none opacity-0 group-hover/rem:opacity-100 transition hover:border-red-500 hover:text-red-400">
          ×
        </button>
      )}
    </div>
  );
}

// Modal: pick a reminder to attach to a seat. Groups by character.
// Includes "Is the Drunk" / "Is the Marionette" markers when those roles are in play
// (or still pending) — selecting one is equivalent to assigning the hidden role.
// Includes a "Custom" section letting the ST pick any in-script icon + freeform text.
function ReminderPicker({ seat, seats, pendingAssignments, extraCharIds, scriptCharIds, targetLabel, onSelect, onClose }) {
  const all = availableReminders(seats, pendingAssignments, extraCharIds || []);
  const headerLabel = targetLabel || (seat?.seatNum != null ? `seat #${seat.seatNum}` : 'seat');
  const grouped = {};
  for (const r of all) {
    if (!grouped[r.charId]) grouped[r.charId] = { charId: r.charId, name: r.charName, team: r.team, reminders: [] };
    grouped[r.charId].reminders.push(r);
  }
  const ordered = Object.values(grouped).sort((a, b) => a.name.localeCompare(b.name));
  const [customOpen, setCustomOpen] = useState(false);
  return (
    <div className="fixed inset-0 z-50 bg-black/70 flex items-center justify-center p-4" onClick={onClose}>
      <div className="parchment rounded-lg max-w-xl w-full max-h-[85vh] flex flex-col" onClick={e => e.stopPropagation()}>
        <div className="p-4 border-b border-stone-800 flex items-center justify-between">
          <h3 className="font-semibold text-amber-200">Add reminder · {headerLabel}</h3>
          <button onClick={onClose} className="text-stone-400 hover:text-amber-200">✕</button>
        </div>
        <div className="scroll-y p-3 space-y-3">
          {/* Custom reminder builder */}
          <div className="card rounded p-2 border-stone-700">
            <button onClick={() => setCustomOpen(o => !o)}
              className="w-full flex items-center justify-between text-left">
              <span className="text-sm font-semibold text-amber-200">+ Custom reminder</span>
              <span className="text-xs text-stone-400">{customOpen ? '▾' : '▸'}</span>
            </button>
            {customOpen && (
              <CustomReminderForm
                scriptCharIds={scriptCharIds || []}
                onAdd={(charId, label) => {
                  const c = CHAR_BY_ID[charId];
                  if (!c) return;
                  onSelect({ charId, label, charName: c.name, team: c.team });
                  onClose();
                }}
              />
            )}
          </div>

          {ordered.map(g => (
            <div key={g.charId}>
              <div className={`text-xs uppercase tracking-wider mb-1.5 team-${g.team}`}>{g.name}</div>
              <div className="flex flex-wrap gap-2">
                {g.reminders.map((r, i) => (
                  <button key={i}
                    onClick={() => { onSelect(r); onClose(); }}
                    className={`flex items-center gap-2 card rounded px-2 py-1.5 hover:border-amber-500
                      ${r.hiddenRoleMarker ? 'border-amber-700' : ''}`}
                    title={r.hiddenRoleMarker ? `Assigning this changes seat #${seat?.seatNum}'s actual role to the ${r.charName}.` : ''}>
                    <ReminderToken reminder={r} size={32} />
                    <span className="text-sm">{r.label}</span>
                    {r.hiddenRoleMarker && (
                      <span className="text-[9px] uppercase tracking-wider text-amber-300 ml-auto">assigns role</span>
                    )}
                  </button>
                ))}
              </div>
            </div>
          ))}
          {ordered.length === 0 && (
            <div className="text-sm text-stone-500 italic p-6 text-center">
              No built-in reminders — use the custom reminder form above to create your own.
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// Returns short setup-notes text for a character: SETUP_DELTAS note if available,
// else the bracketed snippet from the ability text, else the full ability text.
function getSetupNote(charId) {
  const delta = SETUP_DELTAS[charId];
  if (delta?.note) return delta.note;
  const c = CHAR_BY_ID[charId];
  if (!c) return '';
  const m = (c.ability || '').match(/\[([^\]]+)\]/);
  if (m) return m[1];
  return c.ability || '';
}

// Top-of-grimoire checklist: every in-play character with setup: true, plus any
// pending hidden roles (Drunk/Marionette) that need ST assignment.
function SetupNeedsPanel({ seats, pendingAssignments, assigningRoleId, eligibleCount, onPickup, onCancel, onUndo }) {
  // In-play characters (by actualRoleId) with setup: true
  const inPlay = new Set(seats.map(s => s.actualRoleId));
  const charIds = [...inPlay].filter(id => CHAR_BY_ID[id]?.setup);
  // Append pending hidden roles (they aren't on a seat yet)
  for (const id of pendingAssignments) {
    if (!inPlay.has(id) && CHAR_BY_ID[id]) charIds.push(id);
  }
  if (charIds.length === 0) return null;

  // Order: pending (need attention) first, then assigned-but-undoable hidden roles, then informational.
  const isHidden = (id) => NOT_IN_PHYSICAL_BAG.has(id);
  charIds.sort((a, b) => {
    const aPend = pendingAssignments.includes(a) ? 0 : (isHidden(a) ? 1 : 2);
    const bPend = pendingAssignments.includes(b) ? 0 : (isHidden(b) ? 1 : 2);
    if (aPend !== bPend) return aPend - bPend;
    return (CHAR_BY_ID[a]?.name || '').localeCompare(CHAR_BY_ID[b]?.name || '');
  });

  const anyPending = pendingAssignments.length > 0;

  return (
    <section className={`parchment rounded-lg p-3 sm:p-4 ${anyPending ? 'border-amber-700/70' : ''}`}>
      <div className="flex items-baseline justify-between gap-2 mb-2">
        <div>
          <h3 className="text-amber-200 font-semibold">Setup needs</h3>
          <p className="text-xs text-stone-400">
            {anyPending
              ? 'Some characters still need to be assigned before the game can begin.'
              : 'All setup characters handled. Reference notes for in-play setup effects.'}
          </p>
        </div>
        {assigningRoleId && (
          <button onClick={onCancel}
            className="text-xs px-3 py-1 rounded pill hover:border-amber-500 hover:text-amber-200">
            Cancel pickup
          </button>
        )}
      </div>

      <ul className="space-y-1.5">
        {charIds.map(id => {
          const c = CHAR_BY_ID[id];
          const isPendingThis = pendingAssignments.includes(id);
          const isPickedUp = assigningRoleId === id;
          // Find a seat where this hidden role was assigned (perceived != actual matches charId)
          const assignedSeat = !isPendingThis && isHidden(id)
            ? seats.find(s => s.actualRoleId === id && s.perceivedRoleId !== s.actualRoleId)
            : null;
          return (
            <SetupEntry key={id}
              char={c}
              isPending={isPendingThis}
              isPickedUp={isPickedUp}
              eligibleCount={isPickedUp ? eligibleCount : null}
              assignedSeat={assignedSeat}
              onPickup={(isHidden(id) || isPendingThis) ? () => onPickup(id) : null}
              onUndo={assignedSeat ? () => onUndo(id) : null}
              seats={seats}
            />
          );
        })}
      </ul>
    </section>
  );
}

function SetupEntry({ char, isPending, isPickedUp, eligibleCount, assignedSeat, onPickup, onUndo, seats }) {
  if (!char) return null;
  const note = getSetupNote(char.id);
  const recluseInPlay = char.id === 'marionette' && seats?.some(s => s.perceivedRoleId === 'recluse');

  return (
    <li className={`card rounded p-2 flex items-start gap-3 transition
      ${isPickedUp ? 'border-sky-400 ring-2 ring-sky-400/30 bg-sky-950/20' :
        isPending ? 'border-amber-700' : ''}`}>
      <ReminderToken reminder={{ charId: char.id, label: char.name }} size={44} />
      <div className="flex-1 min-w-0">
        <div className="flex items-center gap-2 flex-wrap">
          <span className={`team-${char.team} font-medium`}>{char.name}</span>
          {isPending && <span className="text-[10px] uppercase pill rounded px-1.5 py-0.5 text-amber-300 border-amber-700">needs assignment</span>}
          {assignedSeat && <span className="text-[10px] uppercase text-emerald-400">✓ seat #{assignedSeat.seatNum}</span>}
        </div>
        <div className="text-xs text-stone-300/80 mt-0.5 leading-snug">
          {note}
          {char.id === 'marionette' && recluseInPlay && (
            <span className="text-stone-400"> (Recluse may register as the Demon for adjacency.)</span>
          )}
        </div>
        {isPickedUp && (
          <div className="text-xs text-sky-300 mt-1">
            {eligibleCount === 0
              ? <span className="text-red-400">No eligible seats — check the bag.</span>
              : <>Tap one of the {eligibleCount} highlighted seat{eligibleCount===1?'':'s'} to assign.</>}
          </div>
        )}
      </div>
      <div className="flex flex-col gap-1 items-end">
        {onPickup && isPending && (
          <button onClick={onPickup}
            className={`text-xs px-3 py-1.5 rounded font-medium
              ${isPickedUp ? 'bg-sky-700 hover:bg-sky-600 text-stone-100' : 'bg-amber-700 hover:bg-amber-600 text-stone-100'}`}>
            {isPickedUp ? 'Picked up' : 'Tap to assign'}
          </button>
        )}
        {onUndo && (
          <button onClick={onUndo}
            className="text-xs px-2 py-1 rounded pill hover:border-amber-500 hover:text-amber-200">
            Undo
          </button>
        )}
      </div>
    </li>
  );
}

function PlayerRow({ seat, onSetName, onRelease, onDealRole, onUndealSeat, dealBlockedReason }) {

  const status = seat.playerStatus;          // null | 'pending' | 'asking' | 'accepted'
  const dealt = !!seat.roleDealt;

  // Row background reflects player response. Duplicate-claim always wins (security signal).
  const bgClass = dupClaim
    ? 'border-red-600 bg-red-950/30'
    : status === 'accepted' ? 'border-emerald-600 bg-emerald-950/30'
    : status === 'asking'   ? 'border-yellow-500 bg-yellow-950/30'
    : '';

  return (
    <li className={`card rounded px-2 py-1.5 flex items-center gap-2 ${bgClass}`}>
      <span className="text-amber-200/80 text-xs w-8 text-center">#{seat.seatNum}</span>
      <input

        onChange={e => onSetName(seat.seatNum, e.target.value)}

        className="flex-1 min-w-0 bg-stone-900 border border-stone-700 rounded px-2 py-1 text-sm"
      />
      <div className="flex items-center gap-1 flex-wrap justify-end">

            ⚠ dup
          </span>
        )}
        {!dupClaim && hasClaims && !dealt && (
          <span title="Player connected from phone"
            className="text-[10px] uppercase px-1.5 py-0.5 rounded bg-emerald-900 text-emerald-300 border border-emerald-700">
            joined
          </span>
        )}
        {!hasClaims && hasName && !dealt && (
          <span title="Name entered manually by ST"
            className="text-[10px] uppercase px-1.5 py-0.5 rounded bg-stone-800 text-stone-400 border border-stone-700">
            manual
          </span>
        )}
        {/* Deal status pills */}
        {dealt && status === 'pending' && (
          <span title="Role sent, awaiting player response"
            className="text-[10px] uppercase px-1.5 py-0.5 rounded bg-amber-950/60 text-amber-300 border border-amber-700">
            dealt
          </span>
        )}
        {dealt && status === 'asking' && (
          <span title="Player tapped Ask a question — pull them aside"
            className="text-[10px] uppercase font-bold px-1.5 py-0.5 rounded bg-yellow-700 text-stone-100">
            ✋ question
          </span>
        )}
        {dealt && status === 'accepted' && (
          <span title="Player has accepted their role"
            className="text-[10px] uppercase font-bold px-1.5 py-0.5 rounded bg-emerald-700 text-stone-100">

              ${hasName && !dealBlockedReason ? 'border-amber-600 text-amber-200 hover:bg-amber-950/40' : 'opacity-40 cursor-not-allowed'}`}>
            Pass role
          </button>
        )}
        {dealt && (
          <button onClick={() => onUndealSeat(seat.seatNum)}
            title="Take back this seat's role"
            className="text-[11px] px-1.5 py-0.5 rounded pill hover:border-amber-500 hover:text-amber-200">

            className="text-[11px] px-1.5 py-0.5 rounded pill hover:border-red-500 hover:text-red-400">
            release

// ALL_CHARACTERS / CHAR_BY_ID already include the traveller team; this helper just
// surfaces them sorted by name for the picker UIs.
function allTravellerChars() {
  return (window.BOTC_DATA?.characters || [])
    .filter(c => c.team === 'traveller')
    .sort((a, b) => a.name.localeCompare(b.name));
}

// Build the URL a traveller's player opens. Includes the room code so the
// traveller joins the right game, plus their traveller number.
function travellerLinkFor(num) {
  const room = getRoomFromUrl() || getLastRoom() || '';
  const roomParam = room ? `room=${room}&` : '';
  return `${siteBaseUrl()}player.html?${roomParam}t=${num}`;
}

// Render a small inline SVG QR for the given URL. Returns null if the qrcode lib
// isn't loaded (fail silently — the link is still visible).
function buildQrSvg(text, sizePx = 96) {
  try {
    if (typeof qrcode !== 'function') return null;
    const q = qrcode(0, 'L');
    q.addData(text);
    q.make();
    // 0 = no margin module, modules will draw exactly. The lib produces a string.
    return q.createSvgTag({ cellSize: 4, margin: 2 });
  } catch (e) { return null; }
}

// Full-screen QR overlay so the traveller can scan without seeing anything else
// on the storyteller's screen. Tap anywhere (or the close button) to dismiss.
function QrFullscreenOverlay({ url, label, onClose }) {
  // Build the QR fresh each render; the underlying lib produces an SVG string we
  // inject so the QR scales with CSS. Falls back to plain text if the lib failed.
  let svg = null;
  try {
    if (typeof qrcode === 'function') {
      const q = qrcode(0, 'L');
      q.addData(url);
      q.make();
      svg = q.createSvgTag({ cellSize: 12, margin: 4 });
    }
  } catch {}
  return (
    <div onClick={onClose}
      className="fixed inset-0 z-[60] bg-white flex flex-col items-center justify-center p-4 cursor-pointer"
      style={{ touchAction: 'manipulation' }}>
      {label && (
        <div className="text-stone-700 text-sm uppercase tracking-widest mb-3 font-semibold">{label}</div>
      )}
      {svg ? (
        <div className="w-[min(90vmin,720px)] h-[min(90vmin,720px)] flex items-center justify-center"
          ref={el => {
            if (!el) return;
            el.innerHTML = svg;
            const inner = el.firstElementChild;
            if (inner) {
              inner.setAttribute('width', '100%');
              inner.setAttribute('height', '100%');
              inner.style.display = 'block';
            }
          }} />
      ) : (
        <div className="text-stone-800 text-center">
          <p className="text-lg mb-2">QR library not loaded.</p>
          <p className="text-sm break-all bg-stone-100 p-3 rounded border border-stone-300 max-w-md">{url}</p>
        </div>
      )}
      {/* Always print the encoded URL below the QR so the ST can sanity-check
          (and so anyone whose phone can't scan QRs can just type it). */}
      <div className="mt-3 text-stone-700 text-xs sm:text-sm break-all max-w-[min(90vmin,720px)] text-center font-mono px-2">{url}</div>
      <div className="mt-2 text-stone-500 text-xs">Tap anywhere to close</div>
      <button onClick={(e) => { e.stopPropagation(); onClose(); }}
        className="absolute top-3 right-3 bg-stone-900 text-white rounded-full w-9 h-9 text-lg leading-none flex items-center justify-center shadow">
        ✕
      </button>
    </div>
  );
}

function Token({ seat, isEligible, swapSourceSeat, onSeatTap, onToggleDead, onToggleAlignment, onUnassignPending, onSwap, onOpenReminderPicker, onOpenRoleChanger, onRemoveReminder, hideSeatBadge, showHeaderLabel, compact, zoom = 1 }) {
  const perceived = CHAR_BY_ID[seat.perceivedRoleId];
  const actual = CHAR_BY_ID[seat.actualRoleId];
  const misregistered = seat.actualRoleId !== seat.perceivedRoleId;
  const isPickedUp = swapSourceSeat === seat.seatNum;
  const isSwapTarget = swapSourceSeat != null && swapSourceSeat !== seat.seatNum;
  const img = iconUrl(seat.perceivedRoleId);
  const [isDragOver, setIsDragOver] = useState(false);
  const naturalAlign = naturalAlignment(seat.perceivedRoleId);
  const effectiveAlign = seat.alignment || naturalAlign;
  const alignmentOverridden = effectiveAlign !== naturalAlign;

  const handleDragStart = (e) => {
    e.dataTransfer.setData('application/x-botc-seat', String(seat.seatNum));
    e.dataTransfer.effectAllowed = 'move';
  };
  const handleDragOver = (e) => {
    if (e.dataTransfer.types.includes('application/x-botc-seat')) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      setIsDragOver(true);
    }
  };
  const handleDragLeave = () => setIsDragOver(false);
  const handleDrop = (e) => {
    e.preventDefault();
    setIsDragOver(false);
    const src = Number(e.dataTransfer.getData('application/x-botc-seat'));
    if (src && src !== seat.seatNum && onSwap) onSwap(src, seat.seatNum);
  };

  const handleClick = () => {
    if (onSeatTap) onSeatTap(seat.seatNum);
  };

  // Six reminder slots fanning around the token's left and right edges.
  // The first 3 reminders go to the left side (top→bottom); reminders 4-6 to the right.
  const reminders = seat.reminders || [];
  const slotConfigs = [
    { side: 'left',  top: '2%',  off: '-14%' },
    { side: 'left',  top: '38%', off: '-22%' },
    { side: 'left',  top: '74%', off: '-14%' },
    { side: 'right', top: '2%',  off: '-14%' },
    { side: 'right', top: '38%', off: '-22%' },
    { side: 'right', top: '74%', off: '-14%' },
  ];

  return (
    <div className="relative w-full flex flex-col items-center group">
      {showHeaderLabel && (
        <div className="text-center mb-1 leading-tight px-0.5">
          <div className={`text-amber-200 font-bold ${compact ? 'text-xs' : 'text-base sm:text-lg'}`}>#{seat.seatNum}</div>
          {(seat.playerName || '').trim() && (
            <div className={`text-stone-300 break-words ${compact ? 'text-[10px]' : 'text-xs sm:text-sm'}`}>{seat.playerName}</div>
          )}
        </div>
      )}
      {/* Round token + 6 reminder slots flanking it */}
      <div className="relative w-full">
      <div
        draggable={!!onSwap}
        onDragStart={handleDragStart}
        onDragOver={handleDragOver}
        onDragLeave={handleDragLeave}
        onDrop={handleDrop}
        onClick={handleClick}
        style={{ touchAction: 'manipulation' }}
        className={`relative w-full aspect-square rounded-full overflow-hidden border-2 transition cursor-pointer
          ${isPickedUp ? 'border-sky-400 ring-4 ring-sky-400/60 scale-105' :
            isEligible ? 'border-emerald-400 ring-4 ring-emerald-400/40 animate-pulse' :
            isSwapTarget ? 'border-sky-500/60 ring-2 ring-sky-500/30 hover:ring-sky-400 hover:border-sky-400' :
            isDragOver ? 'border-sky-400 ring-4 ring-sky-400/40' :
            alignmentOverridden && effectiveAlign === 'evil' ? 'border-red-500 ring-2 ring-red-500/40' :

        )}
      </div>
      {/* Reminder slots flanking the round token (3 left, 3 right) */}
      {slotConfigs.map((cfg, idx) => {
        const reminder = reminders[idx];
        if (!reminder) return null;
        const style = {
          position: 'absolute',

          width: '30%',
          zIndex: 5,
          ...(cfg.side === 'left' ? { left: cfg.off } : { right: cfg.off }),
        };
        // For auto-generated hidden-role markers, the × undoes the assignment instead of just removing the reminder.
        const onRemoveForSlot = reminder.hiddenRoleMarker

        <div className={`text-center text-[10px] italic mt-1 team-${actual.team}`}>

            title="Change role (Summoner picks Demon, Pit-Hag transform, etc.)"
            className="bg-stone-900 border border-amber-700 rounded-full w-6 h-6 text-[11px] hover:border-amber-500 hover:text-amber-300 leading-none">
            ↻
          </button>
        )}

            title={`Flip alignment (currently ${effectiveAlign})`}

        {misregistered && (
          <button onClick={(e) => { e.stopPropagation(); onUnassignPending(seat.seatNum); }}
            title="Undo hidden role assignment"
            className="bg-stone-900 border border-amber-700 rounded-full w-6 h-6 text-[10px] hover:border-amber-500">
            ↩

        )}

    </div>
  );

// Circular seat picker for creating a nomination. Same geometry as the grimoire,
// but no center "Town Square" piece and no roles — just seat # + name on each disc.
// Two-tap flow: tap nominator → tap nominee (or the same seat for self-nom).
function CircularNominator({ seats, onNominate }) {
  const [picked, setPicked] = useState(null); // seatNum of the first tap
  const N = Math.max(1, seats.length);
  const tokenRadiusPct = N >= 15 ? 44 : N >= 13 ? 42 : N >= 11 ? 40 : 38;
  const linearSpacingPct = N > 1 ? 2 * tokenRadiusPct * Math.sin(Math.PI / N) : 100;
  const cap = N >= 15 ? 13 : N >= 13 ? 14 : N >= 11 ? 16 : 18;
  const tokenWidthPct = Math.max(11, Math.min(cap, linearSpacingPct - 2));
  const tokenWidthStyle = `min(120px, ${tokenWidthPct.toFixed(1)}%)`;

  const handleTap = (seatNum) => {
    if (picked == null) {
      setPicked(seatNum);
      return;
    }
    // Second tap → create nomination (allow self-nom)
    onNominate(picked, seatNum);
    setPicked(null);
  };

  return (
    <section className="parchment rounded-lg p-3 sm:p-4">
      <div className="flex items-baseline justify-between mb-2 gap-2 flex-wrap">
        <div>
          <h3 className="text-amber-200 font-semibold">New nomination</h3>
          <p className="text-xs text-stone-400">
            {picked == null
              ? 'Tap the player who is nominating.'
              : <>Now tap the player being nominated <span className="text-stone-500">(or tap {seatLabel(seats.find(s => s.seatNum === picked))} again to self-nominate)</span>.</>}
          </p>
        </div>
        {picked != null && (
          <button onClick={() => setPicked(null)}
            className="text-xs px-3 py-1.5 rounded pill hover:border-amber-500 hover:text-amber-200">
            Cancel
          </button>
        )}
      </div>
      <div className="relative mx-auto" style={{ width: 'min(560px, calc(100vw - 3rem))', aspectRatio: '1 / 1' }}>
        {seats.map((seat, i) => {
          const angle = (i / N) * 2 * Math.PI - Math.PI / 2;
          const tx = 50 + tokenRadiusPct * Math.cos(angle);
          const ty = 50 + tokenRadiusPct * Math.sin(angle);
          const isPicked = picked === seat.seatNum;
          return (
            <button key={seat.seatNum}
              onClick={() => handleTap(seat.seatNum)}
              className={`absolute rounded-full border-2 transition flex flex-col items-center justify-center text-center p-1 leading-tight overflow-hidden
                ${isPicked
                  ? 'border-amber-400 ring-4 ring-amber-400/40 bg-amber-950/40'
                  : 'border-stone-700 bg-stone-900/70 hover:border-amber-500 hover:bg-stone-900'}`}
              style={{
                left: `${tx}%`,
                top: `${ty}%`,
                transform: 'translate(-50%, -50%)',
                width: tokenWidthStyle,
                aspectRatio: '1 / 1',
              }}>
              <div className="text-amber-200 font-bold text-base sm:text-lg leading-none">#{seat.seatNum}</div>
              {(seat.playerName || '').trim() && (
                <div className="text-stone-200 text-[10px] sm:text-xs mt-0.5 break-words w-full px-0.5"
                  style={{ wordBreak: 'break-word' }}>
                  {seat.playerName}
                </div>
              )}
            </button>
          );
        })}
      </div>
    </section>
  );
}

function TokensPage({ state, onShowGrimoireToSeat, onCancelGrimoireShow }) {
  const grim = state.grimoire || {};
  const seats = grim.seats || [];
  // scriptIds = script's regular characters PLUS any traveller currently added to
  // the game (so the Script roles grid and "You are mad" / "selected you" pickers
  // surface mid-game travellers without overcounting). Dedup in case a traveller
  // role also somehow appears in the script.
  const baseScriptIds = state.characterIds || [];
  const travellerInPlayIds = Array.from(new Set(
    (grim.travellers || []).map(t => t.charId).filter(Boolean)
  ));
  const scriptIds = Array.from(new Set([
    ...baseScriptIds,
    ...travellerInPlayIds.filter(id => !baseScriptIds.includes(id)),
  ]));
  const [shown, setShown] = useState(null); // { kind, ... }
  const [spyPickerOpen, setSpyPickerOpen] = useState(false);
  const [lunaticMinionsPickerOpen, setLunaticMinionsPickerOpen] = useState(false);
  const [madTokenOpen, setMadTokenOpen] = useState(false);
  const [wordTokenOpen, setWordTokenOpen] = useState(false);
  const [selectedYouOpen, setSelectedYouOpen] = useState(false);

  // Compute in-play groups for quick actions.
  // NOTE: these filter by ACTUAL role, so the Lunatic (perceivedRole=demon, actualRole=lunatic)
  // is correctly excluded from both demonSeats and minionSeats.
  const demonSeats   = seats.filter(s => CHAR_BY_ID[s.actualRoleId]?.team === 'demon');
  const minionSeats  = seats.filter(s => CHAR_BY_ID[s.actualRoleId]?.team === 'minion');
  const bluffs       = (grim.demonBluffs || []).filter(Boolean);
  const lunaticInPlay = seats.some(s => s.actualRoleId === 'lunatic') || state.bagCharacterIds?.includes('lunatic');
  const lunaticBluffs = (grim.lunaticBluffs || []).filter(Boolean);
  // Magician (Experimental Townsfolk): "The Demon thinks you are a Minion. Minions think
  // you are a Demon." On N1 info-giving, the Magician seat is added to BOTH the Show-Demon
  // and Show-Minions lists, in random order, so neither the Demon nor the Minions can tell
  // who the real Demon / who the real Minions are.
  const magicianSeat = seats.find(s => s.actualRoleId === 'magician');
  // Stable shallow randomizer — Fisher-Yates on a copy. Reshuffles per-click so the
  // ordering changes every time the ST shows the token (avoids the Demon learning the
  // Magician's position by re-watching).
  const shuffleSeats = (arr) => {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  };

  return (
    <div className="space-y-4">
      <header>
        <h2 className="text-amber-200 text-lg font-semibold">Tokens</h2>
        <p className="text-xs text-stone-400">
          Tap any token to show it full-screen. Hand the phone (or hold up the screen) to the player.
          Tap anywhere on the overlay to dismiss.
        </p>
      </header>

      {/* Quick actions tied to the live game */}
      <section className="parchment rounded-lg p-3 sm:p-4 space-y-3">
        <h3 className="text-amber-200 font-semibold">Quick show</h3>
        <p className="text-xs text-stone-500">For Night 0 info-giving.</p>
        <div className="grid grid-cols-1 sm:grid-cols-3 gap-2">
          <button
            onClick={() => {
              if (!demonSeats.length) return;
              // Magician (if in play) is mixed into the Demon's view in random order
              // so the real Demon can't pick out which seat is the actual Demon.
              const list = magicianSeat
                ? shuffleSeats([...demonSeats, magicianSeat])
                : demonSeats;
              setShown({
                kind: 'players',
                header: magicianSeat ? 'These are the Demons' : 'This is the Demon',
                team: 'demon',
                players: list.map(s => ({ seatNum: s.seatNum, playerName: s.playerName })),
              });
            }}
            disabled={!demonSeats.length}
            className={`card rounded p-3 text-left ${demonSeats.length ? 'hover:border-red-500' : 'opacity-40 cursor-not-allowed'}`}>
            <div className="text-xs uppercase tracking-wider text-red-300">Show the Demon{magicianSeat ? ' (+ Magician)' : ''}</div>
            <div className="text-sm text-stone-200 mt-1">
              {demonSeats[0]
                ? (magicianSeat
                    ? `${demonSeats.length + 1} seats (shuffled — Magician confusion)`
                    : `Seat #${demonSeats[0].seatNum}${demonSeats[0].playerName ? ` · ${demonSeats[0].playerName}` : ''}`)
                : 'No demon in play'}
            </div>
            <div className="text-[10px] text-stone-500 mt-0.5">Role hidden — shows player identity only</div>
          </button>
          <button
            onClick={() => {
              if (!minionSeats.length && !magicianSeat) return;
              // Magician (if in play) is added to the Minion list in random order so
              // Minions can't pick out who the real Minions are.
              const list = magicianSeat
                ? shuffleSeats([...minionSeats, magicianSeat])
                : minionSeats;
              const realMinionWord = list.length === 1 ? 'Minion' : 'Minions';
              setShown({
                kind: 'players',

                players: list.map(s => ({ seatNum: s.seatNum, playerName: s.playerName })),

            disabled={!minionSeats.length && !magicianSeat}
            className={`card rounded p-3 text-left ${(minionSeats.length || magicianSeat) ? 'hover:border-red-500' : 'opacity-40 cursor-not-allowed'}`}>

function ScriptRolesGrid({ scriptIds, onPick }) {
  const chars = scriptIds.map(id => CHAR_BY_ID[id]).filter(Boolean);
  const byTeam = {};
  for (const c of chars) {
    if (!byTeam[c.team]) byTeam[c.team] = [];
    byTeam[c.team].push(c);
  }
  return (
    <div className="space-y-3">
      {TEAM_ORDER.filter(t => byTeam[t]?.length).map(team => (
        <div key={team}>
          <div className={`text-[10px] uppercase tracking-wider mb-1 team-${team}`}>{TEAM_LABEL[team]}</div>
          <div className="grid grid-cols-3 sm:grid-cols-5 lg:grid-cols-6 gap-2">
            {byTeam[team].map(c => (
              <button key={c.id}
                onClick={() => onPick(c.id)}
                title={c.ability}
                className="card rounded p-2 flex flex-col items-center gap-1 hover:border-amber-500 transition">

                  <img src={iconUrl(c.id)} alt="" className="w-12 h-12 rounded-full border border-stone-700 object-cover" />

function SpyAction({ seats, sentToSeat, onPick, onCancel }) {

        <div className="flex items-center justify-between gap-2 flex-wrap">
          <div>

            <div className="text-xs text-stone-400">

              Awaiting their "Got it" tap.

function MultiSeatPickerModal({ title, subtitle, seats, suggestedCount, onDone, onClose }) {
  const [picked, setPicked] = useState(new Set());
  const toggle = (n) => {
    setPicked(p => {
      const next = new Set(p);
      if (next.has(n)) next.delete(n);
      else next.add(n);
      return next;
    });
  };
  const tooMany = suggestedCount != null && picked.size > suggestedCount;
  const enoughPicked = suggestedCount == null || picked.size >= suggestedCount;

  return (
    <div className="fixed inset-0 z-50 bg-black/70 flex items-center justify-center p-4" onClick={onClose}>
      <div className="parchment rounded-lg max-w-md w-full max-h-[85vh] flex flex-col" onClick={e => e.stopPropagation()}>
        <div className="p-4 border-b border-stone-800 flex items-center justify-between">
          <h3 className="font-semibold text-amber-200">{title}</h3>
          <button onClick={onClose} className="text-stone-400 hover:text-amber-200">✕</button>
        </div>
        {subtitle && <div className="px-4 pt-2 text-xs text-stone-400">{subtitle}</div>}
        <div className="px-4 pt-2 text-xs">
          <span className="text-stone-500">Selected: </span>
          <span className={`tabular-nums font-semibold ${tooMany ? 'text-red-400' : enoughPicked ? 'text-emerald-300' : 'text-amber-200'}`}>
            {picked.size}{suggestedCount != null ? ` / ${suggestedCount}` : ''}
          </span>
          {tooMany && <span className="text-red-400 ml-2">over the suggested count — that's OK if intentional.</span>}
        </div>
        <div className="scroll-y p-3">
          <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
            {seats.map(s => {
              const isPicked = picked.has(s.seatNum);
              return (
                <button key={s.seatNum}
                  onClick={() => toggle(s.seatNum)}
                  className={`card rounded p-3 text-left transition
                    ${isPicked ? 'border-amber-500 bg-amber-950/30' : 'hover:border-amber-700'}`}>
                  <div className="flex items-center gap-2">
                    <span className={`w-4 h-4 rounded-sm border flex items-center justify-center text-[10px]
                      ${isPicked ? 'bg-amber-500 border-amber-500 text-stone-950' : 'border-stone-600'}`}>
                      {isPicked ? '✓' : ''}
                    </span>
                    <span className="text-amber-200 font-bold text-base">#{s.seatNum}</span>
                  </div>
                  {s.playerName && <div className="text-xs text-stone-300 truncate mt-1">{s.playerName}</div>}
                </button>
              );
            })}
          </div>
        </div>
        <div className="p-3 border-t border-stone-800 flex justify-between gap-2">
          <button onClick={onClose}
            className="text-xs px-3 py-1.5 rounded pill hover:border-amber-500 hover:text-amber-200">
            Cancel
          </button>
          <button onClick={() => onDone([...picked])}
            disabled={picked.size === 0}
            className={`text-sm px-4 py-2 rounded font-medium ${picked.size === 0
              ? 'bg-stone-800 text-stone-500 cursor-not-allowed'
              : 'bg-amber-600 hover:bg-amber-500 text-stone-950'}`}>
            Show {picked.size}
          </button>
        </div>
      </div>
    </div>
  );
}

function SeatPickerModal({ title, subtitle, seats, onPick, onClose }) {

// Fullscreen overlay for showing a token to a player. Click anywhere to dismiss.
// Generic single-character picker — searchable, grouped by team. Used by the
// "This character selected you" action and reusable elsewhere.
function CharacterPickerModal({ title, subtitle, scriptIds, onPick, onClose }) {
  const [query, setQuery] = useState('');
  const chars = (scriptIds || []).map(id => CHAR_BY_ID[id]).filter(Boolean);
  const filtered = chars.filter(c =>
    !query || c.name.toLowerCase().includes(query.toLowerCase()) || (c.ability || '').toLowerCase().includes(query.toLowerCase())
  );
  const byTeam = {};
  for (const c of filtered) {
    if (!byTeam[c.team]) byTeam[c.team] = [];
    byTeam[c.team].push(c);
  }
  return (
    <div className="fixed inset-0 z-50 bg-black/70 flex items-center justify-center p-4" onClick={onClose}>
      <div className="parchment rounded-lg max-w-xl w-full max-h-[85vh] flex flex-col" onClick={e => e.stopPropagation()}>
        <div className="p-4 border-b border-stone-800 flex items-center justify-between">
          <h3 className="font-semibold text-amber-200">{title}</h3>
          <button onClick={onClose} className="text-stone-400 hover:text-amber-200">✕</button>
        </div>
        {subtitle && <div className="px-4 pt-2 text-xs text-stone-400">{subtitle}</div>}
        <div className="p-3 border-b border-stone-800">
          <input autoFocus value={query} onChange={e => setQuery(e.target.value)}
            placeholder="Search by name or ability…"
            className="w-full bg-stone-900 border border-stone-700 rounded px-2 py-1.5 text-sm" />
        </div>
        <div className="scroll-y p-3 space-y-3">
          {TEAM_ORDER.filter(t => byTeam[t]?.length).map(team => (
            <div key={team}>
              <div className={`text-[10px] uppercase tracking-wider mb-1 team-${team}`}>{TEAM_LABEL[team]}</div>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                {byTeam[team].map(c => (
                  <button key={c.id} onClick={() => onPick(c.id)}
                    className="text-left card rounded p-2 flex items-start gap-2 hover:border-amber-500">
                    {iconUrl(c.id) && (
                      <img src={iconUrl(c.id)} alt="" className="w-10 h-10 rounded-full border border-stone-700 object-cover" />
                    )}
                    <div className="flex-1 min-w-0">
                      <div className={`team-${c.team} font-medium text-sm`}>{c.name}</div>
                      <div className="text-[10px] text-stone-300/80 mt-0.5">{c.ability}</div>
                    </div>
                  </button>
                ))}
              </div>
            </div>
          ))}
          {filtered.length === 0 && (
            <div className="text-sm text-stone-500 italic p-6 text-center">No matches.</div>
          )}
        </div>
      </div>
    </div>
  );
}

// "You are mad" picker — ST picks a role from the script OR types custom text.
// One of them populates: charId (role mode) or customText (text mode).
function MadTokenModal({ scriptIds, onShow, onClose }) {
  const [mode, setMode] = useState('role');   // 'role' | 'text'
  const [charId, setCharId] = useState('');
  const [text, setText] = useState('');
  const [query, setQuery] = useState('');
  const chars = scriptIds.map(id => CHAR_BY_ID[id]).filter(Boolean);
  const filtered = chars.filter(c =>
    !query || c.name.toLowerCase().includes(query.toLowerCase()) || (c.ability || '').toLowerCase().includes(query.toLowerCase())
  );
  const byTeam = {};
  for (const c of filtered) {
    if (!byTeam[c.team]) byTeam[c.team] = [];
    byTeam[c.team].push(c);
  }
  const canShow = mode === 'role' ? !!charId : !!text.trim();

  return (
    <div className="fixed inset-0 z-50 bg-black/70 flex items-center justify-center p-4" onClick={onClose}>
      <div className="parchment rounded-lg max-w-xl w-full max-h-[85vh] flex flex-col" onClick={e => e.stopPropagation()}>
        <div className="p-4 border-b border-stone-800 flex items-center justify-between">
          <h3 className="font-semibold text-amber-200">"You are mad" token</h3>
          <button onClick={onClose} className="text-stone-400 hover:text-amber-200">✕</button>
        </div>
        <div className="p-3 border-b border-stone-800 flex gap-2">
          <button onClick={() => setMode('role')}
            className={`text-xs px-3 py-1.5 rounded pill ${mode === 'role' ? 'border-amber-500 text-amber-200 bg-stone-800' : ''}`}>
            Role from script
          </button>
          <button onClick={() => setMode('text')}
            className={`text-xs px-3 py-1.5 rounded pill ${mode === 'text' ? 'border-amber-500 text-amber-200 bg-stone-800' : ''}`}>
            Custom text
          </button>
        </div>

        {mode === 'role' ? (
          <>
            <div className="p-3 border-b border-stone-800">
              <input autoFocus value={query} onChange={e => setQuery(e.target.value)}
                placeholder="Search by name or ability…"
                className="w-full bg-stone-900 border border-stone-700 rounded px-2 py-1.5 text-sm" />
            </div>
            <div className="scroll-y p-3 space-y-3">
              {TEAM_ORDER.filter(t => byTeam[t]?.length).map(team => (
                <div key={team}>
                  <div className={`text-[10px] uppercase tracking-wider mb-1 team-${team}`}>{TEAM_LABEL[team]}</div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                    {byTeam[team].map(c => (
                      <button key={c.id} onClick={() => setCharId(c.id)}
                        className={`text-left card rounded p-2 flex items-start gap-2
                          ${charId === c.id ? 'border-amber-500 ring-2 ring-amber-500/30' : 'hover:border-amber-500'}`}>
                        {iconUrl(c.id) && (
                          <img src={iconUrl(c.id)} alt="" className="w-10 h-10 rounded-full border border-stone-700 object-cover" />
                        )}
                        <div className="flex-1 min-w-0">
                          <div className={`team-${c.team} font-medium text-sm`}>{c.name}</div>
                          <div className="text-[10px] text-stone-300/80 mt-0.5">{c.ability}</div>
                        </div>
                      </button>
                    ))}
                  </div>
                </div>
              ))}
              {filtered.length === 0 && (
                <div className="text-sm text-stone-500 italic p-6 text-center">No matches.</div>
              )}
            </div>
          </>
        ) : (
          <div className="p-3 space-y-2">
            <label className="text-xs uppercase tracking-wider text-stone-400 block mb-1">Custom text</label>
            <textarea autoFocus value={text} onChange={e => setText(e.target.value)}
              maxLength={200} rows={3}
              placeholder="e.g. The Drunk, a Townsfolk, the Imp on day 2…"
              className="w-full bg-stone-900 border border-stone-700 rounded px-2 py-2 text-sm" />
            <p className="text-[10px] text-stone-500">Will display as: "YOU ARE MAD" + your text. {text.length}/200</p>
