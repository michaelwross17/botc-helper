          ) : <div className="text-stone-400 italic text-center">(no role)</div>}
          <div className="text-center text-xs text-stone-400 leading-snug">
            Claim this character tomorrow. If you don't, you may be executed.
          </div>
        </div>
      );
    } else if (info.type === 'lunatic-actions') {
      const ls = info.lunaticSeat || {};
      const perceived = info.perceivedRoleId ? CHAR_BY_ID[info.perceivedRoleId] : null;
      const perceivedName = info.perceivedRoleName || perceived?.name || 'their perceived role';
      const picks = info.picks || [];
      infoBody = (
        <div className="space-y-4">
          <div className="text-center text-sm text-stone-300">
            The Lunatic just acted. They believe they are you.
          </div>
          <div className="flex flex-col items-center gap-2">
            {iconUrl('lunatic') && (
              <img src={iconUrl('lunatic')} alt=""
                className="w-20 h-20 rounded-full border-2 border-purple-600 object-cover" />
            )}
            <div className="text-amber-200 text-lg font-bold">Lunatic</div>
            <div className="text-amber-200/80 text-sm">
              seat #{ls.seatNum}{ls.playerName ? ' · ' + ls.playerName : ''}
            </div>
          </div>
          {picks.length > 0 ? (
            <div>
              <div className="text-center text-xs text-stone-400 mb-2 uppercase tracking-wider">
                Their picks
              </div>
              <ul className="grid grid-cols-2 gap-2">
                {picks.map((p, i) => (
                  <li key={i} className="card rounded p-3 text-center">
                    <div className="text-amber-200/80 text-xs">seat #{p.seatNum}</div>
                    <div className="text-base text-amber-100 font-semibold truncate">
                      {p.playerName || <span className="text-stone-500 italic">—</span>}
                    </div>
                  </li>
                ))}
              </ul>
            </div>
          ) : (
            <div className="text-center text-stone-400 italic">(no player targets — info action)</div>
          )}
        </div>
      );
    } else if (info.type === 'direction') {
      const dir = info.direction || 'cw';
      const top = info.display || 'The nearest evil player is:';
      infoBody = (
        <div className="space-y-3 text-center">
          <div className="text-sm text-stone-300">{top}</div>
          <div className="p-6 rounded-lg border-2 bg-amber-900/30 text-amber-200 border-amber-700/70">
            <div className="text-7xl mb-1 leading-none">{dir === 'cw' ? '↻' : '↺'}</div>
            <div className="text-3xl font-extrabold tracking-wide">{dir === 'cw' ? 'CLOCKWISE' : 'COUNTER-CLOCKWISE'}</div>
          </div>
        </div>
      );
    } else if (info.type === 'role-alignment') {
      const rlRole = info.roleId ? CHAR_BY_ID[info.roleId] : null;
      const rlAlign = info.alignment || 'good';
      infoBody = (
        <div className="text-center space-y-4">
          <div className="text-sm text-stone-300">Your role</div>
          {rlRole ? (
            <div className="flex flex-col items-center gap-2">
              {iconUrl(rlRole.id) && (
                <img src={iconUrl(rlRole.id)} alt="" className="w-28 h-28 rounded-full border-2 border-amber-700 object-cover" />
              )}
              <div className={`text-3xl font-bold team-${rlRole.team}`}>{rlRole.name}</div>
              {rlRole.ability && (
                <div className="text-sm text-stone-200 leading-relaxed border-l-2 border-amber-700/50 pl-3 text-left mt-2">
                  {rlRole.ability}
                </div>
              )}
            </div>
          ) : <div className="text-stone-400 italic">(unknown role)</div>}
          <div className="pt-3 border-t border-stone-800">
            <div className="text-sm text-stone-300">Your alignment</div>
            <div className={`text-2xl font-bold mt-1 ${rlAlign === 'evil' ? 'text-red-300' : 'text-emerald-300'}`}>
              {rlAlign.toUpperCase()}
            </div>
          </div>
        </div>
      );
    } else if (info.type === 'barber-ask') {
      infoBody = (
        <div className="text-center space-y-3">
          <div className="text-sm text-stone-200">The Barber died — would you like to swap 2 players' characters tonight?</div>
          <div className="grid grid-cols-2 gap-3 pt-2">
            <button onClick={() => { setSubmittedValue('no'); setPhase('confirmed'); onSubmit([]); }}
              className="py-4 rounded-lg text-base font-bold transition bg-red-700 hover:bg-red-600 text-stone-100">
              NO
            </button>
            <button onClick={() => { setSubmittedValue('yes'); setPhase('confirmed'); onSubmit([1]); }}
              className="py-4 rounded-lg text-base font-bold transition bg-emerald-600 hover:bg-emerald-500 text-stone-950">
              YES
            </button>
          </div>
          <div className="text-[10px] text-stone-500 pt-2">Tap one option above.</div>
        </div>
      );
    }
  }

  // Use-decision phase — for canSkip oncePerGame roles, ask "Use your X
  // ability tonight?" with Use/Skip buttons before the picker.
  if (phase === 'use-decision') {
    const roleName = c?.name || step.char.id;
    return (
      <div className="fixed inset-0 z-50 bg-stone-950 overflow-y-auto p-3 sm:p-4">
        <div className="max-w-md mx-auto space-y-4 py-4">
          <div className="text-center text-xs uppercase tracking-wider text-purple-300">
            🏠 Local player — show this to {mySeat.playerName || `seat #${mySeat.seatNum}`}
          </div>
          <section className="parchment rounded-lg p-4 sm:p-5 space-y-3 border-2 border-amber-600/70">
            <div className="flex items-center gap-3">
              {iconUrl(step.char.id) && (
                <img src={iconUrl(step.char.id)} alt=""
                  className="w-14 h-14 rounded-full border-2 border-amber-700 object-cover flex-shrink-0" />
              )}
              <div className="min-w-0">
                <div className={`text-xs uppercase tracking-wider team-${c?.team || 'townsfolk'}`}>{c?.team || 'role'}</div>
                <div className="text-amber-200 text-lg font-bold">{roleName}</div>
              </div>
            </div>
            <div className="text-sm text-stone-200 leading-relaxed border-l-2 border-amber-700/50 pl-3">
              {step.instruction || c?.ability}
            </div>
          </section>
          <section className="parchment rounded-lg p-5 text-center space-y-3">
            <div className="text-stone-200 text-base">
              Use your <span className="text-amber-200 font-semibold">{roleName}</span> ability tonight?
            </div>
            <div className="text-xs text-stone-500">
              You can only use this ability once per game. Save it for later if you want.
            </div>
          </section>
          <div className="grid grid-cols-2 gap-2 pt-1">
            <button onClick={doSkip}
              className="py-3 rounded-lg text-base font-semibold bg-stone-800 hover:bg-stone-700 text-stone-300 border border-stone-700">
              No, save it
            </button>
            <button onClick={() => setPhase('input')}
              className="py-3 rounded-lg text-base font-semibold bg-emerald-600 hover:bg-emerald-500 text-stone-950 shadow-lg shadow-emerald-900/40">
              Yes, use it
            </button>
          </div>
        </div>
      </div>
    );
  }

  // Confirmation phase — shown after Submit. Fully opaque background hides the
  // grimoire while the local player is still holding the phone. Only the ST
  // taps "Return to storyteller" to actually close the overlay.
  if (phase === 'confirmed') {
    return (
      <div className="fixed inset-0 z-50 bg-stone-950 overflow-y-auto p-3 sm:p-4">
        <div className="max-w-md mx-auto space-y-4 py-4">
          <section className="parchment rounded-lg p-6 sm:p-8 text-center space-y-4 border-2 border-emerald-700/70">
            <div className="text-6xl">✓</div>
            <div className="text-emerald-300 text-2xl font-bold">
              {isInfo ? 'Acknowledged' : 'Choice recorded'}
            </div>
            <p className="text-sm text-stone-300">
              Thanks, <span className="text-amber-200 font-semibold">{mySeat.playerName || `seat #${mySeat.seatNum}`}</span>.
              Please return the phone to the storyteller.
            </p>
            <div className="text-xs text-stone-500 pt-3 border-t border-stone-800">
              Seat #{mySeat.seatNum}
            </div>
          </section>

          <button onClick={onClose}
            className="w-full py-3 rounded-lg text-base font-semibold bg-amber-600 hover:bg-amber-500 text-stone-950 shadow-lg shadow-amber-900/40">
            Return to storyteller →
          </button>
          <p className="text-[10px] text-stone-500 text-center">
            Storyteller-only — do not tap if you are the local player.
          </p>
        </div>
      </div>
    );
  }

  // Input phase — picker or info display.
  return (
    <div className="fixed inset-0 z-50 bg-stone-950 overflow-y-auto p-3 sm:p-4">
      <div className="max-w-md mx-auto space-y-4 py-4">
        <div className="text-center text-xs uppercase tracking-wider text-purple-300">
          🏠 Local player — show this to {mySeat.playerName || `seat #${mySeat.seatNum}`}
        </div>

        <section className="parchment rounded-lg p-4 sm:p-5 space-y-3 border-2 border-amber-600/70">
          {(() => {
            const cannibalStealth = (step.seat && (step.seat.reminders || []).some(r =>
              r && r.charId === 'cannibal'))
              || (infoPayload && infoPayload.cannibalStealth)
              || (step.scRevealRoleId && step.seat && (step.seat.reminders || []).some(r =>
                r && r.charId === 'cannibal'));
            if (cannibalStealth) {
              return (
                <div className="text-center">
                  <div className="text-xs uppercase tracking-wider text-amber-300/70">Storyteller request</div>
                  <div className="text-amber-200 text-lg font-bold mt-1">{isInfo ? 'See below' : 'Make your selection'}</div>
                </div>
              );
            }
            return (
              <>
                <div className="flex items-center gap-3">
                  {iconUrl(_displayCharId) && (
                    <img src={iconUrl(_displayCharId)} alt=""
                      className="w-14 h-14 rounded-full border-2 border-amber-700 object-cover flex-shrink-0" />
                  )}
                  <div className="min-w-0">
                    <div className={`text-xs uppercase tracking-wider team-${c?.team || 'townsfolk'}`}>{c?.team || 'role'}</div>
                    <div className="text-amber-200 text-lg font-bold">{c?.name || _displayCharId}</div>
                  </div>
                </div>
                <div className="text-sm text-stone-200 leading-relaxed border-l-2 border-amber-700/50 pl-3">
                  {step.instruction || c?.ability}
                </div>
              </>
            );
          })()}
        </section>

        {isInfo ? (
          <section className="parchment rounded-lg p-5">
            {infoBody}
          </section>
        ) : (
          <section className="parchment rounded-lg p-3 sm:p-4 space-y-2">
            {!isLocalRoleOnly && (<>
            <div className="flex items-baseline justify-between gap-2">
              <h3 className="text-amber-200 font-semibold text-sm">
                {isPoFlex
                  ? 'Choose 1 player or pick none'
                  : (isThree ? 'Choose 3 players' : (isTwo ? 'Choose 2 players' : 'Choose 1 player'))}
              </h3>
              <span className="text-xs text-stone-400">{picked.length} of {isPoFlex ? '0–1' : need} chosen</span>
            </div>
            <ul className="grid grid-cols-2 gap-1.5">
              {eligibleSeats.map(s => {
                const isMe = s.seatNum === mySeat.seatNum;
                const pickIdx = picked.indexOf(s.seatNum);
                const isPicked = pickIdx >= 0;
                return (
                  <li key={s.seatNum}>
                    <button onClick={() => togglePick(s.seatNum)}
                      className={`w-full card rounded px-2.5 py-2 flex items-center gap-2 text-left transition
                        ${isPicked ? 'border-amber-500 bg-amber-900/30 ring-1 ring-amber-700' : 'hover:border-amber-500'}
                        ${s.isDead ? 'opacity-60' : ''}`}>
                      <span className="text-amber-200/80 text-xs w-7 text-center font-semibold">#{s.seatNum}</span>
                      <span className="flex-1 min-w-0 truncate text-sm">
                        {s.playerName || <span className="text-stone-500 italic">(no name)</span>}
                        {isMe && <span className="ml-1 text-[10px] text-amber-300/80">· you</span>}
                      </span>
                      {isPicked && (
                        need > 1
                          ? <span className="text-amber-200 text-xs font-bold bg-amber-900/70 rounded-full w-5 h-5 flex items-center justify-center">{pickIdx + 1}</span>
                          : <span className="text-amber-300 text-sm leading-none">✓</span>
                      )}
                    </button>
                  </li>
                );
              })}
            </ul>
            </>)}
            {wantsRolePick && (
              <div className="mt-3 pt-3 border-t border-stone-800">
                <div className="flex items-baseline justify-between gap-2 mb-1.5">
                  <h3 className="text-amber-200 font-semibold text-sm">
                    {isRoleClaim ? 'Pick a good character' : 'Guess their character'}
                  </h3>
                  <span className="text-xs text-stone-400">{pickedGuess ? '1' : '0'} of 1 chosen</span>
                </div>
                <ul className="grid grid-cols-2 gap-1.5 max-h-60 overflow-y-auto">
                  {(scriptCharIds || [])
                    .map(id => CHAR_BY_ID[id])
                    .filter(rc => {
                      if (!rc || rc.team === 'traveller') return false;
                      if (isRoleClaim) return rc.team === 'townsfolk' || rc.team === 'outsider';
                      return true;
                    })
                    .sort((a, b) => (a.name || '').localeCompare(b.name || ''))
                    .map(rc => {
                      const isPickedRole = pickedGuess === rc.id;
                      return (
                        <li key={rc.id}>
                          <button onClick={() => setPickedGuess(rc.id)}
                            className={`w-full card rounded px-2 py-1.5 flex items-center gap-2 text-left text-sm
                              ${isPickedRole ? 'border-amber-500 bg-amber-900/30 ring-1 ring-amber-700' : 'hover:border-amber-500'}`}>
                            {iconUrl(rc.id) && <img src={iconUrl(rc.id)} alt="" className="w-7 h-7 rounded-full border border-stone-700 object-cover flex-shrink-0" />}
                            <span className={`flex-1 min-w-0 truncate team-${rc.team}`}>{rc.name}</span>
                          </button>
                        </li>
                      );
                    })}
                </ul>
              </div>
            )}
          </section>
        )}

        {(infoPayload && infoPayload.type === 'barber-ask') ? null : (<>
        <div className={`grid ${isPoFlex && !isInfo ? 'grid-cols-3' : 'grid-cols-2'} gap-2 pt-1`}>
          <button onClick={onClose}
            className="py-3 rounded-lg text-base font-semibold bg-stone-800 hover:bg-stone-700 text-stone-300 border border-stone-700">
            Cancel
          </button>
          {isPoFlex && !isInfo && (
            <button onClick={() => { setPicked([]); setTimeout(doSubmit, 0); }}
              className="py-3 rounded-lg text-sm font-semibold bg-stone-700 hover:bg-stone-600 text-stone-100 border border-stone-600">
              ✕ Kill no one
            </button>
          )}
          <button onClick={doSubmit}
            disabled={!canSubmit}
            className={`py-3 rounded-lg text-base font-semibold transition
              ${canSubmit
                ? 'bg-emerald-600 hover:bg-emerald-500 text-stone-950 shadow-lg shadow-emerald-900/40'
                : 'bg-stone-800 text-stone-500 cursor-not-allowed'}`}>
            {isInfo ? 'Got it' : (isPoFlex && picked.length === 0 ? 'Submit (kill 1)' : 'Submit')}
          </button>
        </div>
        <p className="text-[10px] text-stone-500 text-center">
          Hand the phone to the local player to {isInfo ? 'acknowledge' : 'make their choice'}.
        </p>
        </>)}
      </div>
    </div>
  );
}

// ---------------- Night Phase Section ----------------

// Labels for the abstract "ceremonies" that appear in the official night order
// alongside actual character wake-ups. These are signposts the ST follows.
const NIGHT_CEREMONIES = {
  dusk:        'Dusk — everyone closes their eyes',
  dawn:        'Dawn — everyone opens their eyes',
  minioninfo:  'Minions wake — learn each other & the Demon',
  demoninfo:   'Demon wakes — learns Minions & sees 3 bluffs',
  lunaticinfo: 'Lunatic wakes — learns Minions & sees 3 bluffs',
};

function NightPhaseSection({ seats, viewingDayIndex, daysSnapshots, gameStarted, extraCharIds = [],
                              automation = false, nightPrompts = {}, readOnly = false,
                              onStartPrompt, onCancelPrompt, onMarkDone, onClearAllPrompts,
                              scriptCharIds = [], onOpenLocalPrompt,
                              nominationsByDay = {}, onPromoteScarletWoman, onStartShowGrimoire,
                              onOpenMoonchildCapture, onResolveMoonchild, onOpenEvilTwinModal, onOpenBarberFlow, onSweetheartPick,
                              onSendCeremony,
                              lastExecution = null }) {
  // Auto-expand when automation is on so the ST sees the interactive panel immediately.
  const [collapsed, setCollapsed] = useState(!automation);
  useEffect(() => { if (automation) setCollapsed(false); }, [automation]);
  // Which info-role step is currently being filled in by the ST (null = closed).
  const [infoPickerStep, setInfoPickerStep] = useState(null);
  const openInfoPicker = (step) => setInfoPickerStep(step);
  const closeInfoPicker = () => setInfoPickerStep(null);
  // Scarlet Woman promotion confirm modal — opens when ST clicks Start on the
  // synthetic SW step. Holds the step descriptor so the modal can read the
  // dead demon's role + the SW's seat info.
  const [swPromoteStep, setSWPromoteStep] = useState(null);
  const openSWPromote  = (step) => setSWPromoteStep(step);
  const closeSWPromote = () => setSWPromoteStep(null);
  const nightOrder = window.BOTC_DATA?.nightOrder || { firstNight: [], otherNight: [] };
  // The "night" is determined by the day being viewed. Day 0 -> Night 0 (first), Day N -> Night N.
  const nightNum = viewingDayIndex || 0;
  const isFirstNight = nightNum === 0;
  const orderList = isFirstNight ? nightOrder.firstNight : nightOrder.otherNight;
  // Did anyone die today (during the day that just ended)? Used to dim
  // Zombuul's night step. Markers are tagged with dayIdx at placement;
  // we look for ones from (viewingDayIndex - 1) which represents the
  // day BEFORE the night being rendered.
  const anyDeathToday = (seats || []).some(s =>
    (s.reminders || []).some(r =>
      r && r.charId === 'zombuul' && /^died today$/i.test(String(r.label || '')) &&
      r.dayIdx === (viewingDayIndex - 1)));
  // Wake-order lookup is keyed by PERCEIVED role, not actual role, so that
  // Drunk-as-FT (actualRoleId='drunk', perceivedRoleId='fortuneteller') wakes
  // as the Fortune Teller — the player thinks they have FT's ability and would
  // notice if they were skipped. Same for Marionette-as-X and Lunatic-as-Demon.
  // We use an ARRAY per role so a real FT + a Drunk-as-FT both get their own
  // night-phase rows (independent prompts keyed by seatNum).
  const seatsByPerceived = {};
  for (const s of (seats || [])) {
    if (!s.perceivedRoleId) continue;
    if (!seatsByPerceived[s.perceivedRoleId]) seatsByPerceived[s.perceivedRoleId] = [];
    seatsByPerceived[s.perceivedRoleId].push(s);
  }
  // For jinxes we use ACTUAL roles — jinxes are mechanical interactions between
  // real abilities, not what players think they have.
  const actualInPlay = new Set();
  for (const s of (seats || [])) {
    if (s.actualRoleId) actualInPlay.add(s.actualRoleId);
  }
  // No-seat in-play characters (e.g. Lil' Monsta — a token passed each night, not on any
  // seat). These still need a wake step in the night order.
  const extraSet = new Set(extraCharIds || []);
  // Build the displayable steps: ceremonies always; characters only if in play.
  // Emit ONE step per matching seat (so dual-FT etc. both show).
  const steps = [];
  let stepNum = 0;
  for (const id of orderList) {
    if (NIGHT_CEREMONIES[id]) {
      steps.push({ type: 'ceremony', id, label: NIGHT_CEREMONIES[id] });
      continue;
    }
    // 'lunatic' in the night order maps to a synthetic 'lunaticinfo' ceremony
    // (only first night, only when a Lunatic is in play).
    if (id === 'lunatic') {
      const hasLunatic = (seats || []).some(s => s.actualRoleId === 'lunatic');
      if (hasLunatic && isFirstNight) {
        steps.push({ type: 'ceremony', id: 'lunaticinfo', label: NIGHT_CEREMONIES['lunaticinfo'] });
      }
      continue;
    }
    const c = CHAR_BY_ID[id];
    if (!c) continue;
    // Special case: Scarlet Woman — when promotion conditions are met this
    // night, emit a synthetic sw-promote step in her natural night-order slot
    // (instead of the default manual "handle in person" row). The substitution
    // disappears automatically on subsequent renders once the SW's role has
    // been swapped to the demon's, since detectScarletWomanPromotion then
    // returns null.
    if (id === 'scarletwoman' && !isFirstNight) {
      const sw = detectScarletWomanPromotion(seats);
      if (sw) {
        stepNum += 1;
        steps.push({
          type: 'sw-promote',
          stepNum,
          char: CHAR_BY_ID['scarletwoman'] || { id: 'scarletwoman', name: 'Scarlet Woman', team: 'minion' },
          swSeat: sw.swSeat,
          deadDemonSeat: sw.deadDemonSeat,
          demonRoleId: sw.demonRoleId,
        });
        continue;
      }
    }
    const matched = seatsByPerceived[id] || [];
    const isExtra = extraSet.has(id);
    if (matched.length === 0 && !isExtra) continue;
    const reminder = (isFirstNight ? c.firstNightReminder : c.otherNightReminder) || '';
    let def = nightActionFor(id);
    let phaseOk = def.phase === 'both' || (def.phase === 'first' && isFirstNight) || (def.phase === 'other' && !isFirstNight);
    // Cannibal override: if any matched seat is a Cannibal-swapped seat
    // (carries a 'Was Cannibal' marker), allow the borrowed role's ability
    // to fire regardless of phase - the Cannibal gets the ability the night
    // AFTER eating, not on the role's natural night-order phase.
    if (!phaseOk) {
      const anyCannibal = matched.some(seat => (seat.reminders || []).some(r =>
        r && r.charId === 'cannibal' && /^was cannibal/i.test(String(r.label || ''))));
      if (anyCannibal) phaseOk = true;
    }
    let effectiveAction = phaseOk ? def.action : 'manual';
    // Godfather is special: first night = info-st showing in-play Outsiders;
    // other nights = target1 (kill someone) ONLY when Died Today is on their
    // seat (set by _executePlayer when an Outsider is executed). Otherwise
    // passive (dim, no Start button).
    if (id === 'godfather') {
      if (isFirstNight) {
        def = {
          ...def,
          action: 'info-st',
          instruction: 'You start knowing which Outsiders are in play.',
          reminder: '',
          infoType: 'role-list',
          infoConfig: { roleTeam: 'outsider' },
        };
        effectiveAction = 'info-st';
      } else {
        const gfSeat = matched[0];
        const hasDiedToday = !!(gfSeat?.reminders || []).some(r => r && r.charId === 'godfather' && /died today/i.test(String(r.label || '')));
        if (hasDiedToday) {
          // Default Godfather entry already has action: 'target1', reminder: 'Dead'.
          // Use it as-is.
          effectiveAction = def.action;
        } else {
          def = { ...def, action: 'passive', instruction: 'No Outsider died today — Godfather does not wake.' };
          effectiveAction = 'passive';
        }
      }
    }
    // Po: action flips between po-flex (default) and target3 when she has
    // 'Hungry' reminder from a previous-night skip.
    if (id === 'po') {
      const poSeat = matched[0];
      const hungry = !!(poSeat?.reminders || []).some(r =>
        r && r.charId === 'po' && /hungry|3 to kill/i.test(String(r.label || '')));
      if (hungry) {
        def = { ...def, action: 'target3', instruction: 'You chose no one last night — you must choose 3 players to kill tonight.' };
        effectiveAction = 'target3';
      }
    }
    // Moonchild natural-slot: scan for a 'Moonchild: Dead' marker on any
    // seat (placed at capture). If present → action='moonchild-resolve'
    // (rendered inline with Execute/Skip buttons in NightStepActionRow).
    // If absent → passive (either not triggered yet or already resolved).
    if (id === 'moonchild') {
      const mcSeat = matched[0];
      const targetSeat = (seats || []).find(s =>
        (s.reminders || []).some(r =>
          r && r.charId === 'moonchild' && /^dead$/i.test(String(r.label || ''))));
      if (targetSeat) {
        const tgtTeam = (CHAR_BY_ID[targetSeat.actualRoleId] || {}).team;
        const tgtIsGood = tgtTeam === 'townsfolk' || tgtTeam === 'outsider';
        const mcAfflicted = mcSeat ? isDrunkOrPoisoned(mcSeat) : false;
        def = {
          ...def,
          action: 'moonchild-resolve',
          instruction: `Moonchild chose seat #${targetSeat.seatNum}${targetSeat.playerName ? ' · ' + targetSeat.playerName : ''}. ` + (mcAfflicted
            ? 'Moonchild is drunk/poisoned — ability malfunctions, no one dies.'
            : tgtIsGood
              ? 'Target is good — execute them now.'
              : 'Target is evil — no effect.'),
        };
        effectiveAction = 'moonchild-resolve';
        // Stash data on the def so the step push picks it up; we re-attach
        // it on the step itself below.
        def.__moonchildTargetSeatNum = targetSeat.seatNum;
        def.__moonchildTargetIsGood = tgtIsGood;
        def.__moonchildAfflicted = mcAfflicted;
      } else {
        const resolved = !!(mcSeat?.reminders || []).some(r =>
          r && r.charId === 'moonchild' && /^chose$/i.test(String(r.label || '')));
        def = {
          ...def,
          action: 'passive',
          instruction: resolved
            ? "Moonchild's ability already resolved this game."
            : 'Moonchild has not died yet — does not wake.',
        };
        effectiveAction = 'passive';
      }
    }
    // Demon dim when exorcised: any demon seat carrying an 'Exorcised'
    // reminder (placed by Exorcist) does not wake tonight.
    if (CHAR_BY_ID[id]?.team === 'demon') {
      const dSeat = matched[0];
      const exorcised = !!(dSeat?.reminders || []).some(r =>
        r && r.charId === 'exorcist' && /exorcised/i.test(String(r.label || '')));
      if (exorcised) {
        def = { ...def, action: 'passive', instruction: 'Exorcised by the Exorcist tonight — does not wake.' };
        effectiveAction = 'passive';
      }
    }
    if (matched.length === 0 && isExtra) {
      // No-seat assignment (Lil' Monsta).
      stepNum += 1;
      steps.push({ type: 'char', stepNum, char: c, seat: null, reminder, isExtra,
                   action: effectiveAction, instruction: def.instruction, reminderLabel: def.reminder,
                   requiresDeath: def.requiresDeath, oncePerGame: def.oncePerGame, canSkip: def.canSkip,
                   infoType: def.infoType, infoConfig: def.infoConfig,
                   prompt: null });
    } else {
      // Sort matched seats so any Lunatic (perceived as this role) is
      // emitted BEFORE the real holder of the role — the ST wakes the
      // Lunatic first, then wakes the real Demon to get the actual pick.
      const matchedSorted = matched.slice().sort((a, b) => {
        const aLun = a.actualRoleId === 'lunatic' ? 0 : 1;
        const bLun = b.actualRoleId === 'lunatic' ? 0 : 1;
        return aLun - bLun;
      });
      for (const seat of matchedSorted) {
        stepNum += 1;
        // Ceremony prompts (minioninfo / demoninfo / lunaticinfo /
        // lunatic-actions / etc.) live on the same seat as role prompts but
        // are conceptually separate — they shouldn't make the role's night
        // row show as Done / Awaiting / Question. Skip them here.
        const rawPrompt = nightPrompts[seat.seatNum];
        const prompt = (rawPrompt && rawPrompt.ceremony) ? null : rawPrompt;
        steps.push({ type: 'char', stepNum, char: c, seat, reminder, isExtra,
                     action: effectiveAction, instruction: def.instruction, reminderLabel: def.reminder,
                     requiresDeath: def.requiresDeath, oncePerGame: def.oncePerGame, canSkip: def.canSkip,
                     infoType: def.infoType, infoConfig: def.infoConfig,
                     moonchildTargetSeatNum: def.__moonchildTargetSeatNum,
                     moonchildTargetIsGood:  def.__moonchildTargetIsGood,
                     moonchildAfflicted:     def.__moonchildAfflicted,
                     zombuulDayDeath: id === 'zombuul' ? anyDeathToday : false,
                     jugglerWrongNight: id === 'juggler' && nightNum !== 1,
                     barberHasHaircut: id === 'barber' && (seat.reminders || []).some(r =>
                       r && r.charId === 'barber' && /haircuts tonight/i.test(String(r.label || ''))),
                     eviltwinTwinSeatNum: id === 'eviltwin'
                       ? (((seats || []).find(x => (x.reminders || []).some(r =>
                           r && r.charId === 'eviltwin' && /^twin$/i.test(String(r.label || '')))) || {}).seatNum || null)
                       : null,
                     prompt });
      }
    }
    // Huntsman post-swap reveal — emit a synthetic sc-reveal step below
    // Huntsman's row for each seat carrying 'Reveal: huntsman-converted'.
    if (id === 'huntsman') {
      const hRevealSeats = (seats || []).filter(sx =>
        (sx.reminders || []).some(r => r && r.charId === 'huntsman' && /^reveal: huntsman-converted$/i.test(String(r.label || ''))));
      for (const rev of hRevealSeats) {
        stepNum += 1;
        const newRoleId = rev.actualRoleId;
        const newRoleChar = CHAR_BY_ID[newRoleId] || { id: newRoleId, name: newRoleId, team: 'townsfolk' };
        const rawPrompt = nightPrompts[rev.seatNum];
        const isOurPrompt = !!(rawPrompt && rawPrompt.scRevealKind === 'huntsman-' + rev.seatNum);
        steps.push({
          type: 'char',
          stepNum,
          char: newRoleChar,
          seat: rev,
          reminder: 'Show new role + alignment',
          isExtra: false,
          action: 'sc-reveal',
          instruction: 'Wake this player and reveal their new role and alignment.',
          reminderLabel: '',
          requiresDeath: false,
          oncePerGame: false,
          canSkip: false,
          infoType: 'role-alignment',
          infoConfig: { roleId: newRoleId, alignment: 'good' },
          scReveal: { kind: 'huntsman-' + rev.seatNum, seatNum: rev.seatNum, roleId: newRoleId, alignment: 'good' },
          prompt: isOurPrompt ? rawPrompt : null,
        });
      }
    }
    // Barber post-swap reveal steps — same pattern as SC reveal: emit 2
    // synthetic reveal steps under Barber's row for each swapped seat.
    if (id === 'barber') {
      const revealSeats = (seats || []).filter(sx =>
        (sx.reminders || []).some(r => r && r.charId === 'barber' && /^reveal: new role$/i.test(String(r.label || ''))));
      for (const rev of revealSeats) {
        stepNum += 1;
        const newRoleId = rev.actualRoleId;
        const newAlignment = (CHAR_BY_ID[newRoleId] || {}).team === 'minion' || (CHAR_BY_ID[newRoleId] || {}).team === 'demon' ? 'evil' : 'good';
        const newRoleChar = CHAR_BY_ID[newRoleId] || { id: newRoleId, name: newRoleId, team: newAlignment === 'evil' ? 'demon' : 'townsfolk' };
        const rawPrompt = nightPrompts[rev.seatNum];
        const isOurPrompt = !!(rawPrompt && rawPrompt.scRevealKind === 'barber-' + rev.seatNum);
        steps.push({
          type: 'char',
          stepNum,
          char: newRoleChar,
          seat: rev,
          reminder: 'Show new role to swapped seat',
          isExtra: false,
          action: 'sc-reveal',
          instruction: 'Wake this player and reveal their new role and alignment.',
          reminderLabel: '',
          requiresDeath: false,
          oncePerGame: false,
          canSkip: false,
          infoType: 'role-alignment',
          infoConfig: { roleId: newRoleId, alignment: newAlignment },
          scReveal: { kind: 'barber-' + rev.seatNum, seatNum: rev.seatNum, roleId: newRoleId, alignment: newAlignment },
          prompt: isOurPrompt ? rawPrompt : null,
        });
      }
    }
    // Fang Gu post-swap reveal — emit a synthetic sc-reveal step below
    // Fang Gu's row for each seat carrying a 'Reveal: new fanggu' marker.
    if (id === 'fanggu') {
      const fgRevealSeats = (seats || []).filter(sx =>
        (sx.reminders || []).some(r => r && r.charId === 'fanggu' && /^reveal: new fanggu$/i.test(String(r.label || ''))));
      for (const rev of fgRevealSeats) {
        stepNum += 1;
        const newRoleId = rev.actualRoleId; // 'fanggu' after swap
        const newAlignment = 'evil';
        const newRoleChar = CHAR_BY_ID[newRoleId] || { id: newRoleId, name: 'Fang Gu', team: 'demon' };
        const rawPrompt = nightPrompts[rev.seatNum];
        const isOurPrompt = !!(rawPrompt && rawPrompt.scRevealKind === 'fanggu-' + rev.seatNum);
        steps.push({
          type: 'char',
          stepNum,
          char: newRoleChar,
          seat: rev,
          reminder: 'Show new role + alignment',
          isExtra: false,
          action: 'sc-reveal',
          instruction: 'Wake this player and reveal their new role and alignment.',
          reminderLabel: '',
          requiresDeath: false,
          oncePerGame: false,
          canSkip: false,
          infoType: 'role-alignment',
          infoConfig: { roleId: newRoleId, alignment: newAlignment },
          scReveal: { kind: 'fanggu-' + rev.seatNum, seatNum: rev.seatNum, roleId: newRoleId, alignment: newAlignment },
          prompt: isOurPrompt ? rawPrompt : null,
        });
      }
    }
    // Snake Charmer post-swap synthetic steps — emitted AFTER SC's main row
    // push so they appear BELOW SC in the night order. Each reveal step is
    // independent (own prompt status keyed by scRevealKind on the prompt).
    if (id === 'snakecharmer') {
      const revealMarkers = [];
      for (const sx of (seats || [])) {
        for (const r of (sx.reminders || [])) {
          if (!r || r.charId !== 'snakecharmer') continue;
          if (/^reveal: new demon$/i.test(String(r.label || ''))) {
            revealMarkers.push({ kind: 'newdemon', seatNum: sx.seatNum, roleId: sx.actualRoleId, alignment: sx.alignment || 'evil' });
          } else if (/^reveal: new sc$/i.test(String(r.label || ''))) {
            revealMarkers.push({ kind: 'newsc', seatNum: sx.seatNum, roleId: sx.actualRoleId, alignment: sx.alignment || 'good' });
          }
        }
      }
      for (const rev of revealMarkers) {
        stepNum += 1;
        const revealSeat = (seats || []).find(x => x.seatNum === rev.seatNum);
        const newRoleChar = CHAR_BY_ID[rev.roleId] || { id: rev.roleId, name: rev.roleId, team: rev.alignment === 'evil' ? 'demon' : 'townsfolk' };
        // Only count the seat's existing prompt as OUR prompt if it has the
        // matching scRevealKind tag (set when we push the reveal payload).
        // Otherwise leave prompt null so Start button shows.
        const rawPrompt = nightPrompts[rev.seatNum];
        const isOurPrompt = !!(rawPrompt && rawPrompt.scRevealKind === rev.kind);
        steps.push({
          type: 'char',
          stepNum,
          char: newRoleChar,
          seat: revealSeat,
          reminder: rev.kind === 'newdemon' ? 'Show new demon their role' : 'Show new snake charmer their role',
          isExtra: false,
          action: 'sc-reveal',
          instruction: 'Wake this player and reveal their new role and alignment.',
          reminderLabel: '',
          requiresDeath: false,
          oncePerGame: false,
          canSkip: false,
          infoType: 'role-alignment',
          infoConfig: { roleId: rev.roleId, alignment: rev.alignment },
          scReveal: { kind: rev.kind, seatNum: rev.seatNum, roleId: rev.roleId, alignment: rev.alignment },
          prompt: isOurPrompt ? rawPrompt : null,
        });
      }
    }
    // Synthetic 'Show Exorcism' step — emitted right after Exorcist's slot
    // when she picked a Demon tonight. The Demon learns who exorcised them.
    if (id === 'exorcist') {
      const exoSeat = (seats || []).find(s => s.actualRoleId === 'exorcist');
      const exorcisedDemon = (seats || []).find(s =>
        (CHAR_BY_ID[s.actualRoleId] || {}).team === 'demon' &&
        (s.reminders || []).some(r => r && r.charId === 'exorcist' && /exorcised/i.test(String(r.label || ''))));
      if (exoSeat && exorcisedDemon) {
        // Use exorcist as char.id so the modal header renders the Exorcist
        // icon + name. The infoConfig carries a custom 'displayLabel' that
        // overrides the default "Your Grandchild is:" wording on the demon's
        // info display, plus a 'role-hidden' flag so the role token is shown
        // without the seat-mode "Your Grandchild" preamble.
        const exorcistChar = CHAR_BY_ID['exorcist'] || { id: 'exorcist', name: 'Exorcist', team: 'townsfolk' };
        stepNum += 1;
        const prompt = nightPrompts[exorcisedDemon.seatNum];
        steps.push({
          type: 'char',
          stepNum,
          char: exorcistChar,
          seat: exorcisedDemon,
          reminder: '',
          isExtra: false,
          action: 'info-st',
          instruction: `Show the Demon (#${exorcisedDemon.seatNum}${exorcisedDemon.playerName ? ' · ' + exorcisedDemon.playerName : ''}) the Exorcist token and point to the Exorcist (#${exoSeat.seatNum}${exoSeat.playerName ? ' · ' + exoSeat.playerName : ''}). The Demon does not wake tonight.`,
          reminderLabel: '',
          requiresDeath: false,
          oncePerGame: false,
          canSkip: false,
          infoType: 'seat+role',
          infoConfig: {
            suggestion: 'exorcist-show',
            presetSeat: exoSeat.seatNum,
            presetRoleId: 'exorcist',
            displayLabel: 'You have been exorcised by:',
            displayRoleLabel: 'The Exorcist',
          },
          prompt,
        });
      }
    }
  }
  // Goon synthetic 'show alignment' step. When the Goon carries a
  // 'Show alignment' marker (placed by the trigger above when her
  // alignment just flipped), splice a synthetic step right after the
  // actor's step so the ST shows the Goon her new alignment in order.
  {
    const goonSeat = (seats || []).find(s => s.actualRoleId === 'goon');
    const showRem = goonSeat ? (goonSeat.reminders || []).find(r =>
      r && r.charId === 'goon' && /^show alignment$/i.test(String(r.label || ''))) : null;
    if (goonSeat && showRem) {
      const triggeredBy = showRem.triggeredBy;
      const newAlignment = showRem.newAlignment || (goonSeat.alignment || 'good');
      const goonChar = CHAR_BY_ID['goon'] || { id: 'goon', name: 'Goon', team: 'outsider' };
      const prompt = nightPrompts[goonSeat.seatNum];
      const goonStep = {
        type: 'char',
        char: goonChar,
        seat: goonSeat,
        reminder: '',
        isExtra: false,
        action: 'info-st',
        instruction: `Show the Goon her new alignment (${newAlignment.toUpperCase()}). Wake her, give thumbs-${newAlignment === 'good' ? 'up' : 'down'}, then put her to sleep.`,
        reminderLabel: '',
        requiresDeath: false,
        oncePerGame: false,
        canSkip: false,
        infoType: 'alignment',
        infoConfig: { presetAlignment: newAlignment, displayLabel: 'Your new alignment is:' },
        prompt,
      };
      // Find the actor's step and splice after it. Fallback: append.
      let insertAt = steps.length;
      for (let i = 0; i < steps.length; i++) {
        if (steps[i].type === 'char' && steps[i].seat?.seatNum === triggeredBy) {
          insertAt = i + 1;
          break;
        }
      }
      steps.splice(insertAt, 0, goonStep);
      // Renumber char steps.
      let n = 0;
      for (const s of steps) {
        if (s.type === 'char') { n += 1; s.stepNum = n; }
      }
    }
  }
  // Klutz after-dawn injection. When any Klutz seat carries the 'Triggered'
  // reminder (placed on night death by firePassiveDeathTriggers), splice a
  // synthetic klutz-capture step right after Dawn so the ST opens the picker
  // alongside the morning death announcement.
  {
    const triggeredKl = (seats || []).find(s =>
      s.actualRoleId === 'klutz' &&
      (s.reminders || []).some(r => r && r.charId === 'klutz' && /^triggered$/i.test(String(r.label || ''))) &&
      !(s.reminders || []).some(r => r && r.charId === 'klutz' && /^chosen$/i.test(String(r.label || '')))
    );
    if (triggeredKl) {
      const klChar = CHAR_BY_ID['klutz'] || { id: 'klutz', name: 'Klutz', team: 'outsider' };
      const klDawnIdx = steps.findIndex(s => s.type === 'ceremony' && s.id === 'dawn');
      const klStep = {
        type: 'char',
        char: klChar,
        seat: triggeredKl,
        reminder: '',
        isExtra: false,
        action: 'klutz-capture',
        instruction: 'The Klutz died last night — capture the player they publicly chose. A corner popup will announce the result.',
        reminderLabel: '',
        requiresDeath: true,
        oncePerGame: false,
        canSkip: false,
      };
      if (klDawnIdx >= 0) {
        steps.splice(klDawnIdx + 1, 0, klStep);
      } else {
        steps.push(klStep);
      }
      let n = 0;
      for (const s of steps) { if (s.type === 'char') { n += 1; s.stepNum = n; } }
    }
  }
  // Moonchild after-dawn injection. When any Moonchild seat carries the
  // 'Triggered' reminder, splice a synthetic step right after the Dawn
  // ceremony so the ST handles her pick while announcing morning deaths.
  {
    const triggeredMc = (seats || []).find(s =>
      s.actualRoleId === 'moonchild' &&
      (s.reminders || []).some(r => r && r.charId === 'moonchild' && /trigger/i.test(String(r.label || ''))) &&
      !(s.reminders || []).some(r => r && r.charId === 'moonchild' && /^chose$/i.test(String(r.label || '')))
    );
    if (triggeredMc) {
      const mcChar = CHAR_BY_ID['moonchild'] || { id: 'moonchild', name: 'Moonchild', team: 'outsider' };
      const prompt = nightPrompts[triggeredMc.seatNum];
      const dawnIdx = steps.findIndex(s => s.type === 'ceremony' && s.id === 'dawn');
      const mcStep = {
        type: 'char',
        char: mcChar,
        seat: triggeredMc,
        reminder: '',
        isExtra: false,
        action: 'moonchild-capture',
        instruction: 'The Moonchild just died — capture the player she publicly chose. (Kill resolves at the Moonchild\'s normal night slot.)',
        reminderLabel: '',
        requiresDeath: true,
        oncePerGame: false,
        canSkip: false,
        infoType: undefined,
        infoConfig: undefined,
        prompt,
      };
      if (dawnIdx >= 0) {
        steps.splice(dawnIdx + 1, 0, mcStep);
      } else {
        steps.push(mcStep);
      }
      // Renumber stepNum on char steps so the UI shows clean ordering.
      let n = 0;
      for (const s of steps) {
        if (s.type === 'char') {
          n += 1;
          s.stepNum = n;
        }
      }
    }
  }
  // Active jinxes (same logic as JinxSection but scoped to in-play characters).
  const inPlayIds = [...actualInPlay, ...extraSet];
  const jinxes = getActiveJinxes(inPlayIds);

  return (
    <section className={`parchment rounded-lg p-3 sm:p-4 ${automation ? 'border-amber-700/60' : ''}`}>
      <button onClick={() => setCollapsed(c => !c)}
        className="w-full flex items-center justify-between gap-2 text-left">
        <div>
          <h3 className="text-amber-200 font-semibold">
            Night phase {gameStarted && <span className="text-stone-400 font-normal">· {isFirstNight ? 'first night' : `night ${nightNum}`}</span>}
            {automation && <span className="ml-2 text-[10px] uppercase tracking-wider text-amber-400 align-middle">⚡ automated</span>}
          </h3>
          <p className="text-xs text-stone-400">
            {steps.filter(s => s.type === 'char').length} characters wake
            {jinxes.length > 0 && <> · {jinxes.length} jinx{jinxes.length === 1 ? '' : 'es'} active</>}
            <span className="text-stone-500"> · click to {collapsed ? 'expand' : 'collapse'}</span>
          </p>
        </div>
        <span className="text-stone-400 text-lg leading-none w-5 text-center">{collapsed ? '▸' : '▾'}</span>
      </button>
      {!collapsed && (
        <div className="mt-3 pt-3 border-t border-stone-800 space-y-3">
          {/* Wake order */}
          {steps.length === 0 ? (
            <p className="text-sm text-stone-500 italic">No in-play characters wake this night.</p>
          ) : (
            <ol className="space-y-1.5">
              {steps.map((s, i) => s.type === 'ceremony' ? (() => {
                const clickable = automation && gameStarted && isFirstNight &&
                  (s.id === 'minioninfo' || s.id === 'demoninfo' || s.id === 'lunaticinfo') && !!onSendCeremony;
                if (!clickable) {
                  return (
                    <li key={i} className="card rounded px-3 py-1.5 border-stone-700 bg-stone-900/60 text-stone-300 text-xs uppercase tracking-wider text-center">
                      {s.label}
                    </li>
                  );
                }
                // Targets that should receive the ceremony info.
                const hasTargets = s.id === 'minioninfo'
                  ? (seats || []).some(x => (CHAR_BY_ID[x.actualRoleId] || {}).team === 'minion')
                  : s.id === 'lunaticinfo'
                    ? (seats || []).some(x => x.actualRoleId === 'lunatic')
                    : (seats || []).some(x => (CHAR_BY_ID[x.actualRoleId] || {}).team === 'demon');
                // Progress over prompts created for this ceremony.
                const ceremonyTags = s.id === 'minioninfo' ? ['minioninfo']
                  : s.id === 'lunaticinfo' ? ['lunaticinfo']
                  : ['demoninfo'];
                const cPrompts = Object.values(nightPrompts || {}).filter(p =>
                  p && ceremonyTags.includes(p.ceremony));
                const totalSent = cPrompts.length;
                const acked = cPrompts.filter(p => p.status === 'submitted' || p.status === 'done').length;
                return (
                  <li key={i} className="card rounded px-3 py-2 border-amber-700/60 bg-amber-950/20">
                    <div className="flex items-center justify-between gap-2 flex-wrap">
                      <span className="text-amber-200 text-xs uppercase tracking-wider">{s.label}</span>
                      <div className="flex items-center gap-2">
                        {totalSent > 0 && (
                          <span className="text-[10px] text-stone-400 normal-case tracking-normal">
                            {acked}/{totalSent} acked
                          </span>
                        )}
                        <button
                          onClick={() => onSendCeremony(s.id)}
                          disabled={!hasTargets}
                          className={`text-[11px] px-3 py-1 rounded font-medium normal-case tracking-normal
                            ${hasTargets
                              ? (totalSent > 0
                                  ? 'pill hover:border-amber-500 hover:text-amber-200 text-amber-300'
                                  : 'bg-amber-600 hover:bg-amber-500 text-stone-950')
                              : 'opacity-40 cursor-not-allowed text-stone-500'}`}>
                          {totalSent > 0 ? 'Resend →' : 'Send →'}
                        </button>
                      </div>
                    </div>
                  </li>
                );
              })() : s.type === 'sw-promote' ? (
                <li key={i} className="card rounded p-2 flex items-start gap-2 border-red-600/70 bg-red-950/30">
                  <span className="text-stone-500 text-xs tabular-nums w-6 text-center pt-0.5">{s.stepNum}</span>
                  {iconUrl('scarletwoman') && (
                    <img src={iconUrl('scarletwoman')} alt=""
                      className="w-10 h-10 rounded-full border-2 border-red-600 object-cover flex-shrink-0" />
                  )}
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap">
                      <span className="team-minion font-medium text-sm">Scarlet Woman</span>
                      <span className="text-[10px] uppercase text-amber-200/70">seat #{s.swSeat.seatNum}{s.swSeat.playerName ? ` · ${s.swSeat.playerName}` : ''}</span>
                      {s.swSeat.isLocal && <span className="text-[10px] uppercase text-purple-300">🏠 local</span>}
                    </div>
                    <div className="text-xs text-stone-300/85 mt-0.5 leading-snug">
                      Demon (<span className="team-demon">{CHAR_BY_ID[s.demonRoleId]?.name || s.demonRoleId}</span>, seat #{s.deadDemonSeat.seatNum}) is dead. Promote the Scarlet Woman to take over.
                    </div>
                    {automation && (
                      <div className="mt-2 pt-2 border-t border-stone-800/70">
                        {gameStarted ? (
                          <div className="flex items-center gap-2 flex-wrap">
                            <button onClick={() => openSWPromote(s)}
                              className="text-xs px-3 py-1 rounded bg-red-700 hover:bg-red-600 text-stone-100 font-medium">
                              ▶ Promote to {CHAR_BY_ID[s.demonRoleId]?.name || s.demonRoleId}
                            </button>
                          </div>
                        ) : (
                          <div className="text-[11px] text-stone-500 italic">Click "Begin Game" first before promoting.</div>
                        )}
                      </div>
                    )}
                  </div>
                </li>
              ) : (() => {
                // For requiresDeath roles (Ravenkeeper), dim when ALIVE or when
                // a 'No ability' reminder is already present (ability used).
                // Zombuul is "functionally alive" if alive OR has an
                // 'Executed once' marker — and dims if a day-death today
                // gates the ability. Otherwise dim when dead (the usual case).
                const noAbility = (s.seat?.reminders || []).some(r => r && /no ability/i.test(String(r.label || '')));
                const zombuulHasExecOnce = (s.seat?.reminders || []).some(r =>
                  r && r.charId === 'zombuul' && /^executed once$/i.test(String(r.label || '')));
                const zombuulTrulyDead = !!s.seat?.isDead && !zombuulHasExecOnce;
                const vigorKeepsAbility = (s.seat?.reminders || []).some(r =>
                  r && r.charId === 'vigormortis' && /keeps ability/i.test(String(r.label || '')));
                // Lunatic-as-X rows display the Lunatic icon + name + outsider
                // team color (the prompt sent to the player still uses the
                // perceived role).
                const lunDisplay = (s.seat && s.seat.actualRoleId === 'lunatic')
                  ? (CHAR_BY_ID['lunatic'] || s.char) : s.char;
                // Juggler only acts on the night following Day 1 (the night
                // immediately after their daytime guesses). nightNum === 1
                // is that night in the app's day-index model — any other
                // value dims the row.
                const jugglerWrongNight = (s.char && s.char.id === 'juggler' && nightNum !== 1);
                // Barber's passive row un-dims tonight if the Barber has the
                // 'Haircuts tonight' reminder (placed on death by the passive
                // trigger). Without it, the Barber row stays dim.
                const barberActive = (s.char && s.char.id === 'barber' && s.barberHasHaircut);
                // Sweetheart: row is ACTIVE (un-dim) only when Sweetheart is
                // dead AND the ability hasn't been used. Alive or used → dim.
                const sweetheartActive = (s.char && s.char.id === 'sweetheart' && s.seat?.isDead && !noAbility);
                const sweetheartInactive = (s.char && s.char.id === 'sweetheart' && (!s.seat?.isDead || noAbility));
                const dim = sweetheartActive
                  ? false
                  : sweetheartInactive
                  ? true
                  : barberActive
                  ? false
                  : jugglerWrongNight
                  ? true
                  : s.action === 'passive'
                    ? true
                    : s.requiresDeath
                      ? (!s.seat?.isDead || noAbility)
                      : (s.char && s.char.id === 'zombuul')
                        ? (zombuulTrulyDead || !!s.zombuulDayDeath)
                        : (vigorKeepsAbility
                          ? false
                          : !!s.seat?.isDead);
                return (
                <li key={i} className={`card rounded p-2 flex items-start gap-2 ${dim ? 'opacity-50' : ''} ${automation && s.prompt?.status === 'awaiting' ? 'border-amber-500 ring-1 ring-amber-700/40' : ''} ${automation && s.prompt?.status === 'question' ? 'border-red-500 ring-1 ring-red-700/40' : ''}`}>
                  <span className="text-stone-500 text-xs tabular-nums w-6 text-center pt-0.5">{s.stepNum}</span>
                  {iconUrl(lunDisplay.id) && (
                    <img src={iconUrl(lunDisplay.id)} alt=""
                      className={`w-10 h-10 rounded-full border border-stone-700 object-cover flex-shrink-0 ${dim ? 'grayscale' : ''}`} />
                  )}
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap">
                      <span className={`team-${lunDisplay.team} font-medium text-sm`}>{lunDisplay.name}</span>
                      {s.seat ? (
                        <>
                          <span className="text-[10px] uppercase text-amber-200/70">seat #{s.seat.seatNum}{s.seat.playerName ? ` · ${s.seat.playerName}` : ''}</span>
                          {s.seat.isDead && <span className="text-[10px] uppercase text-red-400">dead</span>}
                          {s.seat.isLocal && <span className="text-[10px] uppercase text-purple-300">🏠 local</span>}
                        </>
                      ) : (
                        <span className="text-[10px] uppercase text-amber-300/80">no seat · find the "Is the Demon" reminder</span>
                      )}
                    </div>
                    {s.reminder && (
                      <div className="text-xs text-stone-300/85 mt-0.5 leading-snug">{s.reminder}</div>
                    )}
                    {automation && (
                      <NightStepActionRow step={s} readOnly={readOnly}
                        onStartPrompt={onStartPrompt}
                        onCancelPrompt={onCancelPrompt}
                        onMarkDone={onMarkDone}
                        onOpenInfoPicker={openInfoPicker}
                        onOpenLocalPrompt={onOpenLocalPrompt}
                        onStartShowGrimoire={onStartShowGrimoire}
                        onOpenMoonchildCapture={onOpenMoonchildCapture}
                        onOpenEvilTwinModal={onOpenEvilTwinModal}
                        onOpenBarberFlow={onOpenBarberFlow}
                        onResolveMoonchild={onResolveMoonchild}
                        gameStarted={gameStarted}
                      />
                    )}
                  </div>
                </li>
                );
              })())}
            </ol>
          )}

          {automation && Object.keys(nightPrompts || {}).length > 0 && (
            <div className="pt-2 border-t border-stone-800 flex items-center justify-between gap-2">
              <span className="text-[11px] text-stone-500">
                {Object.values(nightPrompts).filter(p => p && p.status === 'awaiting').length} awaiting ·
                {' '}{Object.values(nightPrompts).filter(p => p && p.status === 'done').length} done ·
                {' '}{Object.values(nightPrompts).filter(p => p && p.status === 'question').length} questions
              </span>
              <button onClick={() => { if (confirm('Clear all night-automation prompts? This dismisses any in-progress player phones.')) onClearAllPrompts && onClearAllPrompts(); }}
                className="text-[11px] px-2.5 py-1 rounded pill hover:border-red-500 hover:text-red-300 text-stone-400">
                Clear all prompts
              </button>
            </div>
          )}

          {/* Active jinxes */}
          {jinxes.length > 0 && (
            <div>
              <div className="text-xs uppercase tracking-wider text-amber-300 mb-1.5">Active jinxes</div>
              <ul className="space-y-1.5">
                {jinxes.map((j, i) => {
                  const a = CHAR_BY_ID[j.a], b = CHAR_BY_ID[j.b];
                  if (!a || !b) return null;
                  return (
                    <li key={i} className="card rounded p-2 text-xs">
                      <div className="font-medium">
                        <span className={`team-${a.team}`}>{a.name}</span>
                        <span className="text-stone-500"> × </span>
                        <span className={`team-${b.team}`}>{b.name}</span>
                      </div>
                      <div className="text-stone-300/80 mt-0.5">{j.reason}</div>
                    </li>
                  );
                })}
              </ul>
            </div>
          )}
        </div>
      )}
      {infoPickerStep && (
        <InfoPickerModal
          step={infoPickerStep}
          seats={seats}
          scriptCharIds={scriptCharIds}
          viewingDayIndex={viewingDayIndex}
          nominationsByDay={nominationsByDay}
          daysSnapshots={daysSnapshots}
          lastExecution={lastExecution}
          onClose={closeInfoPicker}
          onSend={(payload) => {
            // Sweetheart: ST-only resolution. Place 'Sweetheart: Drunk' on
            // the picked seat (permanent) + 'No ability' on the sweetheart
            // seat (oncePerGame tracker). Do NOT push a prompt to the
            // sweetheart's phone — they're dead.
            if (infoPickerStep.char && infoPickerStep.char.id === 'sweetheart' && payload && payload.type === 'seat') {
              onSweetheartPick && onSweetheartPick(infoPickerStep.seat.seatNum, payload.askSeat);
              closeInfoPicker();
              return;
            }
            // For local players, don't push to a phone — open the on-ST overlay
            // with the chosen info so the local player can tap Got it on this device.
            if (infoPickerStep.seat?.isLocal) {
              onOpenLocalPrompt && onOpenLocalPrompt(infoPickerStep, payload);
            } else {
              onStartPrompt && onStartPrompt(infoPickerStep.seat.seatNum, infoPickerStep, payload);
            }
            closeInfoPicker();
          }}
        />
      )}

      {swPromoteStep && (
        <SWPromoteModal
          step={swPromoteStep}
          onConfirm={() => {
            onPromoteScarletWoman && onPromoteScarletWoman(swPromoteStep.swSeat.seatNum, swPromoteStep.demonRoleId);
            closeSWPromote();
          }}
          onCancel={closeSWPromote}
        />
      )}
    </section>
  );
}

// ---------------- Demon Bluffs ----------------

// Snitch ability: "Each Minion gets 3 bluffs." This renders one DemonBluffs-style
// panel per in-play minion seat (one for each Lil' Monsta-minion too). Each panel
// is titled with the minion's role name + seat # so the ST knows which minion's
// bluffs they're editing. Hidden role markers don't show up here — we key off
// actualRoleId so a Marionette-as-minion (perceived only) still gets bluffs from
// the perceived role's seat, while the actual Marionette seat (whose actual team
// is outsider) does not. Bluffs are stored per seatNum so they survive swaps.
function MinionBluffsPanel({ seats, minionBluffs, readOnly, onPick, onClear }) {
  const [collapsed, setCollapsed] = useState(false);
  const minionSeats = (seats || []).filter(s =>
    CHAR_BY_ID[s.actualRoleId]?.team === 'minion'
  );
  const totalFilled = minionSeats.reduce((acc, s) =>
    acc + ((minionBluffs[s.seatNum] || []).filter(Boolean).length), 0);
  const totalNeeded = minionSeats.length * 3;

  return (
    <section className="parchment rounded-lg p-3 sm:p-4">
      <button onClick={() => setCollapsed(c => !c)}
        className="w-full flex items-center justify-between gap-2 text-left">
        <div>
          <h3 className="text-amber-200 font-semibold">Minion bluffs (Snitch)</h3>
          <p className="text-xs text-stone-400">
            {minionSeats.length === 0
              ? <>No minions in play — nothing to pick.</>
              : <>{totalFilled} / {totalNeeded} picked across {minionSeats.length} minion{minionSeats.length === 1 ? '' : 's'}</>}
            <span className="text-stone-500"> · each minion gets 3 out-of-play good bluffs · click to {collapsed ? 'expand' : 'hide from players'}</span>
          </p>
        </div>
        <span className="text-stone-400 text-lg leading-none w-5 text-center">{collapsed ? '▸' : '▾'}</span>
      </button>
      {!collapsed && minionSeats.length > 0 && (
        <div className="space-y-4 mt-3">
          {minionSeats.map(seat => {
            const charName = CHAR_BY_ID[seat.actualRoleId]?.name || 'Minion';
            const bluffs = minionBluffs[seat.seatNum] || [null, null, null];
            return (
              <div key={seat.seatNum} className="card rounded p-2 sm:p-3">
                <div className="flex items-baseline justify-between gap-2 mb-2 flex-wrap">
                  <div>
                    <span className="text-amber-200 font-medium">{charName}</span>
                    <span className="text-xs text-stone-400 ml-2">
                      Seat #{seat.seatNum}{seat.playerName ? ` · ${seat.playerName}` : ''}
                    </span>
                  </div>
                  <span className="text-[10px] text-stone-500">
                    {bluffs.filter(Boolean).length} / 3 picked
                  </span>
                </div>
                <div className="grid grid-cols-3 gap-2 sm:gap-4">
                  {[0, 1, 2].map(i => (
                    <BluffSlot key={i}
                      slotIndex={i}
                      charId={bluffs[i]}
                      onPick={() => !readOnly && onPick(seat.seatNum, i)}
                      onClear={() => !readOnly && onClear(seat.seatNum, i)}
                    />
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </section>
  );
}

function LunaticBluffs({ bluffs, onPick, onClear }) {
  const [collapsed, setCollapsed] = useState(false);
  const filled = bluffs.filter(Boolean).length;
  return (
    <section className="parchment rounded-lg p-3 sm:p-4">
      <button onClick={() => setCollapsed(c => !c)}
        className="w-full flex items-center justify-between gap-2 text-left">
        <div>
          <h3 className="text-amber-200 font-semibold">Lunatic bluffs</h3>
          <p className="text-xs text-stone-400">
            {filled} / 3 picked
            <span className="text-stone-500"> · 3 fake bluffs shown to the Lunatic (who thinks they're the Demon). Any script role allowed.</span>
          </p>
        </div>
        <span className="text-stone-400 text-lg leading-none w-5 text-center">{collapsed ? '▸' : '▾'}</span>
      </button>
      {!collapsed && (
        <div className="grid grid-cols-3 gap-2 sm:gap-4 mt-3">
          {bluffs.map((charId, i) => (
            <BluffSlot key={i}
              slotIndex={i}
              charId={charId}
              onPick={() => onPick(i)}
              onClear={() => onClear(i)}
            />
          ))}
        </div>
      )}
    </section>
  );
}

function DemonBluffs({ bluffs, onPick, onClear }) {
  const [collapsed, setCollapsed] = useState(false);
  const filled = bluffs.filter(Boolean).length;
  return (
    <section className="parchment rounded-lg p-3 sm:p-4">
      <button onClick={() => setCollapsed(c => !c)}
        className="w-full flex items-center justify-between gap-2 text-left">
        <div>
          <h3 className="text-amber-200 font-semibold">Demon bluffs</h3>
          <p className="text-xs text-stone-400">
            {filled} / 3 picked
            <span className="text-stone-500"> · click to {collapsed ? 'expand' : 'hide from players'}</span>
          </p>
        </div>
        <span className="text-stone-400 text-lg leading-none w-5 text-center">{collapsed ? '▸' : '▾'}</span>
      </button>
      {!collapsed && (
        <div className="grid grid-cols-3 gap-2 sm:gap-4 mt-3">
          {bluffs.map((charId, i) => (
            <BluffSlot key={i}
              slotIndex={i}
              charId={charId}
              onPick={() => onPick(i)}
              onClear={() => onClear(i)}
            />
          ))}
        </div>
      )}
    </section>
  );
}

function BluffSlot({ slotIndex, charId, onPick, onClear }) {
  const c = charId ? CHAR_BY_ID[charId] : null;
  const img = charId ? iconUrl(charId) : null;

  if (!c) {
    return (
      <button onClick={onPick}
        className="card rounded-lg aspect-square flex flex-col items-center justify-center text-stone-500 hover:border-amber-500 hover:text-amber-300 transition">
        <span className="text-3xl leading-none">+</span>
        <span className="text-xs mt-1 uppercase tracking-wider">Bluff {slotIndex + 1}</span>
      </button>
    );
  }

  return (
    <div className="card rounded-lg p-2 sm:p-3 flex flex-col items-center gap-1 relative group/bluff">
      <button onClick={onPick} className="w-full flex flex-col items-center gap-1"
        title="Replace this bluff">
        <div className="rounded-full overflow-hidden border-2 border-amber-700 w-16 h-16 sm:w-20 sm:h-20"
          style={{ backgroundImage: 'url(data/tokens/character-token-noise.webp)', backgroundSize: 'cover' }}>
          {img && <img src={img} alt={c.name} className="w-full h-full object-cover" />}
        </div>
        <div className={`text-xs sm:text-sm font-medium team-${c.team}`}>{c.name}</div>
      </button>
      <div className="text-[10px] text-stone-300/80 leading-tight text-center px-1">
        {c.ability}
      </div>
      <button onClick={onClear}
        title="Clear this bluff"
        className="touch-show absolute top-1 right-1 bg-stone-900 border border-stone-700 rounded-full w-6 h-6 text-[12px] leading-none flex items-center justify-center opacity-0 group-hover/bluff:opacity-100 transition hover:border-red-500 hover:text-red-400">
        ×
      </button>
    </div>
  );
}

function BluffPicker({ slot, options, currentlyChosen, title, subtitle, onSelect, onClose }) {
  const [query, setQuery] = useState('');
  const filtered = options.filter(c =>
    !query || c.name.toLowerCase().includes(query.toLowerCase()) || (c.ability || '').toLowerCase().includes(query.toLowerCase())
  );
  const byTeam = { townsfolk: [], outsider: [], minion: [], demon: [] };
  for (const c of filtered) byTeam[c.team]?.push(c);
  const hasEvil = byTeam.minion.length || byTeam.demon.length;

  return (
    <div className="fixed inset-0 z-50 bg-black/70 flex items-center justify-center p-4" onClick={onClose}>
      <div className="parchment rounded-lg max-w-xl w-full max-h-[85vh] flex flex-col" onClick={e => e.stopPropagation()}>
        <div className="p-4 border-b border-stone-800 flex items-center justify-between">
          <h3 className="font-semibold text-amber-200">{title || `Pick demon bluff #${slot + 1}`}</h3>
          <button onClick={onClose} className="text-stone-400 hover:text-amber-200">✕</button>
        </div>
        <div className="p-3 border-b border-stone-800">
          <input
            autoFocus
            value={query}
            onChange={e => setQuery(e.target.value)}
            placeholder="Search by name or ability…"
            className="w-full bg-stone-900 border border-stone-700 rounded px-2 py-1.5 text-sm"
          />
          <p className="text-xs text-stone-500 mt-1">
            {subtitle || 'Only out-of-play Townsfolk and Outsiders from the script.'}
          </p>
        </div>
        <div className="scroll-y p-3 space-y-3">
          {['townsfolk', 'outsider', 'minion', 'demon'].map(team => {
            const list = byTeam[team] || [];
            if (list.length === 0) return null;
            return (
              <div key={team}>
                <div className={`text-xs uppercase tracking-wider mb-1.5 team-${team}`}>{TEAM_LABEL[team]}</div>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                  {list.map(c => {
                    const already = currentlyChosen.has(c.id);
                    return (
                      <button key={c.id}
                        disabled={already}
                        onClick={() => onSelect(c.id)}
                        className={`text-left card rounded p-2 flex items-start gap-2 ${already ? 'opacity-40 cursor-not-allowed' : 'hover:border-amber-500'}`}>
                        {iconUrl(c.id) && (
                          <img src={iconUrl(c.id)} alt="" className="w-10 h-10 rounded-full border border-stone-700 object-cover" />
                        )}
                        <div className="flex-1 min-w-0">
                          <div className={`team-${c.team} font-medium text-sm`}>
                            {c.name}
                            {already && <span className="text-[10px] uppercase text-stone-500 ml-2">already a bluff</span>}
                          </div>
                          <div className="text-[10px] text-stone-300/80 mt-0.5">{c.ability}</div>
                        </div>
                      </button>
                    );
                  })}
                </div>
              </div>
            );
          })}
          {filtered.length === 0 && (
            <div className="text-sm text-stone-500 italic p-6 text-center">
              {options.length === 0
                ? 'No available characters in the script.'
                : 'No matches for that search.'}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ---------------- Error boundary ----------------
// Surfaces runtime errors instead of letting React unmount everything to a blank page.
// Also shows a "reset state" button in case bad localStorage state is the cause.
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null, info: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { this.setState({ error, info }); console.error('Storyteller error:', error, info); }
  render() {
    if (this.state.error) {
      return (
        <div style={{ padding: 24, fontFamily: 'monospace', color: '#f5a' }}>
          <h2 style={{ color: '#fc6', marginBottom: 12 }}>Something broke in the storyteller app.</h2>
          <pre style={{ whiteSpace: 'pre-wrap', background: '#1c1a14', padding: 12, borderRadius: 6, border: '1px solid #4a3c22', overflow: 'auto' }}>
            {String(this.state.error?.stack || this.state.error)}
          </pre>
          <p style={{ marginTop: 16, color: '#aaa' }}>
            If this looks like stale saved-state, you can wipe it and reload:
          </p>
          <button
            onClick={() => { localStorage.removeItem('botc-storyteller-v1'); location.reload(); }}
            style={{ marginTop: 8, padding: '8px 16px', background: '#9c2b2b', color: '#fff', border: 'none', borderRadius: 4, cursor: 'pointer' }}>
            Reset saved state &amp; reload
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}

// ---------------- Mount ----------------
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
