                const hasName = (s.playerName || '').trim();
                const hasClaim = (s.claims || []).length > 0;
                return (
                  <li key={s.seatNum}
                    className={`card rounded px-2 py-1.5 flex items-center gap-2 text-sm
                      ${hasName ? 'border-emerald-700' : hasClaim ? 'border-amber-700' : 'border-stone-800'}`}>
                    <span className="text-amber-200/80 text-xs w-8 text-center">#{s.seatNum}</span>
                    <span className={`flex-1 min-w-0 truncate ${hasName ? 'text-stone-200' : 'text-stone-500 italic'}`}>
                      {hasName || (hasClaim ? '(typing name…)' : 'open')}
                    </span>
                    {hasName && (
                      <button onClick={() => onReleaseSeat(s.seatNum)}
                        title="Clear this seat — the player will need to rejoin"
                        className="text-[10px] px-1.5 py-0.5 rounded pill hover:border-red-500 hover:text-red-400">
                        release
                      </button>
                    )}
                  </li>
                );
              })}
            </ul>
          </section>
        )}
      </div>
    );
  }

  // Eligibility comes from whichever role the ST is currently "holding" via the SetupNeedsPanel.
  const eligibleSet = assigningRoleId
    ? eligibleSeatsForPending(assigningRoleId, grim.seats)
    : new Set();

  // Day-tab plumbing: viewingDayIndex < days.length means we're showing a past snapshot.
  const isViewingPastDay = grim.gameStarted && grim.viewingDayIndex < (grim.days?.length || 0);
  const displayedSeats = isViewingPastDay
    ? (grim.days[grim.viewingDayIndex]?.seats || grim.seats)
    : grim.seats;
  const displayedBluffs = isViewingPastDay
    ? (grim.days[grim.viewingDayIndex]?.demonBluffs || grim.demonBluffs)
    : grim.demonBluffs;
  const displayedNotes = isViewingPastDay
    ? (grim.days[grim.viewingDayIndex]?.townSquareNotes || grim.townSquareNotes)
    : grim.townSquareNotes;
  const readOnly = isViewingPastDay || !!forceReadOnly;

  // --- Night-info heads-up banners (Flower Girl, Town Crier) ---
  // On Day 2+, these characters wake each night* and learn something about the
  // previous in-game day. Surface that info at the top of the page so the ST
  // doesn't have to flip to the Nominations tab during the night phase.
  // We deliberately check ACTUAL role so a Drunk/Marionette version doesn't trigger,
  // and require the seat to be alive (dead character gets no info).
  const flowerGirlSeat = (grim.seats || []).find(s =>
    s.actualRoleId === 'flowergirl' && !s.isDead);
  const townCrierSeat = (grim.seats || []).find(s =>
    s.actualRoleId === 'towncrier' && !s.isDead);
  const liveDayIdx = (grim.days || []).length;            // 0 = Day 1, 1 = Day 2, …
  const prevDayIdx = liveDayIdx - 1;
  const onNightTwoPlus = grim.gameStarted && liveDayIdx >= 1;
  const showFlowerGirlBanner = !!flowerGirlSeat && onNightTwoPlus;
  const showTownCrierBanner  = !!townCrierSeat  && onNightTwoPlus;
  const prevDayEntry = onNightTwoPlus
    ? normalizeDayNoms((grim.nominationsByDay || {})[prevDayIdx])
    : null;
  // For Town Crier: did any nomination on the previous day come from a Minion?
  // Use the previous day's seat snapshot if available so role changes mid-game
  // are respected at the right point in time.
  const prevDaySeats = (grim.days?.[prevDayIdx]?.seats) || grim.seats || [];
  const prevDayMinionNominated = !!(showTownCrierBanner && prevDayEntry &&
    prevDayEntry.nominations.some(n => {
      const ns = prevDaySeats.find(s => s.seatNum === n.nominatorSeat);
      return ns && CHAR_BY_ID[ns.actualRoleId]?.team === 'minion';
    }));
  const prevDayDemonVoted = showFlowerGirlBanner && prevDayEntry
    ? prevDayEntry.demonVoted
    : false;

  return (
    <div className="space-y-4">
      {showFlowerGirlBanner && (
        <FlowerGirlBanner
          seat={flowerGirlSeat}
          prevDayNumber={prevDayIdx + 1}
          demonVoted={prevDayDemonVoted}
        />
      )}
      {showTownCrierBanner && (
        <TownCrierBanner
          seat={townCrierSeat}
          prevDayNumber={prevDayIdx + 1}
          minionNominated={prevDayMinionNominated}
        />
      )}
      {(grim.kazaliPicks || []).length > 0 && (
        <KazaliPicksBanner picks={grim.kazaliPicks} seats={grim.seats} />
      )}

      {nightToasts.length > 0 && (
        <NightToastStack toasts={nightToasts} onDismiss={onDismissNightToast} />
      )}

      {dayBanners.length > 0 && (
        <DayBannerStack banners={dayBanners} onDismiss={onDismissDayBanner} />
      )}

      {/* ST-response banner at top of grimoire — persistent reminder. */}
      <STResponseInline
        prompts={grim.nightPrompts || {}}
        seats={grim.seats || []}
        scriptCharIds={state.characterIds || []}
        onSend={onRespondToNightPrompt}
      />

      {/* ST-response popup: full-screen modal that auto-opens on a new
          awaiting-st-response prompt. Dismissable so ST can fall back to the
          banner. Sending YES/NO naturally closes via status change. */}
      <STResponsePopup
        prompts={grim.nightPrompts || {}}
        seats={grim.seats || []}
        dismissed={dismissedResponses || new Set()}
        onDismiss={onDismissResponsePopup}
        onSend={onRespondToNightPrompt}
        scriptCharIds={state.characterIds || []}
      />

      <GrimoireToolbar
        view={state.grimoireView}
        onSetView={onSetView}
        onRegenerate={onRegenerate}
        onJumpToBag={onJumpToBag}
      />

      <SetupNeedsPanel
        seats={grim.seats}
        pendingAssignments={grim.pendingAssignments}
        assigningRoleId={assigningRoleId}
        eligibleCount={eligibleSet.size}
        onPickup={onPickupAssignment}
        onCancel={onCancelAssignment}
        onUndo={onUndoAssignmentByCharId}
        setupRemindersDone={grim.setupRemindersDone || {}}
        setupRemindersSkipped={!!grim.setupRemindersSkipped}
        onMarkSetupReminder={onMarkSetupReminder}
        onSkipSetupReminders={onSkipSetupReminders}
        onSetupReminderAction={onSetupReminderAction}
        gameStarted={!!grim.gameStarted}
      />

      <PlayersPanel
        seats={grim.seats}
        travellers={grim.travellers || []}
        onSetName={onSetPlayerName}
        onRelease={onReleaseSeat}
        onDealRole={onDealRoleToSeat}
        onUndealSeat={onUndealSeat}
        dealBlockedReason={dealBlockedReason}
        onSetSeatLocal={onSetSeatLocal}
        onShowLocalRole={onShowLocalRole}
        onAddTraveller={onAddTraveller}
        onRemoveTraveller={onRemoveTraveller}
        onSetTravellerName={onSetTravellerName}
        onReleaseTravellerSeat={onReleaseTravellerSeat}
        onSetTravellerInsertion={onSetTravellerInsertion}
        onSetTravellerRole={onSetTravellerRole}
        onSetTravellerAlignment={onSetTravellerAlignment}
        onDealRoleToTraveller={onDealRoleToTraveller}
        onUndealTraveller={onUndealTraveller}
        onToggleTravellerDead={onToggleTravellerDead}
        onToggleTravellerAlignment={onToggleTravellerAlignment}
      />

      {grim.gameStarted && (
        <DayTabs
          days={grim.days || []}
          viewingDayIndex={grim.viewingDayIndex || 0}
          onSelect={onSetViewingDayIndex}
        />
      )}

      {swapSourceSeat != null && (
        <SwapBanner
          sourceSeat={grim.seats.find(s => s.seatNum === swapSourceSeat)}
          onCancel={onCancelSwap}
        />
      )}

      {state.grimoireView === 'circular' ? (
        <CircularGrimoire
          seats={displayedSeats}
          travellers={grim.travellers || []}
          eligibleSet={readOnly ? new Set() : eligibleSet}
          swapSourceSeat={readOnly ? null : swapSourceSeat}
          assigningRoleId={readOnly ? null : assigningRoleId}
          townSquareNotes={displayedNotes || { above: '', below: '' }}
          gameStarted={grim.gameStarted}
          days={grim.days || []}
          viewingDayIndex={grim.viewingDayIndex || 0}
          readOnly={readOnly}
          onSeatTap={readOnly ? undefined : onSeatTap}
          onUnassignPending={readOnly ? undefined : onUnassignPending}
          onToggleDead={readOnly ? undefined : onToggleDead}
          onToggleAlignment={readOnly ? undefined : onToggleAlignment}
          onSwap={readOnly ? undefined : onSwap}
          onOpenReminderPicker={readOnly ? undefined : setPickerSeat}
          onOpenRoleChanger={readOnly ? undefined : setRoleChangerSeat}
          onRemoveReminder={readOnly ? undefined : onRemoveReminder}
          onSetTownSquareNote={readOnly ? undefined : onSetTownSquareNote}
          onSetViewingDayIndex={onSetViewingDayIndex}
          onToggleTravellerDead={readOnly ? undefined : onToggleTravellerDead}
          onToggleTravellerAlignment={readOnly ? undefined : onToggleTravellerAlignment}
          onOpenTravellerReminderPicker={readOnly ? undefined : setPickerTravellerNum}
          onOpenTravellerRoleChanger={readOnly ? undefined : setRoleChangerTravellerNum}
          onRemoveTravellerReminder={readOnly ? undefined : onRemoveTravellerReminder}
        />
      ) : (
        <ListGrimoire
          seats={displayedSeats}
          travellers={grim.travellers || []}
          eligibleSet={readOnly ? new Set() : eligibleSet}
          swapSourceSeat={readOnly ? null : swapSourceSeat}
          assigningRoleId={readOnly ? null : assigningRoleId}
          onSeatTap={readOnly ? undefined : onSeatTap}
          onUnassignPending={readOnly ? undefined : onUnassignPending}
          onToggleDead={readOnly ? undefined : onToggleDead}
          onToggleAlignment={readOnly ? undefined : onToggleAlignment}
          onSwap={readOnly ? undefined : onSwap}
          onOpenReminderPicker={readOnly ? undefined : setPickerSeat}
          onOpenRoleChanger={readOnly ? undefined : setRoleChangerSeat}
          onRemoveReminder={readOnly ? undefined : onRemoveReminder}
          onToggleTravellerDead={readOnly ? undefined : onToggleTravellerDead}
          onToggleTravellerAlignment={readOnly ? undefined : onToggleTravellerAlignment}
          onOpenTravellerReminderPicker={readOnly ? undefined : setPickerTravellerNum}
          onOpenTravellerRoleChanger={readOnly ? undefined : setRoleChangerTravellerNum}
          onRemoveTravellerReminder={readOnly ? undefined : onRemoveTravellerReminder}
        />
      )}

      {readOnly && (
        <section className="parchment rounded-lg p-3 border-amber-700/60 text-center text-sm text-amber-300">
          📜 Viewing a past day's snapshot ({grim.days[grim.viewingDayIndex]?.label}). Read-only.
        </section>
      )}

      <DemonBluffs
        bluffs={displayedBluffs || [null, null, null]}
        onPick={readOnly ? () => {} : (slot) => setBluffPickerSlot(slot)}
        onClear={readOnly ? () => {} : (slot) => onSetDemonBluff(slot, null)}
      />

      {(state.bagCharacterIds || []).includes('lunatic') && (
        <LunaticBluffs
          bluffs={grim.lunaticBluffs || [null, null, null]}
          onPick={readOnly ? () => {} : (slot) => setLunaticBluffPickerSlot(slot)}
          onClear={readOnly ? () => {} : (slot) => onSetLunaticBluff(slot, null)}
        />
      )}

      {/* Snitch ability: "Each Minion gets 3 bluffs." One panel per minion seat. */}
      {(state.bagCharacterIds || []).includes('snitch') && (
        <MinionBluffsPanel
          seats={grim.seats}
          minionBluffs={grim.minionBluffs || {}}
          readOnly={readOnly}
          onPick={(seatNum, slot) => setMinionBluffPicker({ seatNum, slot })}
          onClear={(seatNum, slot) => onSetMinionBluff(seatNum, slot, null)}
        />
      )}

      <NightPhaseSection
        seats={displayedSeats}
        viewingDayIndex={grim.viewingDayIndex || 0}
        daysSnapshots={grim.days || []}
        gameStarted={grim.gameStarted}
        extraCharIds={(state.bagCharacterIds || []).filter(id => NO_SEAT_ASSIGNMENT.has(id))}
        automation={!!(state.features?.automation)}
        nightPrompts={grim.nightPrompts || {}}
        readOnly={readOnly}
        onStartPrompt={onStartNightPrompt}
        onCancelPrompt={onCancelNightPrompt}
        onMarkDone={onMarkStepDone}
        onClearAllPrompts={onClearAllNightPrompts}
        scriptCharIds={state.characterIds || []}
        onOpenLocalPrompt={onOpenLocalPrompt}
        onOpenMoonchildCapture={onOpenMoonchildCapture}
        onOpenEvilTwinModal={onOpenEvilTwinModal}
        onOpenBarberFlow={onOpenBarberFlow}
        onSweetheartPick={onSweetheartPick}
        onResolveMoonchild={onResolveMoonchild}
        nominationsByDay={grim.nominationsByDay || {}}
        onPromoteScarletWoman={onPromoteScarletWoman}
        onStartShowGrimoire={onStartShowGrimoire}
        onSendCeremony={onSendCeremonyInfo}
        lastExecution={grim.lastExecution || null}
      />

      <DealRolesButton
        seats={grim.seats}
        onDealAll={onDealAllRoles}
        onUndealAll={onUndealAllRoles}
        blockedReason={dealBlockedReason}
      />

      <BeginOrAdvanceButton
        seats={grim.seats}
        gameStarted={grim.gameStarted}
        daysCount={(grim.days || []).length}
        onBegin={onBeginGame}
        onAdvance={onAdvanceToNight}
        setupReady={(() => {
          if ((grim.pendingAssignments || []).length > 0) return false;
          if (grim.setupRemindersSkipped) return true;
          const items = listSetupReminders(grim.seats || [], grim.setupRemindersDone || {});
          return items.every(it => it.done);
        })()}
        setupBlockReason="Finish the setup needs above before starting."
      />

      {pickerSeat != null && (
        <ReminderPicker
          seat={grim.seats.find(s => s.seatNum === pickerSeat)}
          seats={grim.seats}
          pendingAssignments={grim.pendingAssignments}
          extraCharIds={[
            ...(state.bagCharacterIds || []).filter(id => NO_SEAT_ASSIGNMENT.has(id)),
            ...((grim.travellers || []).map(t => t.charId).filter(Boolean)),
          ]}
          scriptCharIds={state.characterIds}
          onSelect={(r) => onAddReminder(pickerSeat, r.charId, r.label, !!r.hiddenRoleMarker)}
          onClose={() => setPickerSeat(null)}
        />
      )}

      {pickerTravellerNum != null && (() => {
        const t = (grim.travellers || []).find(x => x.travellerNum === pickerTravellerNum);
        const c = CHAR_BY_ID[t?.charId];
        return (
          <ReminderPicker
            seat={{ seatNum: `T${pickerTravellerNum}` }}
            targetLabel={`T#${pickerTravellerNum}${t?.playerName ? ` · ${t.playerName}` : ''}${c ? ` (${c.name})` : ''}`}
            seats={grim.seats}
            pendingAssignments={grim.pendingAssignments}
            extraCharIds={[
              ...(state.bagCharacterIds || []).filter(id => NO_SEAT_ASSIGNMENT.has(id)),
              ...((grim.travellers || []).map(tt => tt.charId).filter(Boolean)),
            ]}
            scriptCharIds={state.characterIds}
            onSelect={(r) => onAddTravellerReminder(pickerTravellerNum, r.charId, r.label)}
            onClose={() => setPickerTravellerNum(null)}
          />
        );
      })()}

      {roleChangerTravellerNum != null && (() => {
        const t = (grim.travellers || []).find(x => x.travellerNum === roleChangerTravellerNum);
        const currentName = CHAR_BY_ID[t?.charId]?.name || `T#${roleChangerTravellerNum}`;
        return (
          <BluffPicker
            slot={0}
            title={`Change role for T#${roleChangerTravellerNum}${t?.playerName ? ` · ${t.playerName}` : ''}`}
            subtitle={`Currently ${currentName}. Pick any traveller role.`}
            options={allTravellerChars()}
            currentlyChosen={new Set()}
            onSelect={(charId) => { onSetTravellerRole(roleChangerTravellerNum, charId); setRoleChangerTravellerNum(null); }}
            onClose={() => setRoleChangerTravellerNum(null)}
          />
        );
      })()}

      {bluffPickerSlot != null && (
        <BluffPicker
          slot={bluffPickerSlot}
          options={availableBluffs(state.characterIds, grim.seats, grim.pendingAssignments)}
          currentlyChosen={new Set((grim.demonBluffs || []).filter(Boolean))}
          onSelect={(charId) => { onSetDemonBluff(bluffPickerSlot, charId); setBluffPickerSlot(null); }}
          onClose={() => setBluffPickerSlot(null)}
        />
      )}

      {lunaticBluffPickerSlot != null && (
        <BluffPicker
          slot={lunaticBluffPickerSlot}
          title="Pick Lunatic bluff"
          subtitle="Any role from the script (in or out of play). These are the fake bluffs shown to the Lunatic, who thinks they're the Demon."
          options={(state.characterIds || []).map(id => CHAR_BY_ID[id]).filter(Boolean).filter(c => ['townsfolk','outsider','minion','demon'].includes(c.team))}
          currentlyChosen={new Set((grim.lunaticBluffs || []).filter(Boolean))}
          onSelect={(charId) => { onSetLunaticBluff(lunaticBluffPickerSlot, charId); setLunaticBluffPickerSlot(null); }}
          onClose={() => setLunaticBluffPickerSlot(null)}
        />
      )}

      {roleChangerSeat != null && (() => {
        const seat = grim.seats.find(s => s.seatNum === roleChangerSeat);
        const currentName = CHAR_BY_ID[seat?.actualRoleId]?.name || `Seat #${roleChangerSeat}`;
        return (
          <BluffPicker
            slot={0}
            title={`Change role for Seat #${roleChangerSeat}${seat?.playerName ? ` · ${seat.playerName}` : ''}`}
            subtitle={`Currently ${currentName}. Pick any role from the script. The player will need their role re-dealt — the deal status resets automatically.`}
            options={(state.characterIds || []).map(id => CHAR_BY_ID[id]).filter(Boolean).filter(c => ['townsfolk','outsider','minion','demon'].includes(c.team))}
            currentlyChosen={new Set()}
            onSelect={(charId) => { onChangeRole(roleChangerSeat, charId); setRoleChangerSeat(null); }}
            onClose={() => setRoleChangerSeat(null)}
          />
        );
      })()}

      {minionBluffPicker != null && (() => {
        const { seatNum, slot } = minionBluffPicker;
        const minionSeat = grim.seats.find(s => s.seatNum === seatNum);
        const minionName = CHAR_BY_ID[minionSeat?.actualRoleId]?.name || `Seat #${seatNum}`;
        const currentForThisMinion = new Set(((grim.minionBluffs || {})[seatNum] || []).filter(Boolean));
        return (
          <BluffPicker
            slot={slot}
            title={`Pick ${minionName} bluff #${slot + 1}`}
            subtitle="Out-of-play Townsfolk and Outsiders from the script. These are the 3 bluffs the Snitch grants this minion."
            options={availableBluffs(state.characterIds, grim.seats, grim.pendingAssignments)}
            currentlyChosen={currentForThisMinion}
            onSelect={(charId) => { onSetMinionBluff(seatNum, slot, charId); setMinionBluffPicker(null); }}
            onClose={() => setMinionBluffPicker(null)}
          />
        );
      })()}
    </div>
  );
}

// Heads-up banner: pinned to the top of the Grimoire page on Day 2+ whenever a
// Flower Girl is in play. Pulls from the previous in-game day's nomination flags.
// The ST can mark Demon voted on the Nominations tab; this banner mirrors that
// state so during the night phase they don't have to switch tabs to remember.
function FlowerGirlBanner({ seat, prevDayNumber, demonVoted }) {
  const tone = demonVoted
    ? 'border-red-600 bg-red-950/30 text-red-200'
    : 'border-emerald-700 bg-emerald-950/30 text-emerald-200';
  const big = demonVoted ? 'YES — a Demon voted' : 'NO — no Demon voted';
  return (
    <section className={`parchment rounded-lg p-3 sm:p-4 border-2 ${tone}`}>
      <div className="flex items-start gap-3">
        <div className="text-2xl leading-none mt-0.5">🌸</div>
        <div className="flex-1 min-w-0">
          <div className="text-amber-200 font-semibold text-sm">
            Flower Girl info — tonight
          </div>
          <div className="text-xs text-stone-300/90 mt-0.5">
            Seat #{seat.seatNum}{seat.playerName ? ` · ${seat.playerName}` : ''}.
            On Day {prevDayNumber}: <span className="font-bold">{big}</span>.
          </div>
          <div className="text-[10px] text-stone-500 mt-1">
            Toggle "Demon voted" for Day {prevDayNumber} on the Nominations tab to change this.
          </div>
        </div>
      </div>
    </section>
  );
}

// Heads-up banner: Kazali picked their minions from the player phone. Lists each
// pick + a hint to re-deal those phones (the seats' roles have already been auto-
// converted to the chosen minion roles).
function KazaliPicksBanner({ picks, seats }) {
  const seatBy = Object.fromEntries((seats || []).map(s => [s.seatNum, s]));
  return (
    <section className="parchment rounded-lg p-3 sm:p-4 border-2 border-red-700 bg-red-950/30">
      <div className="flex items-start gap-3">
        <div className="text-2xl leading-none mt-0.5">🗡️</div>
        <div className="flex-1 min-w-0">
          <div className="text-amber-200 font-semibold text-sm">
            Kazali picked their Minions
          </div>
          <ul className="text-xs text-stone-300/90 mt-1 space-y-0.5">
            {picks.map((p, i) => {
              const s = seatBy[p.seatNum];
              const c = CHAR_BY_ID[p.minionId];
              return (
                <li key={i}>
                  Seat #{p.seatNum}{s?.playerName ? ` · ${s.playerName}` : ''} →{' '}
                  <span className={`team-${c?.team || 'minion'} font-medium`}>{c?.name || p.minionId}</span>
                </li>
              );
            })}
          </ul>
          <div className="text-[10px] text-stone-500 mt-1">
            Roles already updated on the grimoire. Re-deal each picked seat's role so their phone shows the new minion role.
          </div>
        </div>
      </div>
    </section>
  );
}

// Heads-up banner for Town Crier (Sects & Violets). Each night*, the Town Crier
// learns whether any Minion nominated on the previous day. Derived from the
// nominations on the previous day (no per-day flag — the nominator's role is
// pulled from the previous-day seat snapshot, falling back to live seats).
function TownCrierBanner({ seat, prevDayNumber, minionNominated }) {
  const tone = minionNominated
    ? 'border-red-600 bg-red-950/30 text-red-200'
    : 'border-emerald-700 bg-emerald-950/30 text-emerald-200';
  const big = minionNominated ? 'YES — a Minion nominated' : 'NO — no Minion nominated';
  return (
    <section className={`parchment rounded-lg p-3 sm:p-4 border-2 ${tone}`}>
      <div className="flex items-start gap-3">
        <div className="text-2xl leading-none mt-0.5">🔔</div>
        <div className="flex-1 min-w-0">
          <div className="text-amber-200 font-semibold text-sm">
            Town Crier info — tonight
          </div>
          <div className="text-xs text-stone-300/90 mt-0.5">
            Seat #{seat.seatNum}{seat.playerName ? ` · ${seat.playerName}` : ''}.
            On Day {prevDayNumber}: <span className="font-bold">{big}</span>.
          </div>
          <div className="text-[10px] text-stone-500 mt-1">
            Derived from Day {prevDayNumber} nominations — change a nominator on the Nominations tab to update this.
          </div>
        </div>
      </div>
    </section>
  );
}

function GrimoireToolbar({ view, onSetView, onRegenerate, onJumpToBag }) {
  return (
    <div className="flex flex-wrap items-center justify-between gap-3">
      <div className="flex items-center gap-2">
        <span className="text-xs uppercase tracking-wider text-stone-400">View:</span>
        <div className="inline-flex">
          {[{id:'circular',label:'Circular'},{id:'list',label:'List'}].map((v,i) => (
            <button key={v.id}
              onClick={() => onSetView(v.id)}
              className={`px-3 py-1.5 text-sm border ${i===0 ? 'rounded-l' : 'rounded-r border-l-0'}
                ${view === v.id ? 'bg-stone-800 border-amber-600 text-amber-200' : 'border-stone-700 text-stone-400 hover:border-amber-500'}`}>
              {v.label}
            </button>
          ))}
        </div>
      </div>
      <div className="flex items-center gap-2">
        <button onClick={onJumpToBag}
          className="text-xs px-3 py-1.5 rounded pill hover:border-amber-500 hover:text-amber-200">
          ← Edit bag
        </button>
        <button onClick={() => { if (confirm('Re-shuffle the bag and replace all assignments?')) onRegenerate(); }}
          className="text-xs px-3 py-1.5 rounded pill hover:border-amber-500 hover:text-amber-200">
          Re-shuffle
        </button>
      </div>
    </div>
  );
}

function PendingPrompt({ roleId, eligibleCount, remaining, seats }) {
  const c = CHAR_BY_ID[roleId];
  const isMar = roleId === 'marionette';
  const recluseInPlay = isMar && seats?.some(s => s.perceivedRoleId === 'recluse');
  return (
    <section className="parchment rounded-lg p-3 border-emerald-700/60">
      <div className="flex items-center gap-3 flex-wrap">
        {iconUrl(roleId) && <img src={iconUrl(roleId)} alt="" className="w-12 h-12 rounded-full border border-emerald-700" />}
        <div className="flex-1">
          <div className="text-emerald-300 font-medium">
            Click a highlighted seat to assign the {c?.name || roleId}.
          </div>
          <div className="text-xs text-stone-400 mt-0.5">
            {eligibleCount === 0
              ? <span className="text-red-400">No eligible seats — check your bag composition.</span>
              : <>{eligibleCount} eligible seat{eligibleCount===1?'':'s'} highlighted.</>}
            {isMar && (
              <> Marionette must sit next to the Demon
                {recluseInPlay && <> (or the Recluse, who may register as one)</>}.
              </>
            )}
            {remaining > 1 && <> · {remaining - 1} more to assign after this.</>}
          </div>
        </div>
      </div>
    </section>
  );
}

// Compact composite reminder token: round, character icon as background, label overlaid.
// `size` may be a pixel number (e.g. 36) or any CSS length (e.g. '100%') to fill the parent.
// `zoom` (from the grimoire pan/zoom layer) relaxes the label clamp at higher magnification.
function ReminderToken({ reminder, onRemove, size = 36, zoom = 1 }) {
  const c = CHAR_BY_ID[reminder.charId];
  const img = iconUrl(reminder.charId);
  const isFixed = typeof size === 'number';
  const cssSize = isFixed ? `${size}px` : size;
  const fontPx = isFixed ? Math.max(7, size * 0.18) : 8;
  // At default zoom keep labels to a single truncated line so they fit the small slot.
  // When the storyteller is zoomed in, let labels wrap (up to 3 lines at high zoom).
  const labelClampClass = zoom >= 2.5 ? '' : zoom >= 1.5 ? 'line-clamp-3' : 'truncate';
  // Slight bump to font when zoomed-in so the wrap-friendly layout uses the space well.
  const labelFontPx = zoom >= 2.5 ? fontPx * 1.25 : fontPx;
  return (
    <div className="relative inline-block group/rem"
      style={{ width: cssSize, height: isFixed ? cssSize : undefined, aspectRatio: '1 / 1' }}>
      <div className="rounded-full overflow-hidden border border-amber-700/70 bg-stone-900 relative w-full h-full"
        title={`${c?.name || reminder.charId}: ${reminder.label}`}
        style={{
          backgroundImage: 'url(data/tokens/character-token-noise.webp)',
          backgroundSize: 'cover',
        }}>
        {img && <img src={img} alt="" className="w-full h-full object-cover opacity-90" draggable={false} />}
        <div className={`absolute inset-x-0 bottom-0 bg-stone-950/85 text-amber-100 text-center leading-none px-0.5 ${labelClampClass}`}
          style={{ fontSize: `${labelFontPx}px` }}>
          {reminder.label}
        </div>
      </div>
      {onRemove && (
        <button onClick={(e) => { e.stopPropagation(); onRemove(); }}
          title="Remove reminder"
          className="touch-show absolute -top-1 -right-1 bg-stone-900 border border-stone-700 rounded-full w-4 h-4 flex items-center justify-center text-[10px] leading-none opacity-0 group-hover/rem:opacity-100 transition hover:border-red-500 hover:text-red-400">
          ×
        </button>
      )}
    </div>
  );
}

// Modal: pick a reminder to attach to a seat. Groups by character.
// Includes "Is the Drunk" / "Is the Marionette" markers when those roles are in play
// (or still pending) — selecting one is equivalent to assigning the hidden role.
// Includes a "Custom" section letting the ST pick any in-script icon + freeform text.
function ReminderPicker({ seat, seats, pendingAssignments, extraCharIds, scriptCharIds, targetLabel, onSelect, onClose }) {
  const all = availableReminders(seats, pendingAssignments, extraCharIds || []);
  const headerLabel = targetLabel || (seat?.seatNum != null ? `seat #${seat.seatNum}` : 'seat');
  const grouped = {};
  for (const r of all) {
    if (!grouped[r.charId]) grouped[r.charId] = { charId: r.charId, name: r.charName, team: r.team, reminders: [] };
    grouped[r.charId].reminders.push(r);
  }
  const ordered = Object.values(grouped).sort((a, b) => a.name.localeCompare(b.name));
  const [customOpen, setCustomOpen] = useState(false);
  return (
    <div className="fixed inset-0 z-50 bg-black/70 flex items-center justify-center p-4" onClick={onClose}>
      <div className="parchment rounded-lg max-w-xl w-full max-h-[85vh] flex flex-col" onClick={e => e.stopPropagation()}>
        <div className="p-4 border-b border-stone-800 flex items-center justify-between">
          <h3 className="font-semibold text-amber-200">Add reminder · {headerLabel}</h3>
          <button onClick={onClose} className="text-stone-400 hover:text-amber-200">✕</button>
        </div>
        <div className="scroll-y p-3 space-y-3">
          {/* Custom reminder builder */}
          <div className="card rounded p-2 border-stone-700">
            <button onClick={() => setCustomOpen(o => !o)}
              className="w-full flex items-center justify-between text-left">
              <span className="text-sm font-semibold text-amber-200">+ Custom reminder</span>
              <span className="text-xs text-stone-400">{customOpen ? '▾' : '▸'}</span>
            </button>
            {customOpen && (
              <CustomReminderForm
                scriptCharIds={scriptCharIds || []}
                onAdd={(charId, label) => {
                  const c = CHAR_BY_ID[charId];
                  if (!c) return;
                  onSelect({ charId, label, charName: c.name, team: c.team });
                  onClose();
                }}
              />
            )}
          </div>

          {ordered.map(g => (
            <div key={g.charId}>
              <div className={`text-xs uppercase tracking-wider mb-1.5 team-${g.team}`}>{g.name}</div>
              <div className="flex flex-wrap gap-2">
                {g.reminders.map((r, i) => (
                  <button key={i}
                    onClick={() => { onSelect(r); onClose(); }}
                    className={`flex items-center gap-2 card rounded px-2 py-1.5 hover:border-amber-500
                      ${r.hiddenRoleMarker ? 'border-amber-700' : ''}`}
                    title={r.hiddenRoleMarker ? `Assigning this changes seat #${seat?.seatNum}'s actual role to the ${r.charName}.` : ''}>
                    <ReminderToken reminder={r} size={32} />
                    <span className="text-sm">{r.label}</span>
                    {r.hiddenRoleMarker && (
                      <span className="text-[9px] uppercase tracking-wider text-amber-300 ml-auto">assigns role</span>
                    )}
                  </button>
                ))}
              </div>
            </div>
          ))}
          {ordered.length === 0 && (
            <div className="text-sm text-stone-500 italic p-6 text-center">
              No built-in reminders — use the custom reminder form above to create your own.
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function CustomReminderForm({ scriptCharIds, onAdd }) {
  // Group script characters by team so the icon picker is scannable.
  const chars = (scriptCharIds || []).map(id => CHAR_BY_ID[id]).filter(Boolean);
  const byTeam = {};
  for (const c of chars) {
    if (!byTeam[c.team]) byTeam[c.team] = [];
    byTeam[c.team].push(c);
  }
  const [selectedId, setSelectedId] = useState(chars[0]?.id || '');
  const [text, setText] = useState('');
  const trimmed = text.trim();
  const canAdd = !!selectedId && !!trimmed;

  return (
    <div className="mt-3 space-y-3">
      <div>
        <div className="text-xs uppercase tracking-wider text-stone-400 mb-1.5">Token icon (any character from the script)</div>
        <div className="space-y-2 max-h-44 overflow-y-auto pr-1">
          {TEAM_ORDER.filter(t => byTeam[t]?.length).map(team => (
            <div key={team}>
              <div className={`text-[10px] uppercase tracking-wider mb-1 team-${team}`}>{TEAM_LABEL[team]}</div>
              <div className="grid grid-cols-6 sm:grid-cols-8 gap-1">
                {byTeam[team].map(c => (
                  <button key={c.id}
                    onClick={() => setSelectedId(c.id)}
                    title={c.name}
                    className={`rounded-full overflow-hidden border-2 aspect-square transition
                      ${selectedId === c.id ? 'border-amber-500 ring-2 ring-amber-500/40' : 'border-stone-700 hover:border-amber-700'}`}>
                    {iconUrl(c.id)
                      ? <img src={iconUrl(c.id)} alt={c.name} className="w-full h-full object-cover" />
                      : <span className="text-[10px]">{c.name[0]}</span>}
                  </button>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>
      <div>
        <label className="text-xs uppercase tracking-wider text-stone-400 mb-1 block">Reminder text</label>
        <input value={text}
          onChange={e => setText(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter' && canAdd) onAdd(selectedId, trimmed); }}
          maxLength={40}
          placeholder="e.g. Cursed, Used today, Marked…"
          className="w-full bg-stone-900 border border-stone-700 rounded px-2 py-1.5 text-sm"
        />
      </div>
      <div className="flex items-center justify-between gap-2">
        <div className="flex items-center gap-2">
          {selectedId && iconUrl(selectedId) && trimmed && (
            <>
              <span className="text-xs text-stone-400">Preview:</span>
              <ReminderToken reminder={{ charId: selectedId, label: trimmed }} size={36} />
            </>
          )}
        </div>
        <button onClick={() => onAdd(selectedId, trimmed)}
          disabled={!canAdd}
          className={`text-sm px-3 py-1.5 rounded font-medium
            ${canAdd ? 'bg-amber-600 hover:bg-amber-500 text-stone-950' : 'bg-stone-800 text-stone-500 cursor-not-allowed'}`}>
          Add reminder
        </button>
      </div>
    </div>
  );
}

// Returns short setup-notes text for a character: SETUP_DELTAS note if available,
// else the bracketed snippet from the ability text, else the full ability text.
function getSetupNote(charId) {
  const delta = SETUP_DELTAS[charId];
  if (delta?.note) return delta.note;
  const c = CHAR_BY_ID[charId];
  if (!c) return '';
  const m = (c.ability || '').match(/\[([^\]]+)\]/);
  if (m) return m[1];
  return c.ability || '';
}

// Top-of-grimoire checklist: every in-play character with setup: true, plus any
// pending hidden roles (Drunk/Marionette) that need ST assignment.
function SetupNeedsPanel({ seats, pendingAssignments, assigningRoleId, eligibleCount, onPickup, onCancel, onUndo,
                            setupRemindersDone = {}, setupRemindersSkipped = false, onMarkSetupReminder, onSkipSetupReminders, onSetupReminderAction, gameStarted = false }) {
  // In-play characters (by actualRoleId) with setup: true
  const inPlay = new Set(seats.map(s => s.actualRoleId));
  const charIds = [...inPlay].filter(id => CHAR_BY_ID[id]?.setup);
  // Append pending hidden roles (they aren't on a seat yet)
  for (const id of pendingAssignments) {
    if (!inPlay.has(id) && CHAR_BY_ID[id]) charIds.push(id);
  }
  // Setup reminders (Red Herring etc.) — only render while the game hasn't started.
  const setupReminders = !gameStarted ? listSetupReminders(seats, setupRemindersDone) : [];

  // If absolutely nothing to surface, render nothing.
  if (charIds.length === 0 && setupReminders.length === 0) return null;

  // Order: pending (need attention) first, then assigned-but-undoable hidden roles, then informational.
  const isHidden = (id) => NOT_IN_PHYSICAL_BAG.has(id);
  charIds.sort((a, b) => {
    const aPend = pendingAssignments.includes(a) ? 0 : (isHidden(a) ? 1 : 2);
    const bPend = pendingAssignments.includes(b) ? 0 : (isHidden(b) ? 1 : 2);
    if (aPend !== bPend) return aPend - bPend;
    return (CHAR_BY_ID[a]?.name || '').localeCompare(CHAR_BY_ID[b]?.name || '');
  });

  const anyPending = pendingAssignments.length > 0;
  const remindersAllDone = setupReminders.every(it => it.done);
  const anyReminderOutstanding = setupReminders.length > 0 && !remindersAllDone && !setupRemindersSkipped;
  const blocksBegin = anyPending || anyReminderOutstanding;

  return (
    <section className={`parchment rounded-lg p-3 sm:p-4 ${blocksBegin ? 'border-amber-700/70' : ''}`}>
      <div className="flex items-baseline justify-between gap-2 mb-2">
        <div>
          <h3 className="text-amber-200 font-semibold">Setup needs</h3>
          <p className="text-xs text-stone-400">
            {blocksBegin
              ? 'Finish these before clicking Begin Game.'
              : 'All setup handled. Reference notes for in-play setup effects.'}
          </p>
        </div>
        {assigningRoleId && (
          <button onClick={onCancel}
            className="text-xs px-3 py-1 rounded pill hover:border-amber-500 hover:text-amber-200">
            Cancel pickup
          </button>
        )}
      </div>

      {charIds.length > 0 && (
        <ul className="space-y-1.5">
          {charIds.map(id => {
            const c = CHAR_BY_ID[id];
            const isPendingThis = pendingAssignments.includes(id);
            const isPickedUp = assigningRoleId === id;
            // Find a seat where this hidden role was assigned (perceived != actual matches charId)
            const assignedSeat = !isPendingThis && isHidden(id)
              ? seats.find(s => s.actualRoleId === id && s.perceivedRoleId !== s.actualRoleId)
              : null;
            return (
              <SetupEntry key={id}
                char={c}
                isPending={isPendingThis}
                isPickedUp={isPickedUp}
                eligibleCount={isPickedUp ? eligibleCount : null}
                assignedSeat={assignedSeat}
                onPickup={(isHidden(id) || isPendingThis) ? () => onPickup(id) : null}
                onUndo={assignedSeat ? () => onUndo(id) : null}
                seats={seats}
              />
            );
          })}
        </ul>
      )}

      {/* Setup reminders sub-section (Red Herring, etc.) */}
      {setupReminders.length > 0 && (
        <div className={`${charIds.length > 0 ? 'mt-3 pt-3 border-t border-stone-800' : ''}`}>
          <div className="flex items-baseline justify-between gap-2 mb-1.5">
            <div className="text-xs uppercase tracking-wider text-amber-300">
              Setup reminders
            </div>
            <span className="text-[11px] text-stone-400">
              {setupReminders.filter(it => it.done).length} / {setupReminders.length} done
              {setupRemindersSkipped && <span className="ml-1 text-amber-400">· skipped</span>}
            </span>
          </div>
          <ul className="space-y-1.5">
            {setupReminders.map(it => (
              <li key={it.id} className={`card rounded p-2 flex items-start gap-2 ${it.done ? 'opacity-70' : ''}`}>
                {iconUrl(it.icon) && (
                  <img src={iconUrl(it.icon)} alt=""
                    className="w-9 h-9 rounded-full border border-stone-700 object-cover flex-shrink-0" />
                )}
                <div className="flex-1 min-w-0">
                  <div className={`text-sm font-medium ${it.done ? 'text-emerald-300 line-through' : 'text-amber-200'}`}>
                    {it.title}
                  </div>
                  <div className="text-xs text-stone-400 mt-0.5">{it.description}</div>
                </div>
                {it.actionLabel && !it.done && (
                  <button onClick={() => onSetupReminderAction && onSetupReminderAction(it.actionKind)}
                    className="text-[11px] px-2 py-1 rounded transition flex-shrink-0 pill hover:border-emerald-500 hover:text-emerald-200 text-emerald-300 mr-1">
                    {it.actionLabel}
                  </button>
                )}
                <button onClick={() => onMarkSetupReminder && onMarkSetupReminder(it.id, !it.done)}
                  disabled={it.autoDetected}
                  title={it.autoDetected ? 'Auto-detected from grimoire reminders' : undefined}
                  className={`text-[11px] px-2 py-1 rounded transition flex-shrink-0
                    ${it.done
                      ? 'pill text-emerald-300 cursor-default'
                      : 'pill hover:border-amber-500 hover:text-amber-200'}
                    ${it.autoDetected ? 'cursor-not-allowed' : ''}`}>
                  {it.done ? '✓ Done' : 'Mark done'}
                </button>
              </li>
            ))}
          </ul>
          {!remindersAllDone && onSkipSetupReminders && (
            <div className="mt-2 flex items-center justify-between gap-2">
              <span className="text-[10px] text-stone-500">
                Reminders block Begin Game until done or skipped.
              </span>
              <button onClick={() => onSkipSetupReminders(!setupRemindersSkipped)}
                className={`text-[11px] px-2 py-1 rounded pill
                  ${setupRemindersSkipped ? 'border-amber-500 text-amber-200' : 'hover:border-amber-500 hover:text-amber-200 text-stone-300'}`}>
                {setupRemindersSkipped ? '↺ Un-skip' : 'Skip remaining'}
              </button>
            </div>
          )}
        </div>
      )}
    </section>
  );
}

function SetupEntry({ char, isPending, isPickedUp, eligibleCount, assignedSeat, onPickup, onUndo, seats }) {
  if (!char) return null;
  const note = getSetupNote(char.id);
  const recluseInPlay = char.id === 'marionette' && seats?.some(s => s.perceivedRoleId === 'recluse');

  return (
    <li className={`card rounded p-2 flex items-start gap-3 transition
      ${isPickedUp ? 'border-sky-400 ring-2 ring-sky-400/30 bg-sky-950/20' :
        isPending ? 'border-amber-700' : ''}`}>
      <ReminderToken reminder={{ charId: char.id, label: char.name }} size={44} />
      <div className="flex-1 min-w-0">
        <div className="flex items-center gap-2 flex-wrap">
          <span className={`team-${char.team} font-medium`}>{char.name}</span>
          {isPending && <span className="text-[10px] uppercase pill rounded px-1.5 py-0.5 text-amber-300 border-amber-700">needs assignment</span>}
          {assignedSeat && <span className="text-[10px] uppercase text-emerald-400">✓ seat #{assignedSeat.seatNum}</span>}
        </div>
        <div className="text-xs text-stone-300/80 mt-0.5 leading-snug">
          {note}
          {char.id === 'marionette' && recluseInPlay && (
            <span className="text-stone-400"> (Recluse may register as the Demon for adjacency.)</span>
          )}
        </div>
        {isPickedUp && (
          <div className="text-xs text-sky-300 mt-1">
            {eligibleCount === 0
              ? <span className="text-red-400">No eligible seats — check the bag.</span>
              : <>Tap one of the {eligibleCount} highlighted seat{eligibleCount===1?'':'s'} to assign.</>}
          </div>
        )}
      </div>
      <div className="flex flex-col gap-1 items-end">
        {onPickup && isPending && (
          <button onClick={onPickup}
            className={`text-xs px-3 py-1.5 rounded font-medium
              ${isPickedUp ? 'bg-sky-700 hover:bg-sky-600 text-stone-100' : 'bg-amber-700 hover:bg-amber-600 text-stone-100'}`}>
            {isPickedUp ? 'Picked up' : 'Tap to assign'}
          </button>
        )}
        {onUndo && (
          <button onClick={onUndo}
            className="text-xs px-2 py-1 rounded pill hover:border-amber-500 hover:text-amber-200">
            Undo
          </button>
        )}
      </div>
    </li>
  );
}

// Storyteller-side panel for tracking which player is at each seat. Names get
// set automatically when a player joins via player.html; ST can also edit manually.
// Per-row "Pass role" button sends just that seat's role to its player; status
// pill + row color reflect the player's response (pending / asking / accepted).
function PlayersPanel({ seats, travellers, onSetName, onRelease, onDealRole, onUndealSeat, dealBlockedReason,
                        onSetSeatLocal, onShowLocalRole,
                        onAddTraveller, onRemoveTraveller, onSetTravellerName, onReleaseTravellerSeat,
                        onSetTravellerInsertion, onSetTravellerRole, onSetTravellerAlignment,
                        onDealRoleToTraveller, onUndealTraveller,
                        onToggleTravellerDead, onToggleTravellerAlignment }) {
  const [collapsed, setCollapsed] = useState(false);
  const [addTravellerOpen, setAddTravellerOpen] = useState(false);
  const named = seats.filter(s => (s.playerName || '').trim());
  const dealtCount = seats.filter(s => s.roleDealt).length;
  const acceptedCount = seats.filter(s => s.playerStatus === 'accepted').length;
  const travs = travellers || [];
  return (
    <section className="parchment rounded-lg p-3 sm:p-4">
      <button onClick={() => setCollapsed(c => !c)}
        className="w-full flex items-center justify-between gap-2 text-left">
        <div>
          <h3 className="text-amber-200 font-semibold">Players</h3>
          <p className="text-xs text-stone-400">
            {named.length} / {seats.length} seats filled
            {dealtCount > 0 && <> · {dealtCount} dealt</>}
            {acceptedCount > 0 && <> · {acceptedCount} accepted</>}
            {travs.length > 0 && <> · {travs.length} traveller{travs.length === 1 ? '' : 's'}</>}
            <span className="text-stone-500"> · click to {collapsed ? 'expand' : 'collapse'}</span>
          </p>
        </div>
        <span className="text-stone-400 text-lg leading-none w-5 text-center">{collapsed ? '▸' : '▾'}</span>
      </button>
      {!collapsed && (
        <>
          {dealBlockedReason && (
            <div className="mt-2 text-xs text-amber-300 bg-amber-950/30 border border-amber-700 rounded px-3 py-2">
              ⚠ Dealing blocked: {dealBlockedReason}
            </div>
          )}
          <ul className="grid grid-cols-1 sm:grid-cols-2 gap-1.5 mt-3">
            {seats.map(seat => (
              <PlayerRow key={seat.seatNum}
                seat={seat}
                onSetName={onSetName}
                onRelease={onRelease}
                onDealRole={onDealRole}
                onUndealSeat={onUndealSeat}
                dealBlockedReason={dealBlockedReason}
                onSetLocal={onSetSeatLocal}
                onShowLocalRole={onShowLocalRole}
              />
            ))}
          </ul>

          {/* Travellers subsection */}
          <div className="mt-4 pt-3 border-t border-stone-800">
            <div className="flex items-center justify-between gap-2 mb-2">
              <h4 className="text-amber-200 font-semibold text-sm">Travellers</h4>
              <button onClick={() => setAddTravellerOpen(true)}
                className="text-xs px-3 py-1.5 rounded pill hover:border-amber-500 hover:text-amber-200">
                + Add traveller
              </button>
            </div>
            {travs.length === 0 ? (
              <p className="text-xs text-stone-500 italic">None. Click "+ Add traveller" to bring a new player in mid-game.</p>
            ) : (
              <ul className="space-y-2">
                {travs.map(t => (
                  <TravellerRow key={t.travellerNum}
                    traveller={t}
                    seats={seats}
                    onSetName={onSetTravellerName}
                    onRelease={onReleaseTravellerSeat}
                    onRemove={onRemoveTraveller}
                    onSetInsertion={onSetTravellerInsertion}
                    onSetRole={onSetTravellerRole}
                    onSetAlignment={onSetTravellerAlignment}
                    onDealRole={onDealRoleToTraveller}
                    onUndeal={onUndealTraveller}
                    onToggleDead={onToggleTravellerDead}
                    onToggleAlignment={onToggleTravellerAlignment}
                  />
                ))}
              </ul>
            )}
          </div>

          {addTravellerOpen && (
            <AddTravellerModal
              seats={seats}
              onAdd={(payload) => { onAddTraveller(payload); setAddTravellerOpen(false); }}
              onClose={() => setAddTravellerOpen(false)}
            />
          )}
        </>
      )}
    </section>
  );
}

function PlayerRow({ seat, onSetName, onRelease, onDealRole, onUndealSeat, dealBlockedReason,
                     onSetLocal, onShowLocalRole }) {
  const hasName = (seat.playerName || '').trim();
  const hasClaims = (seat.claims || []).length > 0;
  const dupClaim = (seat.claims || []).length > 1;
  const status = seat.playerStatus;          // null | 'pending' | 'asking' | 'accepted'
  const dealt = !!seat.roleDealt;
  const isLocal = !!seat.isLocal;

  // Row background reflects player response. Duplicate-claim always wins (security signal).
  // Local players get a distinct purple tint so the ST can spot them quickly.
  const bgClass = dupClaim
    ? 'border-red-600 bg-red-950/30'
    : status === 'accepted' ? 'border-emerald-600 bg-emerald-950/30'
    : status === 'asking'   ? 'border-yellow-500 bg-yellow-950/30'
    : isLocal              ? 'border-purple-700/60 bg-purple-950/15'
    : '';

  return (
    <li className={`card rounded px-2 py-1.5 flex items-center gap-2 ${bgClass}`}>
      <span className="text-amber-200/80 text-xs w-8 text-center">#{seat.seatNum}</span>
      <input
        value={seat.playerName || ''}
        onChange={e => onSetName(seat.seatNum, e.target.value)}
        placeholder="(empty)"
        className="flex-1 min-w-0 bg-stone-900 border border-stone-700 rounded px-2 py-1 text-sm"
      />
      <div className="flex items-center gap-1 flex-wrap justify-end">
        {dupClaim && (
          <span title="Two clients are claiming this seat — possible URL manipulation"
            className="text-[10px] uppercase font-bold px-1.5 py-0.5 rounded bg-red-700 text-stone-100">
            ⚠ dup
          </span>
        )}
        {!dupClaim && hasClaims && !dealt && (
          <span title="Player connected from phone"
            className="text-[10px] uppercase px-1.5 py-0.5 rounded bg-emerald-900 text-emerald-300 border border-emerald-700">
            joined
          </span>
        )}
        {!hasClaims && hasName && !dealt && !isLocal && (
          <span title="Name entered manually by ST"
            className="text-[10px] uppercase px-1.5 py-0.5 rounded bg-stone-800 text-stone-400 border border-stone-700">
            manual
          </span>
        )}
        {isLocal && (
          <span title="Local player — ST shows role on their own device"
            className="text-[10px] uppercase font-bold px-1.5 py-0.5 rounded bg-purple-900 text-purple-200 border border-purple-700">
            🏠 local
          </span>
        )}
        {/* Deal status pills */}
        {dealt && status === 'pending' && (
          <span title="Role sent, awaiting player response"
            className="text-[10px] uppercase px-1.5 py-0.5 rounded bg-amber-950/60 text-amber-300 border border-amber-700">
            dealt
          </span>
        )}
        {dealt && status === 'asking' && (
          <span title="Player tapped Ask a question — pull them aside"
            className="text-[10px] uppercase font-bold px-1.5 py-0.5 rounded bg-yellow-700 text-stone-100">
            ✋ question
          </span>
        )}
        {dealt && status === 'accepted' && (
          <span title="Player has accepted their role"
            className="text-[10px] uppercase font-bold px-1.5 py-0.5 rounded bg-emerald-700 text-stone-100">
            ✓ accepted
          </span>
        )}
        {/* Pass / Re-pass / Take back (remote) — OR Show role (local) */}
        {!dealt && !isLocal && (
          <button onClick={() => onDealRole(seat.seatNum)}
            disabled={!hasName || !!dealBlockedReason}
            title={dealBlockedReason || (hasName ? 'Send this seat its role' : 'Player name required first')}
            className={`text-[11px] px-2 py-0.5 rounded pill font-medium
              ${hasName && !dealBlockedReason ? 'border-amber-600 text-amber-200 hover:bg-amber-950/40' : 'opacity-40 cursor-not-allowed'}`}>
            Pass role
          </button>
        )}
        {isLocal && onShowLocalRole && (
          <button onClick={() => onShowLocalRole(seat.seatNum)}
            disabled={!!dealBlockedReason}
            title={dealBlockedReason || 'Show this role full-screen on the ST device for the player to see'}
            className={`text-[11px] px-2 py-0.5 rounded pill font-medium
              ${!dealBlockedReason ? 'border-purple-600 text-purple-200 hover:bg-purple-950/40' : 'opacity-40 cursor-not-allowed'}`}>
            {dealt ? 'Re-show role' : 'Show role'}
          </button>
        )}
        {dealt && !isLocal && (
          <button onClick={() => onUndealSeat(seat.seatNum)}
            title="Take back this seat's role"
            className="text-[11px] px-1.5 py-0.5 rounded pill hover:border-amber-500 hover:text-amber-200">
            take back
          </button>
        )}
        {/* Toggle: local ↔ remote. Sits at the end so it's out of the way. */}
        {onSetLocal && (
          <button onClick={() => onSetLocal(seat.seatNum, !isLocal)}
            title={isLocal ? 'Switch this player back to using their phone' : 'No phone? Switch to local — show role on the ST device instead'}
            className={`text-[11px] px-1.5 py-0.5 rounded pill
              ${isLocal ? 'border-purple-600 text-purple-300 hover:text-purple-200' : 'hover:border-purple-500 hover:text-purple-300'}`}>
            {isLocal ? '📱 remote' : '🏠 local'}
          </button>
        )}
        {(hasName || hasClaims) && (
          <button onClick={() => onRelease(seat.seatNum)}
            title="Clear player and any claims for this seat"
            className="text-[11px] px-1.5 py-0.5 rounded pill hover:border-red-500 hover:text-red-400">
            release
          </button>
        )}
      </div>
    </li>
  );
}

// ALL_CHARACTERS / CHAR_BY_ID already include the traveller team; this helper just
// surfaces them sorted by name for the picker UIs.
function allTravellerChars() {
  return (window.BOTC_DATA?.characters || [])
    .filter(c => c.team === 'traveller')
    .sort((a, b) => a.name.localeCompare(b.name));
}

// Build the URL a traveller's player opens. Includes the room code so the
// traveller joins the right game, plus their traveller number.
function travellerLinkFor(num) {
  const room = getRoomFromUrl() || getLastRoom() || '';
  const roomParam = room ? `room=${room}&` : '';
  return `${siteBaseUrl()}player.html?${roomParam}t=${num}`;
}

// Render a small inline SVG QR for the given URL. Returns null if the qrcode lib
// isn't loaded (fail silently — the link is still visible).
function buildQrSvg(text, sizePx = 96) {
  try {
    if (typeof qrcode !== 'function') return null;
    const q = qrcode(0, 'L');
    q.addData(text);
    q.make();
    // 0 = no margin module, modules will draw exactly. The lib produces a string.
    return q.createSvgTag({ cellSize: 4, margin: 2 });
  } catch (e) { return null; }
}

// Full-screen role reveal shown on the ST's own device for local players (no
// phone). Mirrors what the remote player would see on their phone: big token,
// role name + ability, alignment, and any bluffs (Demon / Lunatic / Snitch
// minion / Summoner). The ST hands their phone to the player to view; tapping
// "Got it" dismisses and marks the seat as accepted.
function LocalRoleOverlay({ seat, state, onDismiss, onAccept }) {
  const grim = state?.grimoire || {};
  const role = CHAR_BY_ID[seat.perceivedRoleId];
  const actual = CHAR_BY_ID[seat.actualRoleId];
  const align = seat.alignment || naturalAlignment(seat.perceivedRoleId);
  // Bluff sources mirror the player-side RoleReveal logic.
  const isLunatic = seat.actualRoleId === 'lunatic';
  const isSummoner = seat.actualRoleId === 'summoner';
  const perceivedIsDemon = role?.team === 'demon';
  const snitchInPlay = (state?.bagCharacterIds || []).includes('snitch');
  const actualIsMinion = actual?.team === 'minion';
  const perceivedIsMinion = role?.team === 'minion';
  const showMinionBluffs = snitchInPlay && actualIsMinion && perceivedIsMinion;
  const minionBluffsForMe = showMinionBluffs
    ? ((grim.minionBluffs || {})[seat.seatNum] || [null, null, null]).filter(Boolean)
    : [];
  // skipDemonBluffs is set by the storyteller when promoting (e.g. SW becomes
  // the Demon) — those players don't get the 3-bluff first-night info.
  const showBluffs = !seat.skipDemonBluffs && (perceivedIsDemon || showMinionBluffs || isSummoner);
  const bluffs = showMinionBluffs
    ? minionBluffsForMe
    : (isLunatic
      ? (grim.lunaticBluffs || []).filter(Boolean)
      : (grim.demonBluffs || []).filter(Boolean));
  // The "you were originally X" banner used for Kazali conversions and the
  // Scarlet Woman promotion. The wording differs based on who changed them.
  const prev = seat.previousRoleId && seat.previousRoleId !== seat.perceivedRoleId
    ? CHAR_BY_ID[seat.previousRoleId] : null;

  return (
    <div onClick={onDismiss}
      className="fixed inset-0 z-[60] bg-stone-950 overflow-y-auto cursor-pointer"
      style={{ touchAction: 'manipulation' }}>
      <div className="min-h-full max-w-md mx-auto p-4 sm:p-6 space-y-4 text-center" onClick={e => e.stopPropagation()}>
        <div>
          <div className="text-xs text-stone-400 uppercase tracking-wider">{seat.playerName || '(no name)'}</div>
          <div className="text-amber-200/80 text-sm">Seat #{seat.seatNum} · local</div>
        </div>

        {prev && (
          <div className="rounded-lg p-3 border-2 border-red-700 bg-red-950/40 text-center">
            <div className="text-xs uppercase tracking-wider text-red-300 font-semibold mb-2">Your role has changed</div>
            <div className="text-xs text-stone-300 mb-2">You were originally:</div>
            <div className="flex flex-col items-center gap-1.5">
              <div className="rounded-full overflow-hidden border-2 border-amber-700 w-20 h-20"
                style={{ backgroundImage: 'url(data/tokens/character-token-noise.webp)', backgroundSize: 'cover' }}>
                {iconUrl(seat.previousRoleId) && (
                  <img src={iconUrl(seat.previousRoleId)} alt={prev.name} className="w-full h-full object-cover" />
                )}
              </div>
              <div className={`text-sm font-bold team-${prev.team}`}>{prev.name}</div>
            </div>
            <p className="text-xs text-stone-300 mt-3">
              {seat.changedBy === 'scarletwoman'
                ? 'The previous Demon has died and you have taken over as the Demon.'
                : `${seat.changedBy === 'kazali' ? 'The Kazali' : 'The Storyteller'} has chosen you to become a Minion of the evil team.`}
            </p>
          </div>
        )}

        <div className="text-xs uppercase tracking-wider text-amber-300">Your role</div>
        <div className="mx-auto rounded-full overflow-hidden border-4 border-amber-700 relative shadow-xl"
          style={{ width: 'min(220px, 60vw)', aspectRatio: '1 / 1',
                   backgroundImage: 'url(data/tokens/character-token-noise.webp)', backgroundSize: 'cover' }}>
          {iconUrl(seat.perceivedRoleId) && (
            <img src={iconUrl(seat.perceivedRoleId)} alt={role?.name || ''} className="w-full h-full object-cover" />
          )}
          <div className="absolute inset-x-0 bottom-0 bg-stone-950/85 px-2 py-2 text-center" style={{ minHeight: '42%' }}>
            <div className="text-[10px] sm:text-xs leading-tight mb-1 text-stone-200 px-1">{role?.ability}</div>
            <div className={`text-sm sm:text-base font-bold leading-tight ${role ? `team-${role.team}` : ''}`}>
              {role?.name || '?'}
            </div>
          </div>
        </div>

        <div className="pt-2">
          <div className={`text-2xl font-bold ${role ? `team-${role.team}` : ''}`}>{role?.name}</div>
          <p className="text-sm text-stone-300 mt-2 leading-relaxed">{role?.ability}</p>
        </div>

        {/* Alignment box mirrors the traveller reveal so the player sees it clearly. */}
        <div className={`rounded-lg p-3 border-2
          ${align === 'evil' ? 'border-red-700 bg-red-950/40 text-red-200' : 'border-sky-700 bg-sky-950/40 text-sky-200'}`}>
          <div className="text-xs uppercase tracking-wider">Your alignment</div>
          <div className="text-2xl font-bold mt-1">{align === 'evil' ? 'EVIL' : 'GOOD'}</div>
        </div>

        {showBluffs && (
          <div className="pt-4 border-t border-stone-800">
            <div className="text-xs uppercase tracking-wider text-amber-300 mb-1">
              {showMinionBluffs ? 'Your bluffs (from the Snitch)' : (isSummoner ? 'Your bluffs (Summoner)' : 'Your bluffs')}
            </div>
            <p className="text-xs text-stone-400 mb-3">3 roles you can claim to be</p>
            <div className="grid grid-cols-3 gap-2">
              {[0, 1, 2].map(i => {
                const sourceArr = showMinionBluffs
                  ? (grim.minionBluffs || {})[seat.seatNum]
                  : (isLunatic ? grim.lunaticBluffs : grim.demonBluffs);
                const bId = sourceArr?.[i];
                const bc = bId ? CHAR_BY_ID[bId] : null;
                return (
                  <div key={i} className="text-center">
                    <div className="rounded-full overflow-hidden border-2 border-amber-700/70 mx-auto aspect-square w-full"
                      style={{ backgroundImage: 'url(data/tokens/character-token-noise.webp)', backgroundSize: 'cover' }}>
                      {bc && iconUrl(bId)
                        ? <img src={iconUrl(bId)} alt={bc.name} className="w-full h-full object-cover" />
                        : <div className="w-full h-full flex items-center justify-center text-stone-600 text-xs">?</div>}
                    </div>
                    {bc ? (
                      <>
                        <div className={`mt-1 text-[11px] font-medium team-${bc.team}`}>{bc.name}</div>
                        <div className="text-[9px] text-stone-300/80 leading-tight mt-0.5">{bc.ability}</div>
                      </>
                    ) : (
                      <div className="mt-1 text-[10px] text-stone-500 italic">(no bluff set)</div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        <div className="pt-4 border-t border-stone-800 space-y-2">
          <button onClick={onAccept}
            className="w-full py-3 rounded-lg text-base font-semibold bg-emerald-600 hover:bg-emerald-500 text-stone-950">
            Got it — hand back to the storyteller
          </button>
          <p className="text-[11px] text-stone-500">Tapping confirms the player has seen their role.</p>
        </div>
      </div>
    </div>
  );
}

// Full-screen QR overlay so the traveller can scan without seeing anything else
// on the storyteller's screen. Tap anywhere (or the close button) to dismiss.
function QrFullscreenOverlay({ url, label, onClose }) {
  // Build the QR fresh each render; the underlying lib produces an SVG string we
  // inject so the QR scales with CSS. Falls back to plain text if the lib failed.
  let svg = null;
  try {
    if (typeof qrcode === 'function') {
      const q = qrcode(0, 'L');
      q.addData(url);
      q.make();
      svg = q.createSvgTag({ cellSize: 12, margin: 4 });
    }
  } catch {}
  return (
    <div onClick={onClose}
      className="fixed inset-0 z-[60] bg-white flex flex-col items-center justify-center p-4 cursor-pointer"
      style={{ touchAction: 'manipulation' }}>
      {label && (
        <div className="text-stone-700 text-sm uppercase tracking-widest mb-3 font-semibold">{label}</div>
      )}
      {svg ? (
        <div className="w-[min(90vmin,720px)] h-[min(90vmin,720px)] flex items-center justify-center"
          ref={el => {
            if (!el) return;
            el.innerHTML = svg;
            const inner = el.firstElementChild;
            if (inner) {
              inner.setAttribute('width', '100%');
              inner.setAttribute('height', '100%');
              inner.style.display = 'block';
            }
          }} />
      ) : (
        <div className="text-stone-800 text-center">
          <p className="text-lg mb-2">QR library not loaded.</p>
          <p className="text-sm break-all bg-stone-100 p-3 rounded border border-stone-300 max-w-md">{url}</p>
        </div>
      )}
      {/* Always print the encoded URL below the QR so the ST can sanity-check
          (and so anyone whose phone can't scan QRs can just type it). */}
      <div className="mt-3 text-stone-700 text-xs sm:text-sm break-all max-w-[min(90vmin,720px)] text-center font-mono px-2">{url}</div>
      <div className="mt-2 text-stone-500 text-xs">Tap anywhere to close</div>
      <button onClick={(e) => { e.stopPropagation(); onClose(); }}
        className="absolute top-3 right-3 bg-stone-900 text-white rounded-full w-9 h-9 text-lg leading-none flex items-center justify-center shadow">
        ✕
      </button>
    </div>
  );
}

function TravellerRow({ traveller: t, seats, onSetName, onRelease, onRemove,
                       onSetInsertion, onSetRole, onSetAlignment,

  const [showQr, setShowQr] = useState(false);
  const c = CHAR_BY_ID[t.charId];
  const hasName = (t.playerName || '').trim();
  const hasClaims = (t.claims || []).length > 0;
  const dupClaim = (t.claims || []).length > 1;
  const status = t.playerStatus;
  const dealt = !!t.roleDealt;
  const align = t.alignment || 'good';
  const url = travellerLinkFor(t.travellerNum);

  const bgClass = dupClaim
    ? 'border-red-600 bg-red-950/30'
    : status === 'accepted' ? 'border-emerald-600 bg-emerald-950/30'
    : status === 'asking'   ? 'border-yellow-500 bg-yellow-950/30'
    : 'border-purple-700/60 bg-purple-950/15';

  return (
    <li className={`card rounded p-2 ${bgClass} ${t.isDead ? 'opacity-60' : ''}`}>
      <div className="flex items-center gap-2 flex-wrap">
        <span className="text-purple-300 text-xs font-bold w-10 text-center" title="Traveller">T#{t.travellerNum}</span>
        {iconUrl(t.charId) && (
          <img src={iconUrl(t.charId)} alt={c?.name || ''}
            className={`w-9 h-9 rounded-full border border-stone-700 object-cover ${t.isDead ? 'grayscale' : ''}`} />
        )}
        <div className="flex-1 min-w-0">
          <input value={t.playerName || ''}
            onChange={e => onSetName(t.travellerNum, e.target.value)}
            placeholder="(player name)"
            className="w-full bg-stone-900 border border-stone-700 rounded px-2 py-1 text-sm"
          />
          <div className="text-[10px] text-stone-400 mt-0.5 flex items-center gap-2 flex-wrap">
            <span className="team-traveller font-medium">{c?.name || '?'}</span>
            <button onClick={() => onToggleAlignment(t.travellerNum)}
              className={`text-[10px] uppercase font-bold px-1.5 rounded border
                ${align === 'evil' ? 'border-red-600 text-red-300' : 'border-sky-600 text-sky-300'}`}
              title="Click to flip alignment">
              {align === 'evil' ? '⚑ Evil' : '⚑ Good'}
            </button>
            {dupClaim && <span className="text-[10px] uppercase font-bold px-1.5 py-0.5 rounded bg-red-700 text-stone-100">⚠ dup</span>}
            {!dupClaim && hasClaims && <span className="text-[10px] uppercase px-1.5 py-0.5 rounded bg-emerald-900 text-emerald-300 border border-emerald-700">joined</span>}
            {dealt && status === 'pending'  && <span className="text-[10px] uppercase px-1.5 py-0.5 rounded bg-amber-950/60 text-amber-300 border border-amber-700">dealt</span>}
            {dealt && status === 'asking'   && <span className="text-[10px] uppercase font-bold px-1.5 py-0.5 rounded bg-yellow-700 text-stone-100">✋ question</span>}
            {dealt && status === 'accepted' && <span className="text-[10px] uppercase font-bold px-1.5 py-0.5 rounded bg-emerald-700 text-stone-100">✓ accepted</span>}
          </div>
        </div>
        <div className="flex flex-col items-end gap-1">
          {!dealt && (
            <button onClick={() => onDealRole(t.travellerNum)}
              disabled={!hasName}
              title={hasName ? 'Send traveller their role' : 'Player name required'}
              className={`text-[11px] px-2 py-0.5 rounded pill font-medium
                ${hasName ? 'border-amber-600 text-amber-200 hover:bg-amber-950/40' : 'opacity-40 cursor-not-allowed'}`}>
              Pass role
            </button>
          )}
          {dealt && (
            <button onClick={() => onUndeal(t.travellerNum)}
              className="text-[11px] px-1.5 py-0.5 rounded pill hover:border-amber-500 hover:text-amber-200">
              take back
            </button>
          )}
          <button onClick={() => setExpanded(e => !e)}
            className="text-[11px] px-1.5 py-0.5 rounded pill hover:border-amber-500 hover:text-amber-200">
            {expanded ? 'hide' : 'options'}
          </button>
        </div>
      </div>

      {expanded && (
        <div className="mt-2 pt-2 border-t border-stone-800 space-y-2 text-xs">
          {/* Link + QR */}
          <div>
            <div className="text-[10px] uppercase tracking-wider text-stone-400 mb-1">Player join link</div>
            <div className="flex items-center gap-1 flex-wrap">
              <input readOnly value={url}
                onFocus={e => e.target.select()}
                className="flex-1 min-w-0 bg-stone-900 border border-stone-700 rounded px-2 py-1 text-xs text-stone-200" />
              <button onClick={() => { navigator.clipboard?.writeText(url); }}
                className="text-[11px] px-2 py-1 rounded pill hover:border-amber-500 hover:text-amber-200">copy</button>
              <button onClick={() => setShowQr(true)}
                className="text-[11px] px-2 py-1 rounded pill hover:border-amber-500 hover:text-amber-200">
                show QR
              </button>
            </div>
          </div>
          {showQr && (
            <QrFullscreenOverlay url={url} label={`Traveller T#${t.travellerNum}`}
              onClose={() => setShowQr(false)} />

          {/* Insertion point */}
          <div>
            <label className="text-[10px] uppercase tracking-wider text-stone-400 block mb-1">Sits in circle</label>
            <select value={t.insertAfterSeat ?? 0}
              onChange={e => onSetInsertion(t.travellerNum, Number(e.target.value))}
              className="w-full bg-stone-900 border border-stone-700 rounded px-2 py-1 text-xs">
              <option value={0}>Before seat #1</option>
              {seats.map(s => (
                <option key={s.seatNum} value={s.seatNum}>After seat #{s.seatNum}{s.playerName ? ` (${s.playerName})` : ''}</option>
              ))}
            </select>
          </div>

          {/* Role picker */}
          <div>
            <label className="text-[10px] uppercase tracking-wider text-stone-400 block mb-1">Traveller role</label>
            <select value={t.charId || ''}
              onChange={e => onSetRole(t.travellerNum, e.target.value)}
              className="w-full bg-stone-900 border border-stone-700 rounded px-2 py-1 text-xs">
              <option value="">— pick a role —</option>
              {allTravellerChars().map(tc => (
                <option key={tc.id} value={tc.id}>{tc.name}</option>
              ))}
            </select>
            {c?.ability && <p className="text-[10px] text-stone-400 mt-1 leading-snug">{c.ability}</p>}
          </div>

          {/* Alive/dead + release + remove */}
          <div className="flex items-center gap-1 flex-wrap pt-1">
            <button onClick={() => onToggleDead(t.travellerNum)}
              className={`text-[11px] px-2 py-0.5 rounded pill ${t.isDead ? 'border-emerald-700 text-emerald-300' : 'hover:border-red-500 hover:text-red-400'}`}>
              {t.isDead ? 'Revive' : 'Mark dead'}
            </button>
            {(hasName || hasClaims) && (
              <button onClick={() => onRelease(t.travellerNum)}
                className="text-[11px] px-2 py-0.5 rounded pill hover:border-amber-500 hover:text-amber-200">
                release seat
              </button>
            )}
            <button onClick={() => { if (confirm(`Remove traveller T#${t.travellerNum} (${c?.name || ''}) from the game?`)) onRemove(t.travellerNum); }}
              className="text-[11px] px-2 py-0.5 rounded pill border-red-700 text-red-300 hover:bg-red-950/40 ml-auto">
              ✕ remove from game
            </button>
          </div>
        </div>
      )}
    </li>
  );
}

function AddTravellerModal({ seats, onAdd, onClose }) {
  const all = allTravellerChars();
  const [charId, setCharId] = useState(all[0]?.id || '');
  const [alignment, setAlignment] = useState('good');
  const [insertAfter, setInsertAfter] = useState(seats.length); // default: after last seat
  const [playerName, setPlayerName] = useState('');
  const [query, setQuery] = useState('');
  const filtered = all.filter(c =>
    !query || c.name.toLowerCase().includes(query.toLowerCase()) || (c.ability || '').toLowerCase().includes(query.toLowerCase())
  );
  const canAdd = !!charId;
  return (
    <div className="fixed inset-0 z-50 bg-black/70 flex items-center justify-center p-4" onClick={onClose}>
